name: Docs Health

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/**'
      - 'package.json'
      - '.nvmrc'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/**'
      - 'package.json'
      - '.nvmrc'
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * 1'

permissions:
  contents: read

jobs:
  docs-health:
    uses: Latimer-Woods-Tech/Factory/.github/workflows/_docs-health.yml@main
    with:
      repo_profile: app
      tools_ref: main
      enforce_generated: true
