# capabilities.yml — capricast (P2.15)
# Schema: docs/architecture/ADMIN_TECHNICAL_GUIDE.md §3.1.1
# Validated by: .github/workflows/_app-capability-lint.yml (P2.16)
#
# Note: The Worker is named `capricast-api`; legacy names include `videoking`,
# `nichestream-api`. The capabilities file retains the `videoking.yml` filename
# for backwards compatibility with the capabilities-loader.
#
# supervisor_access tiers:
#   green   — supervisor may call without human review
#   yellow  — supervisor may call; human confirms before execution
#   red     — human must explicitly approve; supervisor may only plan, not execute
#   denied  — never callable by supervisor

version: 1
app:
  id: capricast
  name: "capricast"
  repo: Latimer-Woods-Tech/capricast
  custom_domain: api.capricast.com
  product_tier: revenue

routes:
  # ── Admin telemetry (mandatory per service-registry.yml) ────────────────────
  - path: /api/admin/health
    method: GET
    handler_class: read-internal
    side_effects: none
    supervisor_access: green

  - path: /api/admin/metrics
    method: GET
    handler_class: read-internal
    side_effects: none
    supervisor_access: green
    params_schema:
      window: { type: enum, values: [1h, 6h, 24h, 7d], optional: true }

  - path: /api/admin/events
    method: GET
    handler_class: read-internal
    side_effects: none
    supervisor_access: green
    params_schema:
      severity: { type: enum, values: [error, warn, info], optional: true }
      limit:    { type: integer, min: 1, max: 100, optional: true }

  # ── Creators ─────────────────────────────────────────────────────────────────
  - path: /api/admin/creators
    method: GET
    handler_class: read-internal
    side_effects: none
    supervisor_access: green
    params_schema:
      page:   { type: integer, min: 1, optional: true }
      limit:  { type: integer, min: 1, max: 100, optional: true }
      status: { type: enum, values: [pending, active, suspended, onboarding], optional: true }

  - path: /api/admin/creators/:id
    method: GET
    handler_class: read-internal
    side_effects: none
    supervisor_access: green

  - path: /api/admin/creators/:id/verify-stripe
    method: POST
    handler_class: mutate-internal
    side_effects: write-external
    supervisor_access: yellow
    reversibility: idempotent
    requires_codeowner_oob: false

  - path: /api/admin/creators/:id/mark-ready-for-payout
    method: POST
    handler_class: mutate-internal
    side_effects: write-app
    supervisor_access: yellow
    reversibility: reversible-with-effort
    requires_codeowner_oob: true

  # ── Payouts ──────────────────────────────────────────────────────────────────
  - path: /api/admin/payouts/batches
    method: GET
    handler_class: read-internal
    side_effects: none
    supervisor_access: green
    params_schema:
      limit: { type: integer, min: 1, max: 50, optional: true }

  - path: /api/admin/payouts
    method: POST
    handler_class: mutate-internal
    side_effects: write-external
    supervisor_access: red
    reversibility: reversible-with-effort
    requires_codeowner_oob: true
    body_schema:
      creator_id:   { type: string, validator: "^[a-zA-Z0-9\\-]{1,64}$" }
      amount_cents: { type: integer, min: 100 }
      currency:     { type: enum, values: [usd, eur, gbp], optional: true }

  # ── Videos ───────────────────────────────────────────────────────────────────
  - path: /api/admin/videos
    method: GET
    handler_class: read-internal
    side_effects: none
    supervisor_access: green
    params_schema:
      page:   { type: integer, min: 1, optional: true }
      limit:  { type: integer, min: 1, max: 100, optional: true }
      status: { type: enum, values: [pending, processing, published, failed], optional: true }

  - path: /api/admin/videos/import
    method: POST
    handler_class: mutate-internal
    side_effects: write-app
    supervisor_access: yellow
    reversibility: idempotent
    body_schema:
      stream_video_id: { type: string, validator: "^[a-f0-9\\-]{32,64}$" }
      title:           { type: string, validator: "^.{1,200}$" }
      creator_id:      { type: string, validator: "^[a-zA-Z0-9\\-]{1,64}$" }

  # ── Creator onboarding ────────────────────────────────────────────────────────
  - path: /api/creator/onboarding
    method: GET
    handler_class: read-internal
    side_effects: none
    supervisor_access: green

  # ── Webhooks (never callable by supervisor) ──────────────────────────────────
  - path: /api/stripe/webhook
    method: POST
    handler_class: webhook-external
    side_effects: write-external
    supervisor_access: denied

  - path: /webhooks/stripe-connect
    method: POST
    handler_class: webhook-external
    side_effects: write-external
    supervisor_access: denied

  # ── Health ───────────────────────────────────────────────────────────────────
  - path: /health
    method: GET
    handler_class: read-internal
    side_effects: none
    supervisor_access: green

capabilities_exposed:
  - creator-management
  - payout-processing
  - video-import
  - creator-onboarding

capabilities_required:
  - "@latimer-woods-tech/stripe@^0.2.0"
  - "@latimer-woods-tech/auth@^0.2.0"
  - "@latimer-woods-tech/neon@^0.2.0"

side_effects_summary:
  read_external: ["sentry-api", "posthog", "cloudflare-stream"]
  write_external: ["stripe", "cloudflare-stream", "resend"]
  write_app: ["neon:72697ebbf0d44419850743679390acf1"]
