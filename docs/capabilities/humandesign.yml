# capabilities.yml — HumanDesign / selfprime (P2.14)
# Schema: docs/architecture/ADMIN_TECHNICAL_GUIDE.md §3.1.1
# Validated by: .github/workflows/_app-capability-lint.yml (P2.16)
#
# supervisor_access tiers:
#   green   — supervisor may call without human review
#   yellow  — supervisor may call; human confirms before execution
#   red     — human must explicitly approve; supervisor may only plan, not execute
#   denied  — never callable by supervisor; user-facing or payment surface

version: 1
app:
  id: humandesign
  name: "HumanDesign / selfprime"
  repo: Latimer-Woods-Tech/HumanDesign
  custom_domain: api.selfprime.net
  product_tier: revenue

routes:
  # ── Auth ────────────────────────────────────────────────────────────────────
  - path: /auth/login
    method: POST
    handler_class: auth-internal
    side_effects: none
    supervisor_access: denied   # user-facing credential endpoint

  - path: /auth/refresh
    method: POST
    handler_class: auth-internal
    side_effects: none
    supervisor_access: denied

  # ── Practitioners (read-only) ────────────────────────────────────────────────
  - path: /api/practitioners
    method: GET
    handler_class: read-internal
    side_effects: none
    supervisor_access: green
    params_schema:
      page:   { type: integer, min: 1, optional: true }
      limit:  { type: integer, min: 1, max: 100, optional: true }
      status: { type: enum, values: [active, pending, suspended], optional: true }

  - path: /api/practitioners/:id
    method: GET
    handler_class: read-internal
    side_effects: none
    supervisor_access: green

  # ── Admin telemetry (mandatory per service-registry.yml) ────────────────────
  - path: /api/admin/health
    method: GET
    handler_class: read-internal
    side_effects: none
    supervisor_access: green

  - path: /api/admin/metrics
    method: GET
    handler_class: read-internal
    side_effects: none
    supervisor_access: green
    params_schema:
      window: { type: enum, values: [1h, 6h, 24h, 7d], optional: true }

  - path: /api/admin/events
    method: GET
    handler_class: read-internal
    side_effects: none
    supervisor_access: green
    params_schema:
      severity: { type: enum, values: [error, warn, info], optional: true }
      limit:    { type: integer, min: 1, max: 100, optional: true }
      user_id:  { type: string, validator: "^[a-zA-Z0-9\\-]{1,64}$", optional: true }

  # ── Admin user management ────────────────────────────────────────────────────
  - path: /api/admin/users
    method: GET
    handler_class: read-internal
    side_effects: none
    supervisor_access: green
    params_schema:
      page:   { type: integer, min: 1, optional: true }
      limit:  { type: integer, min: 1, max: 100, optional: true }
      tier:   { type: enum, values: [individual, practitioner, agency], optional: true }
      status: { type: enum, values: [active, suspended, pending], optional: true }

  - path: /api/admin/users/:id
    method: GET
    handler_class: read-internal
    side_effects: none
    supervisor_access: green

  - path: /api/admin/users/:id/suspend
    method: POST
    handler_class: mutate-internal
    side_effects: write-app
    supervisor_access: yellow
    reversibility: reversible-with-effort
    requires_codeowner_oob: true
    body_schema:
      reason: { type: string, validator: "^[\\w\\s,\\.\\-]{10,200}$" }

  - path: /api/admin/users/:id/reinstate
    method: POST
    handler_class: mutate-internal
    side_effects: write-app
    supervisor_access: yellow
    reversibility: idempotent
    requires_codeowner_oob: true
    body_schema:
      reason: { type: string, validator: "^[\\w\\s,\\.\\-]{10,200}$" }

  - path: /api/admin/users/:id/tier
    method: POST
    handler_class: mutate-internal
    side_effects: write-external
    supervisor_access: red
    reversibility: reversible-with-effort
    requires_codeowner_oob: true
    body_schema:
      new_tier: { type: enum, values: [individual, practitioner, agency] }

  # ── Admin AI/synthesis ───────────────────────────────────────────────────────
  - path: /api/admin/synthesis
    method: POST
    handler_class: mutate-internal
    side_effects: write-app
    supervisor_access: yellow
    reversibility: idempotent
    body_schema:
      user_id:       { type: string, validator: "^[a-zA-Z0-9\\-]{1,64}$" }
      chart_type:    { type: enum, values: [natal, transit, synastry] }
      force_refresh: { type: boolean, optional: true }

  # ── Webhooks (never callable by supervisor) ──────────────────────────────────
  - path: /api/stripe/webhook
    method: POST
    handler_class: webhook-external
    side_effects: write-external
    supervisor_access: denied

capabilities_exposed:
  - synthesize-energy-blueprint
  - generate-practitioner-pdf
  - user-management
  - practitioner-directory

capabilities_required:
  - "@latimer-woods-tech/llm@^0.3.0"
  - "@latimer-woods-tech/stripe@^0.2.0"
  - "@latimer-woods-tech/auth@^0.2.0"

side_effects_summary:
  read_external: ["sentry-api", "posthog"]
  write_external: ["stripe", "anthropic", "resend"]
  write_app: ["neon:divine-grass-42421088"]
