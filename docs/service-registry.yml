# Service Registry
#
# PURPOSE:
#   This file is the authoritative map of every Cloudflare Worker in the system:
#   - What its canonical name is (the value of `name` in wrangler.jsonc)
#   - What its public URL is (used in logs, docs, and consumer configs)
#   - Which repos or files hardcode that URL
#
#   This is the primary source of truth for service registration, health
#   probe generation, and alert-routing configuration in this repo. Do not
#   treat `docs/sauna-brain.md` as an authoritative service or alert config.
#
# RULE:
#   Before changing the `name` field in ANY wrangler.jsonc, you MUST:
#   1. Find this worker in the registry below
#   2. Search every `consumers` file listed for the old URL
#   3. Update all consumers FIRST
#   4. Commit and deploy consumers
#   5. THEN change the worker name and deploy
#
#   Skipping this order = ERR_NAME_NOT_RESOLVED in production.
#
# HOW TO KEEP THIS UPDATED:
#   When you add a new worker: add an entry here.
#   When you add a new hardcoded URL in a frontend: add it to the consumers list.
#   When you rename a worker: update both the name and the url here after the migration.
#   When a deploy workflow must verify a URL different from the canonical public URL,
#   record the exact health-check target under `verification_targets` with a note.
#
# EXECUTABLE GUARDRAIL:
#   This file is validated by `scripts/validate-service-registry.mjs` and
#   `.github/workflows/validate-service-registry.yml`.
#   For the currently covered local Workers, changes to verification targets,
#   required secrets, required vars, or required bindings must stay aligned with
#   both the deploy workflow and the Worker's `wrangler.jsonc` contract.

# ─── AUTOMATION DENYLIST ──────────────────────────────────────────────────────
#
# Repos and workers listed here are FORBIDDEN to automation at the registry level.
# This is layer 2 of the 3-layer lockout described in docs/supervisor/FRIDGE.md rule 1.
# Layer 1: CODEOWNERS on the target repo. Layer 3: supervisor denylist in supervisor-core.mjs.
#
# automation: forbidden  — The supervisor, Copilot, and any automated agent must
#   never open a PR, touch a worker, or read data in this repo under any circumstances.
#
automation_denylist: []
# No repos are currently under an automation hold. The wordis-bond TCPA/regulatory
# hold was lifted 2026-06-08 (regulation language removed); wordis-bond is now a
# normal Factory repo, in-scope for the sense layer like any other. To place a future
# legal/regulatory hold on a repo, add an entry here
# ({ id, repo, scope, automation: forbidden, reason }) — gate.mjs and the entity-graph
# enumerator both treat denylisted repos as never-automatable (FRIDGE rule 1).

workers:
  - id: prime-self
    name: prime-self-api                                   # live Selfprime API worker (zone routes api.selfprime.net/* + selfprime.net/api/*); live repo is HumanDesign
    health_state: live
    repo: Latimer-Woods-Tech/HumanDesign
    url: https://api.selfprime.net                         # canonical public URL (branded custom domain)
    workers_dev_url: null                                  # ⚠️ the legacy `prime-self` worker was hijacked by a misnamed inbound-oracle deploy (2026-06-10) and DELETED with operator approval 2026-06-11 (verified: prime-self.adrper79.workers.dev → 404, api.selfprime.net → 200). Never reuse the name "prime-self" for any worker.
    custom_domain: api.selfprime.net                       # CF custom domain — attach via CF API if missing
    custom_domain_status: attached                         # CF custom domain confirmed live 2026-05-08
    health_endpoint: /health
    telemetry_required: true                               # must expose /api/admin/health|metrics|events
    critical_endpoints:
      - /auth/login
      - /api/practitioners
      - /api/admin/health
      - /api/admin/metrics
      - /api/admin/events
    consumers:
      # Files that hardcode this worker's URL — must be updated before any rename
      - repo: Latimer-Woods-Tech/HumanDesign
        file: public/landing.html
        line: ~537
        pattern: "fetch('https://prime-self.adrper79.workers.dev/auth/login'"
      - repo: Latimer-Woods-Tech/HumanDesign
        file: public/index.html
        line: ~537
        pattern: "fetch('https://prime-self.adrper79.workers.dev/auth/login'"
    notes: >
      Prime Self now deploys from the `HumanDesign` repository. The older
      `prime-self` / `prime-self-ui` repo names are stale documentation labels.
      Current CI/CD lives in HumanDesign's `deploy-workers.yml` and
      `deploy-frontend.yml`. `api.selfprime.net/health` returned 404 during the
      2026-05-21 audit even though the app itself is live, so do not treat that
