# ─── RENAME PROCEDURE ──────────────────────────────────────────────────────────
#
# To rename a worker (e.g. prime-self → prime-self-v2):
#
#   Step 1: Update all consumer URLs in this registry
#   Step 2: Update each consumer file (replace old URL with new URL)
#   Step 3: git add + commit + push consumers → wait for CI green
#   Step 4: Verify consumers deploy successfully (curl the page, check network tab)
#   Step 5: Update `name` in wrangler.jsonc
#   Step 6: Remove any stale `migrations` blocks unless they apply to the new name
#   Step 7: Deploy the worker → verify /health returns 200
#   Step 8: Update this registry (name + url fields)
#
# ─── DO NOT SKIP STEPS ─────────────────────────────────────────────────────────

# ─── IMPLEMENTATION TRACKS ──────────────────────────────────────────────────────
#
# The Factory implementation is organized into 7 coordinated tracks.
# See docs/WORLD_CLASS_IMPLEMENTATION_DASHBOARD.md for full strategy.
#
# Track Registry (from T7 - Documentation & Knowledge Management):
#
#   T1: Product + UX Operating System
#       Owner: Product Lead + Design Lead
#       Status: Phase A (Align)
#       Purpose: Define product quality rubric, design system, UX standards
#
#   T2: Core App Engineering Excellence
#       Owner: Core App Tech Lead
#       Status: Phase B (Baseline)
#       Purpose: Apply Definition of Done, maintain test coverage, implement observability
#
#   T3: Monetization + Operator Maturity
#       Owner: Product Lead + Payments Lead
#       Status: Phase B (Baseline)
#       Purpose: Design operator workflows, Stripe integration, regression tests
#
#   T4: Factory Platform Enablement
#       Owner: Platform Lead
#       Status: Phase C (Build)
#       Purpose: Implement package dependency order, enable new apps to bootstrap
#
#   T5: Reliability, Security, Observability
#       Owner: Platform Lead + Ops
#       Status: Phase C (Build)
#       Purpose: Define SLOs, operationalize incident response, implement security scanning
#
#   T6: Delivery Process & Release Governance
#       Owner: EM / Tech Lead
#       Status: Phase A (Align)
#       Purpose: Define Ready/Done, PR gates, deployment procedures, measure cycle time
#
#   T7: Documentation & Knowledge Management
#       Owner: Tech Writer + EM
#       Status: Phase A (Align)
#       Purpose: Master index, ownership assignments, doc freshness audit, keep docs sync'd
#
# SEE ALSO:
#   - docs/WORLD_CLASS_IMPLEMENTATION_DASHBOARD.md (full strategy and phases)
#   - docs/IMPLEMENTATION_MASTER_INDEX.md (doc navigation hub)
