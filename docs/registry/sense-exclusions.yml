# Sense-layer exclusions — repos deliberately kept OUT of the Platform Brain.
#
# PURPOSE:
#   build-entity-graph.mjs enumerates every active org repo and turns each into a
#   graph node. A repo listed here (or carrying the GitHub topic `platform-exclude`)
#   becomes a node with scope=excluded and is NEVER ticketed by opportunity-scan.
#   This makes "out of scope" an explicit, auditable decision rather than a silent
#   omission — the whole point of the sense layer being *evenly* applied.
#
#   Repos on docs/service-registry.yml `automation_denylist` are excluded
#   STRUCTURALLY (scope=denylisted) without needing an entry here — FRIDGE rule 1.
#
# TWO WAYS TO EXCLUDE A REPO:
#   1. Add it here (canonical, versioned, with a reason + date).
#   2. Add the GitHub topic `platform-exclude` to the repo (operator-facing, no PR).
#
# FIELDS: repo (bare org repo name), reason, since (ISO date).

exclusions:
  - repo: factory-admin
    reason: >
      Under review — appears to duplicate the monorepo apps/admin-studio operator
      dashboard. Decide archive-vs-register before adding a feature-registry.yml;
      excluded for now so the loop does not nag a possible duplicate.
    since: "2026-06-08"
