id: governance-branch-protection
version: 1
tier: red
description: >
  Phased branch-protection hardening playbook: promotes checks from warn-only to required
  based on measured signal quality. Opens a PR to update the branch-protection runbook
  and/or the corresponding .github/workflows file; never applies rulesets directly.
triggers:
  labels_any_of: [hardening, governance, engineering]
  title_pattern: "^chore[(]governance[)]:.*branch.?protect"
  body_patterns:
    - "(?i)(branch.?protect|required.?check|warn.?only|promote|policy.?promot|signal.?quality|phased|playbook)"
preconditions:
  - capability_exists: github.readFile
  - capability_exists: github.openPR
  - capability_exists: github.comment
slots:
  - name: phase
    type: enum
    values: [phase-1-audit, phase-2-warn, phase-3-require, phase-4-lock]
    source: issue_body
    default: phase-1-audit
  - name: target_check
    type: string
    validator: "^[a-zA-Z0-9 _\\-/()\\.]{3,120}$"
    source: issue_body
  - name: branch_name
    type: string
    validator: "^supervisor/governance/branch-protect-[a-z0-9][a-z0-9-]{0,50}$"
    source: issue_body
    default: supervisor/governance/branch-protect-hardening
  - name: commit_message
    type: string
    validator: "^chore[(]governance[)]:"
    source: issue_title
steps:
  - id: s1
    tool: github.readFile
    depends_on: null
    params:
      repo: factory
      path: "docs/runbooks/github-secrets-and-tokens.md"
      ref: main
      allow_missing: true
    intent: "Read the existing secrets/tokens runbook to understand current branch-protection baseline before proposing changes."
    requires_human_review: false
  - id: s2
    tool: github.readFile
    depends_on: s1
    params:
      repo: factory
      path: ".github/workflows/apply-sec-hardening.yml"
      ref: main
      allow_missing: true
    intent: "Read the current security-hardening workflow to determine which checks are already wired."
    requires_human_review: false
  - id: s3
    tool: github.comment
    depends_on: s2
    params:
      issue_ref: "$triggers.issue_number"
      body: |
        **Supervisor — branch-protection hardening plan (RED tier)**

        Phase: `$slots.phase`
        Target check: `$slots.target_check`

        This is a **red-tier** plan. The supervisor will open a **draft PR** updating
        the branch-protection runbook and/or the `apply-sec-hardening.yml` workflow.
        No ruleset is applied automatically — a CODEOWNER must merge and trigger
        the promotion manually.

        Existing hardening workflow snapshot captured in step s2.

        React ✅ to confirm the plan before the PR is drafted.
    intent: "Post the hardening plan for CODEOWNER confirmation before any file is written. Red-tier always requires human approval."
    requires_human_review: true
  - id: s4
    tool: github.openPR
    depends_on: s3
    params:
      repo: factory
      base: main
      head: "$slots.branch_name"
      title: "$slots.commit_message"
      draft: true
      body: |
        Closes #$triggers.issue_number

        **Phase:** $slots.phase
        **Target check:** $slots.target_check

        This draft PR was generated by the supervisor to codify the branch-protection
        hardening step described in the linked issue.

        Changes are **docs/runbook only** or **workflow-only**; no ruleset is activated
        automatically. A CODEOWNER must review the generated content and merge when
        the signal quality threshold is confirmed.

        Red-tier: human approval required before merge. Do NOT use auto-merge.
      labels: [hardening, governance, supervisor, tier-red]
    intent: "Open a DRAFT PR with the hardening artifact. Draft status prevents accidental merge; red-tier label prevents auto-merge."
    requires_human_review: true
  - id: s5
    tool: github.comment
    depends_on: s4
    params:
      pr: "$s4.number"
      body: |
        Supervisor drafted this branch-protection hardening PR (red tier).
        - Only `docs/` or `.github/workflows/` files are touched — no rulesets applied.
        - Human CODEOWNER must verify signal quality before approving.
        - Source issue: #$triggers.issue_number (parent: #270)
    intent: "Leave reviewer-facing provenance note on the PR."
    requires_human_review: false
acceptance_gate:
  description: "A draft PR exists on the expected branch with the red-tier label and source issue referenced."
  verifier_query:
    tool: github.openPR
    query: "pr:$s4.number draft==true labels contains 'tier-red' AND base == 'main'"
    assert: "count >= 1"
rollback:
  - on_step: s4
    action: github.closePR
    params:
      repo: factory
      pr_number: "$s4.number"
      comment: "Supervisor rollback: closing branch-protection hardening draft PR. Manual planning required."
  - on_step: s5
    action: github.removeLabel
    params:
      pr: "$s4.number"
      label: "supervisor"
