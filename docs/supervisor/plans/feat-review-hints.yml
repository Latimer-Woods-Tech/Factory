id: feat-review-hints
version: 1
tier: red
description: >
  Auto-request / notify relevant CODEOWNERS and platform/security reviewers when a PR
  touches sensitive paths. Implements reviewer-class hints via CODEOWNERS updates and/or
  a path-based labeler workflow. Changes go to a draft PR for human review.
triggers:
  labels_any_of: [hardening]
  title_pattern: "^feat[(]review[)]:.*reviewer"
  body_patterns:
    - "(?i)(codeowner|reviewer.?class|reviewer.?hint|sensitive.?path|auto.?request|platform.?review|security.?review|path.?delta|path.?change)"
preconditions:
  - capability_exists: github.readFile
  - capability_exists: github.openPR
  - capability_exists: github.comment
slots:
  - name: sensitive_paths
    type: string
    validator: "^[a-zA-Z0-9/*_.\\-\\n, ]{3,500}$"
    source: issue_body
  - name: reviewer_class
    type: enum
    values: [platform, security, codeowner, all]
    source: issue_body
    default: codeowner
  - name: change_target
    type: enum
    values: [CODEOWNERS, labeler-workflow, both]
    source: issue_body
    default: CODEOWNERS
  - name: branch_name
    type: string
    validator: "^supervisor/governance/review-hints-[a-z0-9][a-z0-9-]{0,50}$"
    source: issue_body
    default: supervisor/governance/review-hints-scaffold
  - name: commit_message
    type: string
    validator: "^feat[(]review[)]:"
    source: issue_title
steps:
  - id: s1
    tool: github.readFile
    depends_on: null
    params:
      repo: factory
      path: ".github/CODEOWNERS"
      ref: main
      allow_missing: true
    intent: "Read the existing CODEOWNERS file to understand current reviewer assignments before proposing additions."
    requires_human_review: false
  - id: s2
    tool: github.readFile
    depends_on: s1
    params:
      repo: factory
      path: ".github/workflows/labeler.yml"
      ref: main
      allow_missing: true
    intent: "Read the existing labeler workflow (if present) to determine whether reviewer-hint rules already exist for these paths."
    requires_human_review: false
  - id: s3
    tool: github.comment
    depends_on: s2
    params:
      issue_ref: "$triggers.issue_number"
      body: |
        **Supervisor — reviewer-class hints plan (RED tier)**

        Sensitive paths: `$slots.sensitive_paths`
        Reviewer class: `$slots.reviewer_class`
        Change target: `$slots.change_target`

        This is a **red-tier** plan because CODEOWNERS and labeler workflows gate all
        sensitive-path PRs. The supervisor will open a **draft PR** adding the reviewer
        hints; no auto-merge is permitted.

        Existing CODEOWNERS + labeler captured in steps s1/s2.

        React ✅ to confirm the plan before the PR is drafted.
    intent: "Post plan for CODEOWNER confirmation. Red-tier — always requires explicit human ✅ before file creation."
    requires_human_review: true
  - id: s4
    tool: github.openPR
    depends_on: s3
    params:
      repo: factory
      base: main
      head: "$slots.branch_name"
      title: "$slots.commit_message"
      draft: true
      body: |
        Closes #$triggers.issue_number

        **Sensitive paths:** $slots.sensitive_paths
        **Reviewer class:** $slots.reviewer_class
        **Change target:** $slots.change_target

        Draft PR adding reviewer-class hints for sensitive path deltas.
        Touches only `.github/CODEOWNERS` and/or `.github/workflows/labeler.yml`.

        Red-tier: CODEOWNER must review before merge. Do NOT enable auto-merge.
      labels: [hardening, engineering, supervisor, tier-red]
    intent: "Open a DRAFT PR with the reviewer-hint changes. Draft prevents accidental merge on a red-tier change."
    requires_human_review: true
  - id: s5
    tool: github.comment
    depends_on: s4
    params:
      pr: "$s4.number"
      body: |
        Supervisor drafted this reviewer-hints PR (red tier).
        - Only `.github/CODEOWNERS` and/or `.github/workflows/labeler.yml` are touched.
        - Existing assignments captured in s1/s2 to prevent accidental removals.
        - Source issue: #$triggers.issue_number (parent: #270)
    intent: "Leave reviewer-facing provenance note on the PR."
    requires_human_review: false
acceptance_gate:
  description: "A draft PR exists on the expected branch with the red-tier label and source issue referenced."
  verifier_query:
    tool: github.openPR
    query: "pr:$s4.number draft==true labels contains 'tier-red' AND base == 'main'"
    assert: "count >= 1"
rollback:
  - on_step: s4
    action: github.closePR
    params:
      repo: factory
      pr_number: "$s4.number"
      comment: "Supervisor rollback: closing reviewer-hints draft PR. Manual CODEOWNERS edit required."
  - on_step: s5
    action: github.removeLabel
    params:
      pr: "$s4.number"
      label: "supervisor"
