id: security-codeql-fix
version: 1
tier: yellow
triggers:
  labels_any_of: [area:security, bug]
  title_pattern: "(SEC-\\d|codeql|code.scan|security.alert|fix.*codeql|codeql.*fix)"
  body_patterns:
    - "(codeql|code scanning alert|security alert)"
preconditions:
  - capability_exists: github.readFile
  - capability_exists: github.openPR
  - capability_exists: github.comment
slots:
  - name: alert_id
    type: string
    validator: "^(SEC-\\d+|\\d+)$"
    source: issue_title
  - name: file_path
    type: string
    validator: "^[a-zA-Z0-9_.\\-/]+\\.(ts|mjs|js)$"
    source: issue_body
  - name: violation_type
    type: enum
    values: [missing-regex-anchor, network-to-file, sql-injection, xss, path-traversal, other]
    source: issue_body
    default: other
steps:
  - id: s1
    tool: github.readFile
    depends_on: null
    params:
      repo: factory
      path: "$slots.file_path"
      ref: main
    intent: "Read the file containing the CodeQL alert to understand the surrounding context."
    requires_human_review: false
  - id: s2
    tool: github.comment
    depends_on: s1
    params:
      issue_ref: "$triggers.issue_number"
      body: "Supervisor diagnosis for $slots.alert_id\n\nFile: `$slots.file_path`\nViolation type: `$slots.violation_type`\n\nApplying minimal targeted fix. Will open a draft PR for review."
    intent: "Post a diagnosis comment before opening the PR so the issue has context."
    requires_human_review: false
  - id: s3
    tool: github.openPR
    depends_on: s2
    params:
      repo: factory
      base: main
      head: "supervisor/codeql-$slots.alert_id"
      title: "fix(security): resolve CodeQL alert $slots.alert_id in $slots.file_path"
      body: "Closes #$triggers.issue_number\n\nMinimal targeted fix for CodeQL alert `$slots.alert_id` ($slots.violation_type) in `$slots.file_path`.\n\nDiagnosis: see issue comment $s2.comment_url\n\nThis PR was generated by the supervisor. Human review required before merge."
      draft: true
    intent: "Open a draft PR with the minimal fix targeting only the flagged file. Human must review before merge."
    requires_human_review: true
acceptance_gate:
  description: "A draft PR exists referencing the CodeQL alert ID, targeting only the flagged file."
rollback:
  - on_step: s3
    action: github.closePR
    params:
      repo: factory
      pr_number: "$s3.pr_number"
      comment: "Supervisor rollback: closing auto-generated CodeQL fix PR. Manual fix required."
