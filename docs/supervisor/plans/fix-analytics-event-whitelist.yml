id: fix-analytics-event-whitelist
version: 1
tier: yellow
description: "Analytics endpoint returns 400 because a client event name is missing from the server-side PUBLIC_SHELL_EVENT_NAMES whitelist."
trigger_keywords: [analytics, whitelist, shell-event, 400, event, unsupported]
triggers:
  labels_any_of: [bug]
  title_pattern: "(analytics.*400|shell.event.*400|400.*shell.event|event.*whitelist|whitelist.*event|Unsupported shell event)"
  body_patterns:
    - "(PUBLIC_SHELL_EVENT_NAMES|shell.event.*400|Unsupported shell event|analytics.*handler.*400)"
preconditions:
  - capability_exists: github.readFile
  - capability_exists: github.openPR
  - capability_exists: github.comment
  - capability_exists: github.addLabel
slots:
  - name: affected_app
    type: enum
    values: [humandesign, capricast, xico-city, factory-admin]
    source: issue_body
    referential_check: factory_admin.repo.health
  - name: missing_event_names
    type: string
    validator: "^[a-z_][a-z0-9_]*(,[a-z_][a-z0-9_]*)*$"
    source: issue_body
  - name: handler_file
    type: string
    validator: "^[a-zA-Z0-9_.\\-/]+\\.(ts|js|mjs)$"
    source: issue_body
    default: "workers/src/handlers/analytics.js"
steps:
  - id: s1
    tool: github.readFile
    depends_on: null
    params:
      repo: "Latimer-Woods-Tech/$slots.affected_app"
      path: "$slots.handler_file"
      ref: "main"
    intent: "Read the analytics handler to locate the PUBLIC_SHELL_EVENT_NAMES set and verify which event names are currently whitelisted."
    requires_human_review: false
  - id: s2
    tool: github.comment
    depends_on: s1
    params:
      body: |
        **Supervisor diagnosis — analytics whitelist gap in `$slots.affected_app`**

        Missing event name(s): `$slots.missing_event_names`
        Handler file: `$slots.handler_file`

        Current whitelist excerpt (from $s1):
        ```
        $s1.excerpt
        ```

        **Fix:** Add `$slots.missing_event_names` to the `PUBLIC_SHELL_EVENT_NAMES` set in `$slots.handler_file`. No client changes required — the client payload shape is correct.

        A draft PR will be opened to add the missing event names.

        _Run ID: $RUN_ID_
    intent: "Post a diagnosis comment identifying the missing event names before opening a PR."
    requires_human_review: false
  - id: s3
    tool: github.openPR
    depends_on: s2
    params:
      repo: "Latimer-Woods-Tech/$slots.affected_app"
      base: "main"
      head: "supervisor/analytics-whitelist-$slots.affected_app"
      title: "fix(analytics): add missing event names to PUBLIC_SHELL_EVENT_NAMES"
      body: |
        Closes #$triggers.issue_number

        **Root cause:** `POST /api/analytics/shell-event` returned HTTP 400 for event name(s) `$slots.missing_event_names` because they are absent from `PUBLIC_SHELL_EVENT_NAMES` in `$slots.handler_file`.

        **Fix:** Adds the missing event name(s) to the whitelist. No client changes needed.

        Diagnosis: see issue comment $s2.comment_url

        This PR was generated by the supervisor. Human review required before merge.
      draft: true
    intent: "Open a draft PR that adds the missing event names to the analytics whitelist."
    requires_human_review: true
acceptance_gate:
  description: "A draft PR exists on the target repo that adds the missing event names to the analytics handler whitelist."
  verifier_query:
    tool: github.readFile
    query: "repo=Latimer-Woods-Tech/$slots.affected_app pr=$s3.number files_changed head=$s3.head"
    assert: "files_changed.any(f => f.path == '$slots.handler_file')"
rollback:
  - on_step: s3
    action: github.closePR
    params:
      repo: "Latimer-Woods-Tech/$slots.affected_app"
      pr_number: "$s3.pr_number"
      comment: "Supervisor rollback: closing analytics whitelist PR. Manual fix required."
