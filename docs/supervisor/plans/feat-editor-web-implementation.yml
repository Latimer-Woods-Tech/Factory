id: feat-editor-web-implementation
version: 1
tier: green
description: "Sprint 3 mobile-editor web UI feature work in capricast: EditTimeline JSON schema, camera screen with multi-clip record, timeline scrubber with thumbnails, trim/split/reorder/speed presets, text overlays, sticker pack, drafts (IndexedDB + R2 sync), auto-captions (Workers AI Whisper), and caption styles. Scaffolds a React component under apps/web/src/app/edit/components/, a Vitest test file alongside it, and an optional Hono route for draft sync. Green tier — the scaffold lands as a non-draft PR; a CODEOWNER must wire vitest+jsdom into apps/web devDependencies (web app currently has no in-app unit runner) and review the editor wiring before merge. Yellow would only post a plan comment and would not scaffold anything; Green is required for executeGreen() to run and produce a non-empty PR."
# T3 gap 2 — Pattern #3 (PR-per-snapshot) and Pattern #4 (`git add` before
# `diff --cached`) both apply: this template opens a PR against main and may
# include generated React/test scaffolds that must be staged before the diff
# is inspected.
pattern_check: [3, 4]
trigger_keywords:
  - edittimeline
  - editor
  - timeline
  - scrubber
  - trim
  - split
  - reorder
  - speed
  - overlay
  - sticker
  - drafts
  - indexeddb
  - captions
  - whisper
  - camera
  - record
  - countdown
triggers:
  labels_any_of: [enhancement, sprint:3]
  # Title evidence — capricast Sprint 3 mobile-editor basics issue titles.
  # Matches: #82 EditTimeline JSON schema; #83 Camera screen multi-clip record;
  # #84 Timeline scrubber with thumbnails; #85 Trim/split/reorder/speed presets;
  # #86 Text overlays motion presets; #87 Sticker pack (50 SVG); #92 Drafts in
  # IndexedDB + R2 sync; #97 Auto-captions Workers AI Whisper; #98 4 caption
  # styles.
  # Deliberately does NOT match Sprint 2 conversations/call-room issues (#61-
  # #66, #74-#81, #116) and does NOT match Sprint 4 effect-module issues
  # (#88-#91, #93-#96, #99-#104) which are covered by feat-editor-effect-
  # implementation.
  title_pattern: "(EditTimeline|Camera screen|multi.?clip record|Timeline (scrubber|strip)|frame thumbnails|Trim, split, reorder|speed presets|Text overlays|motion presets|Sticker pack|sticker drawer|Drafts in IndexedDB|R2 for cross.?device|Auto.?captions?|Whisper|caption styles|TikTok.?classic|Karaoke|per.?line edit|getUserMedia|hold.?to.?record|tap.?to.?record|countdown|front/back camera)"
  # Body evidence required (no label-only matching — that's the bug PR #815
  # just fixed). At least ONE of these phrases must appear in the issue body
  # to confirm this is genuine Sprint 3 editor UI work.
  body_patterns:
    - "(EditTimeline|@capricast/types|clips\\[\\]|audio_tracks\\[\\]|text_overlays\\[\\]|getUserMedia|facingMode|tap.?to.?record|hold.?to.?record|VideoFrame\\.copyTo|frame thumbnails|drag handles to trim|split.?at.?playhead|speed presets|Add.?text button|style picker|motion presets|sticker drawer|royalty.?free SVG|IndexedDB|debounce.?save|drafts/<user_id>|Workers AI|whisper|word.?level timestamps|TikTok.?classic|caption preset|Karaoke|3-2-1 countdown|/create route)"
preconditions:
  - capability_exists: github.readFile
  - capability_exists: github.openPR
  - capability_exists: github.comment
  - capability_exists: github.addLabel
slots:
  - name: feature_slug
    type: string
    description: "Short kebab-case identifier derived from the issue title — used in branch names and component filenames. Examples: edit-timeline-schema, camera-screen, timeline-scrubber, trim-split-reorder, text-overlays, sticker-pack, drafts-sync, auto-captions, caption-styles."
    validator: "^[a-z][a-z0-9-]{2,40}$"
    source: issue_title
    default: "editor-component"
  - name: component_name
    type: string
    description: "React component name in PascalCase. Should reflect the editor surface. Examples: EditTimelineSchema, CameraScreen, TimelineScrubber, ClipEditor, TextOverlayPanel, StickerDrawer, DraftsSync, AutoCaptions, CaptionStylePicker."
    validator: "^[A-Z][A-Za-z0-9]{2,60}$"
    source: issue_title
    default: "EditorComponent"
  - name: component_file_path
    type: string
    description: "Path to a new React component file under apps/web/src/app/edit/components/. PascalCase filename matching component_name (e.g. CameraScreen.tsx, TimelineScrubber.tsx). The /edit route does not exist on main yet — scaffolding under apps/web/src/app/edit/components/ creates the convention; the CODEOWNER may move it during review if a different module layout fits the editor's IA."
    validator: "^apps/web/src/app/edit/components/[A-Z][A-Za-z0-9]{2,60}\\.tsx$"
    source: issue_body
    default: "apps/web/src/app/edit/components/EditorComponent.tsx"
  - name: component_content
    type: string
    description: "Full TypeScript source for a React 19 + Next.js 15 client component. SYNTHESIZE from the issue body — extract the UI primitives, state, and events described in the acceptance criteria and produce a real component. Use 'use client' at top for browser-only APIs (getUserMedia, IndexedDB, WebAudio, MediaPipe, WebGL). Import React hooks (useState, useEffect, useRef, useCallback) as needed. Use Tailwind utility classes (the project already uses tailwindcss 3.4 + tailwind-merge + clsx). Use lucide-react for icons (already a dependency). Reuse shared types from @capricast/types when modelling EditTimeline / clips / overlays. Wire posthog-js capture() calls for non-trivial creator actions (recordStarted, clipTrimmed, captionApplied, etc.) — analytics is required per the BlerdArt spec. Component must default-export the component. Tests in the colocated __tests__/ dir verify the contract — do not produce a stub."
    validator: "^[\\s\\S]{80,40000}$"
    source: issue_body
    default: |
      // Supervisor scaffold — review the issue body and replace this with
      // the real editor component. Tests in __tests__/ will fail until the
      // UI primitives, state, and acceptance criteria are implemented.
      "use client";

      import { useState } from "react";

      type Props = {
        // TODO(supervisor-scaffold): replace with the prop shape implied by
        // the source issue (EditTimeline ref, callbacks, etc.).
        className?: string;
      };

      export default function EditorComponent({ className }: Props) {
        const [ready, setReady] = useState(false);
        return (
          <section className={className} data-testid="editor-component-scaffold">
            <button
              type="button"
              onClick={() => setReady(true)}
              className="rounded bg-black px-3 py-2 text-sm text-white"
            >
              {ready ? "ready" : "scaffold"}
            </button>
          </section>
        );
      }
  - name: test_file_path
    type: string
    description: "Vitest test file path colocated under apps/web/src/app/edit/components/__tests__/. PascalCase filename mirroring the component (e.g. CameraScreen.test.tsx). NOTE: apps/web currently has no vitest config or @testing-library — the CODEOWNER must add vitest + @testing-library/react + jsdom to apps/web/package.json devDependencies and create a vitest.config.ts during review. Same model as the call-room template requiring wrangler.jsonc edits."
    validator: "^apps/web/src/app/edit/components/__tests__/[A-Z][A-Za-z0-9]{2,60}\\.test\\.tsx$"
    source: issue_body
    default: "apps/web/src/app/edit/components/__tests__/EditorComponent.test.tsx"
  - name: test_content
    type: string
    description: "Vitest + @testing-library/react test module — SYNTHESIZE assertions for the React component described in the issue. Cover: (1) renders without crashing with minimal props, (2) primary user interaction described in the acceptance criteria (e.g. clicking record starts capture, dragging trim handle updates timeline state, applying a caption style updates the preview), (3) at least one negative/edge case (e.g. record button disabled while permissions pending, no clips → empty state). Use describe + it() blocks. Mock browser-only APIs (navigator.mediaDevices, IndexedDB, WebGL) via vi.mock or jsdom stubs as needed. Aim for ≥3 it() blocks. Import the default export of the component and exercise it via render() + fireEvent or userEvent. Do not produce it.todo() stubs."
    validator: "^[\\s\\S]{60,40000}$"
    source: issue_body
    default: |
      import { describe, it, expect } from "vitest";
      import { render } from "@testing-library/react";
      import EditorComponent from "../EditorComponent";

      // TODO(supervisor-scaffold): replace with real assertions tied to the
      // acceptance criteria in the source issue. The CODEOWNER must also
      // wire vitest + @testing-library/react + jsdom into apps/web/package.json
      // — the web app currently has no in-app unit runner.
      describe("EditorComponent scaffold", () => {
        it("renders the scaffold marker", () => {
          const { getByTestId } = render(<EditorComponent />);
          expect(getByTestId("editor-component-scaffold")).toBeTruthy();
        });
      });
  - name: branch_name
    type: string
    description: "Git branch name. Prefer supervisor/feat-editor-web/<feature_slug> so the bot's PRs are visually grouped. The conventional feat/<feature_slug> form is also accepted because the LLM keeps producing it."
    validator: "^(supervisor/feat-editor-web/|feat/)[a-z0-9][a-z0-9/_-]{2,80}$"
    source: issue_title
    default: "supervisor/feat-editor-web/scaffold"
  - name: commit_message
    type: string
    description: "Conventional Commits message for the squash-merge. Scope should reflect the editor surface (e.g. feat(editor): ..., feat(camera): ..., feat(timeline): ..., feat(captions): ...). Description should be a single-sentence imperative summary of what the PR adds."
    validator: "^feat(\\([a-z0-9-]+\\))?:\\s.{5,140}$"
    source: issue_title
    default: "feat(editor): scaffold web component and test"
steps:
  - id: s1
    tool: github.readFile
    depends_on: null
    params:
      repo: "Latimer-Woods-Tech/capricast"
      path: "apps/web/src/app"
      ref: "main"
      allow_missing: true
    intent: "Confirm the apps/web/src/app directory exists. The /edit subdirectory does not exist on main yet — the supervisor will create it. If the parent app router directory is missing entirely the CODEOWNER must scaffold capricast's apps/web manually first."
    requires_human_review: false
  - id: s2
    tool: github.readFile
    depends_on: s1
    params:
      repo: "Latimer-Woods-Tech/capricast"
      path: "apps/web/package.json"
      ref: "main"
      allow_missing: true
    intent: "Read apps/web/package.json so the CODEOWNER reviewer can confirm which vitest + testing-library packages they need to add — the web app currently has none."
    requires_human_review: false
  - id: s3
    tool: github.comment
    depends_on: s2
    params:
      body: |
        **Supervisor plan — `feat-editor-web-implementation` for `capricast`**

        Feature slug: `$slots.feature_slug`
        Component: `$slots.component_name`
        Component file: `$slots.component_file_path`
        Test: `$slots.test_file_path`

        This template scaffolds two files derived from the issue body:
        1. A React 19 / Next.js 15 client component under `apps/web/src/app/edit/components/` covering the editor surface described in the acceptance criteria.
        2. A colocated Vitest + @testing-library/react test file exercising the component contract.

        🟢 Green tier — the scaffold lands as a non-draft PR. The supervisor cannot implement business logic; the scaffold is a starting point and tests/handlers may need filling in. A CODEOWNER must:
        - Add `vitest`, `@testing-library/react`, `@testing-library/jest-dom`, and `jsdom` to `apps/web/package.json` devDependencies (the web app currently has no in-app unit runner) and create `apps/web/vitest.config.ts`.
        - Move the component file if a different module layout fits the editor's IA — `apps/web/src/app/edit/` does not exist on main yet, this PR creates the convention.
        - Review the React + Tailwind wiring for the editor surface.

        _Run ID: $RUN_ID_
    intent: "Post a plan comment so the human reviewer sees the two file paths, the test-infra gap they need to close, and the convention this PR introduces before the PR lands."
    requires_human_review: false
  - id: s4
    tool: github.openPR
    depends_on: s3
    params:
      repo: "Latimer-Woods-Tech/capricast"
      branch: "$slots.branch_name"
      base: "main"
      title: "$slots.commit_message"
      commit_message: "$slots.commit_message"
      files:
        - path: "$slots.component_file_path"
          content: "$slots.component_content"
        - path: "$slots.test_file_path"
          content: "$slots.test_content"
      body: |
        Closes #$triggers.issue_number

        Auto-drafted by Factory Supervisor (`feat-editor-web-implementation`).

        **Scaffolds:**
        - React component: `$slots.component_file_path` (component `$slots.component_name`)
        - Vitest test: `$slots.test_file_path`

        🟢 Green tier — scaffold only. A CODEOWNER must:
        1. Add `vitest` + `@testing-library/react` + `@testing-library/jest-dom` + `jsdom` to `apps/web/package.json` and create `apps/web/vitest.config.ts` — the web app currently has no in-app unit runner.
        2. Review the React + Tailwind wiring and fill in any handlers the supervisor could not synthesize from the issue body.
        3. Confirm the chosen path under `apps/web/src/app/edit/components/` fits the editor's eventual information architecture.

        Plan comment: see source issue for details.
      labels: [enhancement, sprint:3, supervisor, tier-green]
      draft: false
    intent: "Open a real (non-draft, non-empty) PR with the two scaffolded files so CI runs and a CODEOWNER can review."
    requires_human_review: true
acceptance_gate:
  description: "PR is open on capricast with at least one changed file matching one of the slot paths."
  verifier_query:
    tool: github.openPR
    query: "pr:$s4.number files.count >= 1 AND base == 'main'"
    assert: "files.any(f => f.path == '$slots.component_file_path')"
rollback:
  - on_step: s4
    action: github.closePR
    params:
      repo: "Latimer-Woods-Tech/capricast"
      pr_number: "$s4.pr_number"
      comment: "Supervisor rollback: closing editor-web scaffold PR. CODEOWNER must implement manually or re-trigger with a clearer issue body."
