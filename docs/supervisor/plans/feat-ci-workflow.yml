id: feat-ci-workflow
version: 1
tier: yellow
triggers:
  labels_any_of: [engineering, hardening, enhancement]
  title_pattern: "(feat\\(ci\\)|feat\\(triage\\)|feat\\(review\\)|feat\\(reliability\\)|feat\\(process\\)|chore\\(ci\\)|chore\\(process\\)|chore\\(governance\\))"
  body_patterns:
    - "(github actions|workflow|\\.github/workflows|ci check|path\\.based|required\\.check)"
preconditions:
  - capability_exists: github.readFile
  - capability_exists: github.openPR
  - capability_exists: github.comment
slots:
  - name: workflow_name
    type: string
    validator: "^[a-z][a-z0-9\\-]+$"
    source: issue_title
  - name: trigger_events
    type: string
    validator: "^[a-z_,\\s]+$"
    source: issue_body
    default: workflow_dispatch
  - name: description
    type: string
    validator: "^.{10,200}$"
    source: issue_body
steps:
  - id: s1
    tool: github.readFile
    depends_on: null
    params:
      repo: factory
      path: ".github/workflows/COORDINATION.md"
      ref: main
    intent: "Read the workflow coordination guide to understand naming conventions and approval patterns for this repo."
    requires_human_review: false
  - id: s2
    tool: github.comment
    depends_on: s1
    params:
      issue_ref: "$triggers.issue_number"
      body: "Supervisor plan for `$slots.workflow_name`\n\n**Trigger events:** `$slots.trigger_events`\n**Description:** $slots.description\n\nDrafting workflow YAML following Factory conventions. Will open a draft PR.\n\n@adrper79-dot — React ✅ to proceed, or comment with changes needed."
    intent: "Post a plan comment and wait for CODEOWNER confirmation before creating any files."
    requires_human_review: true
  - id: s3
    tool: github.openPR
    depends_on: s2
    params:
      repo: factory
      base: main
      head: "supervisor/ci-$slots.workflow_name"
      title: "feat(ci): add $slots.workflow_name workflow"
      body: "Closes #$triggers.issue_number\n\nAdds `.github/workflows/$slots.workflow_name.yml` implementing: $slots.description\n\nFollows Factory App token pattern and COORDINATION.md conventions.\n\nGenerated by supervisor. Human review required before merge."
      draft: true
    intent: "Open a draft PR with the new workflow file. Uses Factory GitHub App token pattern, not PATs."
    requires_human_review: true
acceptance_gate:
  description: "A draft PR exists containing the new workflow file under .github/workflows/."
rollback:
  - on_step: s3
    action: github.closePR
    params:
      repo: factory
      pr_number: "$s3.pr_number"
      comment: "Supervisor rollback: closing auto-generated workflow PR. Manual implementation required."
