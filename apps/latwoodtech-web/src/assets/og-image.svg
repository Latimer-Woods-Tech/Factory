<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050403;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0704;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050403;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="grad-accent" cx="15%" cy="10%">
      <stop offset="0%" style="stop-color:rgba(236,187,91,0.24);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(236,187,91,0);stop-opacity:1" />
    </radialGradient>
    <radialGradient id="grad-accent2" cx="85%" cy="80%">
      <stop offset="0%" style="stop-color:rgba(73,165,109,0.18);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(73,165,109,0);stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad-main)"/>
  <rect width="1200" height="630" fill="url(#grad-accent)"/>
  <rect width="1200" height="630" fill="url(#grad-accent2)"/>

  <!-- Accent line -->
  <line x1="0" y1="120" x2="1200" y2="120" stroke="rgba(215,169,75,0.16)" stroke-width="2"/>

  <!-- Logo mark -->
  <circle cx="100" cy="80" r="48" fill="none" stroke="rgba(240,207,122,0.22)" stroke-width="2"/>
  <text x="100" y="95" font-family="'Cormorant Garamond', serif" font-size="64" font-weight="700" fill="#d7a94b" text-anchor="middle">L</text>

  <!-- Main headline -->
  <text x="200" y="90" font-family="'Cormorant Garamond', serif" font-size="72" font-weight="600" fill="#fff7e3">Latimer Woods</text>

  <!-- Subheadline -->
  <text x="200" y="150" font-family="'Space Grotesk', sans-serif" font-size="32" font-weight="400" fill="#d8c9a3">Technology for people who want more life.</text>

  <!-- Divider -->
  <line x1="200" y1="180" x2="1100" y2="180" stroke="rgba(215,169,75,0.2)" stroke-width="1"/>

  <!-- Key stats -->
  <g>
    <text x="200" y="240" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="700" fill="#d7a94b" letter-spacing="2" text-transform="uppercase">BUILT WITH CRAFT</text>
    <text x="200" y="280" font-family="'Cormorant Garamond', serif" font-size="48" font-weight="600" fill="#f6e7c0">1,325 PRs</text>
    <text x="200" y="310" font-family="'Space Grotesk', sans-serif" font-size="16" fill="#b7a577">Shipped and reviewed</text>
  </g>

  <g>
    <text x="550" y="280" font-family="'Cormorant Garamond', serif" font-size="48" font-weight="600" fill="#f6e7c0">27 Apps</text>
    <text x="550" y="310" font-family="'Space Grotesk', sans-serif" font-size="16" fill="#b7a577">In production</text>
  </g>

  <g>
    <text x="850" y="280" font-family="'Cormorant Garamond', serif" font-size="48" font-weight="600" fill="#f6e7c0">$9.11/mo</text>
    <text x="850" y="310" font-family="'Space Grotesk', sans-serif" font-size="16" fill="#b7a577">Infra cost</text>
  </g>

  <!-- Footer -->
  <text x="200" y="420" font-family="'Space Grotesk', sans-serif" font-size="16" fill="#b7a577">Portfolio of platforms: edge-first, AI-orchestrated, human-centered</text>
  <text x="200" y="460" font-family="'Space Grotesk', sans-serif" font-size="14" fill="#8a8070">latwoodtech.com</text>

  <!-- Accent elements -->
  <circle cx="1100" cy="80" r="2" fill="#49a56d" opacity="0.4"/>
  <circle cx="1080" cy="520" r="2" fill="#d95a43" opacity="0.4"/>
  <circle cx="120" cy="550" r="2" fill="#d7a94b" opacity="0.3"/>
</svg>
