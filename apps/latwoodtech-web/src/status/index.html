<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Live uptime probes for Latimer Woods brand surfaces. Refreshed every 5 minutes by the status-prober Worker." />
    <meta name="theme-color" content="#05070a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234f7bff' width='100' height='100'/><text x='50' y='60' font-size='70' font-weight='700' fill='white' text-anchor='middle'>L</text></svg>" />
    <title>Status — Latimer Woods Surfaces</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .status-shell { padding: 3rem 1.5rem; max-width: 960px; margin: 0 auto; }
      .status-shell h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; margin: 0 0 0.5rem; }
      .status-meta { color: #8a93a6; font-size: 0.95rem; margin: 0 0 2rem; }
      .status-meta[data-tone="stale"] { color: #d4a14a; }
      .status-meta[data-tone="error"] { color: #d46a6a; }
      .status-grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      .status-card { border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 1.25rem; background: rgba(255,255,255,0.02); }
      .status-card .name { font-weight: 600; font-size: 1.1rem; margin: 0 0 0.35rem; }
      .status-card .url { font-family: 'Space Grotesk', monospace; font-size: 0.85rem; color: #8a93a6; margin: 0 0 0.75rem; word-break: break-all; }
      .status-card .row { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
      .status-pill { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
      .status-pill[data-alive="true"] { background: rgba(86, 196, 130, 0.15); color: #56c482; }
      .status-pill[data-alive="false"] { background: rgba(212, 106, 106, 0.15); color: #d46a6a; }
      .status-pill[data-alive="unknown"] { background: rgba(138, 147, 166, 0.15); color: #8a93a6; }
      .status-back { display: inline-block; margin-top: 2.5rem; color: #4f7bff; text-decoration: none; }
      .status-back:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <a href="#main" class="skip-link">Skip to main content</a>
    <main id="main" class="status-shell">
      <p class="eyebrow">Live status</p>
      <h1>Brand surface health</h1>
      <p class="status-meta" data-status-meta>Loading…</p>

      <div class="status-grid" data-status-grid>
        <article class="status-card">
          <p class="name">—</p>
          <p class="url">awaiting probe data</p>
          <div class="row">
            <span class="status-pill" data-alive="unknown">UNKNOWN</span>
            <span>—</span>
          </div>
        </article>
      </div>

      <a class="status-back" href="/">← Back to latwoodtech.com</a>
    </main>

    <script type="module">
      const LIVE_ENDPOINT = 'https://status.latwoodtech.work/current';
      const FALLBACK_ENDPOINT = '/data/pulse.json';
      const LIVE_TIMEOUT_MS = 8000;

      const grid = document.querySelector('[data-status-grid]');
      const meta = document.querySelector('[data-status-meta]');

      function formatRelative(iso) {
        if (!iso) return 'unknown time';
        const then = new Date(iso).getTime();
        if (Number.isNaN(then)) return iso;
        const delta = Math.max(0, Date.now() - then);
        const seconds = Math.round(delta / 1000);
        if (seconds < 60) return `${seconds}s ago`;
        const minutes = Math.round(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.round(minutes / 60);
        if (hours < 24) return `${hours}h ago`;
        const days = Math.round(hours / 24);
        return `${days}d ago`;
      }

      function renderResults(results, generatedAt, source) {
        if (!Array.isArray(results) || results.length === 0) {
          grid.innerHTML = '<p>No surfaces reported.</p>';
          meta.textContent = 'No data available.';
          meta.dataset.tone = 'error';
          return;
        }
        grid.innerHTML = results
          .map((entry) => {
            const alive = entry.alive === true ? 'true' : entry.alive === false ? 'false' : 'unknown';
            const pillText = alive === 'true' ? 'UP' : alive === 'false' ? 'DOWN' : 'UNKNOWN';
            const status = entry.status != null ? `HTTP ${entry.status}` : entry.error ? 'no response' : '—';
            const duration = typeof entry.durationMs === 'number' ? `${entry.durationMs}ms` : '';
            const name = entry.name ?? 'Unknown';
            const url = entry.url ?? '';
            return `
              <article class="status-card">
                <p class="name">${name}</p>
                <p class="url"><a href="${url}" target="_blank" rel="noopener">${url}</a></p>
                <div class="row">
                  <span class="status-pill" data-alive="${alive}">${pillText}</span>
                  <span>${status}${duration ? ' · ' + duration : ''}</span>
                </div>
              </article>`;
          })
          .join('');
        const probedLabel = formatRelative(generatedAt);
        const sourceLabel = source === 'live' ? 'live probe' : 'build-time snapshot';
        meta.textContent = `Probed ${probedLabel} (${sourceLabel}).`;
        meta.dataset.tone = source === 'live' ? '' : 'stale';
      }

      function fetchLive() {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), LIVE_TIMEOUT_MS);
        return fetch(LIVE_ENDPOINT, {
          headers: { Accept: 'application/json' },
          signal: controller.signal,
          cache: 'no-store',
        })
          .then((response) => {
            if (!response.ok) throw new Error('live endpoint returned ' + response.status);
            return response.json();
          })
          .finally(() => clearTimeout(timer));
      }

      function fetchFallback() {
        return fetch(FALLBACK_ENDPOINT, { headers: { Accept: 'application/json' } })
          .then((response) => {
            if (!response.ok) throw new Error('fallback returned ' + response.status);
            return response.json();
          });
      }

      function normalizeFallback(payload) {
        const pulse = payload && payload.pulse ? payload.pulse : {};
        const generatedAt = (payload && payload.generatedAt) || (pulse && pulse.generatedAt) || null;
        const fromSurfaceHealth = Array.isArray(pulse.surfaceHealth) ? pulse.surfaceHealth : null;
        const fromSurfaces = Array.isArray(pulse.surfaces)
          ? pulse.surfaces.map((surface) => ({
              name: surface.name,
              url: surface.url,
              alive: null,
              status: null,
              durationMs: null,
            }))
          : [];
        const results = fromSurfaceHealth ?? fromSurfaces;
        return { generatedAt, results };
      }

      fetchLive()
        .then((envelope) => {
          if (!envelope || !Array.isArray(envelope.results)) {
            throw new Error('live envelope malformed');
          }
          renderResults(envelope.results, envelope.generatedAt, 'live');
        })
        .catch((liveError) => {
          console.warn('status-prober live fetch failed; falling back to pulse.json', liveError);
          fetchFallback()
            .then((payload) => {
              const normalized = normalizeFallback(payload);
              renderResults(normalized.results, normalized.generatedAt, 'fallback');
            })
            .catch((fallbackError) => {
              console.error('fallback fetch failed', fallbackError);
              grid.innerHTML = '<p>Status data temporarily unavailable.</p>';
              meta.textContent = 'Unable to load status data.';
              meta.dataset.tone = 'error';
            });
        });
    </script>
  </body>
</html>
