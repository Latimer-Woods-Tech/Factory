# Google Cloud Build pipeline for the Factory browser-agent Cloud Run service.
#
# Pipeline steps:
#   1. Build the Docker image from apps/browser-agent/Dockerfile.
#   2. Push the image to Artifact Registry.
#   3. Deploy to Cloud Run (us-central1) with 2Gi memory and 1 CPU.
#      R2 credentials are injected from GCP Secret Manager at deploy time.
#
# Project: factory-495015
# Service: browser-agent
# Region:  us-central1
#
# Trigger filter: apps/browser-agent/**

substitutions:
  _REGION: us-central1
  _PROJECT_ID: factory-495015
  _SERVICE: browser-agent
  _REPOSITORY: factory
  _IMAGE_NAME: browser-agent
  _R2_ACCOUNT_ID: a1c8a33cbe8a3c9e260480433a0dbb06
  _R2_BUCKET_NAME: factory-test-artifacts

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/${_PROJECT_ID}/secrets/browser-agent-r2-access-key-id/versions/latest
      env: R2_ACCESS_KEY_ID
    - versionName: projects/${_PROJECT_ID}/secrets/browser-agent-r2-secret-access-key/versions/latest
      env: R2_SECRET_ACCESS_KEY

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: apps/browser-agent
    args:
      - build
      - --tag
      - us-central1-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}
      - --tag
      - us-central1-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    secretEnv:
      - R2_ACCESS_KEY_ID
      - R2_SECRET_ACCESS_KEY
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=us-central1-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --memory=2Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --concurrency=4
      - --timeout=300
      - --port=8080
      - --no-allow-unauthenticated
      - --set-env-vars=R2_ACCOUNT_ID=${_R2_ACCOUNT_ID},R2_BUCKET_NAME=${_R2_BUCKET_NAME}
      - --set-secrets=R2_ACCESS_KEY_ID=browser-agent-r2-access-key-id:latest,R2_SECRET_ACCESS_KEY=browser-agent-r2-secret-access-key:latest

images:
  - us-central1-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}
  - us-central1-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:latest
