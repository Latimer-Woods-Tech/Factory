# Flagship Feature Flag Registry
#
# Source of truth for all feature flags across Factory apps.
# The admin-studio ops panel reads this at build time (inlined into flagship.ts).
# CI enforces consistency between this file and the inlined copy.
#
# Key format:  {app}:{tier}:{name}
# Tiers:       ks (kill switch) | ro (rollout) | ex (experiment) | ops | cfg (config)
# Owners:      app slug or "factory" for org-wide flags

# ── Global (org-wide) ─────────────────────────────────────────────────────────

- key: "global:ks:supervisor_automerge"
  type: kill_switch
  description: "Halt supervisor auto-merge org-wide."
  apps: ["*"]
  owner: factory
  status: active
  default_value: true
  created_at: "2026-05-07"
  cleanup_policy: permanent

- key: "global:ks:maintenance_mode"
  type: kill_switch
  description: "Org-wide maintenance banner across all apps."
  apps: ["*"]
  owner: factory
  status: active
  default_value: false
  created_at: "2026-05-07"
  cleanup_policy: permanent

# ── humandesign ───────────────────────────────────────────────────────────────

- key: "humandesign:ks:profile_generate"
  type: kill_switch
  description: "Disable /api/profile/generate instantly."
  apps: ["humandesign"]
  owner: humandesign
  status: active
  default_value: true
  created_at: "2026-05-07"
  cleanup_policy: permanent

- key: "humandesign:ks:billing_portal"
  type: kill_switch
  description: "Disable Stripe billing portal if 400s surface."
  apps: ["humandesign"]
  owner: humandesign
  status: active
  default_value: true
  created_at: "2026-05-07"
  cleanup_policy: permanent

- key: "humandesign:ops:llm_tier"
  type: ops
  description: "LLM tier for humandesign: balanced | fast | quality"
  apps: ["humandesign"]
  owner: humandesign
  status: active
  default_value: "balanced"
  created_at: "2026-05-07"
  cleanup_policy: permanent

- key: "humandesign:ks:maintenance_mode"
  type: kill_switch
  description: "Kill switch — enables maintenance mode for humandesign"
  apps: ["humandesign"]
  owner: humandesign
  status: active
  default_value: false
  created_at: "2026-05-07"
  cleanup_policy: permanent

- key: "humandesign:ro:post_purchase_flow_v2"
  type: rollout
  description: "New post-purchase flow handling missing chart state."
  apps: ["humandesign"]
  owner: humandesign
  status: draft
  default_value: false
  created_at: "2026-05-07"
  cleanup_policy: remove_when_fully_rolled_out

- key: "humandesign:ex:annual_pricing_copy"
  type: experiment
  description: "save_percent vs save_dollars. PostHog measures conversion."
  apps: ["humandesign"]
  owner: factory
  status: draft
  default_value: "save_percent"
  variations: ["save_percent", "save_dollars"]
  created_at: "2026-05-07"
  cleanup_policy: remove_when_winner_declared

