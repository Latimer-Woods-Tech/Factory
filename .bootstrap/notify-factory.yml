name: notify-factory
on:
  push:
    branches: [main]
    paths:
      - 'docs/FUNCTIONS_MATRIX.md'
      - 'apps/admin-studio/docs/FUNCTIONS_MATRIX.md'

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Mint Factory App token (Factory dispatch target)
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: Factory

      - name: Send repository_dispatch[matrix-updated]
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          set -e
          payload=$(jq -nc \
            --arg repo  "${{ github.repository }}" \
            --arg sha   "${{ github.sha }}" \
            --arg actor "${{ github.actor }}" \
            '{event_type:"matrix-updated", client_payload:{repo:$repo, sha:$sha, actor:$actor}}')
          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "$payload" \
            https://api.github.com/repos/Latimer-Woods-Tech/Factory/dispatches
