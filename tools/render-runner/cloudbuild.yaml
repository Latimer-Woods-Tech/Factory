steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - tools/render-runner/Dockerfile
      - -t
      - us-central1-docker.pkg.dev/factory-495015/factory/render-runner:latest
      - .
    timeout: 1200s

images:
  - us-central1-docker.pkg.dev/factory-495015/factory/render-runner:latest

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
