version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions-updates:
        patterns: ["*"]
    labels:
      - dependencies
      - supervisor:approved-source
    commit-message:
      prefix: chore(actions)
    open-pull-requests-limit: 3
# Note:
# npm version updates are handled by Renovate. Keeping Dependabot scoped to
# GitHub Actions avoids duplicate bot traffic and stale root-level npm config.
