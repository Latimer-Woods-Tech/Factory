name: CodeQL Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # NOTE: no `paths:` filter — branch protection requires "Analyze (javascript)"
    # on every PR. With path filtering, PRs touching only non-source files
    # (eg. version bumps in package.json) silently skip CodeQL and become
    # permanently unmergeable since the required check never reports.
    # CodeQL runs ~30s on small diffs; the always-on cost is acceptable
    # for the merge-flow predictability it buys.
  merge_group:
  schedule:
    # Weekly on Sunday 3am ET
    - cron: '0 7 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: javascript
          # Keep signal high: security-only suite avoids high-volume quality findings.
          queries: security-extended
      - uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: /language:javascript
