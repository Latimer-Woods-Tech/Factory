name: Policy Drift Guard

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - name: Verify org allowed_actions = all
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          endpoint="https://api.github.com/orgs/Latimer-Woods-Tech/actions/permissions"
          body=$(mktemp)
          code=$(curl -sS -o "$body" -w "%{http_code}" -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$endpoint")

          if [ "$code" = "200" ]; then
            state=$(jq -r '.allowed_actions // "all"' "$body")
            enabled=$(jq -r '.enabled_repositories // "all"' "$body")
            echo "Org allowed_actions=$state, enabled_repositories=$enabled"
            if [ "$state" != "all" ]; then
              echo "::error::Org allowed_actions drifted from 'all' to '$state'. Cross-repo reusable workflows are now broken. Fix at https://github.com/organizations/Latimer-Woods-Tech/settings/actions"
              exit 1
            fi
            if [ "$enabled" != "all" ]; then
              echo "::warning::enabled_repositories=$enabled (expected all)"
            fi
          elif [ "$code" = "403" ]; then
            echo "::warning::Skipping org actions policy check: token lacks org-level access to $endpoint (HTTP 403)."
            echo "::warning::Grant org admin token access or keep this check informational."
          else
            echo "::error::Unexpected response from $endpoint (HTTP $code)."
            cat "$body"
            exit 1
          fi
      - name: Verify factory remains public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          vis=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" https://api.github.com/repos/${{ github.repository }} | jq -r '.visibility')
          echo "factory visibility=$vis"
          if [ "$vis" != "public" ]; then
            echo "::error::factory must remain public for cross-repo reusable workflow consumption on Team plan."
            exit 1
          fi

      # SEC-1.1 — Org 2FA enforcement
      - name: Verify org 2FA is enforced (SEC-1.1)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          endpoint="https://api.github.com/orgs/Latimer-Woods-Tech"
          body=$(mktemp)
          code=$(curl -sS -o "$body" -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$endpoint")

          if [ "$code" = "200" ]; then
            tfa=$(jq -r '.two_factor_requirement_enabled // "false"' "$body")
            echo "Org two_factor_requirement_enabled=$tfa"
            if [ "$tfa" != "true" ]; then
              echo "::error::Org 2FA is not enforced. Enable at https://github.com/organizations/Latimer-Woods-Tech/settings/auth (SEC-1.1)"
              exit 1
            fi
          elif [ "$code" = "403" ]; then
            echo "::warning::Skipping org 2FA check: token lacks org admin access (HTTP 403)."
          else
            echo "::error::Unexpected response from $endpoint (HTTP $code)."
            cat "$body"
            exit 1
          fi

      - name: Verify The_Calling is archived (OPS-2.1)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          body=$(mktemp)
          code=$(curl -sS -o "$body" -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/Latimer-Woods-Tech/The_Calling")

          if [ "$code" = "404" ]; then
            echo "The_Calling: repo not found (may have been deleted) — OK"
            exit 0
          fi
          if [ "$code" != "200" ]; then
            echo "::warning::Could not fetch The_Calling (HTTP $code) — skipping check"
            exit 0
          fi
          archived=$(jq -r '.archived' "$body")
          echo "The_Calling archived=$archived"
          if [ "$archived" != "true" ]; then
            echo "::error::The_Calling is not archived. Run the 'Align Legacy Repos (OPS-2.1)' workflow."
            exit 1
          fi

      - name: Verify legacy repos comply with Factory policy (OPS-2.1)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          failed=0

          check_repo() {
            local repo="$1"
            local body code
            body=$(mktemp)
            code=$(curl -sS -o "$body" -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/Latimer-Woods-Tech/${repo}")

            if [ "$code" = "404" ]; then
              echo "${repo}: not found — skipping"
              return
            fi
            if [ "$code" != "200" ]; then
              echo "::warning::Could not fetch ${repo} (HTTP $code) — skipping check"
              return
            fi

            local archived allow_rebase allow_merge_commit allow_squash delete_branch description
            archived=$(jq -r '.archived' "$body")
            if [ "$archived" = "true" ]; then
              echo "${repo}: archived — skipping policy check"
              return
            fi

            allow_rebase=$(jq -r '.allow_rebase_merge' "$body")
            allow_merge_commit=$(jq -r '.allow_merge_commit' "$body")
            allow_squash=$(jq -r '.allow_squash_merge' "$body")
            delete_branch=$(jq -r '.delete_branch_on_merge' "$body")
            description=$(jq -r '.description // ""' "$body")

            echo "${repo}: allow_rebase_merge=${allow_rebase} allow_merge_commit=${allow_merge_commit} allow_squash_merge=${allow_squash} delete_branch_on_merge=${delete_branch} description='${description}'"

            if [ "$allow_rebase" != "false" ]; then
              echo "::error::${repo}: allow_rebase_merge must be false (Factory squash-only policy). Run align-legacy-repos workflow."
              failed=1
            fi
            if [ "$allow_merge_commit" != "false" ]; then
              echo "::error::${repo}: allow_merge_commit must be false (Factory squash-only policy). Run align-legacy-repos workflow."
              failed=1
            fi
            if [ "$allow_squash" != "true" ]; then
              echo "::error::${repo}: allow_squash_merge must be true (Factory squash-only policy). Run align-legacy-repos workflow."
              failed=1
            fi
            if [ "$delete_branch" != "true" ]; then
              echo "::error::${repo}: delete_branch_on_merge must be true. Run align-legacy-repos workflow."
              failed=1
            fi
            if [ -z "$description" ]; then
              echo "::error::${repo}: description is empty. Run align-legacy-repos workflow."
              failed=1
            fi

            # Check SECURITY.md exists
            local sec_code
            sec_code=$(curl -sS -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/Latimer-Woods-Tech/${repo}/contents/SECURITY.md")
            if [ "$sec_code" = "404" ]; then
              echo "::error::${repo}: SECURITY.md missing. Run align-legacy-repos workflow."
              failed=1
            elif [ "$sec_code" != "200" ]; then
              echo "::warning::${repo}: Could not check SECURITY.md (HTTP ${sec_code})"
            else
              echo "${repo}: SECURITY.md present ✓"
            fi
          }

          check_repo "coh"
          check_repo "focusbro"

          exit $failed

      # SEC-1.2 — factory main branch protection via repository ruleset
      - name: Verify factory main branch protection (SEC-1.2)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          endpoint="https://api.github.com/repos/Latimer-Woods-Tech/Factory/rulesets"
          body=$(mktemp)
          code=$(curl -sS -o "$body" -w "%{http_code}"             -H "Authorization: Bearer $GH_TOKEN"             -H "Accept: application/vnd.github+json"             "$endpoint")

          if [ "$code" = "403" ]; then
            echo "::warning::Skipping ruleset branch protection check: token lacks admin access (HTTP 403)."
            exit 0
          fi
          if [ "$code" != "200" ]; then
            echo "::error::Unexpected response from $endpoint (HTTP $code)."
            cat "$body"
            exit 1
          fi

          ruleset_id=$(jq -r '.[] | select(.target == "branch" and .name == "main" and .enforcement == "active") | .id' "$body" | head -n1)
          if [ -z "$ruleset_id" ]; then
            echo "::error::No active repository ruleset named main protects the default branch. (SEC-1.2)"
            cat "$body"
            exit 1
          fi

          detail=$(mktemp)
          detail_code=$(curl -sS -o "$detail" -w "%{http_code}"             -H "Authorization: Bearer $GH_TOKEN"             -H "Accept: application/vnd.github+json"             "https://api.github.com/repos/Latimer-Woods-Tech/Factory/rulesets/$ruleset_id")
          if [ "$detail_code" != "200" ]; then
            echo "::error::Could not fetch ruleset $ruleset_id (HTTP $detail_code)."
            cat "$detail"
            exit 1
          fi

          FAILED=0
          REQUIRED_CONTEXTS='["validate","Analyze (javascript)","dependency-review"]'

          includes_default=$(jq -r '(.conditions.ref_name.include // []) | index("~DEFAULT_BRANCH") != null' "$detail")
          if [ "$includes_default" != "true" ]; then
            echo "::error::main ruleset does not include ~DEFAULT_BRANCH. (SEC-1.2)"
            FAILED=1
          fi

          has_deletion=$(jq -r '[.rules[]? | select(.type == "deletion")] | length > 0' "$detail")
          has_non_fast_forward=$(jq -r '[.rules[]? | select(.type == "non_fast_forward")] | length > 0' "$detail")
          has_linear=$(jq -r '[.rules[]? | select(.type == "required_linear_history")] | length > 0' "$detail")
          if [ "$has_deletion" != "true" ]; then
            echo "::error::main ruleset does not block branch deletion. (SEC-1.2)"
            FAILED=1
          fi
          if [ "$has_non_fast_forward" != "true" ]; then
            echo "::error::main ruleset does not block non-fast-forward pushes. (SEC-1.2)"
            FAILED=1
          fi
          if [ "$has_linear" != "true" ]; then
            echo "::error::main ruleset does not require linear history. (SEC-1.2)"
            FAILED=1
          fi

          pr_rule=$(jq -c '.rules[]? | select(.type == "pull_request") | .parameters' "$detail" | head -n1)
          if [ -z "$pr_rule" ]; then
            echo "::error::main ruleset does not require pull requests. (SEC-1.2)"
            FAILED=1
          else
            approvals=$(jq -rn --argjson pr "$pr_rule" '$pr.required_approving_review_count // 0')
            stale=$(jq -rn --argjson pr "$pr_rule" '$pr.dismiss_stale_reviews_on_push // false')
            codeowners=$(jq -rn --argjson pr "$pr_rule" '$pr.require_code_owner_review // false')
            threads=$(jq -rn --argjson pr "$pr_rule" '$pr.required_review_thread_resolution // false')
            squash=$(jq -rn --argjson pr "$pr_rule" '($pr.allowed_merge_methods // []) | index("squash") != null')
            if [ "$approvals" -lt 1 ]; then
              echo "::error::main ruleset requires fewer than 1 approving review. (SEC-1.2)"
              FAILED=1
            fi
            if [ "$stale" != "true" ]; then
              echo "::error::main ruleset does not dismiss stale reviews. (SEC-1.2)"
              FAILED=1
            fi
            if [ "$codeowners" != "true" ]; then
              echo "::error::main ruleset does not require CODEOWNERS review. (SEC-1.2)"
              FAILED=1
            fi
            if [ "$threads" != "true" ]; then
              echo "::error::main ruleset does not require review thread resolution. (SEC-1.2)"
              FAILED=1
            fi
            if [ "$squash" != "true" ]; then
              echo "::error::main ruleset does not restrict merges to squash. (SEC-1.2)"
              FAILED=1
            fi
          fi

          actual_contexts=$(jq -c '[.rules[]? | select(.type == "required_status_checks") | .parameters.required_status_checks[]?.context]' "$detail")
          missing_contexts=$(jq -rn --argjson actual "$actual_contexts" --argjson required "$REQUIRED_CONTEXTS" '
            [ $required[] | select(($actual | index(.)) == null) ]
          ')
          if [ "$missing_contexts" != "[]" ]; then
            echo "::error::main ruleset is missing required status checks: $missing_contexts (SEC-1.2)"
            FAILED=1
          fi

          strict=$(jq -r '[.rules[]? | select(.type == "required_status_checks") | .parameters.strict_required_status_checks_policy] | first // false' "$detail")
          if [ "$strict" != "true" ]; then
            echo "::error::main ruleset does not require branches to be up to date before merge. (SEC-1.2)"
            FAILED=1
          fi

          echo "ruleset_id=$ruleset_id"
          echo "required_contexts=$actual_contexts"
          if [ "$FAILED" -eq 1 ]; then
            echo "Run apply-sec-hardening or update the repository ruleset to restore required settings."
            exit 1
          fi
          echo "✅ factory main repository ruleset is compliant."

      # SEC-1.3 — Secret scanning advanced features
      - name: Verify secret scanning features enabled (SEC-1.3)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          endpoint="https://api.github.com/repos/Latimer-Woods-Tech/factory"
          body=$(mktemp)
          code=$(curl -sS -o "$body" -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$endpoint")

          if [ "$code" = "200" ]; then
            ss=$(jq -r '.security_and_analysis.secret_scanning.status // "disabled"' "$body")
            push=$(jq -r '.security_and_analysis.secret_scanning_push_protection.status // "disabled"' "$body")
            ai=$(jq -r '.security_and_analysis.secret_scanning_ai_inference.status // "disabled"' "$body")
            validity=$(jq -r '.security_and_analysis.secret_scanning_validity_checks.status // "disabled"' "$body")
            non_provider=$(jq -r '.security_and_analysis.secret_scanning_non_provider_patterns.status // "disabled"' "$body")

            echo "secret_scanning=$ss, push_protection=$push, ai_inference=$ai, validity_checks=$validity, non_provider_patterns=$non_provider"

            FAILED=0
            [ "$ss" != "enabled" ] && echo "::error::Secret scanning is not enabled. (SEC-1.3)" && FAILED=1
            [ "$push" != "enabled" ] && echo "::warning::Secret scanning push protection is not enabled. (SEC-1.3)"
            [ "$ai" != "enabled" ] && echo "::warning::Secret scanning AI inference is not enabled. (SEC-1.3)"
            [ "$validity" != "enabled" ] && echo "::warning::Secret scanning validity checks are not enabled. (SEC-1.3)"
            [ "$non_provider" != "enabled" ] && echo "::warning::Secret scanning non-provider patterns are not enabled. (SEC-1.3)"

            if [ "$FAILED" -eq 1 ]; then
              echo "Run the apply-sec-hardening workflow to enable secret scanning. (SEC-1.3)"
              exit 1
            fi
            echo "✅ Secret scanning is enabled."
          elif [ "$code" = "403" ]; then
            echo "::warning::Skipping secret scanning check: token lacks access (HTTP 403)."
          else
            echo "::error::Unexpected response from $endpoint (HTTP $code)."
            cat "$body"
            exit 1
          fi
