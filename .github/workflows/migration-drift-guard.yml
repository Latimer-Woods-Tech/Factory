name: Migration Drift Guard (SUP-1.4)

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      app:
        description: 'App to check (leave blank for all)'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  drift-check:
    name: Check migration drift — ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: humandesign
            conn_secret: SELFPRIME_CONNECTION_STRING
          - app: videoking
            conn_secret: VIDEOKING_CONNECTION_STRING
          - app: xico-city
            conn_secret: XICOCITY_CONNECTION_STRING

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: Latimer-Woods-Tech/${{ matrix.app }}
          token: ${{ steps.app-token.outputs.token }}
          path: app

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Count repo migrations
        id: repo-count
        run: |
          MIGRATION_DIR="app/workers/src/db/migrations"
          if [ ! -d "$MIGRATION_DIR" ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          count=$(find "$MIGRATION_DIR" -maxdepth 1 -name "*.sql" 2>/dev/null | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Count applied migrations in Neon
        id: db-count
        env:
          DATABASE_URL: ${{ secrets[matrix.conn_secret] }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::${{ matrix.app }}: ${{ matrix.conn_secret }} not set — skipping DB check"
            echo "count=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          count=$(psql "$DATABASE_URL" -t -c \
            "SELECT COUNT(*) FROM __drizzle_migrations" 2>/dev/null | tr -d ' ' || echo "error")
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Compare and alert
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_COUNT: ${{ steps.repo-count.outputs.count }}
          DB_COUNT: ${{ steps.db-count.outputs.count }}
          APP: ${{ matrix.app }}
        run: |
          if [ "$DB_COUNT" = "skip" ]; then
            echo "⚠️ $APP: DB check skipped (no connection string)"
            exit 0
          fi
          if [ "$DB_COUNT" = "error" ]; then
            echo "::warning::$APP: could not query __drizzle_migrations — table may not exist yet"
            exit 0
          fi
          GAP=$((REPO_COUNT - DB_COUNT))
          echo "$APP: repo=$REPO_COUNT applied=$DB_COUNT gap=$GAP"
          if [ "$GAP" -gt 0 ]; then
            echo "::error::$APP has $GAP unapplied migration(s). Run 'npm run migrate' against the production Neon branch."
            cat > /tmp/issue-body.md <<EOF
          ## Migration Drift Detected: \`$APP\`

          **Repo migrations:** $REPO_COUNT
          **Applied in prod:** $DB_COUNT
          **Gap:** $GAP

          The production Neon database is missing $GAP migration(s) that exist in the repo.

          ### Fix
          \`\`\`bash
          cd apps/$APP/workers && DATABASE_URL=$PROD_CONNECTION_STRING npm run migrate
          \`\`\`

          See \`docs/runbooks/database.md\` for the full procedure.

          /cc @adrper79-dot
          EOF
            gh issue create \
              --repo Latimer-Woods-Tech/factory \
              --title "Migration drift: $APP ($GAP unapplied)" \
              --body-file /tmp/issue-body.md \
              --label "bug,area:database,supervisor:approved-source,priority:P1" \
              2>/dev/null || echo "::warning::Could not file issue (may already exist)"
            exit 1
          fi
          echo "✅ $APP: no migration drift (repo=$REPO_COUNT applied=$DB_COUNT)"
