name: Project Board Sync

on:
  issues:
    types: [opened, reopened, assigned, labeled, unlabeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  auto-assign-copilot:
    if: github.event_name == 'issues' && (github.event.action == 'opened' || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Assign to Copilot when issue has no assignee
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ASSIGNEE="copilot-swe-agent"
          ASSIGNEE_COUNT=$(gh api "/repos/$REPO/issues/$ISSUE_NUMBER" --jq '.assignees | length')
          if [ "$ASSIGNEE_COUNT" -gt 0 ]; then
            echo "issue already assigned; skipping"
            exit 0
          fi

          if gh api -X POST "/repos/$REPO/issues/$ISSUE_NUMBER/assignees" -f assignees[]="$ASSIGNEE" >/dev/null 2>&1; then
            echo "✓ #$ISSUE_NUMBER assigned to $ASSIGNEE"
            exit 0
          fi

          echo "could not assign #$ISSUE_NUMBER to '$ASSIGNEE'"
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "Automation notice: no assignee was set, and auto-assignment to '$ASSIGNEE' failed. Please assign this issue manually."

  sync-status-on-assignment:
    if: github.event_name == 'issues' && github.event.action == 'assigned'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Move assigned issue to In Progress
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
        run: |
          PROJECT_ID="PVT_kwDOEL0sNc4BWWtg"
          STATUS_FIELD=$(gh api graphql -f query='query($id: ID!) { node(id: $id) { ... on ProjectV2 { fields(first: 30) { nodes { __typename ... on ProjectV2SingleSelectField { id name options { id name } } } } } } }' -f id="$PROJECT_ID")
          FIELD_ID=$(echo "$STATUS_FIELD" | jq -r '.data.node.fields.nodes[] | select(.name=="Status") | .id')
          OPTION_ID=$(echo "$STATUS_FIELD" | jq -r '.data.node.fields.nodes[] | select(.name=="Status") | .options[] | select(.name=="In Progress") | .id')
          ITEM_ID=$(gh api graphql -f query='query($issueId: ID!) { node(id: $issueId) { ... on Issue { projectItems(first: 10) { nodes { id project { id } } } } } }' -f issueId="$ISSUE_NODE_ID" --jq ".data.node.projectItems.nodes[] | select(.project.id==\"$PROJECT_ID\") | .id")
          if [ -z "$ITEM_ID" ]; then echo "item not on board, skipping"; exit 0; fi
          if [ -z "$OPTION_ID" ]; then echo "In Progress option not found, skipping"; exit 0; fi
          gh api graphql -f query='mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String!) { updateProjectV2ItemFieldValue(input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { singleSelectOptionId: $value } }) { projectV2Item { id } } }' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$FIELD_ID" -f value="$OPTION_ID"
          echo "✓ issue moved to In Progress"

  sync-agent-field:
    if: github.event_name == 'issues' && startsWith(github.event.label.name, 'agent:claimed:')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Update Agent field on project
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          LABEL_NAME: ${{ github.event.label.name }}
          ACTION: ${{ github.event.action }}
        run: |
          AGENT_NAME=""
          if [ "$ACTION" = "labeled" ]; then
            AGENT_NAME="${LABEL_NAME#agent:claimed:}"
          fi
          PROJECT_ID="PVT_kwDOEL0sNc4BWWtg"
          AGENT_FIELD_ID=$(gh api graphql -f query='query($id: ID!) { node(id: $id) { ... on ProjectV2 { fields(first: 30) { nodes { ... on ProjectV2Field { id name } } } } } }' -f id="$PROJECT_ID" --jq '.data.node.fields.nodes[] | select(.name=="Agent") | .id')
          ITEM_ID=$(gh api graphql -f query='query($issueId: ID!) { node(id: $issueId) { ... on Issue { projectItems(first: 10) { nodes { id project { id } } } } } }' -f issueId="$ISSUE_NODE_ID" --jq ".data.node.projectItems.nodes[] | select(.project.id==\"$PROJECT_ID\") | .id")
          if [ -z "$ITEM_ID" ]; then echo "item not on board, skipping"; exit 0; fi
          gh api graphql -f query='mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String!) { updateProjectV2ItemFieldValue(input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { text: $value } }) { projectV2Item { id } } }' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$AGENT_FIELD_ID" -f value="$AGENT_NAME"

  sync-status-from-label:
    if: github.event_name == 'issues' && github.event.action == 'labeled' && startsWith(github.event.label.name, 'status:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Update Status field from status label
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          STATUS_LABEL: ${{ github.event.label.name }}
        run: |
          STATE="${STATUS_LABEL#status:}"
          case "$STATE" in
            in_progress|wip) PRIMARY_OPT="In Progress"; FALLBACK_OPT="" ;;
            blocked)     PRIMARY_OPT="Blocked"; FALLBACK_OPT="In Progress" ;;
            done)        PRIMARY_OPT="Done"; FALLBACK_OPT="" ;;
            abandoned)   PRIMARY_OPT="Abandoned"; FALLBACK_OPT="Done" ;;
            *) echo "unknown status label $STATUS_LABEL"; exit 0 ;;
          esac
          PROJECT_ID="PVT_kwDOEL0sNc4BWWtg"
          STATUS_FIELD=$(gh api graphql -f query='query($id: ID!) { node(id: $id) { ... on ProjectV2 { fields(first: 30) { nodes { __typename ... on ProjectV2SingleSelectField { id name options { id name } } } } } } }' -f id="$PROJECT_ID")
          FIELD_ID=$(echo "$STATUS_FIELD" | jq -r '.data.node.fields.nodes[] | select(.name=="Status") | .id')
          OPTION_ID=$(echo "$STATUS_FIELD" | jq -r --arg n "$PRIMARY_OPT" '.data.node.fields.nodes[] | select(.name=="Status") | .options[] | select(.name==$n) | .id')
          if [ -z "$OPTION_ID" ] && [ -n "$FALLBACK_OPT" ]; then
            OPTION_ID=$(echo "$STATUS_FIELD" | jq -r --arg n "$FALLBACK_OPT" '.data.node.fields.nodes[] | select(.name=="Status") | .options[] | select(.name==$n) | .id')
          fi
          ITEM_ID=$(gh api graphql -f query='query($issueId: ID!) { node(id: $issueId) { ... on Issue { projectItems(first: 10) { nodes { id project { id } } } } } }' -f issueId="$ISSUE_NODE_ID" --jq ".data.node.projectItems.nodes[] | select(.project.id==\"$PROJECT_ID\") | .id")
          if [ -z "$ITEM_ID" ]; then echo "item not on board, skipping"; exit 0; fi
          if [ -z "$OPTION_ID" ]; then echo "status option not found on board, skipping"; exit 0; fi
          gh api graphql -f query='mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String!) { updateProjectV2ItemFieldValue(input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { singleSelectOptionId: $value } }) { projectV2Item { id } } }' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$FIELD_ID" -f value="$OPTION_ID"

  sync-status-from-comment:
    # Accept both human and bot /status comments so automation can progress board state.
    if: |
      github.event_name == 'issue_comment' &&
      startsWith(github.event.comment.body, '/status')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Parse /status and update Status field
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
        run: |
          STATE=$(echo "$COMMENT_BODY" | grep -oE 'state:[[:space:]]*[a-z_]+' | head -1 | sed 's/state:[[:space:]]*//')
          if [ -z "$STATE" ]; then echo "no state in /status comment"; exit 0; fi
          case "$STATE" in
            in_progress|wip) PRIMARY_OPT="In Progress"; FALLBACK_OPT="" ;;
            blocked)     PRIMARY_OPT="Blocked"; FALLBACK_OPT="In Progress" ;;
            done)        PRIMARY_OPT="Done"; FALLBACK_OPT="" ;;
            abandoned)   PRIMARY_OPT="Abandoned"; FALLBACK_OPT="Done" ;;
            *) echo "unknown state $STATE"; exit 0 ;;
          esac
          PROJECT_ID="PVT_kwDOEL0sNc4BWWtg"
          STATUS_FIELD=$(gh api graphql -f query='query($id: ID!) { node(id: $id) { ... on ProjectV2 { fields(first: 30) { nodes { __typename ... on ProjectV2SingleSelectField { id name options { id name } } } } } } }' -f id="$PROJECT_ID")
          FIELD_ID=$(echo "$STATUS_FIELD" | jq -r '.data.node.fields.nodes[] | select(.name=="Status") | .id')
          OPTION_ID=$(echo "$STATUS_FIELD" | jq -r --arg n "$PRIMARY_OPT" '.data.node.fields.nodes[] | select(.name=="Status") | .options[] | select(.name==$n) | .id')
          if [ -z "$OPTION_ID" ] && [ -n "$FALLBACK_OPT" ]; then
            OPTION_ID=$(echo "$STATUS_FIELD" | jq -r --arg n "$FALLBACK_OPT" '.data.node.fields.nodes[] | select(.name=="Status") | .options[] | select(.name==$n) | .id')
          fi
          ITEM_ID=$(gh api graphql -f query='query($issueId: ID!) { node(id: $issueId) { ... on Issue { projectItems(first: 10) { nodes { id project { id } } } } } }' -f issueId="$ISSUE_NODE_ID" --jq ".data.node.projectItems.nodes[] | select(.project.id==\"$PROJECT_ID\") | .id")
          if [ -z "$ITEM_ID" ]; then echo "item not on board, skipping"; exit 0; fi
          if [ -z "$OPTION_ID" ]; then echo "status option not found on board, skipping"; exit 0; fi
          gh api graphql -f query='mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String!) { updateProjectV2ItemFieldValue(input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { singleSelectOptionId: $value } }) { projectV2Item { id } } }' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$FIELD_ID" -f value="$OPTION_ID"

  sync-deploy-sha-on-merge:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Populate Deploy SHA + Status=Done on linked issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_BODY: ${{ github.event.pull_request.body }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          REPO: ${{ github.repository }}
        run: |
          ISSUE_NUMS=$(echo "$PR_BODY" | grep -oiE '(clos(es|ed)|fix(es|ed)|resolv(es|ed))[[:space:]]+#[0-9]+' | grep -oE '[0-9]+' | sort -u)
          if [ -z "$ISSUE_NUMS" ]; then echo "no linked issues"; exit 0; fi
          PROJECT_ID="PVT_kwDOEL0sNc4BWWtg"
          FIELDS=$(gh api graphql -f query='query($id: ID!) { node(id: $id) { ... on ProjectV2 { fields(first: 30) { nodes { __typename ... on ProjectV2Field { id name } ... on ProjectV2SingleSelectField { id name options { id name } } } } } } }' -f id="$PROJECT_ID")
          DEPLOY_FIELD=$(echo "$FIELDS" | jq -r '.data.node.fields.nodes[] | select(.name=="Deploy SHA") | .id')
          STATUS_FIELD=$(echo "$FIELDS" | jq -r '.data.node.fields.nodes[] | select(.name=="Status") | .id')
          DONE_OPT=$(echo "$FIELDS" | jq -r '.data.node.fields.nodes[] | select(.name=="Status") | .options[] | select(.name=="Done") | .id')
          for N in $ISSUE_NUMS; do
            ISSUE_NODE=$(gh api "/repos/$REPO/issues/$N" --jq .node_id)
            ITEM_ID=$(gh api graphql -f query='query($issueId: ID!) { node(id: $issueId) { ... on Issue { projectItems(first: 10) { nodes { id project { id } } } } } }' -f issueId="$ISSUE_NODE" --jq ".data.node.projectItems.nodes[] | select(.project.id==\"$PROJECT_ID\") | .id")
            if [ -z "$ITEM_ID" ]; then echo "#$N not on board"; continue; fi
            gh api graphql -f query='mutation($p: ID!, $i: ID!, $f: ID!, $v: String!) { updateProjectV2ItemFieldValue(input: { projectId: $p, itemId: $i, fieldId: $f, value: { text: $v } }) { projectV2Item { id } } }' -f p="$PROJECT_ID" -f i="$ITEM_ID" -f f="$DEPLOY_FIELD" -f v="$MERGE_SHA"
            gh api graphql -f query='mutation($p: ID!, $i: ID!, $f: ID!, $v: String!) { updateProjectV2ItemFieldValue(input: { projectId: $p, itemId: $i, fieldId: $f, value: { singleSelectOptionId: $v } }) { projectV2Item { id } } }' -f p="$PROJECT_ID" -f i="$ITEM_ID" -f f="$STATUS_FIELD" -f v="$DONE_OPT"
            echo "✓ #$N → Deploy SHA $MERGE_SHA, Status Done"
          done
