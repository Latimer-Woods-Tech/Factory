name: Bootstrap Publish All Packages

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual publish)'
        required: false
        default: 'false'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
concurrency:
  group: bootstrap-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@latimer-woods-tech'

      - name: Verify npm auth before publishing
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is empty or unset. Configure it at https://github.com/Latimer-Woods-Tech/Factory/settings/secrets/actions"
            exit 1
          fi
          echo "Authenticated npm user:"
          if ! npm whoami; then
            echo "::error::npm whoami failed — token is invalid or expired."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish all packages in dependency order
        run: |
          # NOTE: do NOT use `set -e` for the per-package loop — a failure on
          # one package (e.g. token lacks publish access for that package name)
          # must not block the remaining packages. We collect failures and
          # exit non-zero at the end so the run is still marked failed.
          set -uo pipefail
          # Dependency order — leaf packages first
          PACKAGES=(errors monitoring logger realtime auth neon stripe llm llm-meter telephony analytics deploy testing email copy content social seo crm compliance entitlements protocol creator studio-core design-tokens design-system ui validation video schedule admin)

          declare -a FAILED=()
          declare -a PUBLISHED=()
          declare -a SKIPPED=()

          for pkg in "${PACKAGES[@]}"; do
            echo ""
            echo "=== ${pkg} ==="
            if [ ! -d "packages/${pkg}" ]; then
              echo "  packages/${pkg} does not exist — skip"
              SKIPPED+=("${pkg} (no dir)")
              continue
            fi
            pushd "packages/${pkg}" >/dev/null
            VER=$(node -e "process.stdout.write(require('./package.json').version)")
            NAME=$(node -e "process.stdout.write(require('./package.json').name)")
            echo "  ${NAME}@${VER}"

            # Skip if already published to npmjs at this version
            if npm view "${NAME}@${VER}" version >/dev/null 2>&1; then
              echo "  already published — skip"
              SKIPPED+=("${NAME}@${VER}")
              popd >/dev/null
              continue
            fi

            # Rewrite file: internal deps to ^current — match what other packages will publish
            node -e "
              const fs=require('fs');
              const p=JSON.parse(fs.readFileSync('package.json','utf8'));
              const fix=(deps)=>{
                if(!deps) return;
                for(const [k,v] of Object.entries(deps)){
                  if(k.startsWith('@latimer-woods-tech/') && (v.startsWith('file:')||v.startsWith('workspace:'))){
                    const n=k.split('/')[1];
                    try{
                      const target=JSON.parse(fs.readFileSync('../'+n+'/package.json','utf8')).version;
                      deps[k]='^'+target;
                    }catch{}
                  }
                }
              };
              fix(p.dependencies);
              fix(p.devDependencies);
              fix(p.peerDependencies);
              if(p.publishConfig && p.publishConfig.registry) delete p.publishConfig.registry;
              if(p.scripts && p.scripts.prepublish) delete p.scripts.prepublish;
              fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');
            "

            echo "  --- package.json after rewrite ---"
            head -25 package.json
            echo "  --- regenerating lockfile (clean) ---"
            rm -f package-lock.json
            npm install --legacy-peer-deps --ignore-scripts --no-fund --no-audit
            echo "  --- node_modules/@latimer-woods-tech/ ---"
            ls -la node_modules/@latimer-woods-tech/ 2>&1 || true
            for dep in node_modules/@latimer-woods-tech/*/; do
              echo "    $(basename "$dep"): $(node -p "require('./'+'$dep'+'package.json').version" 2>/dev/null || echo '?')"
            done
            echo "  --- build ---"
            npm run build --if-present

            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "  DRY RUN — would publish ${NAME}@${VER}"
              if ! npm publish --access public --ignore-scripts --dry-run; then
                echo "::error::dry-run publish failed for ${NAME}@${VER}"
                FAILED+=("${NAME}@${VER}")
              fi
            else
              if npm publish --access public --ignore-scripts; then
                echo "  published ${NAME}@${VER}"
                PUBLISHED+=("${NAME}@${VER}")
              else
                # 404 on PUT to scoped pkg = token lacks publish permission for that package.
                # 403 = forbidden (different ownership). Either way: continue with rest.
                echo "::error::publish failed for ${NAME}@${VER} — likely npm token lacks write access for this package. Check token allowlist on npmjs.com."
                FAILED+=("${NAME}@${VER}")
              fi
            fi
            popd >/dev/null
          done

          echo ""
          echo "================ SUMMARY ================"
          echo "Published: ${#PUBLISHED[@]}"
          for p in "${PUBLISHED[@]:-}"; do [ -n "$p" ] && echo "  + $p"; done
          echo "Skipped:   ${#SKIPPED[@]}"
          for p in "${SKIPPED[@]:-}"; do [ -n "$p" ] && echo "  = $p"; done
          echo "Failed:    ${#FAILED[@]}"
          for p in "${FAILED[@]:-}"; do [ -n "$p" ] && echo "  ! $p"; done
          echo "========================================="

          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "::error::${#FAILED[@]} package(s) failed to publish — see summary above."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
