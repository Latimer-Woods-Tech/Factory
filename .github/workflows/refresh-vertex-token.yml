name: Refresh Vertex AI Access Token (SUP-1.2)

on:
  schedule:
    - cron: '0,45 * * * *'   # every 45 min — tokens expire at 60 min
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  refresh:
    name: Mint fresh Vertex AI token for supervisor-sa
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Mint GitHub App token (secrets:write)
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: factory

      - name: Authenticate to GCP as supervisor-sa
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Mint access token
        id: token
        run: |
          TOKEN=$(gcloud auth print-access-token)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Store token as Actions secret
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh secret set VERTEX_ACCESS_TOKEN \
            --repo Latimer-Woods-Tech/factory \
            --body "${{ steps.token.outputs.token }}"
          echo "✅ VERTEX_ACCESS_TOKEN rotated (valid ~60 min)"
