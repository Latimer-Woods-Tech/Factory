name: Refresh Vertex AI Access Token (SUP-1.2)

on:
  schedule:
    - cron: '0,45 * * * *'   # every 45 min — tokens expire at 60 min
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  refresh:
    name: Mint fresh Vertex AI token for supervisor-sa
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Authenticate to Google Cloud (OIDC)
        id: wif-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account_email: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Get secrets from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets:
            - name: FACTORY_APP_ID
              id: factory_app_id
            - name: FACTORY_APP_PRIVATE_KEY
              id: factory_app_private_key
            - name: VERTEX_SA_KEY
              id: vertex_sa_key

      - name: Mint GitHub App token (secrets:write)
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ steps.secrets.outputs.factory_app_id }}
          private-key: ${{ steps.secrets.outputs.factory_app_private_key }}
          owner: Latimer-Woods-Tech
          repositories: factory

      - name: Authenticate to GCP as supervisor-sa
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ steps.secrets.outputs.vertex_sa_key }}

      - name: Mint access token
        id: token
        run: |
          TOKEN=$(gcloud auth print-access-token)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Store token as Actions secret
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh secret set VERTEX_ACCESS_TOKEN \
            --repo Latimer-Woods-Tech/factory \
            --body "${{ steps.token.outputs.token }}"
          echo "✅ VERTEX_ACCESS_TOKEN rotated (valid ~60 min)"
