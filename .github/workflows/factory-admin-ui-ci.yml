name: Factory Admin UI CI

on:
  pull_request:
    paths:
      - 'apps/admin-studio-ui/**'
      - 'packages/ui/**'
      - 'packages/design-tokens/**'
      - '.github/workflows/factory-admin-ui-ci.yml'
  push:
    branches: [main]
    paths:
      - 'apps/admin-studio-ui/**'
      - 'packages/ui/**'
      - 'packages/design-tokens/**'
      - '.github/workflows/factory-admin-ui-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  detect-changes:
    name: Detect Admin UI changes
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.diff.outputs.app_changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect app/package changes
        id: diff
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          changed=$(git diff --name-only "$BASE" HEAD 2>/dev/null \
            | grep -E '^(apps/admin-studio-ui|packages/ui|packages/design-tokens)/' \
            | head -1 || true)
          if [ -n "$changed" ]; then
            echo "app_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "app_changed=false" >> "$GITHUB_OUTPUT"
          fi

  mobile-e2e:
    name: Playwright mobile (${{ matrix.project }})
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: iphone-12
            browser: webkit
          - project: iphone-se3
            browser: webkit
          - project: pixel-5
            browser: chromium
          - project: ipad-mini
            browser: webkit

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            apps/admin-studio-ui/package-lock.json
            packages/studio-core/package-lock.json

      - name: Install + build studio-core
        working-directory: packages/studio-core
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Install admin-studio-ui dependencies
        working-directory: apps/admin-studio-ui
        run: npm ci

      - name: Install Playwright browser
        working-directory: apps/admin-studio-ui
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run mobile e2e
        working-directory: apps/admin-studio-ui
        run: npx playwright test e2e/mobile.spec.ts --project=${{ matrix.project }}

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-mobile-${{ matrix.project }}-${{ github.run_id }}
          path: |
            apps/admin-studio-ui/playwright-report/
            apps/admin-studio-ui/test-results/
          retention-days: 7

  capabilities-e2e:
    name: Playwright capabilities flow (desktop)
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            apps/admin-studio-ui/package-lock.json
            packages/studio-core/package-lock.json

      - name: Install + build studio-core
        working-directory: packages/studio-core
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Install admin-studio-ui dependencies
        working-directory: apps/admin-studio-ui
        run: npm ci

      - name: Install Playwright browser
        working-directory: apps/admin-studio-ui
        run: npx playwright install --with-deps chromium

      - name: Run capabilities e2e
        working-directory: apps/admin-studio-ui
        run: npx playwright test e2e/capabilities.spec.ts --project=desktop-chrome

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-capabilities-${{ github.run_id }}
          path: |
            apps/admin-studio-ui/playwright-report/
            apps/admin-studio-ui/test-results/
          retention-days: 7

  chromatic:
    name: Chromatic visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true' && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main')
    env:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/admin-studio-ui/package-lock.json

      - name: Install dependencies
        working-directory: apps/admin-studio-ui
        run: npm ci

      - name: Build Storybook
        working-directory: apps/admin-studio-ui
        run: npm run build-storybook

      - name: Publish to Chromatic (blocking)
        if: env.CHROMATIC_PROJECT_TOKEN != ''
        working-directory: apps/admin-studio-ui
        run: npx chromatic --project-token="$CHROMATIC_PROJECT_TOKEN" --storybook-build-dir=storybook-static --exit-zero-on-changes=false

      - name: Warn when Chromatic token is missing on PR
        if: env.CHROMATIC_PROJECT_TOKEN == '' && github.event_name == 'pull_request'
        run: echo "::warning::CHROMATIC_PROJECT_TOKEN missing; skipping PR visual-regression publish"

      - name: Fail when Chromatic token is missing
        if: env.CHROMATIC_PROJECT_TOKEN == '' && github.ref == 'refs/heads/main'
        run: |
          echo "CHROMATIC_PROJECT_TOKEN is required for visual-regression gating."
          exit 1

  deploy-storybook:
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_app-deploy-pages.yml
    with:
      node_version: '24'
      working_directory: apps/admin-studio-ui
      environment: production
      build_command: build-storybook
      dist_dir: storybook-static
      project_name: admin-studio-ui-storybook
      branch: main
      health_url: https://admin-ui-storybook.pages.dev
    secrets: inherit
