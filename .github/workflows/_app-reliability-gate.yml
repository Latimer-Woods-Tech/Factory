# =============================================================================
# Reusable Reliability Gate — runs CVE audit + P0-issue gate before deploy.
#
# WHAT IT DOES
#   - npm audit against configurable severity threshold
#   - Queries LatWood Operations project for open issues labeled
#     priority:P0 + repo-matching; fails if any are open
#   - Optional: ESLint with max-warnings threshold
#
# HOW TO CALL
#   jobs:
#     gate:
#       uses: Latimer-Woods-Tech/factory/.github/workflows/_app-reliability-gate.yml@main
#       with:
#         audit_level: high
#         p0_gate_enabled: true
#       secrets: inherit
#
# REQUIRED SECRETS (via secrets: inherit)
#   FACTORY_APP_ID, FACTORY_APP_PRIVATE_KEY — mints a short-lived App token (GH_PAT no longer required)
#
# RELATED
#   factory#70 (SYN-2)
# =============================================================================

name: _app-reliability-gate

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: '22'
      working_directory:
        type: string
        default: '.'
      audit_level:
        type: string
        default: 'high'
      eslint_max_warnings:
        type: number
        default: 10
      run_eslint:
        type: boolean
        default: false
      p0_gate_enabled:
        type: boolean
        default: true
      # Factory Core API URL for gate ingest (P2.4). Optional — skipped when empty.
      factory_core_api_url:
        type: string
        default: ''

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@latimer-woods-tech'
      - name: Configure npm auth
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: CVE audit
        run: |
          echo "::group::npm audit"
          npm audit --audit-level=${{ inputs.audit_level }} || {
            echo "::error::Found CVEs at or above ${{ inputs.audit_level }} severity. Block merge."
            exit 1
          }
          echo "::endgroup::"

      - name: ESLint
        if: ${{ inputs.run_eslint }}
        run: |
          if [ -f .eslintrc.json ] || [ -f eslint.config.js ] || [ -f eslint.config.mjs ]; then
            npx eslint . --max-warnings=${{ inputs.eslint_max_warnings }}
          else
            echo "::notice::No ESLint config found; skipping"
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: P0 issue gate
        if: ${{ inputs.p0_gate_enabled }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          # Query project board for P0 issues on this repo
          RESULT=$(gh api graphql -f query='
            query($owner: String!, $name: String!) {
              repository(owner: $owner, name: $name) {
                issues(states: OPEN, labels: ["priority:P0"], first: 50) {
                  nodes { number title url labels(first: 10) { nodes { name } } }
                }
              }
            }' -F owner="${REPO%/*}" -F name="${REPO#*/}")
          COUNT=$(echo "$RESULT" | jq '.data.repository.issues.nodes | length')
          if [ "$COUNT" -gt 0 ]; then
            echo "::error::$COUNT open P0 issues block this deploy:"
            echo "$RESULT" | jq -r '.data.repository.issues.nodes[] | "  #\(.number) \(.title)\n    \(.url)"'
            exit 1
          fi
          echo "✓ No open P0 issues; gate passes."

      - name: Ingest reliability gate row
        if: always()
        env:
          FACTORY_CORE_API_URL: ${{ inputs.factory_core_api_url }}
          FACTORY_CORE_API_INGEST_KEY: ${{ secrets.FACTORY_CORE_API_INGEST_KEY }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "${FACTORY_CORE_API_URL:-}" ] || [ -z "${FACTORY_CORE_API_INGEST_KEY:-}" ]; then
            echo "Skipping reliability gate ingest (FACTORY_CORE_API_URL or FACTORY_CORE_API_INGEST_KEY not set)"
            exit 0
          fi
          STATE=$([ "$JOB_STATUS" = "success" ] && echo "passed" || echo "failed")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg gt "reliability" \
            --arg ss "github-actions" \
            --arg sr "$RUN_URL" \
            --arg sei "reliability-${{ github.repository }}-${{ github.run_id }}" \
            --arg st "deploy" \
            --arg srepo "${{ github.repository }}" \
            --arg sref "${{ github.run_id }}" \
            --arg state "$STATE" \
            --arg eu "$RUN_URL" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{gate_type:$gt,source_system:$ss,source_ref:$sr,source_event_id:$sei,
              subject_type:$st,subject_repo:$srepo,subject_ref:$sref,state:$state,
              evidence_url:$eu,evidence_summary:{},observed_at:$ts}')
          curl -s -o /dev/null -w "Gate ingest HTTP %{http_code}\n" \
            -X POST "${FACTORY_CORE_API_URL}/v1/gates" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${FACTORY_CORE_API_INGEST_KEY}" \
            -d "$PAYLOAD" || echo "::warning::Reliability gate ingest failed (non-blocking)"
