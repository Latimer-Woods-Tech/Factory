name: Generate State

# Writes docs/STATE.md — the single canonical "what's true right now"
# snapshot for any agent or human reading the repo. Read order is documented
# in the file itself.
#
# Runs after the aggregator has had time to commit completion-tracker.json
# (10:30 UTC + drift-PR auto-merge time ≈ 30 min) and after cost +
# conformance daily runs. 12:11 UTC is comfortably after all of them.
#
# Also runs on push to main when relevant inputs change, so the file
# doesn't go stale on big-change days.
#
# RFC-006 §10: daily runs upload STATE.md as a 30-day artifact.
# Snapshot PRs retired per RFC-006 §10. Durable Git writes happen
# via weekly-governance-checkpoint.yml (Mondays) or manual dispatch.

on:
  schedule:
    - cron: '11 12 * * *' # daily 12:11 UTC, after aggregator + cost + conformance
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'docs/ROADMAP.md'
      - 'docs/GAP_REGISTER.md'
      - 'docs/completion-tracker.json'
      - 'docs/conformance/summary.md'
      - 'docs/cost/summary.md'
      - 'docs/decisions/**'
      - 'scripts/generate_state.py'
      - '.github/workflows/generate-state.yml'

permissions:
  contents: read # RFC-006 §10: artifact upload does not need write

concurrency:
  group: generate-state
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Generate STATE.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_state.py

      # RFC-006 §10: upload artifact instead of opening a snapshot PR.
      - name: Upload STATE.md artifact
        uses: actions/upload-artifact@v7
        with:
          name: state-snapshot-${{ github.run_id }}
          path: docs/STATE.md
          retention-days: 30
          if-no-files-found: warn
