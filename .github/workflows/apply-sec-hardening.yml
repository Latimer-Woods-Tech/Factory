# =============================================================================
# Apply Security Hardening — restores ops-critical repo state from canonical
# config files when drift is detected.
#
# WHY THIS EXISTS
#   Policy Drift Guard (.github/workflows/policy-drift-guard.yml) DETECTS drift
#   in main branch protection (SEC-1.2) but cannot REPAIR it. Until this
#   workflow existed, the only repair path was a human running raw `gh api -X
#   PUT` calls — which is exactly how issue #529 happened (the PUT body
#   referenced workflow-prefixed contexts like "CI / validate" instead of the
#   bare check job names like "validate", silently breaking required-status
#   enforcement). This workflow closes that systemic gap by reading from
#   the checked-in source-of-truth file and re-applying it deterministically.
#
# DIMENSIONS COVERED
#   1. Classic Ruleset id 15843812 (Rulesets API, targets `main` via
#      ~DEFAULT_BRANCH) — canonical: .github/security/main-ruleset.json
#   2. Org-level Copilot coding-agent repo enablement
#      (GET /orgs/{org}/copilot/coding-agent/permissions — read-only verify
#      that Factory is enabled at the org policy level)
#
# HISTORY
#   This workflow previously ran a parallel dimension that PUT
#   .github/security/main-branch-protection.json against the legacy
#   /branches/main/protection API. PR #1000 brought the ruleset to
#   parity-or-better with the legacy mechanism (added dependency-review +
#   required_review_thread_resolution); the legacy half was retired in this
#   PR after an 8-hour parallel-enforcement soak with zero drift. The
#   legacy rules on GitHub will sit unused until an operator runs:
#     gh api repos/Latimer-Woods-Tech/Factory/branches/main/protection -X DELETE
#   Not required for correctness — the ruleset enforces protection alone.
#
# NOT COVERED (no REST API exists as of 2026-05-09)
#   - Per-repo Copilot coding-agent "skip approval for workflows" toggle
#     announced in https://github.blog/changelog/2026-03-13-... — this is the
#     toggle that was reset by hand earlier today (#602 §5 item #17). GitHub
#     has not published a REST endpoint for it; probing returns 404 on every
#     URL shape we tried (see PR body for full probe log). The workflow emits
#     a "::warning::" with manual-step instructions on every scheduled run
#     until an API is available. Tracked in #602 §5 item #17.
#
# SOURCE OF TRUTH
#   .github/security/main-ruleset.json
#   Edit this file (in a PR); the scheduled workflow self-applies on the
#   next 1h tick after merge.
#
# TRIGGERS
#   - workflow_dispatch: deliberate manual repair
#   - schedule: every hour at :47 (offset 30 min after Policy Drift Guard at
#     :17, so detection -> repair within ~30 min on the same cycle). Cadence
#     was previously 6h; #602 §7 recommendation #1 raised it to 1h because
#     branch protection isn't the only ops-critical state and 6h leaves a
#     long unprotected window after each manual mistake.
#   We deliberately do NOT trigger on push or pull_request — repo-wide state
#   is not per-commit. Touching it on every push would race against Policy
#   Drift Guard and amplify any bad config in the canonical file before
#   review.
#
# SECRETS USED
#   FACTORY_APP_ID         — GitHub App ID for `factory-cross-repo`
#   FACTORY_APP_PRIVATE_KEY — PEM private key for the same App
#   PUSHOVER_USER_KEY      — optional; notifies on scheduled drift repair
#   PUSHOVER_APP_TOKEN     — optional; videoking-alerts app token
#
# RELATED
#   .github/workflows/policy-drift-guard.yml (detector)
#   docs/runbooks/branch-protection-hardening.md (this workflow's runbook)
#   docs/runbooks/automation-audit.md §5 (drift incidents)
#   issue #529 (the original incident this workflow prevents)
#   PR #602 (the audit that motivated extending coverage)
# =============================================================================
name: Apply Security Hardening

on:
  workflow_dispatch:
  schedule:
    - cron: "47 * * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OWNER: Latimer-Woods-Tech
      REPO: Factory
      ORG: Latimer-Woods-Tech
      RULESET_ID: "15843812"
      RULESET_CANONICAL_PATH: .github/security/main-ruleset.json
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Mint factory-cross-repo App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: Factory

      # -----------------------------------------------------------------------
      # DIMENSION 1: Classic Ruleset (id 15843812) via /rulesets API.
      # Pattern: canonical -> diff -> PUT -> verify.
      # -----------------------------------------------------------------------
      - name: Validate canonical ruleset config exists & parses
        id: ruleset_canonical
        run: |
          set -euo pipefail
          if [ ! -f "$RULESET_CANONICAL_PATH" ]; then
            echo "::error::Ruleset canonical config not found at $RULESET_CANONICAL_PATH"
            exit 1
          fi
          jq 'del(._comment)' "$RULESET_CANONICAL_PATH" > /tmp/ruleset-canonical.json
          echo "Ruleset canonical PUT body:"
          jq . /tmp/ruleset-canonical.json
          # Sanity: required_status_checks contexts must be bare check job names.
          bad=$(jq -r '
            .rules[]?
            | select(.type == "required_status_checks")
            | .parameters.required_status_checks[]?.context
            | select(test(" / "))
          ' /tmp/ruleset-canonical.json || true)
          if [ -n "$bad" ]; then
            echo "::error::Ruleset canonical contains workflow-prefixed contexts (\"$bad\"). Use bare check job names — see issue #529."
            exit 1
          fi

      - name: Fetch live ruleset
        id: ruleset_live
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          endpoint="https://api.github.com/repos/$OWNER/$REPO/rulesets/$RULESET_ID"
          body=$(mktemp)
          code=$(curl -sS -o "$body" -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$endpoint")
          echo "ruleset_live_status=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" = "200" ]; then
            cp "$body" /tmp/ruleset-live-raw.json
          else
            echo "::error::Unexpected response from $endpoint (HTTP $code). Ruleset id $RULESET_ID may have been deleted by hand — investigate before this workflow can re-create it (POST /repos/{owner}/{repo}/rulesets is a different shape and would create a NEW id)."
            cat "$body"
            exit 1
          fi

      - name: Project live ruleset & diff
        id: ruleset_diff
        run: |
          set -euo pipefail
          # Project the GET response into the same shape as the canonical PUT body.
          # Server-managed fields (id, source_type, source, node_id, *_at, links,
          # current_user_can_bypass) are excluded.
          jq '{
            name,
            target,
            enforcement,
            conditions,
            rules,
            bypass_actors
          }' /tmp/ruleset-live-raw.json > /tmp/ruleset-live-projected.json

          jq -S . /tmp/ruleset-canonical.json > /tmp/ruleset-canonical-sorted.json
          jq -S . /tmp/ruleset-live-projected.json > /tmp/ruleset-live-sorted.json

          if diff -u /tmp/ruleset-canonical-sorted.json /tmp/ruleset-live-sorted.json > /tmp/ruleset-diff.txt; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "No ruleset drift detected; live config matches canonical."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Ruleset drift detected vs canonical:"
            cat /tmp/ruleset-diff.txt
          fi

      - name: Apply canonical ruleset via PUT
        id: ruleset_apply
        if: steps.ruleset_diff.outputs.drift == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          endpoint="https://api.github.com/repos/$OWNER/$REPO/rulesets/$RULESET_ID"
          body=$(mktemp)
          code=$(curl -sS -o "$body" -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/ruleset-canonical.json \
            "$endpoint")
          if [ "$code" != "200" ]; then
            echo "::error::Ruleset PUT failed (HTTP $code)."
            cat "$body"
            exit 1
          fi
          echo "Applied canonical ruleset."
          echo "applied=true" >> "$GITHUB_OUTPUT"

      - name: Verify ruleset post-apply
        if: steps.ruleset_apply.outputs.applied == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          endpoint="https://api.github.com/repos/$OWNER/$REPO/rulesets/$RULESET_ID"
          body=$(mktemp)
          code=$(curl -sS -o "$body" -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$endpoint")
          if [ "$code" != "200" ]; then
            echo "::error::Ruleset verify GET failed (HTTP $code)."
            cat "$body"
            exit 1
          fi

          required_contexts=$(jq -c '
            [.rules[]
              | select(.type == "required_status_checks")
              | .parameters.required_status_checks[].context]
          ' /tmp/ruleset-canonical.json)
          actual_contexts=$(jq -c '
            [.rules[]
              | select(.type == "required_status_checks")
              | .parameters.required_status_checks[].context]
          ' "$body")
          missing=$(jq -rn \
            --argjson required "$required_contexts" \
            --argjson actual "$actual_contexts" \
            '[ $required[] | select(($actual | index(.)) == null) ]')
          if [ "$missing" != "[]" ]; then
            echo "::error::Ruleset post-apply verification failed; missing contexts: $missing"
            exit 1
          fi

          actual_enforcement=$(jq -r '.enforcement' "$body")
          if [ "$actual_enforcement" != "active" ]; then
            echo "::error::Ruleset enforcement is '$actual_enforcement'; expected 'active'."
            exit 1
          fi
          echo "Ruleset post-apply verification OK. Active contexts: $actual_contexts"

      # -----------------------------------------------------------------------
      # DIMENSION 2: Org-level Copilot coding-agent repo enablement
      # Read-only verify (no per-repo skip-approval API exists; see header).
      # -----------------------------------------------------------------------
      - name: Verify org-level Copilot coding-agent enablement
        id: copilot_verify
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          # GET /orgs/{org}/copilot/coding-agent/permissions returns
          #   { "enabled_repositories": "all" | "selected" | "none" }
          endpoint="https://api.github.com/orgs/$ORG/copilot/coding-agent/permissions"
          body=$(mktemp)
          code=$(curl -sS -o "$body" -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$endpoint")
          if [ "$code" = "404" ]; then
            echo "::warning::Org-level Copilot coding-agent permissions endpoint returned 404. Token may lack admin:org scope, or the org has no Copilot Business plan. Skipping this dimension; see docs/runbooks/branch-protection-hardening.md."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$code" != "200" ]; then
            echo "::warning::Unexpected response from $endpoint (HTTP $code). Skipping Copilot dimension this run."
            cat "$body"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          enabled=$(jq -r '.enabled_repositories' "$body")
          echo "Org Copilot coding-agent enabled_repositories: $enabled"
          # Acceptable: "all" or "selected" (we want Factory enabled).
          # "none" would be a regression — emit a warning but do not fail
          # (this dimension is observability-only until we add a writer).
          if [ "$enabled" = "none" ]; then
            echo "::warning::Org-level Copilot coding-agent is set to 'none'; Factory is NOT enabled. Restore via org settings (no per-repo REST writer exists). See docs/runbooks/branch-protection-hardening.md §Manual steps."
            echo "status=drift" >> "$GITHUB_OUTPUT"
          else
            echo "status=ok" >> "$GITHUB_OUTPUT"
          fi

          # Per-repo "skip approval for Copilot coding-agent workflows" toggle:
          # No REST endpoint as of 2026-05-09 (we probed every documented path
          # in copilot-coding-agent-management; all return 404). Document the
          # manual step every run so it's never silently lost.
          echo "::warning::Per-repo Copilot 'skip approval for workflows' toggle is NOT API-controllable as of 2026-05-09. To verify manually: Settings -> Code & automation -> Actions -> General -> 'Require approval for all external contributors' / Copilot section. See docs/runbooks/branch-protection-hardening.md §Manual steps. Tracked in #602 §5 item #17."

      # -----------------------------------------------------------------------
      # Notification & summary
      # -----------------------------------------------------------------------
      - name: Notify on drift repair (Pushover)
        if: github.event_name == 'schedule' && (steps.ruleset_diff.outputs.drift == 'true' || steps.copilot_verify.outputs.status == 'drift')
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          RS_DRIFT: ${{ steps.ruleset_diff.outputs.drift }}
          CP_STATUS: ${{ steps.copilot_verify.outputs.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${PUSHOVER_USER_KEY:-}" ] || [ -z "${PUSHOVER_APP_TOKEN:-}" ]; then
            echo "::warning::Pushover secrets missing; skipping notification."
            exit 0
          fi
          dims=""
          [ "$RS_DRIFT" = "true" ] && dims="$dims ruleset"
          [ "$CP_STATUS" = "drift" ] && dims="$dims copilot-org"
          MESSAGE="Factory security hardening drift detected on:$dims. Repaired (where API exists) and/or warned (Copilot UI-only). Run: $RUN_URL"
          curl -fsS -X POST https://api.pushover.net/1/messages.json \
            --data-urlencode "token=$PUSHOVER_APP_TOKEN" \
            --data-urlencode "user=$PUSHOVER_USER_KEY" \
            --data-urlencode "title=Factory: security hardening drift" \
            --data-urlencode "message=$MESSAGE" \
            --data-urlencode "priority=1" \
            --data-urlencode "url=$RUN_URL" \
            --data-urlencode "url_title=View workflow run"

      - name: Summary
        if: always()
        run: |
          {
            echo "### Apply Security Hardening"
            echo ""
            echo "- Trigger: ${{ github.event_name }}"
            echo ""
            echo "| Dimension | Drift | Applied |"
            echo "| --- | --- | --- |"
            echo "| 1. Ruleset $RULESET_ID | ${{ steps.ruleset_diff.outputs.drift || 'n/a' }} | ${{ steps.ruleset_apply.outputs.applied || 'false' }} |"
            echo "| 2. Copilot org enablement | ${{ steps.copilot_verify.outputs.status || 'n/a' }} | n/a (read-only) |"
            echo ""
            echo "_Per-repo Copilot 'skip approval for workflows' toggle is UI-only as of 2026-05-09 — see workflow header._"
          } >> "$GITHUB_STEP_SUMMARY"
