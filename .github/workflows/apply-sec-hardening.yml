# =============================================================================
# Apply Security Hardening — restores main branch protection from canonical
# config when drift is detected.
#
# WHY THIS EXISTS
#   Policy Drift Guard (.github/workflows/policy-drift-guard.yml) DETECTS drift
#   in main branch protection (SEC-1.2) but cannot REPAIR it. Until this
#   workflow existed, the only repair path was a human running raw `gh api -X
#   PUT` calls — which is exactly how issue #529 happened (the PUT body
#   referenced workflow-prefixed contexts like "CI / validate" instead of the
#   bare check job names like "validate", silently breaking required-status
#   enforcement). This workflow closes that systemic gap by reading from a
#   checked-in source-of-truth file and re-applying it deterministically.
#
# SOURCE OF TRUTH
#   .github/security/main-branch-protection.json
#   Edit that file (in a PR) to change the canonical config.
#
# TRIGGERS
#   - workflow_dispatch: deliberate manual repair
#   - schedule: every 6h at :47 (offset 30 min after Policy Drift Guard at :17,
#     so detection -> repair within ~30 min on the same cycle)
#   We deliberately do NOT trigger on push or pull_request — branch protection
#   is repo-wide state, not per-commit. Touching it on every push would race
#   against Policy Drift Guard and amplify any bad config in the canonical
#   file before review.
#
# SECRETS USED
#   FACTORY_APP_ID         — GitHub App ID for `factory-cross-repo`
#   FACTORY_APP_PRIVATE_KEY — PEM private key for the same App
#   PUSHOVER_USER_KEY      — optional; notifies on scheduled drift repair
#   PUSHOVER_APP_TOKEN     — optional; videoking-alerts app token
#
# RELATED
#   .github/workflows/policy-drift-guard.yml (detector)
#   docs/runbooks/secret-rotation.md
#   issue #529 (the incident this prevents)
# =============================================================================
name: Apply Security Hardening

on:
  workflow_dispatch:
  schedule:
    - cron: "47 */6 * * *"

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OWNER: Latimer-Woods-Tech
      REPO: Factory
      CANONICAL_PATH: .github/security/main-branch-protection.json
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Mint factory-cross-repo App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: Factory

      - name: Validate canonical config exists & parses
        id: canonical
        run: |
          set -euo pipefail
          if [ ! -f "$CANONICAL_PATH" ]; then
            echo "::error::Canonical config not found at $CANONICAL_PATH"
            exit 1
          fi
          # Strip the `_comment` field (humans only) and emit the PUT body.
          jq 'del(._comment)' "$CANONICAL_PATH" > /tmp/canonical.json
          echo "Canonical PUT body:"
          jq . /tmp/canonical.json
          # Sanity: contexts must be the bare names, not workflow-prefixed.
          bad=$(jq -r '.required_status_checks.contexts[]? | select(test(" / "))' /tmp/canonical.json || true)
          if [ -n "$bad" ]; then
            echo "::error::Canonical config contains workflow-prefixed contexts (\"$bad\"). Use bare check job names — see issue #529."
            exit 1
          fi

      - name: Fetch live branch protection
        id: live
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          endpoint="https://api.github.com/repos/$OWNER/$REPO/branches/main/protection"
          body=$(mktemp)
          code=$(curl -sS -o "$body" -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$endpoint")
          echo "live_status=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" = "200" ]; then
            cp "$body" /tmp/live-raw.json
          elif [ "$code" = "404" ]; then
            echo "::warning::No branch protection currently set; will apply canonical."
            echo '{}' > /tmp/live-raw.json
          else
            echo "::error::Unexpected response from $endpoint (HTTP $code)."
            cat "$body"
            exit 1
          fi

      - name: Project live state to canonical shape & diff
        id: diff
        run: |
          set -euo pipefail
          # Project the GET response into the same shape as the canonical PUT body.
          jq '{
            required_status_checks: {
              strict: (.required_status_checks.strict // false),
              contexts: (.required_status_checks.contexts // [])
            },
            enforce_admins: (.enforce_admins.enabled // false),
            required_pull_request_reviews: (
              if .required_pull_request_reviews then
                {
                  dismiss_stale_reviews: (.required_pull_request_reviews.dismiss_stale_reviews // false),
                  require_code_owner_reviews: (.required_pull_request_reviews.require_code_owner_reviews // false),
                  required_approving_review_count: (.required_pull_request_reviews.required_approving_review_count // 0),
                  require_last_push_approval: (.required_pull_request_reviews.require_last_push_approval // false)
                }
              else null end
            ),
            restrictions: null,
            required_linear_history: (.required_linear_history.enabled // false),
            allow_force_pushes: (.allow_force_pushes.enabled // false),
            allow_deletions: (.allow_deletions.enabled // false),
            block_creations: (.block_creations.enabled // false),
            required_conversation_resolution: (.required_conversation_resolution.enabled // false),
            lock_branch: (.lock_branch.enabled // false),
            allow_fork_syncing: (.allow_fork_syncing.enabled // false)
          }' /tmp/live-raw.json > /tmp/live-projected.json

          # Sort canonical to the same shape for stable comparison.
          jq -S . /tmp/canonical.json > /tmp/canonical-sorted.json
          jq -S . /tmp/live-projected.json > /tmp/live-sorted.json

          if diff -u /tmp/canonical-sorted.json /tmp/live-sorted.json > /tmp/diff.txt; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "No drift detected; live config matches canonical."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Drift detected vs canonical:"
            cat /tmp/diff.txt
          fi

      - name: Apply canonical via PUT
        id: apply
        if: steps.diff.outputs.drift == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          endpoint="https://api.github.com/repos/$OWNER/$REPO/branches/main/protection"
          body=$(mktemp)
          code=$(curl -sS -o "$body" -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/canonical.json \
            "$endpoint")
          if [ "$code" != "200" ]; then
            echo "::error::PUT failed (HTTP $code)."
            cat "$body"
            exit 1
          fi
          echo "Applied canonical branch protection."
          echo "applied=true" >> "$GITHUB_OUTPUT"

      - name: Verify post-apply
        if: steps.apply.outputs.applied == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          endpoint="https://api.github.com/repos/$OWNER/$REPO/branches/main/protection"
          body=$(mktemp)
          code=$(curl -sS -o "$body" -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$endpoint")
          if [ "$code" != "200" ]; then
            echo "::error::Verify GET failed (HTTP $code)."
            cat "$body"
            exit 1
          fi

          required_contexts=$(jq -c '.required_status_checks.contexts // []' /tmp/canonical.json)
          actual_contexts=$(jq -c '.required_status_checks.contexts // []' "$body")
          missing=$(jq -rn \
            --argjson required "$required_contexts" \
            --argjson actual "$actual_contexts" \
            '[ $required[] | select(($actual | index(.)) == null) ]')
          if [ "$missing" != "[]" ]; then
            echo "::error::Post-apply verification failed; missing contexts: $missing"
            exit 1
          fi
          echo "Post-apply verification OK. Active contexts: $actual_contexts"

      - name: Notify on drift repair (Pushover)
        if: github.event_name == 'schedule' && steps.diff.outputs.drift == 'true'
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${PUSHOVER_USER_KEY:-}" ] || [ -z "${PUSHOVER_APP_TOKEN:-}" ]; then
            echo "::warning::Pushover secrets missing; skipping notification."
            exit 0
          fi
          MESSAGE="Factory main branch protection drifted and was restored from canonical config. Run: $RUN_URL"
          curl -fsS -X POST https://api.pushover.net/1/messages.json \
            --data-urlencode "token=$PUSHOVER_APP_TOKEN" \
            --data-urlencode "user=$PUSHOVER_USER_KEY" \
            --data-urlencode "title=Factory: branch protection repaired" \
            --data-urlencode "message=$MESSAGE" \
            --data-urlencode "priority=1" \
            --data-urlencode "url=$RUN_URL" \
            --data-urlencode "url_title=View workflow run"

      - name: Summary
        if: always()
        run: |
          {
            echo "### Apply Security Hardening"
            echo ""
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Drift detected: ${{ steps.diff.outputs.drift }}"
            echo "- Applied canonical: ${{ steps.apply.outputs.applied || 'false' }}"
          } >> "$GITHUB_STEP_SUMMARY"
