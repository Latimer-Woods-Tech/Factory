name: Deploy factory-supervisor (Worker + DO)

on:
  push:
    branches: [main]
    paths:
      - 'apps/supervisor/**'
      - 'packages/llm/**'
      - 'packages/llm-meter/**'
      - 'packages/admin/**'
      - 'packages/errors/**'
      - 'packages/logger/**'
      - 'scripts/generate-supervisor-capabilities.mjs'
      - 'scripts/generate-supervisor-templates.mjs'
      - 'docs/capabilities/**'
      - 'docs/supervisor/plans/**'
      - '.github/workflows/deploy-supervisor.yml'
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: supervisor-${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'production' || 'staging' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'production' || 'staging' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: ${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'production' || 'staging' }}
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Fetch secrets from GCP Secret Manager
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env SUPERVISOR_PUSH_KEY    SUPERVISOR_PUSH_KEY
          fetch_to_env SUPERVISOR_API_KEY     SUPERVISOR_API_KEY
          fetch_to_env SLACK_SIGNING_SECRET   SLACK_SIGNING_SECRET   || true
          fetch_to_env SLACK_OWNER_USER_ID    SLACK_OWNER_USER_ID    || true

      - name: Build dependency packages
        run: |
          set -euo pipefail
          # Build in strict dependency order (see CLAUDE.md §Package Dependency Order)
          for pkg in errors monitoring logger neon analytics llm llm-meter admin; do
            echo "=== Building packages/${pkg} ==="
            cd "packages/${pkg}"
            npm ci --ignore-scripts
            npm run build
            cd ../..
          done

      - name: Install supervisor
        run: npm ci
        working-directory: apps/supervisor
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate capabilities + templates
        run: |
          node scripts/generate-supervisor-capabilities.mjs
          node scripts/generate-supervisor-templates.mjs

      - name: Typecheck
        run: npm run typecheck
        working-directory: apps/supervisor

      - name: Confirm CF_API_TOKEN is set
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          test -n "${CF_API_TOKEN}" || \
            (echo "::error::CF_API_TOKEN secret is not set. Create a token at https://dash.cloudflare.com/profile/api-tokens with Workers Scripts:Edit + D1:Edit + Vectorize:Edit permissions." && exit 1)

      - name: Provision Vectorize indexes (RFC-007, idempotent)
        working-directory: apps/supervisor
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          # Create-if-absent: ignore "already exists" exit codes (exit 2 from wrangler).
          create_if_absent() {
            local name="$1" dims="$2" metric="$3"
            if npx wrangler vectorize create "$name" --dimensions="$dims" --metric="$metric" 2>&1; then
              echo "Created $name"
            else
              echo "::notice::$name may already exist — continuing"
            fi
          }
          create_if_absent supervisor-templates 768 cosine
          create_if_absent supervisor-incidents 768 cosine

      - name: Provision secrets
        working-directory: apps/supervisor
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          SECRET_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SECRET_GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SECRET_JWT_SECRET: ${{ secrets.SUPERVISOR_JWT_SECRET }}
          SECRET_VERTEX_ACCESS_TOKEN: ${{ secrets.VERTEX_ACCESS_TOKEN }}
          SECRET_GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          SECRET_FACTORY_APP_ID: ${{ secrets.FACTORY_APP_ID }}
          SECRET_FACTORY_APP_PRIVATE_KEY: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          SECRET_FACTORY_APP_INSTALLATION_ID: ${{ secrets.FACTORY_APP_INSTALLATION_ID }}
          SECRET_PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          SECRET_PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          SECRET_SLACK_SIGNING_SECRET: ${{ env.SLACK_SIGNING_SECRET }}
          SECRET_SLACK_OWNER_USER_ID: ${{ env.SLACK_OWNER_USER_ID }}
          SECRET_SUPERVISOR_PUSH_KEY: ${{ env.SUPERVISOR_PUSH_KEY }}
          SECRET_SUPERVISOR_API_KEY: ${{ env.SUPERVISOR_API_KEY }}
          SECRET_FACTORY_CROSS_REPO_TOKEN: ${{ secrets.FACTORY_CROSS_REPO_TOKEN }}
          TARGET_ENV: ${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'production' || 'staging' }}
        run: |
          # Only provision secrets that are actually set — skip empties with a warning.
          put_secret() {
            local name="$1" val="$2"
            if [ -z "$val" ]; then
              echo "::warning::Skipping $name — secret not set in this repo"
              return 0
            fi
            # Staging = no --env (top-level config, all bindings available)
            # Production = --env production (routes override)
            ENV_FLAG=$([ "${TARGET_ENV}" = "production" ] && echo "--env production" || echo "")
            echo "$val" | npx wrangler secret put "$name" ${ENV_FLAG} 2>&1 | grep -v "^$"
          }

          put_secret ANTHROPIC_API_KEY          "${SECRET_ANTHROPIC_API_KEY}"
          put_secret GROQ_API_KEY               "${SECRET_GROQ_API_KEY}"
          put_secret JWT_SECRET                 "${SECRET_JWT_SECRET}"
          put_secret VERTEX_ACCESS_TOKEN        "${SECRET_VERTEX_ACCESS_TOKEN}"
          put_secret GROK_API_KEY               "${SECRET_GROK_API_KEY}"
          put_secret FACTORY_APP_ID             "${SECRET_FACTORY_APP_ID}"
          put_secret FACTORY_APP_PRIVATE_KEY    "${SECRET_FACTORY_APP_PRIVATE_KEY}"
          put_secret FACTORY_APP_INSTALLATION_ID "${SECRET_FACTORY_APP_INSTALLATION_ID}"
          put_secret PUSHOVER_TOKEN             "${SECRET_PUSHOVER_TOKEN}"
          put_secret PUSHOVER_USER_KEY          "${SECRET_PUSHOVER_USER_KEY}"
          put_secret SLACK_SIGNING_SECRET       "${SECRET_SLACK_SIGNING_SECRET}"
          put_secret SLACK_OWNER_USER_ID        "${SECRET_SLACK_OWNER_USER_ID}"
          put_secret SUPERVISOR_PUSH_KEY        "${SECRET_SUPERVISOR_PUSH_KEY}"
          put_secret SUPERVISOR_API_KEY         "${SECRET_SUPERVISOR_API_KEY}"
          put_secret FACTORY_CROSS_REPO_TOKEN   "${SECRET_FACTORY_CROSS_REPO_TOKEN}"

      - name: Install Sentry CLI
        run: npm install -g @sentry/cli

      - name: Build worker bundle (dry-run for Sentry sourcemaps)
        working-directory: apps/supervisor
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          TARGET_ENV: ${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'production' || 'staging' }}
        run: |
          mkdir -p .sentry-dist
          ENV_FLAG=$([ "${TARGET_ENV}" = "production" ] && echo "--env production" || echo "")
          npx wrangler deploy --dry-run --outdir .sentry-dist ${ENV_FLAG}

      - name: Inject Sentry debug IDs into bundle
        working-directory: apps/supervisor
        run: sentry-cli sourcemaps inject .sentry-dist/

      - name: Upload sourcemaps to Sentry
        working-directory: apps/supervisor
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.FACTORY_SENTRY_API }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG || 'latwood-tech' }}
        run: |
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "::warning::FACTORY_SENTRY_API missing; sourcemap upload skipped"
            exit 0
          fi
          if ! sentry-cli sourcemaps upload \
            --project node-cloudflare-workers \
            .sentry-dist/; then
            echo "::warning::Sentry sourcemap upload failed; continuing deployment"
          fi

      - name: Deploy
        working-directory: apps/supervisor
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          TARGET_ENV: ${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'production' || 'staging' }}
        run: |
          ENV_FLAG=$([ "${TARGET_ENV}" = "production" ] && echo "--env production" || echo "")
          BUILT_FILE=$(ls .sentry-dist/*.js | grep -v '\.map$' | head -1)
          echo "Deploying pre-built bundle: $BUILT_FILE"
          npx wrangler deploy --no-bundle "$BUILT_FILE" ${ENV_FLAG}

      - name: Post-deploy health check (staging)
        if: ${{ (github.event.inputs.env != 'production') && (github.event_name != 'push' || github.ref != 'refs/heads/main') }}
        run: |
          URL="https://factory-supervisor.adrper79.workers.dev"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${URL}/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=${STATUS}, retrying in 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 5 attempts (last status: ${STATUS})"
          exit 1

      - name: Post-deploy health check (production)
        if: ${{ github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: |
          URL="https://supervisor.latwoodtech.work"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${URL}/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed on ${URL}"
              exit 0
            fi
            echo "Attempt $i: status=${STATUS}, retrying in 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 5 attempts (last status: ${STATUS})"
          exit 1
