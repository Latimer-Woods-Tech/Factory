name: Generate Founder Stats

# Queries the GitHub API for live Factory metrics and writes
# founder-stats.json into apps/latwoodtech-web/src/data/ so the
# /resume page always shows current numbers.
#
# Direct pushes to main are blocked by branch protection, so this
# workflow uses a stable same-day branch and opens (or updates) a
# single auto-merge PR. Reruns update one PR instead of failing on
# a protected-branch push. Merge of that PR triggers
# deploy-latwoodtech-web.yml automatically.

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

concurrency:
  group: generate-founder-stats
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Collect stats from GitHub API
        id: stats
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -e

          MERGED_PRS=$(gh api "search/issues?q=repo:Latimer-Woods-Tech/Factory+is:pr+is:merged&per_page=1" \
            --jq '.total_count')

          COMMIT_RESP=$(gh api "repos/Latimer-Woods-Tech/Factory/commits?per_page=1" -i 2>/dev/null || true)
          TOTAL_COMMITS=$(echo "$COMMIT_RESP" | grep -i '^link:' | \
            grep -oP 'page=\K[0-9]+(?=>; rel="last")' || echo "")
          TOTAL_COMMITS=${TOTAL_COMMITS:-1}

          DEPLOYED_APPS=$(ls apps/ | wc -l | tr -d ' ')
          SHARED_PACKAGES=$(ls packages/ | wc -l | tr -d ' ')
          WORKFLOWS=$(ls .github/workflows/*.yml 2>/dev/null | wc -l | tr -d ' ')

          ORG_REPOS=$(gh api "orgs/Latimer-Woods-Tech/repos?per_page=100" --jq 'length')
          REPO_CREATED=$(gh api "repos/Latimer-Woods-Tech/Factory" --jq '.created_at')

          echo "merged_prs=$MERGED_PRS"         >> "$GITHUB_OUTPUT"
          echo "total_commits=$TOTAL_COMMITS"    >> "$GITHUB_OUTPUT"
          echo "deployed_apps=$DEPLOYED_APPS"    >> "$GITHUB_OUTPUT"
          echo "shared_packages=$SHARED_PACKAGES" >> "$GITHUB_OUTPUT"
          echo "workflows=$WORKFLOWS"            >> "$GITHUB_OUTPUT"
          echo "org_repos=$ORG_REPOS"            >> "$GITHUB_OUTPUT"
          echo "repo_created=$REPO_CREATED"      >> "$GITHUB_OUTPUT"

      - name: Write founder-stats.json
        run: |
          cat > apps/latwoodtech-web/src/data/founder-stats.json <<JSON
          {
            "generatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "repoCreatedAt": "${{ steps.stats.outputs.repo_created }}",
            "mergedPrs": ${{ steps.stats.outputs.merged_prs }},
            "totalCommits": ${{ steps.stats.outputs.total_commits }},
            "deployedApps": ${{ steps.stats.outputs.deployed_apps }},
            "sharedPackages": ${{ steps.stats.outputs.shared_packages }},
            "workflows": ${{ steps.stats.outputs.workflows }},
            "orgRepos": ${{ steps.stats.outputs.org_repos }},
            "monthlyCostUsd": 9.11
          }
          JSON
          python3 -c "
          import json
          with open('apps/latwoodtech-web/src/data/founder-stats.json') as f:
              data = json.load(f)
          with open('apps/latwoodtech-web/src/data/founder-stats.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Open or update auto-merge PR if stats changed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          FILE=apps/latwoodtech-web/src/data/founder-stats.json
          git add "$FILE"
          if git diff --cached --quiet "$FILE"; then
            echo "No change in founder-stats.json — skipping PR."
            exit 0
          fi

          DATE=$(date -u +%F)
          BRANCH="chore/founder-stats-$DATE"
          TMP=$(mktemp)
          cp "$FILE" "$TMP"

          git config user.name  "factory-cross-repo[bot]"
          git config user.email "factory-cross-repo[bot]@users.noreply.github.com"

          # Preserve the generated snapshot in TMP, then clear the working tree
          # so Git can switch to the stable daily update branch.
          git restore --staged --worktree "$FILE"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          cp "$TMP" "$FILE"
          git add "$FILE"
          if git diff --cached --quiet "$FILE"; then
            echo "Existing founder-stats snapshot PR already contains this content."
            exit 0
          fi

          git commit -m "chore(latwoodtech-web): update founder stats ($DATE)"
          git push --force-with-lease --set-upstream origin "$BRANCH"

          BODY='Automated hourly founder-stats refresh from .github/workflows/generate-founder-stats.yml. Branch is intentionally stable per day so reruns update one PR instead of pushing to protected main. Merge triggers deploy-latwoodtech-web.yml.'
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing founder-stats PR #$EXISTING_PR for $DATE."
            gh pr edit "$EXISTING_PR" --title "chore(latwoodtech-web): update founder stats ($DATE)" --body "$BODY"
            gh pr merge --auto --squash "$EXISTING_PR" || true
          else
            gh pr create \
              --title "chore(latwoodtech-web): update founder stats ($DATE)" \
              --body "$BODY" \
              --label automation \
              --label auto-merge
            NEW_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
            gh pr merge --auto --squash "$NEW_PR" || true
          fi
