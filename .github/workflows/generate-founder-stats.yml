name: Generate Founder Stats

# Queries the GitHub API for live Factory metrics and writes
# founder-stats.json into apps/latwoodtech-web/src/data/ so the
# /resume page always shows current numbers.
#
# Direct pushes to main are blocked by branch protection, so this
# workflow uses a stable same-day branch and opens (or updates) a
# single auto-merge PR. Reruns update one PR instead of failing on
# a protected-branch push. Merge of that PR triggers
# deploy-latwoodtech-web.yml automatically.

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

concurrency:
  group: generate-founder-stats
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Collect stats from GitHub API
        id: stats
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -e

          MERGED_PRS=$(gh api "search/issues?q=repo:Latimer-Woods-Tech/Factory+is:pr+is:merged&per_page=1" \
            --jq '.total_count')

          COMMIT_RESP=$(gh api "repos/Latimer-Woods-Tech/Factory/commits?per_page=1" -i 2>/dev/null || true)
          TOTAL_COMMITS=$(echo "$COMMIT_RESP" | grep -i '^link:' | \
            grep -oP 'page=\K[0-9]+(?=>; rel="last")' || echo "")
          TOTAL_COMMITS=${TOTAL_COMMITS:-1}

          DEPLOYED_APPS=$(ls apps/ | wc -l | tr -d ' ')
          SHARED_PACKAGES=$(ls packages/ | wc -l | tr -d ' ')
          WORKFLOWS=$(ls .github/workflows/*.yml 2>/dev/null | wc -l | tr -d ' ')

          ORG_REPOS=$(gh api "orgs/Latimer-Woods-Tech/repos?per_page=100" --jq 'length')
          REPO_CREATED=$(gh api "repos/Latimer-Woods-Tech/Factory" --jq '.created_at')

          echo "merged_prs=$MERGED_PRS"         >> "$GITHUB_OUTPUT"
          echo "total_commits=$TOTAL_COMMITS"    >> "$GITHUB_OUTPUT"
          echo "deployed_apps=$DEPLOYED_APPS"    >> "$GITHUB_OUTPUT"
          echo "shared_packages=$SHARED_PACKAGES" >> "$GITHUB_OUTPUT"
          echo "workflows=$WORKFLOWS"            >> "$GITHUB_OUTPUT"
          echo "org_repos=$ORG_REPOS"            >> "$GITHUB_OUTPUT"
          echo "repo_created=$REPO_CREATED"      >> "$GITHUB_OUTPUT"

      - name: Write founder-stats.json
        run: |
          cat > apps/latwoodtech-web/src/data/founder-stats.json <<JSON
          {
            "generatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "repoCreatedAt": "${{ steps.stats.outputs.repo_created }}",
            "mergedPrs": ${{ steps.stats.outputs.merged_prs }},
            "totalCommits": ${{ steps.stats.outputs.total_commits }},
            "deployedApps": ${{ steps.stats.outputs.deployed_apps }},
            "sharedPackages": ${{ steps.stats.outputs.shared_packages }},
            "workflows": ${{ steps.stats.outputs.workflows }},
            "orgRepos": ${{ steps.stats.outputs.org_repos }},
            "monthlyCostUsd": 9.11
          }
          JSON
          python3 -c "
          import json
          with open('apps/latwoodtech-web/src/data/founder-stats.json') as f:
              data = json.load(f)
          with open('apps/latwoodtech-web/src/data/founder-stats.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Generate platform data
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          node .github/scripts/generate-platform-data.mjs

      - name: Build entity graph (Platform Brain MODEL)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # build-entity-graph.mjs needs js-yaml; install just that one package.
          npm install js-yaml@^4.1.1 --no-save --no-audit --no-fund
          node scripts/build-entity-graph.mjs

      - name: Synthesize KPI trends (Platform Brain SYNTHESIZE)
        run: |
          # Reads dated snapshots + entity-graph, appends kpi-series.jsonl, writes
          # the kpis block into entity-graph.json + platform.json. No extra deps.
          node scripts/trend-analyzer.mjs

      - name: Network sense (Platform Brain synergize)
        env:
          FACTORY_NETWORK_CONNECTION_STRING: ${{ secrets.FACTORY_NETWORK_CONNECTION_STRING }}
        run: |
          # Queries factory-network Neon for cross-app link + event metrics.
          # Writes graph.network block into entity-graph.json for planning-session.mjs.
          # Graceful no-op when connection string is absent.
          npm install pg --no-save --no-audit --no-fund
          node scripts/network-sense.mjs

      - name: Generate planning brief (Platform Brain, brief path)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Deterministic weekly-style synthesis over the graph + trends + objectives.
          # Folded into this scheduled job (no new workflow) per the CI-budget posture.
          node scripts/planning-session.mjs

      - name: Roadmap auto-build (Platform Brain, auto-file path)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APPLY: 'true'
        run: |
          # Files one deduplicated GitHub issue per queued roadmap item in build/growth apps.
          # Issues get supervisor:no-template → template-author drafts a plan → supervisor executes.
          node scripts/roadmap-auto-build.mjs

      - name: Open or update auto-merge PR if stats changed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          FILES="apps/latwoodtech-web/src/data/founder-stats.json apps/latwoodtech-web/src/data/platform.json docs/registry/entity-graph.json docs/registry/kpi-series.jsonl docs/planning/brief-$(date -u +%F).md"
          git add $FILES
          if git diff --cached --quiet $FILES; then
            echo "No change in founder-stats.json or platform.json — skipping PR."
            exit 0
          fi

          DATE=$(date -u +%F)
          BRANCH="chore/founder-stats-$DATE"
          TMP=$(mktemp)
          # founder-stats.json is generated by inline bash above (can't be re-run on
          # the branch), so preserve it here. platform.json + entity-graph.json are
          # regenerated by their scripts after the branch checkout below.
          cp apps/latwoodtech-web/src/data/founder-stats.json "$TMP"

          git config user.name  "factory-cross-repo[bot]"
          git config user.email "factory-cross-repo[bot]@users.noreply.github.com"

          # Preserve the generated snapshot in TMP, then clear the working tree
          # so Git can switch to the stable daily update branch.
          git restore --staged --worktree $FILES
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          cp "$TMP" apps/latwoodtech-web/src/data/founder-stats.json
          # Re-run platform data + entity graph + trends so they land on the branch too.
          # Order matters: platform-data regenerates platform.json, then build-entity-graph,
          # then trend-analyzer patches the kpis block into both.
          node .github/scripts/generate-platform-data.mjs
          node scripts/build-entity-graph.mjs
          node scripts/trend-analyzer.mjs
          node scripts/network-sense.mjs
          node scripts/planning-session.mjs
          git add $FILES
          if git diff --cached --quiet $FILES; then
            echo "Existing snapshot PR already contains this content."
            exit 0
          fi

          git commit -m "chore(latwoodtech-web): update founder stats + platform data ($DATE)"
          git push --force-with-lease --set-upstream origin "$BRANCH"

          BODY='Automated hourly refresh: founder-stats.json + platform.json (app constellation + roadmap) + docs/registry/entity-graph.json (Platform Brain MODEL). Generated by generate-founder-stats.yml + generate-platform-data.mjs + build-entity-graph.mjs. Branch is stable per day so reruns update one PR. Merge triggers deploy-latwoodtech-web.yml.'
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing founder-stats PR #$EXISTING_PR for $DATE."
            gh pr edit "$EXISTING_PR" --title "chore(latwoodtech-web): update founder stats + platform data ($DATE)" --body "$BODY"
            gh pr merge --auto --squash "$EXISTING_PR" || true
          else
            gh pr create \
              --title "chore(latwoodtech-web): update founder stats + platform data ($DATE)" \
              --body "$BODY" \
              --label automation \
              --label auto-merge
            NEW_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
            gh pr merge --auto --squash "$NEW_PR" || true
          fi
