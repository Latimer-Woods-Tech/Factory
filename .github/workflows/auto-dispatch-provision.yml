name: Auto-dispatch capability provision

# Scheduled poller for capability provision requests (Stage D dispatcher).
#
# Every 15 minutes: GETs /capabilities/provision-requests?status=requested
# from admin-studio, then fires `dispatch-capability-provision.yml` for each
# pending row. Eliminates the manual workflow_dispatch trigger from Stage C.
#
# Auth: fetches JWT_SECRET from GCP Secret Manager via WIF and mints a fresh
# 4h owner JWT each run. Workflow cadence is 15min so the token always has
# >=3h45m headroom against the production envLockedAt session-age policy
# (packages/studio-core/src/env-context.ts:124 maxSessionAge).

on:
  schedule:
    - cron: '45 * * * *'   # hourly (was */15) — cost trim
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  poll-and-dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Fetch dispatch JWT secret + STUDIO_API_BASE from GCP
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env STUDIO_API_BASE              ADMIN_STUDIO_PROD_URL
          fetch_to_env JWT_SECRET                   JWT_SECRET jwt-secret

      - name: Mint fresh dispatch JWT
        run: |
          set -euo pipefail
          if [ -z "${STUDIO_API_BASE:-}" ] || [ -z "${JWT_SECRET:-}" ]; then
            echo "::error::GCP-sourced values missing — cannot mint dispatch JWT"
            exit 1
          fi
          TOKEN=$(node .github/scripts/mint-admin-studio-jwt.mjs)
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::JWT mint returned no token"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "STUDIO_DISPATCH_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Fetch pending provision requests
        run: |
          set -euo pipefail
          mkdir -p .auto-dispatch
          curl -fsSL \
            -H "Authorization: Bearer ${STUDIO_DISPATCH_TOKEN}" \
            "${STUDIO_API_BASE}/capabilities/provision-requests?status=requested" \
            | node -e "
              const fs = require('fs');
              let body = '';
              process.stdin.on('data', (c) => (body += c));
              process.stdin.on('end', () => {
                const payload = JSON.parse(body);
                const rows = payload.requests ?? [];
                console.log('Pending requests: ' + rows.length);
                fs.writeFileSync('.auto-dispatch/pending.json', JSON.stringify(rows, null, 2));
              });
            "

      - name: Dispatch each pending request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          node << 'DISPATCH_EOF'
          const fs = require('fs');
          const https = require('https');
          const { execSync } = require('child_process');

          const apiBase = process.env.STUDIO_API_BASE;
          const token = process.env.STUDIO_DISPATCH_TOKEN;

          function apiFetch(path) {
            return new Promise((resolve, reject) => {
              const url = new URL(path, apiBase);
              const req = https.get(url.toString(), {
                headers: { Authorization: 'Bearer ' + token },
              }, (res) => {
                let body = '';
                res.on('data', (c) => (body += c));
                res.on('end', () => {
                  if (res.statusCode < 200 || res.statusCode >= 300) {
                    reject(new Error('HTTP ' + res.statusCode + ' from ' + path + ': ' + body));
                  } else {
                    resolve(JSON.parse(body));
                  }
                });
              });
              req.on('error', reject);
            });
          }

          async function resolveConceptId(handoffId, handoffHash) {
            // Primary: id-based lookup (fast path, no hash needed).
            try {
              const payload = await apiFetch('/capabilities/handoffs/' + handoffId);
              if (payload.handoff?.conceptId) return payload.handoff.conceptId;
            } catch (err) {
              console.warn('id-based handoff lookup failed (' + handoffId + '):', err.message);
            }
            // Fallback: hash-based lookup. Closes the Hyperdrive read-after-write
            // race where a freshly-inserted handoff is not yet visible on the
            // pooled connection the id-lookup lands on. The hash is supplied by
            // GET /capabilities/provision-requests via a LEFT JOIN so no extra
            // round-trip is needed here.
            if (handoffHash) {
              try {
                const hashPayload = await apiFetch('/capabilities/handoffs/by-hash/' + handoffHash);
                if (hashPayload.handoff?.conceptId) {
                  console.log('Hash fallback resolved conceptId for handoff ' + handoffId);
                  return hashPayload.handoff.conceptId;
                }
              } catch (hashErr) {
                console.warn('Hash-based handoff lookup also failed (' + handoffHash + '):', hashErr.message);
              }
            }
            return 'unknown-concept';
          }

          async function main() {
            const rows = JSON.parse(fs.readFileSync('.auto-dispatch/pending.json', 'utf8'));
            if (rows.length === 0) {
              console.log('No pending provision requests — nothing to dispatch.');
              return;
            }
            for (const row of rows) {
              const handoffId = row.handoffId;
              const handoffHash = row.handoffHash; // from LEFT JOIN on provision-requests list
              const requestId = row.id;
              if (!handoffId || !requestId) {
                console.warn('Skipping row missing handoffId or id:', JSON.stringify(row));
                continue;
              }
              const conceptId = await resolveConceptId(handoffId, handoffHash);
              const appName = conceptId.replace(/-api$/, '');
              const cmd = [
                'gh workflow run dispatch-capability-provision.yml',
                '--field provision_request_id=' + requestId,
                '--field handoff_id=' + handoffId,
                '--field app_name=' + appName,
                '--field no_deploy=true',
              ].join(' ');
              console.log('Dispatching:', appName, '(request=' + requestId + ', conceptId=' + conceptId + ')');
              execSync(cmd, { stdio: 'inherit' });
            }
          }

          main().catch((err) => { console.error(err); process.exit(1); });
          DISPATCH_EOF
