name: label-sync
on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC reconcile sweep
  workflow_dispatch:

concurrency:
  group: label-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Mint Factory App token (all 5 repos)
        id: app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: |
            HumanDesign
            capricast
            Factory
            cypher-healing
            xico-city

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install pyyaml

      - name: Reconcile labels → matrices
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          python scripts/sync_labels_to_matrix.py \
            --config .github/label-sync-config.yml
