name: Lifecycle controller

on:
  issues:
    types: [opened, labeled, unlabeled, closed, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number
        required: true
      repo:
        description: owner/repo
        required: true
        default: Latimer-Woods-Tech/Factory
      to_state:
        description: Target state
        required: true
      actor:
        description: Requesting actor
        default: manual
      evidence_json:
        description: Evidence JSON
        default: '{}'

# T2 — Operational. Shadow mode by default; enforcement requires 14-day clean shadow.
# LIFECYCLE_SHADOW_MODE=true until manually promoted.

concurrency:
  group: lifecycle-controller-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  transition:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Mint Factory App token
        id: app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: Factory

      - name: Set up Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Run lifecycle controller
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          LIFECYCLE_SHADOW_MODE: 'true'
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
          REPO: ${{ github.repository }}
          TO_STATE: ${{ inputs.to_state || '' }}
          ACTOR: ${{ github.actor }}
          EVIDENCE_JSON: ${{ inputs.evidence_json || '{}' }}
          CORRELATION_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          EVENT_ACTION: ${{ github.event.action || '' }}
          EVENT_LABEL: ${{ github.event.label.name || '' }}
        run: node .github/scripts/lifecycle-controller.mjs
