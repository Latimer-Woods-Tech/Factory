name: Run App Migrations

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

concurrency:
  group: run-app-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: wordis-bond
            conn_secret: WORDISBOND_CONNECTION_STRING
          - app: cypher-healing
            conn_secret: CYPHEROFHEALING_CONNECTION_STRING
          - app: ijustus
            conn_secret: KAIROSCOUNCIL_CONNECTION_STRING
          - app: the-calling
            conn_secret: THECALLING_CONNECTION_STRING
          - app: xico-city
            conn_secret: XICOCITY_CONNECTION_STRING

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Checkout app repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Latimer-Woods-Tech/${{ matrix.app }}
          token: ${{ steps.app-token.outputs.token }}
          path: app

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          registry-url: 'https://npm.pkg.github.com'
          scope: '@adrper79-dot'

      - name: Configure npm auth for GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${{ steps.app-token.outputs.token }}" >> app/.npmrc

      - name: Install dependencies
        run: npm ci
        working-directory: app
        env:
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Generate Drizzle migration
        run: npx drizzle-kit generate
        working-directory: app

      - name: Apply migration to Neon
        env:
          DATABASE_URL: ${{ secrets[matrix.conn_secret] }}
        run: |
          npx drizzle-kit migrate
        working-directory: app

      - name: Commit generated migration files
        run: |
          cd app
          git config user.email "ci@factory.dev"
          git config user.name "Factory CI"
          git add src/db/migrations/
          git diff --staged --quiet && echo "No migration changes" || \
            git commit -m "chore(db): generate initial drizzle migration [skip ci]"
          git push
