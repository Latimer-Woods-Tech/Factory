name: CI
on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@latimer-woods-tech'
      - name: Detect code changes
        id: code-changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            changed=$(git diff --name-only "$BASE" HEAD 2>/dev/null \
              | grep -E '^(packages|apps|scripts)/' | head -1 || true)
            if [ -n "$changed" ]; then
              echo "has_code=true" >> "$GITHUB_OUTPUT"
              echo "Code changes detected — running full package validation."
            else
              echo "has_code=false" >> "$GITHUB_OUTPUT"
              echo "No package/app/script changes — skipping package validation loop."
            fi
          else
            echo "has_code=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate packages in dependency order
        if: steps.code-changes.outputs.has_code == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          packages=(
            errors
            monitoring
            logger
            realtime
            design-tokens
            ui
            auth
            neon
            stripe
            llm
            telephony
            analytics
            deploy
            testing
            email
            copy
            content
            social
            seo
            validation
            crm
            compliance
            admin
            video
            schedule
            llm-meter
            studio-core
          )

          for package in "${packages[@]}"; do
            echo "=== ${package} ==="
            cd "packages/${package}"
            npm ci --ignore-scripts
            npm run lint
            npm run typecheck
            npm run test -- --coverage
            npm run build
            cd ../..
          done

      - name: Enforce workers.dev URL policy
        run: node scripts/check-workers-url-policy.mjs

      - name: Enforce smoke secret contract
        run: node scripts/check-smoke-secret-contract.mjs

      - name: Enforce service registry / app-registry drift check (FRH-01)
        working-directory: apps/admin-studio
        run: node scripts/check-service-registry.mjs

      - name: Enforce wrangler name ↔ service-registry drift (FRH-WRNG-01)
        run: node scripts/check-wrangler-registry-drift.mjs

      - name: Lint publish workflow with actionlint (FRH-06)
        run: |
          bash <(curl -sS https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint .github/workflows/publish.yml

      - name: Enforce dependency version policy (FRH-08)
        run: node scripts/lint-dependency-versions.mjs

      - name: Enforce docs-to-service-registry endpoint consistency (FRH-10)
        run: node scripts/check-docs-registry-consistency.mjs

      - name: Enforce JSDoc coverage ≥90% on exported symbols (FRH-DOC-001)
        run: node scripts/check-jsdoc-coverage.mjs
