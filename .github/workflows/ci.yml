name: CI
on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          registry-url: 'https://npm.pkg.github.com'
          scope: '@latimer-woods-tech'
      - name: Detect code changes
        id: code-changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            changed=$(git diff --name-only "$BASE" HEAD 2>/dev/null \
              | grep -E '^(packages|apps|scripts)/' | head -1 || true)
            if [ -n "$changed" ]; then
              echo "has_code=true" >> "$GITHUB_OUTPUT"
              echo "Code changes detected — running full package validation."
            else
              echo "has_code=false" >> "$GITHUB_OUTPUT"
              echo "No package/app/script changes — skipping package validation loop."
            fi
          else
            echo "has_code=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate packages in dependency order
        if: steps.code-changes.outputs.has_code == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          packages=(
            errors
            monitoring
            logger
            realtime
            design-tokens
            ui
            auth
            neon
            stripe
            llm
            telephony
            analytics
            deploy
            testing
            email
            copy
            content
            social
            seo
            validation
            crm
            compliance
            admin
            video
            schedule
            llm-meter
            studio-core
            creator
            design-system
            entitlements
            protocol
            bodygraph
            agent
          )

          for package in "${packages[@]}"; do
            echo "=== ${package} ==="
            cd "packages/${package}"
            npm ci --ignore-scripts
            # All @latimer-woods-tech/* dependencies use file:../X references in packages/
            # so npm ci creates symlinks into the local tree.  Symlinks resolve to the
            # already-built dist/ from the earlier iteration, so no overlay is needed here.
            npm run lint
            npm run typecheck
            npm run test
            npm run build
            cd ../..
          done

      - name: Enforce workers.dev URL policy
        run: node scripts/check-workers-url-policy.mjs

      - name: Enforce smoke secret contract
        run: node scripts/check-smoke-secret-contract.mjs

      - name: Enforce telemetry contract coverage
        run: node scripts/check-telemetry-contract.mjs

      - name: Enforce service registry / app-registry drift check (FRH-01)
        working-directory: apps/admin-studio
        run: node scripts/check-service-registry.mjs

      - name: Enforce wrangler name ↔ service-registry drift (FRH-WRNG-01)
        run: node scripts/check-wrangler-registry-drift.mjs

      - name: Enforce monitor target generation is up-to-date (FRH-05)
        run: node scripts/generate-monitor-targets.mjs --check

      - name: Lint all workflows with actionlint (FRH-06)
        # Originally scoped to publish.yml only; expanded 2026-05-24 to cover
        # every workflow file. With 108 workflows and active drift in pinning,
        # permissions, and concurrency, single-file coverage was leaving
        # injection vectors and dead step references on main (caught
        # render-video.yml steps.upload_r2 + reviewer-class-hints.yml inline
        # `github.event.*.body` example during the SHA-pinning audit).
        #
        # `-shellcheck=` disables actionlint's bundled shellcheck pass on
        # `run:` blocks. Repo-wide expansion surfaced 30+ pre-existing
        # shellcheck findings (mostly SC2086 unquoted vars, SC2129 redirect
        # style, a few SC2155/SC2015 real bug-class). They predate this step
        # and cleaning them belongs in a dedicated workstream — they don't
        # block actionlint from doing its core job (GH-Actions structural
        # issues, injection vectors, missing step refs, bad cron, etc.).
        run: |
          bash <(curl -sS https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color -shellcheck= .github/workflows/*.yml

      - name: Enforce dependency version policy (FRH-08)
        run: node scripts/lint-dependency-versions.mjs

      - name: Enforce docs-to-service-registry endpoint consistency (FRH-10)
        run: node scripts/check-docs-registry-consistency.mjs

      - name: Enforce JSDoc coverage ≥90% on exported symbols (FRH-DOC-001)
        run: node scripts/check-jsdoc-coverage.mjs

      - name: Detect capability registry changes
        id: cap-changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            changed=$(git diff --name-only "$BASE" HEAD 2>/dev/null \
              | grep -E '^capabilities/' | head -1 || true)
            if [ -n "$changed" ]; then
              echo "has_capabilities=true" >> "$GITHUB_OUTPUT"
              echo "Capability registry changes detected — running FRH-CAP-001 and FRH-CAP-002."
            else
              echo "has_capabilities=false" >> "$GITHUB_OUTPUT"
              echo "No capability registry changes — skipping FRH-CAP-001 and FRH-CAP-002."
            fi
          else
            echo "has_capabilities=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate capability registry (FRH-CAP-001)
        if: steps.cap-changes.outputs.has_capabilities == 'true'
        run: node scripts/capabilities/validate.mjs

      - name: Enforce capability registry compile-determinism (FRH-CAP-002)
        if: steps.cap-changes.outputs.has_capabilities == 'true'
        run: |
          node scripts/capabilities/compile.mjs
          git diff --exit-code -- capabilities/dist apps/admin-studio/src/lib/capability-data.generated.ts \
            || (echo "::error::Capability registry artifacts are out of sync — run 'node scripts/capabilities/compile.mjs' locally and commit the result." && exit 1)
