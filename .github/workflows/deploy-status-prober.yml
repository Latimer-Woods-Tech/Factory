name: Deploy Status Prober

on:
  push:
    branches: [main]
    paths:
      - 'apps/status-prober/**'
      - '.github/workflows/deploy-status-prober.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

concurrency:
  group: deploy-status-prober-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Deploy status-prober to Cloudflare

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Fetch Cloudflare creds from GCP Secret Manager
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env CLOUDFLARE_API_TOKEN   CF_API_TOKEN CLOUDFLARE_API_TOKEN
          fetch_to_env CLOUDFLARE_ACCOUNT_ID  CF_ACCOUNT_ID CLOUDFLARE_ACCOUNT_ID

      - name: Install dependencies
        working-directory: apps/status-prober
        run: npm install

      - name: Typecheck
        working-directory: apps/status-prober
        run: npm run typecheck

      - name: Lint
        working-directory: apps/status-prober
        run: npm run lint

      - name: Test
        working-directory: apps/status-prober
        run: npm test

      - name: Deploy to Cloudflare Workers
        working-directory: apps/status-prober
        run: npx wrangler deploy --env production

      - name: Verify deployment
        run: |
          echo "Status Prober deployment complete"
          echo "Health: https://status-prober.adrper79.workers.dev/health"
          echo "Custom: https://status.latwoodtech.work/health"
          node scripts/verify-http-endpoint.mjs \
            --url https://status-prober.adrper79.workers.dev/health \
            --status 200 \
            --json-field worker \
            --json-equals status-prober \
            --retries 8 \
            --delay-ms 5000
