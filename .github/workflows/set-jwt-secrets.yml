name: Set JWT Secrets (Phase 7.5)

on:
  workflow_dispatch: {}

# Generates a cryptographically random 64-hex JWT secret for each app and
# sets it via `wrangler secret put JWT_SECRET --name <app>`.
# Also stores the secrets in this repo for safe-keeping so they can be
# re-pushed if a worker is redeployed.
#
# Idempotent — wrangler secret put overwrites existing values.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

jobs:
  set-jwt-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        app:
          - wordis-bond
          - cypher-healing
          - ijustus
          - the-calling
          - neighbor-aid

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account_email: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Get secrets from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets:
            - name: FACTORY_APP_ID
              id: factory_app_id
            - name: FACTORY_APP_PRIVATE_KEY
              id: factory_app_private_key
            - name: CF_API_TOKEN
              id: cf_token
            - name: CF_ACCOUNT_ID
              id: cf_account

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ steps.secrets.outputs.factory_app_id }}
          private-key: ${{ steps.secrets.outputs.factory_app_private_key }}
          owner: Latimer-Woods-Tech

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Generate and set JWT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.secrets.outputs.cf_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.secrets.outputs.cf_account }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          APP="${{ matrix.app }}"

          # Generate 64 hex chars = 32 random bytes = 256-bit secret
          JWT_SECRET=$(openssl rand -hex 32)

          # Set on the Cloudflare Worker
          echo "$JWT_SECRET" | wrangler secret put JWT_SECRET --name "$APP"
          echo "✅ JWT_SECRET set on Worker: $APP"

          # Also store as a GitHub Actions secret on the app repo
          # so the app's CI can use it for integration tests
          echo "$JWT_SECRET" | gh secret set JWT_SECRET --repo "Latimer-Woods-Tech/$APP"
          echo "✅ JWT_SECRET set on GitHub repo: $APP"
