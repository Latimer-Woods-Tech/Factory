name: Dispatch capability provision

# Operator-triggered (or auto-dispatch-provision.yml triggered) dispatcher for
# staging provision requests recorded by the Capability Design Studio.
# See docs/CAPABILITY_DESIGN_STUDIO_GOLDEN_DESIGN.md.
#
# Flow:
#   1. Operator (or auto-dispatcher) calls this workflow_dispatch with
#      provision_request_id, handoff_id, app_name.
#   2. This workflow:
#        a. authenticates to GCP (WIF) and pulls JWT_SECRET from Secret Manager
#        b. mints a fresh studio owner JWT (4h TTL)
#        c. fetches the handoff package from admin-studio
#        d. transitions the request to 'dispatched'
#        e. runs scaffold.mjs --handoff <persisted> (--no-deploy by default)
#        f. uploads the scaffolded tree as a workflow artifact for review
#        g. (best-effort) registers service in capability_services lineage table
#           with sha256(wrangler.jsonc) as manifest_hash; failure is non-fatal
#        h. on success, transitions to 'succeeded'; on failure, 'failed' with notes.

on:
  workflow_dispatch:
    inputs:
      provision_request_id:
        description: capability_provision_requests.id (UUID)
        required: true
      handoff_id:
        description: capability_handoffs.id (UUID) referenced by the request
        required: true
      app_name:
        description: kebab-case name for the scaffolded app
        required: true
      no_deploy:
        description: Skip the optional first-deploy prompt (default true)
        required: false
        default: 'true'

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Node 24 is the current Active LTS (since Oct 2025; Maintenance
          # through Oct 2026). Node 20 hit EOL 2026-04-30. Wrangler 4.x
          # refuses to start below node 22, so anything < 22 breaks the
          # scaffold prereq check.
          node-version: '24'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Fetch dispatch JWT secret + STUDIO_API_BASE from GCP
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env STUDIO_API_BASE     ADMIN_STUDIO_PROD_URL
          fetch_to_env JWT_SECRET          JWT_SECRET jwt-secret

      - name: Mint fresh dispatch JWT
        run: |
          set -euo pipefail
          if [ -z "${STUDIO_API_BASE:-}" ] || [ -z "${JWT_SECRET:-}" ]; then
            echo "::error::GCP-sourced values missing — cannot mint dispatch JWT"
            exit 1
          fi
          TOKEN=$(node .github/scripts/mint-admin-studio-jwt.mjs)
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::JWT mint returned no token"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "STUDIO_DISPATCH_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Fetch handoff package
        env:
          HANDOFF_ID: ${{ inputs.handoff_id }}
        run: |
          set -euo pipefail
          mkdir -p .factory-handoff
          curl -fsSL \
            -H "Authorization: Bearer ${STUDIO_DISPATCH_TOKEN}" \
            "${STUDIO_API_BASE}/capabilities/handoffs/${HANDOFF_ID}" \
            | node -e "
              const fs = require('fs');
              let body = '';
              process.stdin.on('data', (c) => (body += c));
              process.stdin.on('end', () => {
                const payload = JSON.parse(body);
                const found = payload.handoff;
                if (!found) {
                  console.error('Handoff not found in response');
                  process.exit(1);
                }
                fs.writeFileSync('.factory-handoff/handoff.json', JSON.stringify(found, null, 2));
                console.log('Handoff written:', found.recipeId, found.hash);
              });
            "

      - name: Transition provision request → dispatched
        env:
          PROVISION_REQUEST_ID: ${{ inputs.provision_request_id }}
        run: |
          set -euo pipefail
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${STUDIO_DISPATCH_TOKEN}" \
            -H 'Content-Type: application/json' \
            -d '{"status":"dispatched","notes":"dispatched via GH Actions"}' \
            "${STUDIO_API_BASE}/capabilities/provision-requests/${PROVISION_REQUEST_ID}/transition"

      - name: Install scaffold prerequisites (wrangler)
        # actions/setup-node sets a custom npm prefix so global installs don't
        # need sudo; the resulting bin/ isn't on PATH by default in the next
        # step. Add it to $GITHUB_PATH so the scaffold call can resolve
        # `wrangler`. Verify accessible inline so we fail fast if install
        # actually went wrong.
        run: |
          set -euo pipefail
          npm install -g wrangler@latest
          NPM_BIN="$(npm config get prefix)/bin"
          echo "$NPM_BIN" >> "$GITHUB_PATH"
          "$NPM_BIN/wrangler" --version
          git config --global user.email "factory-dispatcher@latwoodtech.work"
          git config --global user.name  "Factory Capability Dispatcher"

      - name: Run scaffold against handoff
        id: scaffold
        env:
          APP_NAME: ${{ inputs.app_name }}
          NO_DEPLOY_INPUT: ${{ inputs.no_deploy }}
        run: |
          set -euo pipefail
          mkdir -p staging-workspace
          cd staging-workspace
          NO_DEPLOY_FLAG=""
          if [ "${NO_DEPLOY_INPUT}" = "true" ]; then
            NO_DEPLOY_FLAG="--no-deploy --no-install"
          fi
          # Pass placeholder IDs so scaffold skips its interactive prompts in CI;
          # the generated wrangler.jsonc gets these as defaults — an operator
          # replaces them with real CF resources during human-in-the-loop
          # provisioning. The dispatcher only produces the artifact today.
          node ../packages/deploy/scripts/scaffold.mjs "${APP_NAME}" \
            --handoff ../.factory-handoff/handoff.json \
            --hyperdrive-id REPLACE_WITH_HYPERDRIVE_ID \
            --rate-limiter-id REPLACE_WITH_RATE_LIMITER_NAMESPACE_ID \
            $NO_DEPLOY_FLAG

      - name: Upload scaffolded workspace as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: staging-workspace-${{ inputs.app_name }}
          path: staging-workspace/${{ inputs.app_name }}
          if-no-files-found: ignore
          retention-days: 14

      - name: Register service lineage (Stage 3)
        # Best-effort: failure here must NOT block the provision-request
        # transition to 'succeeded'. The scaffold artifact is the primary
        # deliverable; lineage registration is supplementary.
        #
        # Computes manifest_hash from the generated wrangler.jsonc so the
        # capability_services row can be used for drift detection later:
        # any service whose manifest_hash diverges from the current compiled
        # plan is an upgrade candidate.
        if: success()
        env:
          APP_NAME: ${{ inputs.app_name }}
          HANDOFF_ID: ${{ inputs.handoff_id }}
          PROVISION_REQUEST_ID: ${{ inputs.provision_request_id }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          WRANGLER_PATH="staging-workspace/${APP_NAME}/wrangler.jsonc"
          if [ ! -f "$WRANGLER_PATH" ]; then
            echo "::warning::wrangler.jsonc not found at ${WRANGLER_PATH} — skipping service lineage registration"
            exit 0
          fi
          MANIFEST_HASH=$(sha256sum "$WRANGLER_PATH" | awk '{print $1}')
          BODY=$(jq -n \
            --arg serviceId  "$APP_NAME" \
            --arg handoffId  "$HANDOFF_ID" \
            --arg provReqId  "$PROVISION_REQUEST_ID" \
            --arg sha        "$GITHUB_SHA" \
            --arg mhash      "$MANIFEST_HASH" \
            '{serviceId:$serviceId, handoffId:$handoffId, provisionRequestId:$provReqId, deployedSha:$sha, manifestHash:$mhash}')
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${STUDIO_DISPATCH_TOKEN}" \
            -H 'Content-Type: application/json' \
            -d "$BODY" \
            "${STUDIO_API_BASE}/capabilities/services")
          if [ "$HTTP_STATUS" = "201" ]; then
            echo "Service lineage registered (serviceId=${APP_NAME}, sha=${GITHUB_SHA:0:7}, manifestHash=${MANIFEST_HASH:0:12}…)"
          else
            echo "::warning::Service lineage registration returned HTTP ${HTTP_STATUS} — non-fatal, continuing"
          fi

      - name: Transition provision request → succeeded
        if: success()
        env:
          PROVISION_REQUEST_ID: ${{ inputs.provision_request_id }}
        run: |
          set -euo pipefail
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${STUDIO_DISPATCH_TOKEN}" \
            -H 'Content-Type: application/json' \
            -d '{"status":"succeeded","notes":"scaffold artifact uploaded"}' \
            "${STUDIO_API_BASE}/capabilities/provision-requests/${PROVISION_REQUEST_ID}/transition"

      - name: Transition provision request → failed
        if: failure()
        env:
          PROVISION_REQUEST_ID: ${{ inputs.provision_request_id }}
        run: |
          set -euo pipefail
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${STUDIO_DISPATCH_TOKEN}" \
            -H 'Content-Type: application/json' \
            -d '{"status":"failed","notes":"see GH Actions run log"}' \
            "${STUDIO_API_BASE}/capabilities/provision-requests/${PROVISION_REQUEST_ID}/transition" || true
