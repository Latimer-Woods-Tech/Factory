name: Cost Observability

# Stage 1 M2 — Daily cost digest. Shadow mode: observe + warn, no enforcement.
on:
  schedule:
    - cron: '37 6 * * *' # daily 06:37 UTC (covers prior UTC day)
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD UTC). Empty = yesterday.'
        required: false
      provider:
        description: 'Single provider (cloudflare|anthropic|sentry|stripe|gcp). Empty = all.'
        required: false
      pushover:
        description: 'Send Pushover digest (true/false)'
        required: false
        default: 'true'

permissions:
  contents: write # commit docs/cost/ snapshots back to main

concurrency:
  group: cost-observability
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Fetch secrets from GCP Secret Manager
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          # Cloudflare — repo secrets are canonical here; GCP fallback if missing.
          fetch_to_env CF_API_TOKEN              cloudflare-api-token cf-api-token CF_API_TOKEN
          fetch_to_env CF_ACCOUNT_ID             cloudflare-account-id cf-account-id CF_ACCOUNT_ID
          # Anthropic admin (org-level usage API)
          fetch_to_env ANTHROPIC_ADMIN_KEY       anthropic-admin-key anthropic-admin ANTHROPIC_ADMIN_KEY
          # Sentry — prefer canonical name, fall back to FACTORY_SENTRY_API legacy.
          fetch_to_env SENTRY_AUTH_TOKEN         sentry-auth-token SENTRY_AUTH_TOKEN factory-sentry-api FACTORY_SENTRY_API
          # Stripe — prefer read-only key.
          fetch_to_env STRIPE_API_KEY            stripe-api-key-readonly stripe-readonly stripe-api-key STRIPE_API_KEY
          # GCP billing (still requires BQ export wiring — placeholder)
          fetch_to_env GCP_BILLING_TOKEN         gcp-billing-token GCP_BILLING_TOKEN
          fetch_to_env GCP_BILLING_ACCOUNT_ID    gcp-billing-account-id GCP_BILLING_ACCOUNT_ID
          # Pushover digest delivery
          fetch_to_env PUSHOVER_USER             pushover-user PUSHOVER_USER pushover_user
          fetch_to_env PUSHOVER_TOKEN            pushover-token PUSHOVER_TOKEN pushover_token

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run cost digest
        env:
          # GCP-fetched secrets are exported to $GITHUB_ENV already.
          # Repo-level fallback if Secret Manager lookup didn't populate them.
          CF_API_TOKEN: ${{ env.CF_API_TOKEN || secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          # SENTRY_ORG is a literal config, not a secret. cost_digest.py defaults to 'latwood-tech'.
          SENTRY_ORG: latwood-tech
        run: |
          set -euo pipefail
          args=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            args="$args --date ${{ github.event.inputs.date }}"
          fi
          if [ -n "${{ github.event.inputs.provider }}" ]; then
            args="$args --provider ${{ github.event.inputs.provider }}"
          fi
          if [ "${{ github.event.inputs.pushover || 'true' }}" = "true" ]; then
            args="$args --pushover"
          fi
          python scripts/cost_digest.py $args

      - name: Commit cost snapshots
        run: |
          set -euo pipefail
          if git diff --quiet docs/cost/; then
            echo "No cost changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/cost/
          git commit -m "chore(cost): daily digest snapshot"
          git push
