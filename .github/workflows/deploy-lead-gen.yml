name: Deploy Lead-Gen Engine

on:
  push:
    branches: [main]
    paths:
      - 'apps/lead-gen/**'
      - '.github/workflows/deploy-lead-gen.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

concurrency:
  group: deploy-lead-gen-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: Deploy lead-gen to Cloudflare
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Fetch secrets from GCP Secret Manager
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env CF_API_TOKEN             CF_API_TOKEN CLOUDFLARE_API_TOKEN
          fetch_to_env CF_ACCOUNT_ID            CF_ACCOUNT_ID CLOUDFLARE_ACCOUNT_ID
          fetch_to_env SCRAPE_CREATORS_API_KEY  SCRAPE_CREATORS_API_KEY
          fetch_to_env LOOPS_API_KEY            LOOPS_API_KEY
          fetch_to_env ANTHROPIC_API_KEY        ANTHROPIC_API_KEY
          fetch_to_env GROQ_API_KEY             GROQ_API_KEY

      - name: Build local package dependencies
        run: |
          set -euo pipefail
          for package in errors logger llm; do
            echo "Building @latimer-woods-tech/$package..."
            cd packages/$package
            npm install
            npm run build
            cd ../..
          done

      - name: Install dependencies
        working-directory: apps/lead-gen
        run: npm install

      - name: Deploy to Cloudflare
        working-directory: apps/lead-gen
        run: |
          npx wrangler deploy --minify \
            --var ENVIRONMENT:production \
            --var VERTEX_PROJECT:factory-495015 \
            --var VERTEX_LOCATION:us-central1
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
          
      - name: Inject Secrets
        working-directory: apps/lead-gen
        run: |
          echo "$SCRAPE_CREATORS_API_KEY" | npx wrangler secret put SCRAPE_CREATORS_API_KEY
          echo "$LOOPS_API_KEY" | npx wrangler secret put LOOPS_API_KEY
          echo "$ANTHROPIC_API_KEY" | npx wrangler secret put ANTHROPIC_API_KEY
          echo "$GROQ_API_KEY" | npx wrangler secret put GROQ_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
