name: Generate Implementation Scorecard

# RFC-006 §10: weekly runs upload scorecard as a 30-day artifact.
# Snapshot PRs retired per RFC-006 §10.

on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read # RFC-006 §10: artifact upload does not need write

jobs:
  scorecard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # RFC-006 §10: artifact upload does not need write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run scorecard generator
        run: node scripts/generate-scorecard.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_SCORECARD || secrets.SLACK_WEBHOOK_OPS }}
          SCORECARD_REPO_OWNER: adrper79-dot
          SCORECARD_REPO_NAME: factory

      # RFC-006 §10: upload artifact instead of opening a snapshot PR.
      - name: Upload scorecard artifact
        uses: actions/upload-artifact@v7
        with:
          name: implementation-scorecard-${{ github.run_id }}
          path: docs/IMPLEMENTATION_SCORECARD_AUTO.md
          retention-days: 30
          if-no-files-found: warn
