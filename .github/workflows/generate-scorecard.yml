name: Generate Implementation Scorecard

on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions: {}

jobs:
  scorecard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run scorecard generator
        run: node scripts/generate-scorecard.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_SCORECARD || secrets.SLACK_WEBHOOK_OPS }}
          SCORECARD_REPO_OWNER: adrper79-dot
          SCORECARD_REPO_NAME: factory
      - name: Open auto-merge PR for scorecard snapshot
        # Direct push to main is rejected by branch protection (GH013).
        # Match the cost-observability.yml + platform-conformance.yml pattern:
        # commit to a fresh branch, open a labelled PR, let auto-merge land it.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git add docs/IMPLEMENTATION_SCORECARD_AUTO.md 2>/dev/null || true
          if git diff --quiet --cached docs/IMPLEMENTATION_SCORECARD_AUTO.md; then
            echo "No scorecard changes to commit."
            exit 0
          fi
          DATE=$(date -u +%F)
          BRANCH="chore/scorecard-snapshot-$DATE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
           
          # Check if the branch already exists
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi
           
          git add docs/IMPLEMENTATION_SCORECARD_AUTO.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Existing scorecard PR already contains this content."
          else
            git commit -m "chore(scorecard): weekly implementation scorecard ($DATE)"
            git push --force-with-lease --set-upstream origin "$BRANCH"
          fi
           
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing scorecard PR #$EXISTING_PR."
            gh pr edit "$EXISTING_PR" \
              --title "chore(scorecard): weekly implementation scorecard ($DATE)" \
              --body "Automated scorecard snapshot from \`generate-scorecard.yml\`. Source: \`scripts/generate-scorecard.mjs\`. This branch is stable per week so reruns update one PR instead of opening timestamped duplicates."
            gh pr merge --auto --squash "$EXISTING_PR" || true
          else
            gh pr create \
              --title "chore(scorecard): weekly implementation scorecard ($DATE)" \
              --body "Automated scorecard snapshot from \`generate-scorecard.yml\`. Source: \`scripts/generate-scorecard.mjs\`. This branch is stable per week so reruns update one PR instead of opening timestamped duplicates." \
              --label automation \
              --label documentation \
              --label auto-merge
          fi
