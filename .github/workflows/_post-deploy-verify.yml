# =============================================================================
# Reusable post-deploy verification workflow with auto-rollback.
#
# WHAT IT DOES
#   Probes a health endpoint with configurable retry/backoff. On failure,
#   optionally rolls the Worker back to a known-good prior version using
#   `wrangler versions deploy <version>@100%`.
#
# WHO CALLS IT
#   Chain after `_app-deploy.yml` when you want stronger verification than
#   the inline `health_url` check. Use this when you have a known previous
#   version ID to roll back to (production-grade deployments).
#
# HOW TO CALL
#   jobs:
#     deploy:
#       uses: Latimer-Woods-Tech/factory/.github/workflows/_app-deploy.yml@main
#       secrets: inherit
#     verify:
#       needs: deploy
#       uses: Latimer-Woods-Tech/factory/.github/workflows/_post-deploy-verify.yml@main
#       with:
#         health_url: https://app.example.com/healthz
#         rollback_on_failure: true
#         worker_name: my-app-production
#         previous_version_id: ${{ needs.deploy.outputs.previous_version_id }}
#       secrets: inherit
#
# REQUIRED SECRETS (only when rollback_on_failure: true)
#   VERTEX_SA_KEY          - GCP service account for Secret Manager access
#   CLOUDFLARE_API_TOKEN   - transition fallback token with Workers Scripts:Edit
#   CLOUDFLARE_ACCOUNT_ID  - transition fallback Cloudflare account ID
#
# REQUIRED INPUTS
#   health_url             - URL to probe (must return 2xx)
#
# OPTIONAL INPUTS
#   max_attempts           - Probe attempts before failing (default 5)
#   sleep_seconds          - Delay between probes (default 10)
#   rollback_on_failure    - Auto-rollback if probe fails (default false)
#   worker_name            - Required when rollback enabled
#   previous_version_id    - Required when rollback enabled. Capture from
#                            wrangler before deploy: `wrangler versions list`.
#
# CONVENTIONS
#   App must expose `/healthz` (or equivalent) returning 2xx + a small body.
#   Don't gate on a slow endpoint — keep probe under 10s.
#   Roll-forward beats roll-back when possible. Use rollback as the safety net
#   for prod, not as a substitute for tested code.
#
# RELATED
#   _app-deploy.yml          - The deploy step that runs before this
#   docs/CI_CD.md            - Full architecture reference
# =============================================================================

name: _post-deploy-verify

on:
  workflow_call:
    inputs:
      health_url:
        type: string
        required: true
      max_attempts:
        type: number
        default: 5
      sleep_seconds:
        type: number
        default: 10
      rollback_on_failure:
        type: boolean
        default: false
      worker_name:
        type: string
        default: ''
      previous_version_id:
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: -post-deploy-verify-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Probe health endpoint
        id: probe
        run: |
          for i in $(seq 1 ${{ inputs.max_attempts }}); do
            if curl -fsSL --max-time 10 "${{ inputs.health_url }}" > /tmp/health.txt; then
              echo "✓ Healthy on attempt $i"
              cat /tmp/health.txt
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i failed, sleeping ${{ inputs.sleep_seconds }}s..."
            sleep ${{ inputs.sleep_seconds }}
          done
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          exit 1
      - name: Authenticate to GCP
        if: failure() && inputs.rollback_on_failure && inputs.worker_name != '' && inputs.previous_version_id != '' && secrets.VERTEX_SA_KEY != ''
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}
      - name: Set up gcloud
        if: failure() && inputs.rollback_on_failure && inputs.worker_name != '' && inputs.previous_version_id != '' && secrets.VERTEX_SA_KEY != ''
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
      - name: Fetch Cloudflare rollback credentials from GCP Secret Manager
        if: failure() && inputs.rollback_on_failure && inputs.worker_name != '' && inputs.previous_version_id != '' && secrets.VERTEX_SA_KEY != ''
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env CLOUDFLARE_API_TOKEN CF_API_TOKEN CLOUDFLARE_API_TOKEN cloudflare-api-token
          fetch_to_env CLOUDFLARE_ACCOUNT_ID CF_ACCOUNT_ID CLOUDFLARE_ACCOUNT_ID cloudflare-account-id
      - name: Resolve Cloudflare rollback credentials
        if: failure() && inputs.rollback_on_failure && inputs.worker_name != '' && inputs.previous_version_id != ''
        id: cf-creds
        env:
          FALLBACK_CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          FALLBACK_CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          cf_api_token="${CLOUDFLARE_API_TOKEN:-$FALLBACK_CF_API_TOKEN}"
          cf_account_id="${CLOUDFLARE_ACCOUNT_ID:-$FALLBACK_CF_ACCOUNT_ID}"
          test -n "$cf_api_token" || (echo "::error::Cloudflare rollback API token missing in GCP Secret Manager and GitHub secrets" && exit 1)
          test -n "$cf_account_id" || (echo "::error::Cloudflare rollback account ID missing in GCP Secret Manager and GitHub secrets" && exit 1)
          echo "::add-mask::$cf_api_token"
          {
            echo "api_token=$cf_api_token"
            echo "account_id=$cf_account_id"
          } >> "$GITHUB_OUTPUT"
      - name: Auto-rollback
        if: failure() && inputs.rollback_on_failure && inputs.worker_name != '' && inputs.previous_version_id != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.cf-creds.outputs.api_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cf-creds.outputs.account_id }}
        run: |
          npx -y wrangler@latest versions deploy "${{ inputs.previous_version_id }}@100%" --name "${{ inputs.worker_name }}" --message "post-deploy verify rollback to ${{ inputs.previous_version_id }}" --yes
          echo "✓ Rolled back to ${{ inputs.previous_version_id }}"
