name: browser-agent / deploy

on:
  push:
    branches:
      - main
    paths:
      - 'apps/browser-agent/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # never cancel an in-flight production deploy

permissions:
  contents: read
  id-token: write   # Required for Workload Identity Federation

jobs:
  deploy:
    name: Cloud Build submit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/891842778224/locations/global/workloadIdentityPools/github-factory/providers/github
          service_account: factory-sa@factory-495015.iam.gserviceaccount.com

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Submit Cloud Build
        run: |
          gcloud builds submit . \
            --config apps/browser-agent/cloudbuild.yaml \
            --project factory-495015 \
            --substitutions SHORT_SHA=${GITHUB_SHA::7}