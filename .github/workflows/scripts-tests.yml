name: Scripts Tests

# Runs the pytest suite for scripts/ helpers (G2 deliverable per ROADMAP.md):
# - aggregate_completion.py
# - init-matrix-issues.py
# - sync_labels_to_matrix.py
#
# Triggered on any PR that touches scripts/ or the test files themselves.
# Daily scheduled run catches drift from refactors elsewhere in the repo.

on:
  pull_request:
    paths:
      - 'scripts/aggregate_completion.py'
      - 'scripts/init-matrix-issues.py'
      - 'scripts/sync_labels_to_matrix.py'
      - 'scripts/platform_conformance.py'
      - 'scripts/tests/**'
      - '.github/scripts/**'
      - '.github/workflows/scripts-tests.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/aggregate_completion.py'
      - 'scripts/init-matrix-issues.py'
      - 'scripts/sync_labels_to_matrix.py'
      - 'scripts/platform_conformance.py'
      - 'scripts/tests/**'
      - '.github/scripts/**'
  schedule:
    - cron: '47 3 * * *' # daily 03:47 UTC

permissions:
  contents: read

concurrency:
  group: scripts-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Install pytest + script deps
        run: pip install --quiet pytest pytest-cov pyyaml

      - name: Configure git identity for scaffold tests
        run: |
          git config --global user.email "[email protected]"
          git config --global user.name "Factory CI"

      - name: Run tests
        working-directory: scripts/tests
        run: python -m pytest -v --cov --cov-report=term

      - name: Coverage summary
        if: always()
        working-directory: scripts/tests
        run: |
          python -m pytest --cov --cov-report=term-missing -q 2>&1 | tail -10 || true

  node-tests:
    # Tests for Node.js helpers under .github/scripts/ — e.g. the snapshot-pr
    # auto-merge helper added in workflow lifecycle Phase 2.
    # Discovered via the convention `.github/scripts/*.test.mjs`.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Discover and run Node tests
        run: |
          set -euo pipefail
          shopt -s nullglob
          tests=( .github/scripts/*.test.mjs )
          if [ ${#tests[@]} -eq 0 ]; then
            echo "No Node test files found under .github/scripts/ — skipping."
            exit 0
          fi
          echo "Running ${#tests[@]} Node test file(s):"
          for t in "${tests[@]}"; do echo "  - $t"; done
          node --test "${tests[@]}"
