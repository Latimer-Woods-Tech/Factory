name: Launch Readiness Scorecard

# Stage 2 M3 — Daily composite scorecard. Pure aggregator over the
# shadow-mode snapshots that already land daily on main:
#   • docs/conformance/summary.json
#   • docs/completion-tracker.json
#   • docs/cost/summary.json
#   • docs/revenue/summary.json (when revenue digest #727 lands)
# No external API calls; reads files only. Runs after revenue digest so
# the inputs are fresh.
#
# RFC-006 §10: daily runs upload scorecard as a 30-day artifact.
# Snapshot PRs retired per RFC-006 §10.
on:
  schedule:
    - cron: '37 7 * * *' # daily 07:37 UTC (after revenue digest at 07:07)
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD UTC). Empty = today.'
        required: false

permissions:
  contents: read # RFC-006 §10: artifact upload does not need write

concurrency:
  group: launch-readiness
  cancel-in-progress: false

jobs:
  scorecard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Run scorecard aggregator
        run: |
          set -euo pipefail
          args=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            args="$args --date ${{ github.event.inputs.date }}"
          fi
          python scripts/launch_readiness.py $args

      # RFC-006 §10: upload artifact instead of opening a snapshot PR.
      - name: Upload scorecard artifact
        uses: actions/upload-artifact@v7
        with:
          name: launch-readiness-${{ github.run_id }}
          path: docs/scorecard/
          retention-days: 30
          if-no-files-found: warn
