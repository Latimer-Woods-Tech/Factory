name: Render Video

# End-to-end render pipeline. Dispatched by apps/video-cron on every cron
# tick once a render job is queued in schedule-worker. Each dispatch:
#
#   1. Generate headline + narration script (LLM chain)
#   2. Synthesise narration audio (ElevenLabs)
#   3. Upload narration MP3 to R2
#   4. Render MP4 with Remotion
#   5. ffmpeg re-encode (H.264 baseline + AAC)
#   6. Upload MP4 to R2
#   7. Register with Cloudflare Stream and wait for `ready`
#   8. POST to Capricast admin import endpoint
#   9. PATCH schedule-worker job → status=done (or status=failed on any step)
#
# Two jobs share the workflow file:
#   * `render`  — runs only on `workflow_dispatch` (cron-initiated). Touches
#                 real external APIs.
#   * `dry-run` — runs on every PR change. Walks the same shape using local
#                 fixtures so we exercise the workflow + scripts in CI
#                 without burning ElevenLabs / R2 / Stream / Capricast budget.

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'schedule-worker job id'
        required: true
        type: string
      composition_id:
        description: 'Remotion composition'
        required: true
        type: choice
        default: 'MarketingVideo'
        options:
          - 'EnergyBlueprintVideo'
          - 'MarketingVideo'
          - 'TrainingVideo'
          - 'WalkthroughVideo'
      app_id:
        description: 'Factory application id (e.g. prime_self)'
        required: true
        type: string
      topic:
        description: 'Topic / title seed for the render'
        required: true
        type: string
      brief_key:
        description: 'Optional named content brief under apps/video-studio/content-briefs/{app-id}/ (without .json)'
        required: false
        type: string
        default: ''
      brand_color:
        description: 'Primary brand hex colour'
        required: false
        type: string
        default: '#6366f1'
      brand_accent:
        description: 'Accent brand hex colour'
        required: false
        type: string
        default: '#a5b4fc'
      forge_theme:
        description: 'Atmospheric forge theme for EnergyBlueprintVideo (chronos|eros|aether|lux|phoenix|self)'
        required: false
        type: choice
        default: 'self'
        options:
          - 'self'
          - 'chronos'
          - 'eros'
          - 'aether'
          - 'lux'
          - 'phoenix'
      hd_type:
        description: 'HD energy type for body graph colouring (generator|manifesting_generator|projector|manifestor|reflector)'
        required: false
        type: string
        default: ''
      signature_gates:
        description: 'JSON array of gate numbers to highlight on body graph, e.g. [1,2,64]'
        required: false
        type: string
        default: '[]'
      logo_url:
        description: 'Logo image URL (may be empty)'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Dry run — walk pipeline shape using fixtures, no external calls'
        required: false
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
  pull_request:
    paths:
      - '.github/workflows/render-video.yml'
      - 'tools/media-room/**'
      - 'apps/video-studio/**'
      - 'apps/video-cron/**'
  # Also run on push to non-main branches so dry-run executes from the PR
  # branch's own workflow file (pull_request events use the BASE branch's
  # workflow file, which means a brand-new render-video.yml only validates
  # against main *after* merge). Push lets us validate on the PR branch.
  push:
    branches-ignore:
      - main
    paths:
      - '.github/workflows/render-video.yml'
      - 'tools/media-room/**'
      - 'apps/video-studio/**'
      - 'apps/video-cron/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # factory-core-api base URL for the read-layer artifact ingest (P1.7). When
  # empty, the artifact ingest step is skipped — the render still succeeds.
  # Set this to the branded factory-core-api domain once the worker is
  # deployed and registered in docs/service-registry.yml. Do NOT use a
  # *.workers.dev URL in committed code (CLAUDE.md Hard Constraints).
  FACTORY_CORE_API_URL: ''

permissions:
  contents: read

concurrency:
  # Real renders parallel-safe by job_id; PR/branch dry-runs serialised per ref.
  group: render-video-${{ github.event_name == 'workflow_dispatch' && inputs.job_id || github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # dry-run — runs on every PR. No external API calls.
  # ---------------------------------------------------------------------------
  dry-run:
    if: github.event_name == 'pull_request' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Dry-run pipeline (fixtures)
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Validate workflow inputs shape (dispatch contract)
        env:
          JOB_ID: ${{ inputs.job_id || 'dryrun-job' }}
          COMPOSITION_ID: ${{ inputs.composition_id || 'MarketingVideo' }}
          APP_ID: ${{ inputs.app_id || 'prime_self' }}
          TOPIC: ${{ inputs.topic || 'Your Free Energy Blueprint' }}
          BRIEF_KEY: ${{ inputs.brief_key || '' }}
          BRAND_COLOR: ${{ inputs.brand_color || '#6366f1' }}
          BRAND_ACCENT: ${{ inputs.brand_accent || '#a5b4fc' }}
          LOGO_URL: ${{ inputs.logo_url || '' }}
        run: |
          set -euo pipefail
          echo "job_id=$JOB_ID"
          echo "composition_id=$COMPOSITION_ID"
          echo "app_id=$APP_ID"
          echo "topic=$TOPIC"
          echo "brief_key=$BRIEF_KEY"
          echo "brand_color=$BRAND_COLOR"
          echo "brand_accent=$BRAND_ACCENT"
          echo "logo_url=$LOGO_URL"
          case "$COMPOSITION_ID" in
            MarketingVideo|TrainingVideo|WalkthroughVideo|EnergyBlueprintVideo) ;;
            *) echo "::error::Unknown composition_id: $COMPOSITION_ID"; exit 1 ;;
          esac

      - name: Validate publish-to-capricast.mjs is parseable
        run: node --check apps/video-studio/scripts/publish-to-capricast.mjs

      - name: Validate generate-script.mjs is parseable
        run: node --check apps/video-studio/scripts/generate-script.mjs

      - name: Validate post-render-artifacts.mjs is parseable
        run: node --check apps/video-studio/scripts/post-render-artifacts.mjs

      - name: Validate render.ts entry exists
        run: |
          set -euo pipefail
          test -f apps/video-studio/src/render.ts
          test -f apps/video-studio/src/Root.tsx

      - name: Validate Media Room Prime Self tutorial readiness
        run: |
          set -euo pipefail
          node tools/media-room/src/cli.js validate-briefs \
            --brief-dir apps/video-studio/content-briefs/prime-self \
            --brief-key homepage-welcome \
            --brief-key daily-transits-guide \
            --brief-key blueprint-reading-guide \
            --brief-key energy-type-overview \
            --strict

      - name: Install jq
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jq

      - name: Load fixtures and emit step outputs
        id: fixtures
        env:
          JOB_ID: ${{ inputs.job_id || 'dryrun-job' }}
          TOPIC: ${{ inputs.topic || 'Your Free Energy Blueprint' }}
        run: |
          set -euo pipefail
          SCRIPT_FX="apps/video-studio/scripts/fixtures/dry-run-script.json"
          STREAM_FX="apps/video-studio/scripts/fixtures/dry-run-stream.json"
          test -f "$SCRIPT_FX"
          test -f "$STREAM_FX"
          HEADLINE=$(jq -r '.headline' "$SCRIPT_FX")
          NARRATION=$(jq -r '.narration' "$SCRIPT_FX")
          STREAM_UID=$(jq -r '.result.uid' "$STREAM_FX")
          STREAM_STATE=$(jq -r '.result.status.state' "$STREAM_FX")
          [ "$STREAM_STATE" = "ready" ] || { echo "fixture stream not ready"; exit 1; }
          echo "headline=$HEADLINE"
          echo "narration_len=${#NARRATION}"
          echo "stream_uid=$STREAM_UID"
          # Synthesise the URLs the real pipeline would compute
          NARRATION_URL="https://dryrun.example.com/narrations/${JOB_ID}.mp3"
          VIDEO_URL="https://dryrun.example.com/videos/${JOB_ID}.mp4"
          THUMB_URL="https://customer-dryrun.cloudflarestream.com/${STREAM_UID}/thumbnails/thumbnail.jpg"
          {
            echo "headline=$HEADLINE"
            echo "stream_uid=$STREAM_UID"
            echo "narration_url=$NARRATION_URL"
            echo "video_url=$VIDEO_URL"
            echo "thumbnail_url=$THUMB_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Write Capricast stub server
        run: |
          cat > /tmp/capricast-stub.cjs <<'EOF'
          const http = require('http');
          const { spawn } = require('child_process');
          const srv = http.createServer((req, res) => {
            if (req.method === 'POST' && req.url === '/api/admin/videos/import') {
              let body = '';
              req.on('data', (c) => { body += c; });
              req.on('end', () => {
                try {
                  const json = JSON.parse(body);
                  if (!json.streamUid || !json.title || !json.creatorId || typeof json.durationSeconds !== 'number') {
                    res.writeHead(400, { 'Content-Type': 'application/json' });
                    res.end(JSON.stringify({ error: 'BadRequest', got: Object.keys(json) }));
                    return;
                  }
                  res.writeHead(201, { 'Content-Type': 'application/json' });
                  res.end(JSON.stringify({ id: 'dryrun-video-1', url: 'https://capricast.example.com/v/dryrun-video-1' }));
                } catch {
                  res.writeHead(400, { 'Content-Type': 'application/json' });
                  res.end(JSON.stringify({ error: 'InvalidJSON' }));
                }
              });
            } else {
              res.writeHead(404); res.end();
            }
          });
          srv.listen(8787, '127.0.0.1', () => {
            console.error('dry-run capricast stub listening on :8787');
            // Spawn publish-to-capricast.mjs as a child of the stub so the
            // server is guaranteed to be ready before the publish runs.
            const child = spawn(process.execPath, [process.argv[2]], {
              env: process.env,
              stdio: 'inherit',
            });
            child.on('exit', (code) => {
              console.error('publish-to-capricast exited with code', code);
              srv.close(() => process.exit(code || 0));
            });
          });
          EOF

      - name: Dry-run publish-to-capricast.mjs against a local stub server
        env:
          STREAM_UID: ${{ steps.fixtures.outputs.stream_uid }}
          HEADLINE: ${{ steps.fixtures.outputs.headline }}
          THUMBNAIL_URL: ${{ steps.fixtures.outputs.thumbnail_url }}
        run: |
          set -euo pipefail
          export CAPRICAST_API_URL="http://127.0.0.1:8787"
          export CAPRICAST_PUBLISH_TOKEN="dryrun-token"
          export CAPRICAST_CREATOR_ID="dryrun-creator"
          export TITLE="$HEADLINE"
          export DESCRIPTION="$HEADLINE"
          export DURATION_SECONDS="15"
          export TRANSCRIPT="dryrun transcript"
          export TRANSCRIPT_LANGUAGE="en"
          node /tmp/capricast-stub.cjs apps/video-studio/scripts/publish-to-capricast.mjs

      - name: Dry-run summary
        env:
          STREAM_UID: ${{ steps.fixtures.outputs.stream_uid }}
          NARRATION_URL: ${{ steps.fixtures.outputs.narration_url }}
          VIDEO_URL: ${{ steps.fixtures.outputs.video_url }}
        run: |
          echo "dry-run OK — stream_uid=$STREAM_UID narration=$NARRATION_URL video=$VIDEO_URL"

  # ---------------------------------------------------------------------------
  # render — real pipeline. Only triggered by the cron worker (workflow_dispatch).
  # ---------------------------------------------------------------------------
  render:
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    name: Render and publish video
    environment: production
    permissions:
      contents: read
      # Required so the artifact-ingest step can request a GitHub OIDC token
      # and exchange it at factory-core-api /v1/auth/token for a scoped JWT
      # (aud: artifacts-video). Mirrors _app-constraints-gate.yml.
      id-token: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          skip-token-revoke: true

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          # `cache: 'npm'` removed — actions/setup-node looks for
          # package-lock.json at the repo root, but Factory uses per-app
          # lockfiles (apps/video-cron/package-lock.json,
          # apps/video-studio/package-lock.json). The cache miss isn't
          # worth the workflow-level breakage; render runs are infrequent
          # enough that cold installs are acceptable.

      - name: Install system dependencies (ffmpeg + jq)
        # awscli removed from this apt install — Ubuntu 24.04 (ubuntu-latest)
        # has retired the awscli package. AWS CLI v2 is pre-installed at
        # /usr/local/bin/aws on GitHub-hosted runners (verified by `aws
        # --version`). Pipeline uses `aws s3 cp --endpoint-url=...` to push
        # to R2 (S3-compatible).
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg jq
          ffmpeg -version | head -1
          aws --version

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Fetch secrets from GCP Secret Manager
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env ANTHROPIC_API_KEY               ANTHROPIC_API_KEY anthropic-api-key
          fetch_to_env GROQ_API_KEY                    GROQ_API_KEY groq-api-key
          fetch_to_env ELEVENLABS_API_KEY              ELEVENLABS_API_KEY elevenlabs-api-key
          fetch_to_env ELEVENLABS_VOICE_PRIME_SELF     ELEVENLABS_VOICE_PRIME_SELF elevenlabs-voice-prime-self
          fetch_to_env ELEVENLABS_VOICE_CYPHER         ELEVENLABS_VOICE_CYPHER elevenlabs-voice-cypher
          fetch_to_env ELEVENLABS_VOICE_DEFAULT        ELEVENLABS_VOICE_DEFAULT elevenlabs-voice-default
          fetch_to_env CF_ACCOUNT_ID                   CF_ACCOUNT_ID CLOUDFLARE_ACCOUNT_ID
          # CF_API_TOKEN (general scope) is needed for the AI Gateway preflight;
          # CF_STREAM_TOKEN below is Stream-scoped and can't read AI Gateway.
          fetch_to_env CF_API_TOKEN                    CF_API_TOKEN CLOUDFLARE_API_TOKEN cloudflare-api-token
          fetch_to_env CF_STREAM_TOKEN                 CF_STREAM_TOKEN cf-stream-token
          fetch_to_env CF_STREAM_CUSTOMER_DOMAIN       CF_STREAM_CUSTOMER_DOMAIN cf-stream-customer-domain
          fetch_to_env R2_ACCESS_KEY_ID                R2_ACCESS_KEY_ID r2-access-key-id
          fetch_to_env R2_SECRET_ACCESS_KEY            R2_SECRET_ACCESS_KEY r2-secret-access-key
          fetch_to_env R2_BUCKET_NAME                  R2_BUCKET_NAME r2-bucket-name
          fetch_to_env R2_PUBLIC_DOMAIN                R2_PUBLIC_DOMAIN r2-public-domain
          fetch_to_env SCHEDULE_WORKER_URL             SCHEDULE_WORKER_URL schedule-worker-url
          fetch_to_env WORKER_API_TOKEN                WORKER_API_TOKEN worker-api-token
          fetch_to_env CAPRICAST_PUBLISH_TOKEN         CAPRICAST_PUBLISH_TOKEN capricast-publish-token
          # Dedicated headless service credential (partner-publish step 3); the
          # publish script prefers it over the legacy CAPRICAST_PUBLISH_TOKEN.
          fetch_to_env RENDER_SERVICE_TOKEN            RENDER_SERVICE_TOKEN render-service-token || true
          fetch_to_env CAPRICAST_SYSTEM_CREATOR_ID     CAPRICAST_SYSTEM_CREATOR_ID capricast-system-creator-id
          # YouTube upload (optional — pipeline continues if not configured)
          fetch_to_env YOUTUBE_CLIENT_ID               YOUTUBE_CLIENT_ID youtube-client-id || true
          fetch_to_env YOUTUBE_CLIENT_SECRET           YOUTUBE_CLIENT_SECRET youtube-client-secret || true
          fetch_to_env YOUTUBE_REFRESH_TOKEN           YOUTUBE_REFRESH_TOKEN youtube-refresh-token || true
          # AI_GATEWAY_URL is the canonical GCP secret name (no _BASE_ infix).
          # `@latimer-woods-tech/llm@0.3.0+` requires the env var
          # AI_GATEWAY_BASE_URL (note the _BASE_) — fetch_to_env's first arg
          # is the local env var name, subsequent args are GCP secret aliases.
          fetch_to_env AI_GATEWAY_BASE_URL             AI_GATEWAY_URL AI_GATEWAY_BASE_URL ai-gateway-base-url ai-gateway-url

      - name: Verify AI Gateway exists (preflight)
        # The video pipeline generates headline/script via @latimer-woods-tech/llm
        # through this gateway. A ghost gateway 401s every call → silent fallback;
        # fail loud before spending a full render.
        run: |
          set -euo pipefail
          export CLOUDFLARE_API_TOKEN="$CF_API_TOKEN"
          export CLOUDFLARE_ACCOUNT_ID="$CF_ACCOUNT_ID"
          node scripts/verify-ai-gateway.mjs --url "$AI_GATEWAY_BASE_URL"

      - name: Build local package dependencies
        # `llm` added: apps/video-studio/scripts/generate-script.mjs imports
        # `@latimer-woods-tech/llm`. The package's npm install resolves to the
        # workspace dir but the `dist/index.mjs` isn't generated until
        # `npm run build` runs there. Without this step the import fails with
        # ERR_MODULE_NOT_FOUND on dist/index.mjs. Per CLAUDE.md package order
        # (#8), llm's deps are errors + logger, both already in the loop.
        #
        # `bodygraph` added: packages/video-studio now depends on
        # @latimer-woods-tech/bodygraph (the canonical body-graph engine) via
        # file:../bodygraph. apps/video-studio resolves video-studio's deps
        # transitively, so the engine's dist/ must exist before the install
        # below. bodygraph has zero deps, so it builds first.
        # `video-studio` added last: apps/video-studio imports
        # @latimer-woods-tech/video-studio (file:../../packages/video-studio),
        # whose exports point at dist/ — without building it here the Remotion
        # render dies with "Package path . is not exported … no valid target
        # file" (first live cadence dispatch, run 27389394134). It depends on
        # bodygraph, which builds first.
        run: |
          set -euo pipefail
          for package in bodygraph errors monitoring logger neon llm video schedule video-studio; do
            echo "=== ${package} ==="
            cd "packages/${package}"
            npm ci --ignore-scripts
            npm run build
            cd ../..
          done

      - name: Install video-studio dependencies
        working-directory: apps/video-studio
        run: npm install

      - name: Resolve ElevenLabs voice id
        id: voice
        env:
          APP_ID: ${{ inputs.app_id }}
        run: |
          set -euo pipefail
          case "$APP_ID" in
            prime_self) VOICE_ID="$ELEVENLABS_VOICE_PRIME_SELF" ;;
            cypher)     VOICE_ID="$ELEVENLABS_VOICE_CYPHER" ;;
            *)          VOICE_ID="$ELEVENLABS_VOICE_DEFAULT" ;;
          esac
          if [ -z "${VOICE_ID:-}" ]; then
            echo "::error::No ElevenLabs voice id resolved for app_id=$APP_ID"
            exit 1
          fi
          echo "::add-mask::$VOICE_ID"
          echo "voice_id=$VOICE_ID" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Step 2.5 — Load optional JSON content brief
      # -----------------------------------------------------------------------
      - name: Resolve content brief
        id: brief
        env:
          APP_ID: ${{ inputs.app_id }}
          INPUT_TOPIC: ${{ inputs.topic }}
          INPUT_BRIEF_KEY: ${{ inputs.brief_key }}
          INPUT_BRAND_COLOR: ${{ inputs.brand_color }}
          INPUT_BRAND_ACCENT: ${{ inputs.brand_accent }}
        run: |
          set -euo pipefail

          brief_dir="apps/video-studio/content-briefs/${APP_ID//_/-}"
          brief_json=''
          topic="$INPUT_TOPIC"
          brand_color="$INPUT_BRAND_COLOR"
          brand_accent="$INPUT_BRAND_ACCENT"
          learning_goal=''
          tone_notes=''
          script_override=''
          key_points='[]'
          forbidden_claims='[]'
          screenshot_urls='[]'
          steps='[]'
          visual_beats='[]'
          duration_seconds=''

          if [ -n "$INPUT_BRIEF_KEY" ]; then
            brief_json="$brief_dir/$INPUT_BRIEF_KEY.json"
            if [ ! -f "$brief_json" ]; then
              echo "::error::Content brief not found: $brief_json"
              exit 1
            fi

            topic="$(jq -r '.topic // empty' "$brief_json")"
            brand_color="$(jq -r '.brandColor // empty' "$brief_json")"
            brand_accent="$(jq -r '.brandAccent // empty' "$brief_json")"
            learning_goal="$(jq -r '.learningGoal // empty' "$brief_json")"
            tone_notes="$(jq -r '.toneNotes // empty' "$brief_json")"
            script_override="$(jq -r '.script // empty' "$brief_json")"
            key_points="$(jq -c '.keyPoints // []' "$brief_json")"
            forbidden_claims="$(jq -c '.forbiddenClaims // []' "$brief_json")"
            screenshot_urls="$(jq -c '.screenshotUrls // []' "$brief_json")"
            steps="$(jq -c '.renderPlan.steps // .steps // []' "$brief_json")"
            visual_beats="$(jq -c '.renderPlan.visualBeats // .visualBeats // []' "$brief_json")"
            duration_seconds="$(jq -r '.renderPlan.durationSeconds // .durationSeconds // .duration_seconds // empty' "$brief_json")"
          fi

          if [ -z "$topic" ]; then
            echo '::error::Resolved topic is empty after content brief resolution'
            exit 1
          fi

          {
            echo "topic=$topic"
            echo "brand_color=$brand_color"
            echo "brand_accent=$brand_accent"
            echo "learning_goal=$learning_goal"
            echo "tone_notes=$tone_notes"
            echo "script_override<<EOF"
            echo "$script_override"
            echo "EOF"
            echo "key_points=$key_points"
            echo "forbidden_claims=$forbidden_claims"
            echo "screenshot_urls=$screenshot_urls"
            echo "steps=$steps"
            echo "visual_beats=$visual_beats"
            echo "duration_seconds=$duration_seconds"
          } >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Step 3 — Generate LLM script (headline + narration)
      # -----------------------------------------------------------------------
      - name: Generate LLM script
        id: script
        env:
          COMPOSITION_TYPE: ${{ inputs.composition_id }}
          RESOLVED_TOPIC: ${{ steps.brief.outputs.topic }}
          # SYSTEM_CONTEXT is loaded from the per-app brief directory.
          APP_ID: ${{ inputs.app_id }}
          BRIEF_LEARNING_GOAL: ${{ steps.brief.outputs.learning_goal }}
          BRIEF_KEY_POINTS: ${{ steps.brief.outputs.key_points }}
          BRIEF_FORBIDDEN_CLAIMS: ${{ steps.brief.outputs.forbidden_claims }}
          BRIEF_TONE_NOTES: ${{ steps.brief.outputs.tone_notes }}
          STATIC_SCRIPT_OVERRIDE: ${{ steps.brief.outputs.script_override }}
          BRIEF_STEPS: ${{ steps.brief.outputs.steps }}
        run: |
          set -euo pipefail
          BRIEF_DIR="apps/video-studio/content-briefs/${APP_ID//_/-}"
          if [ -f "$BRIEF_DIR/SYSTEM_CONTEXT.md" ]; then
            SYSTEM_CONTEXT="$(cat "$BRIEF_DIR/SYSTEM_CONTEXT.md")"
          else
            SYSTEM_CONTEXT="You are generating narration for a Factory application video."
          fi
          export SYSTEM_CONTEXT

          if [ "$BRIEF_KEY_POINTS" = '[]' ]; then
            export KEY_POINTS_BLOCK=""
          else
            export KEY_POINTS_BLOCK="$(echo "$BRIEF_KEY_POINTS" | jq -r '.[]' | sed 's/^/- /')"
          fi

          if [ "$BRIEF_FORBIDDEN_CLAIMS" = '[]' ]; then
            export FORBIDDEN_BLOCK=""
          else
            export FORBIDDEN_BLOCK="$(echo "$BRIEF_FORBIDDEN_CLAIMS" | jq -r '.[]' | sed 's/^/- /')"
          fi

          export TONE_BLOCK="$BRIEF_TONE_NOTES"
          export BRIEF_LEARNING_GOAL
          export BRIEF_KEY_POINTS

          if [ -n "$STATIC_SCRIPT_OVERRIDE" ]; then
            {
              echo "headline<<EOF"
              echo "$RESOLVED_TOPIC"
              echo "EOF"
              echo "script<<EOF"
              echo "$STATIC_SCRIPT_OVERRIDE"
              echo "EOF"
              echo "narration<<EOF"
              echo "$STATIC_SCRIPT_OVERRIDE"
              echo "EOF"
              echo "steps<<EOF"
              echo "$BRIEF_STEPS"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node apps/video-studio/scripts/generate-script.mjs

      # -----------------------------------------------------------------------
      # Step 4 — Generate ElevenLabs narration MP3
      # -----------------------------------------------------------------------
      - name: Generate ElevenLabs narration
        id: narration
        env:
          NARRATION_TEXT: ${{ steps.script.outputs.narration }}
          VOICE_ID: ${{ steps.voice.outputs.voice_id }}
        run: |
          set -euo pipefail
          if [ -z "$NARRATION_TEXT" ]; then
            echo "::error::generate-script produced no narration"
            exit 1
          fi
          # Build the request body via jq so newlines/quotes in the script are
          # JSON-encoded safely (no manual escaping in bash).
          jq -n --arg text "$NARRATION_TEXT" '{
            text: $text,
            model_id: "eleven_multilingual_v2",
            voice_settings: { stability: 0.5, similarity_boost: 0.75 }
          }' > /tmp/eleven-body.json

          HTTP_CODE=$(curl -sS -w '%{http_code}' -o /tmp/narration.mp3 \
            -X POST "https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}" \
            -H "xi-api-key: ${ELEVENLABS_API_KEY}" \
            -H 'accept: audio/mpeg' \
            -H 'content-type: application/json' \
            --data @/tmp/eleven-body.json)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::ElevenLabs returned HTTP $HTTP_CODE"
            # body was written to /tmp/narration.mp3 — may be JSON error, may be binary
            head -c 400 /tmp/narration.mp3 2>/dev/null | tr -d '\000' || true
            exit 1
          fi
          ls -la /tmp/narration.mp3

      # -----------------------------------------------------------------------
      # Step 5 — Upload narration MP3 to R2
      # -----------------------------------------------------------------------
      - name: Upload narration to R2
        id: narration_upload
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: |
          set -euo pipefail
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION="auto"
          ENDPOINT="https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 cp /tmp/narration.mp3 \
            "s3://${R2_BUCKET_NAME}/narrations/${JOB_ID}.mp3" \
            --endpoint-url "$ENDPOINT" \
            --content-type audio/mpeg
          PUBLIC_URL="https://${R2_PUBLIC_DOMAIN}/narrations/${JOB_ID}.mp3"
          echo "narration_url=$PUBLIC_URL" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Step 6 — Render MP4 with Remotion
      # -----------------------------------------------------------------------
      - name: Render MP4
        id: render
        timeout-minutes: 75
        env:
          COMPOSITION_ID: ${{ inputs.composition_id }}
          APP_ID: ${{ inputs.app_id }}
          TOPIC: ${{ steps.brief.outputs.topic }}
          BRAND_COLOR: ${{ steps.brief.outputs.brand_color }}
          BRAND_ACCENT: ${{ steps.brief.outputs.brand_accent }}
          LOGO_URL: ${{ inputs.logo_url }}
          NARRATION_URL: ${{ steps.narration_upload.outputs.narration_url }}
          SCRIPT_TEXT: ${{ steps.script.outputs.narration }}
          SCREENSHOT_URLS_JSON: ${{ steps.brief.outputs.screenshot_urls }}
          STEPS_JSON: ${{ steps.script.outputs.steps || steps.brief.outputs.steps }}
          VISUAL_BEATS_JSON: ${{ steps.brief.outputs.visual_beats }}
          DURATION_SECONDS: ${{ steps.brief.outputs.duration_seconds }}
          FORGE_THEME:     ${{ inputs.forge_theme || 'self' }}
          HD_TYPE:         ${{ inputs.hd_type || '' }}
          SIGNATURE_GATES: ${{ inputs.signature_gates || '[]' }}
        run: |
          set -euo pipefail
          write_json_array() {
            local value="$1"
            local file="$2"
            if [ -z "$value" ]; then
              printf '[]' > "$file"
            else
              printf '%s' "$value" > "$file"
            fi
            jq -e 'type == "array"' "$file" >/dev/null
          }

          write_json_array "$SCREENSHOT_URLS_JSON" /tmp/screenshot-urls.json
          write_json_array "$STEPS_JSON" /tmp/render-steps.json
          write_json_array "$VISUAL_BEATS_JSON" /tmp/visual-beats.json

          SIGNATURE_GATES_JSON="$SIGNATURE_GATES"
          write_json_array "$SIGNATURE_GATES_JSON" /tmp/signature-gates.json

          if [ -n "$DURATION_SECONDS" ]; then
            jq -e -n --arg value "$DURATION_SECONDS" '$value | tonumber | . > 0' >/dev/null
          fi

          # Build props JSON with jq so multi-line scripts and brief JSON survive cleanly.
          PROPS=$(jq -n \
            --arg composition  "$COMPOSITION_ID" \
            --arg appId        "$APP_ID" \
            --arg topic        "$TOPIC" \
            --arg script       "$SCRIPT_TEXT" \
            --arg narrationUrl "$NARRATION_URL" \
            --arg brandColor   "$BRAND_COLOR" \
            --arg brandAccent  "$BRAND_ACCENT" \
            --arg logoUrl      "$LOGO_URL" \
            --slurpfile screenshotUrls /tmp/screenshot-urls.json \
            --slurpfile steps /tmp/render-steps.json \
            --slurpfile visualBeats /tmp/visual-beats.json \
            --arg durationSeconds "$DURATION_SECONDS" \
            --arg forgeTheme   "$FORGE_THEME" \
            --arg hdType       "$HD_TYPE" \
            --slurpfile signatureGates /tmp/signature-gates.json \
            'if $composition == "WalkthroughVideo"
             then {appId:$appId,topic:$topic,script:$script,narrationUrl:$narrationUrl,brandColor:$brandColor,brandAccent:$brandAccent,logoUrl:$logoUrl,screenshotUrls:$screenshotUrls[0]}
             elif $composition == "TrainingVideo"
             then {appId:$appId,topic:$topic,script:$script,narrationUrl:$narrationUrl,brandColor:$brandColor,brandAccent:$brandAccent,logoUrl:$logoUrl,steps:$steps[0],durationSeconds:($durationSeconds | if . == "" then 30 else tonumber end)}
             elif $composition == "MarketingVideo"
             then {appId:$appId,topic:$topic,script:$script,narrationUrl:$narrationUrl,brandColor:$brandColor,brandAccent:$brandAccent,logoUrl:$logoUrl,visualBeats:$visualBeats[0],durationSeconds:($durationSeconds | if . == "" then 15 else tonumber end)}
             elif $composition == "EnergyBlueprintVideo"
             then {
               appId:$appId,
               topic:$topic,
               script:$script,
               narrationUrl:$narrationUrl,
               brandColor:$brandColor,
               brandAccent:$brandAccent,
               logoUrl:$logoUrl,
               forgeTheme:$forgeTheme,
               hdType:(if $hdType == "" then null else $hdType end),
               signatureGates:$signatureGates[0]
             }
             else {appId:$appId,topic:$topic,script:$script,narrationUrl:$narrationUrl,brandColor:$brandColor,brandAccent:$brandAccent,logoUrl:$logoUrl}
             end')
          cd apps/video-studio
          node -r ts-node/register src/render.ts \
            --composition "$COMPOSITION_ID" \
            --props "$PROPS" \
            --output /tmp/output.mp4
          ls -la /tmp/output.mp4

      # -----------------------------------------------------------------------
      # Step 7 — ffmpeg re-encode for max Stream + browser compatibility
      # -----------------------------------------------------------------------
      - name: ffmpeg re-encode (H.264 baseline + AAC)
        run: |
          set -euo pipefail
          ffmpeg -y -i /tmp/output.mp4 \
            -c:v libx264 -profile:v baseline -level 3.0 -pix_fmt yuv420p \
            -c:a aac -b:a 128k \
            /tmp/output-final.mp4
          ls -la /tmp/output-final.mp4

      # -----------------------------------------------------------------------
      # Step 8 — Upload MP4 to R2
      # -----------------------------------------------------------------------
      - name: Upload MP4 to R2
        id: video_upload
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: |
          set -euo pipefail
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION="auto"
          ENDPOINT="https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 cp /tmp/output-final.mp4 \
            "s3://${R2_BUCKET_NAME}/videos/${JOB_ID}.mp4" \
            --endpoint-url "$ENDPOINT" \
            --content-type video/mp4
          PUBLIC_URL="https://${R2_PUBLIC_DOMAIN}/videos/${JOB_ID}.mp4"
          echo "video_url=$PUBLIC_URL" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Step 9 — Register with Cloudflare Stream + poll until ready
      # -----------------------------------------------------------------------
      - name: Register with Cloudflare Stream and poll
        id: stream
        env:
          VIDEO_URL: ${{ steps.video_upload.outputs.video_url }}
          TOPIC: ${{ steps.brief.outputs.topic }}
          APP_ID: ${{ inputs.app_id }}
        run: |
          set -euo pipefail
          REQ=$(jq -n --arg url "$VIDEO_URL" --arg name "$TOPIC" --arg appId "$APP_ID" \
            '{url:$url, meta:{name:$name, appId:$appId}}')
          RESP=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/stream/copy" \
            -H "Authorization: Bearer ${CF_STREAM_TOKEN}" \
            -H 'Content-Type: application/json' \
            --data "$REQ")
          # NOTE: `UID` is a bash readonly variable (the running user's uid).
          # Assigning to it fails with "UID: readonly variable". Use a renamed
          # local instead. STREAM_UID matches the dry-run job's naming + the
          # step's output key.
          STREAM_UID=$(echo "$RESP" | jq -r '.result.uid // empty')
          if [ -z "$STREAM_UID" ]; then
            echo "::error::Cloudflare Stream copy did not return uid: $RESP"
            exit 1
          fi
          echo "Stream uid: $STREAM_UID"
          # Poll for ready (max 10 min, 10s interval).
          for i in $(seq 1 60); do
            STATE=$(curl -sS \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/stream/${STREAM_UID}" \
              -H "Authorization: Bearer ${CF_STREAM_TOKEN}" \
              | jq -r '.result.status.state // "unknown"')
            echo "[$i/60] stream state: $STATE"
            if [ "$STATE" = "ready" ]; then
              break
            fi
            if [ "$STATE" = "error" ]; then
              echo "::error::Stream encoding failed"
              exit 1
            fi
            sleep 10
          done
          if [ "$STATE" != "ready" ]; then
            echo "::error::Stream did not reach ready within 10 minutes (last state: $STATE)"
            exit 1
          fi
          DURATION=$(curl -sS \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/stream/${STREAM_UID}" \
            -H "Authorization: Bearer ${CF_STREAM_TOKEN}" \
            | jq -r '.result.duration // 0')
          THUMB_URL="https://customer-${CF_STREAM_CUSTOMER_DOMAIN}.cloudflarestream.com/${STREAM_UID}/thumbnails/thumbnail.jpg"
          {
            echo "stream_uid=$STREAM_UID"
            echo "duration_seconds=$DURATION"
            echo "thumbnail_url=$THUMB_URL"
          } >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Step 11 — Publish to Capricast
      # -----------------------------------------------------------------------
      - name: Publish to Capricast
        id: capricast
        env:
          STREAM_UID: ${{ steps.stream.outputs.stream_uid }}
          DURATION_SECONDS: ${{ steps.stream.outputs.duration_seconds }}
          THUMBNAIL_URL: ${{ steps.stream.outputs.thumbnail_url }}
          TITLE: ${{ steps.script.outputs.headline }}
          DESCRIPTION: ${{ steps.brief.outputs.topic }}
          TRANSCRIPT: ${{ steps.script.outputs.narration }}
          TRANSCRIPT_LANGUAGE: 'en'
          CAPRICAST_API_URL: 'https://api.capricast.com'
        run: |
          set -euo pipefail
          # CAPRICAST_PUBLISH_TOKEN + CAPRICAST_SYSTEM_CREATOR_ID were loaded
          # into the environment by the "Fetch secrets" step. The publish
          # script reads CAPRICAST_CREATOR_ID — alias it here so the
          # workflow lints cleanly without referencing the env context.
          export CAPRICAST_CREATOR_ID="$CAPRICAST_SYSTEM_CREATOR_ID"
          node apps/video-studio/scripts/publish-to-capricast.mjs

      # -----------------------------------------------------------------------
      # Step 11b — Upload to YouTube (non-blocking; skipped if no credentials)
      # Uploads to YouTube AFTER Capricast to maintain Capricast as primary.
      # Requires: YOUTUBE_REFRESH_TOKEN, YOUTUBE_CLIENT_ID, YOUTUBE_CLIENT_SECRET
      # in GCP Secret Manager. Safe to skip — missing secrets result in a warning.
      # -----------------------------------------------------------------------
      - name: Upload to YouTube
        id: youtube
        continue-on-error: true
        env:
          STREAM_UID: ${{ steps.stream.outputs.stream_uid }}
          VIDEO_URL: ${{ steps.video_upload.outputs.video_url }}
          TOPIC: ${{ steps.brief.outputs.topic }}
          NARRATION: ${{ steps.script.outputs.narration }}
          KEY_POINTS: ${{ steps.brief.outputs.key_points }}
          APP_ID: ${{ inputs.app_id }}
          BRIEF_KEY: ${{ inputs.brief_key }}
        run: |
          set -euo pipefail
          # Skip if credentials are not configured
          if [ -z "${YOUTUBE_REFRESH_TOKEN:-}" ] || [ -z "${YOUTUBE_CLIENT_ID:-}" ]; then
            echo "::notice::YouTube credentials not configured — skipping YouTube upload"
            echo "youtube_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Build description from key points
          DESCRIPTION="${NARRATION:-$TOPIC}"$'\n\n'
          if [ -n "${KEY_POINTS:-}" ]; then
            DESCRIPTION+=$(echo "$KEY_POINTS" | jq -r '.[] | "• \(.)"' 2>/dev/null || true)$'\n\n'
          fi
          DESCRIPTION+="Learn more at https://selfprime.net"
          # Download from R2 then upload to YouTube
          curl -sL "$VIDEO_URL" -o /tmp/yt_upload.mp4
          RESULT=$(node scripts/youtube-upload.mjs \
            --file /tmp/yt_upload.mp4 \
            --title "$TOPIC" \
            --description "$DESCRIPTION" \
            --tags "prime self,human design,energy blueprint,$APP_ID" \
            --category "27")
          YOUTUBE_URL=$(echo "$RESULT" | jq -r '.url // empty')
          echo "youtube_url=$YOUTUBE_URL" >> "$GITHUB_OUTPUT"
          echo "::notice::YouTube upload complete: $YOUTUBE_URL"

      # -----------------------------------------------------------------------
      # Step 11c — Record artifacts in the Factory admin read-layer (P1.7).
      # Runs only after the render + upload + Capricast publish all succeeded,
      # so a factory_artifacts row only ever describes a video that exists.
      # Best-effort: continue-on-error keeps a read-layer hiccup from failing
      # the render; the script also always exits 0 and surfaces any non-2xx.
      # Skipped entirely when FACTORY_CORE_API_URL is unset.
      # -----------------------------------------------------------------------
      - name: Record artifacts in factory-core-api
        id: artifacts
        continue-on-error: true
        env:
          # ACTIONS_ID_TOKEN_REQUEST_TOKEN / _URL are injected automatically by
          # GitHub because this job declares `id-token: write`.
          JOB_ID: ${{ inputs.job_id }}
          APP_ID: ${{ inputs.app_id }}
          STREAM_UID: ${{ steps.stream.outputs.stream_uid }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VIDEO_URL: ${{ steps.video_upload.outputs.video_url }}
          NARRATION_URL: ${{ steps.narration_upload.outputs.narration_url }}
          THUMBNAIL_URL: ${{ steps.stream.outputs.thumbnail_url }}
          TRANSCRIPT: ${{ steps.script.outputs.narration }}
          DURATION_SECONDS: ${{ steps.stream.outputs.duration_seconds }}
        run: node apps/video-studio/scripts/post-render-artifacts.mjs

      # -----------------------------------------------------------------------
      # Step 12 — PATCH schedule-worker → status=done
      # -----------------------------------------------------------------------
      - name: Mark schedule-worker job done
        env:
          JOB_ID: ${{ inputs.job_id }}
          STREAM_UID: ${{ steps.stream.outputs.stream_uid }}
          CAPRICAST_URL: ${{ steps.capricast.outputs.capricastUrl }}
        run: |
          set -euo pipefail
          BODY=$(jq -n \
            --arg streamUid "$STREAM_UID" \
            --arg videoUrl  "$CAPRICAST_URL" \
            '{status:"done", streamUid:$streamUid, videoUrl:$videoUrl}')
          HTTP_CODE=$(curl -sS -o /tmp/patch-resp.txt -w '%{http_code}' \
            -X PATCH "${SCHEDULE_WORKER_URL}/jobs/${JOB_ID}" \
            -H "Authorization: Bearer ${WORKER_API_TOKEN}" \
            -H 'Content-Type: application/json' \
            --data "$BODY")
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "::error::schedule-worker PATCH returned HTTP $HTTP_CODE"
            head -c 400 /tmp/patch-resp.txt || true
            exit 1
          fi
          echo "✅ schedule-worker job $JOB_ID marked done"

      # -----------------------------------------------------------------------
      # On any failure, PATCH the job to status=failed so it stops blocking the cron.
      # -----------------------------------------------------------------------
      - name: Mark schedule-worker job failed (on-failure handler)
        if: failure()
        env:
          JOB_ID: ${{ inputs.job_id }}
          FAILED_STEP: ${{ github.action }}
        run: |
          set -euo pipefail
          if [ -z "${SCHEDULE_WORKER_URL:-}" ] || [ -z "${WORKER_API_TOKEN:-}" ]; then
            echo "::warning::Secrets not loaded — cannot PATCH schedule-worker"
            exit 0
          fi
          REASON="render-video.yml failed in step: ${FAILED_STEP:-unknown}"
          BODY=$(jq -n --arg error "$REASON" '{status:"failed", script:$error}')
          curl -sS -X PATCH "${SCHEDULE_WORKER_URL}/jobs/${JOB_ID}" \
            -H "Authorization: Bearer ${WORKER_API_TOKEN}" \
            -H 'Content-Type: application/json' \
            --data "$BODY" || true
          echo "schedule-worker job $JOB_ID marked failed"
