name: Setup project status options

on:
  workflow_dispatch:

# TM — Manual only. Run once to bootstrap RFC-006 lifecycle Status options
# on the GitHub Projects v2 board. Idempotent — safe to re-run.

concurrency:
  group: setup-project-status-options
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Mint Factory App token
        id: app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: Factory

      - name: Set up Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Add missing Status options to project board
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: node .github/scripts/setup-project-status-options.mjs
