name: PR Advisory Sweep

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:         # manual trigger

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run advisory sweep
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/pr-advisory-sweep.mjs
