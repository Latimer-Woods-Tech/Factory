name: Supervisor Loop

on:
  schedule:
    - cron: '0 */4 * * *'
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Specific issue number to process (optional)'
        required: false
        type: string

concurrency:
  group: supervisor-loop-${{ github.event_name }}-${{ github.event.issue.number || inputs.issue_number || 'scheduled' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  supervise:
    if: |
      github.event_name != 'issues' ||
      (
        github.event.action == 'labeled' &&
        startsWith(github.event.label.name, 'agent:') &&
        !endsWith(github.event.sender.login, '[bot]')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Debounce rapid label bursts
        run: sleep 5

      - name: Log trigger context
        env:
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number || '' }}
          ISSUE_LABEL: ${{ github.event.label.name || '' }}
        run: |
          echo "Event: $EVENT_NAME"
          echo "Issue: $ISSUE_NUMBER"
          echo "Label: $ISSUE_LABEL"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - name: Run supervisor core
        run: node .github/scripts/supervisor-core.mjs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5-20251001
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          TRIGGER_ISSUE: ${{ github.event.issue.number || inputs.issue_number || '' }}
