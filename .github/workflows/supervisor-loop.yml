name: Supervisor Loop

on:
  schedule:
    - cron: '0 */4 * * *'
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Specific issue number to process (optional)'
        required: false
        type: string

concurrency:
  group: supervisor-loop-${{ github.event_name }}-${{ github.event.issue.number || inputs.issue_number || 'scheduled' }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  supervise:
    if: |
      github.event_name != 'issues' ||
      (
        github.event.action == 'labeled' &&
        startsWith(github.event.label.name, 'agent:')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Debounce rapid label bursts
        run: sleep 5

      - name: Log trigger context
        env:
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number || '' }}
          ISSUE_LABEL: ${{ github.event.label.name || '' }}
        run: |
          echo "Event: $EVENT_NAME"
          echo "Issue: $ISSUE_NUMBER"
          echo "Label: $ISSUE_LABEL"

      - uses: actions/checkout@v6
      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account_email: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
      - name: Get secrets from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets:
            - name: FACTORY_APP_ID
              id: factory_app_id
            - name: FACTORY_APP_PRIVATE_KEY
              id: factory_app_private_key
            - name: ANTHROPIC_API_KEY
              id: anthropic_key
            - name: PUSHOVER_TOKEN
              id: pushover_token
            - name: PUSHOVER_USER
              id: pushover_user
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ steps.secrets.outputs.factory_app_id }}
          private-key: ${{ steps.secrets.outputs.factory_app_private_key }}
          owner: Latimer-Woods-Tech
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Run supervisor core
        run: node .github/scripts/supervisor-core.mjs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ANTHROPIC_API_KEY: ${{ steps.secrets.outputs.anthropic_key }}
          ANTHROPIC_MODEL: claude-haiku-4-5-20251001
          PUSHOVER_TOKEN: ${{ steps.secrets.outputs.pushover_token }}
          PUSHOVER_USER: ${{ steps.secrets.outputs.pushover_user }}
          TRIGGER_ISSUE: ${{ github.event.issue.number || inputs.issue_number || '' }}
