name: Deploy Schedule Worker

on:
  push:
    branches: [main]
    paths:
      - 'apps/schedule-worker/**'
      - '.github/workflows/deploy-schedule-worker.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

concurrency:
  group: deploy-schedule-worker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: Deploy schedule-worker to Cloudflare
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account_email: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Get secrets from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets:
            - name: CF_API_TOKEN
              id: cf_token
            - name: CF_ACCOUNT_ID
              id: cf_account
            - name: HYPERDRIVE_FACTORY_CORE
              id: hyperdrive_id
            - name: WORKER_API_TOKEN
              id: worker_token

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build local package dependencies
        run: |
          set -euo pipefail
          for package in errors monitoring logger neon video schedule; do
            echo "=== ${package} ==="
            cd "packages/${package}"
            npm ci --ignore-scripts
            npm run build
            cd ../..
          done

      - name: Install dependencies
        run: |
          cd apps/schedule-worker
          npm install

      - name: Update wrangler.jsonc with Hyperdrive ID
        run: |
          cd apps/schedule-worker
          sed -i 's/REPLACE_WITH_HYPERDRIVE_ID/${{ steps.secrets.outputs.hyperdrive_id }}/g' wrangler.jsonc
          echo "✅ Updated wrangler.jsonc with Hyperdrive ID"
          cat wrangler.jsonc

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ steps.secrets.outputs.cf_token }}
          accountId: ${{ steps.secrets.outputs.cf_account }}
          workingDirectory: apps/schedule-worker
          command: deploy --env production
          secrets: |
            WORKER_API_TOKEN
          environment: production
        env:
          WORKER_API_TOKEN: ${{ steps.secrets.outputs.worker_token }}

      - name: Verify deployment
        run: |
          echo "🚀 Deployment complete"
          echo "📍 Health check: https://schedule-worker.adrper79.workers.dev/health"
          node scripts/verify-http-endpoint.mjs \
            --url https://schedule-worker.adrper79.workers.dev/health \
            --status 200 \
            --json-field status \
            --json-equals ok \
            --retries 8 \
            --delay-ms 5000
