name: smoke admin-studio

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Override BASE_URL
        required: false
        default: https://apunlimited.com
  schedule:
    # Every 2 hours. Quiet enough to not spam Sentry, busy enough to
    # surface deploy drift between releases.
    - cron: '17 */2 * * *'

concurrency:
  group: smoke-admin-studio
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install
        run: npm install --legacy-peer-deps
        working-directory: apps/prime-self-smoke

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
        working-directory: apps/prime-self-smoke

      - name: Probe
        id: probe
        env:
          # NOTE: FACTORY_USER / FACTORY_PW must be populated as repo or
          # org Actions secrets. Without them probe-factory-admin.mjs exits 2
          # at startup (RC-2 in the 2026-05-23 scheduled-workflow triage).
          BASE_URL: ${{ github.event.inputs.base_url || 'https://apunlimited.com' }}
          STUDIO_EMAIL: ${{ secrets.FACTORY_USER }}
          STUDIO_PASSWORD: ${{ secrets.FACTORY_PW }}
          STUDIO_ENV: production
          OUT_DIR: probe-output
        # Exit-code policy:
        #   0  healthy           → pass
        #   1  endpoint 4xx/5xx  → fail (real product regression)
        #   2  login UI/redirect → fail (real product regression)
        #   3  creds rejected (auth 401/403) → WARN, not fail. This is a
        #      test-infra problem: FACTORY_USER/FACTORY_PW have drifted from the
        #      worker's STUDIO_ADMIN creds. The auth surface is provably healthy
        #      (the worker correctly rejected the creds), so this must not page.
        run: |
          set +e
          node scripts/probe-factory-admin.mjs
          code=$?
          if [ "$code" -eq 3 ]; then
            echo "::warning title=admin-studio smoke::Probe creds rejected (auth 401/403). Auth surface is healthy; FACTORY_USER/FACTORY_PW are stale vs the worker's STUDIO_ADMIN creds. Deep tab-walk skipped — NOT a product regression. Realign creds (ideally a dedicated smoke account) to restore full coverage."
            exit 0
          fi
          exit "$code"
        working-directory: apps/prime-self-smoke

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: probe-output-${{ github.run_id }}
          # OUT_DIR=probe-output is created relative to the working-directory
          # of the Probe step (apps/prime-self-smoke). The historical "missing
          # dir" warning was downstream of the credentials check exiting 2
          # before probe-factory-admin.mjs ever created OUT_DIR — once secrets
          # are wired, this path resolves correctly.
          path: apps/prime-self-smoke/probe-output/
          retention-days: 14
