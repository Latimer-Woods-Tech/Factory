name: smoke admin-studio

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Override BASE_URL
        required: false
        default: https://apunlimited.com
  schedule:
    # Every 2 hours. Quiet enough to not spam Sentry, busy enough to
    # surface deploy drift between releases.
    - cron: '17 */2 * * *'

concurrency:
  group: smoke-admin-studio
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Fetch production smoke JWT secret
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env JWT_SECRET JWT_SECRET jwt-secret

      - name: Mint production smoke JWT
        run: |
          set -euo pipefail
          payload=$(node .github/scripts/mint-admin-studio-jwt.mjs --json)
          token=$(printf '%s' "$payload" | jq -r .token)
          expires_at=$(printf '%s' "$payload" | jq -r .expiresAt)
          if [ -z "$token" ] || [ "$token" = "null" ] || [ -z "$expires_at" ] || [ "$expires_at" = "null" ]; then
            echo "::error::Failed to mint production smoke JWT"
            exit 1
          fi
          echo "::add-mask::$token"
          echo "STUDIO_TOKEN=$token" >> "$GITHUB_ENV"
          echo "STUDIO_EXPIRES_AT=$expires_at" >> "$GITHUB_ENV"

      - name: Install
        run: npm install --legacy-peer-deps
        working-directory: apps/prime-self-smoke

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
        working-directory: apps/prime-self-smoke

      - name: Probe
        id: probe
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://apunlimited.com' }}
          STUDIO_ENV: production
          OUT_DIR: probe-output
        # Exit-code policy:
        #   0  healthy           → pass
        #   1  endpoint 4xx/5xx  → fail (real product regression)
        #   2  login UI/redirect → fail (real product regression)
        run: node scripts/probe-factory-admin.mjs
        working-directory: apps/prime-self-smoke

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: probe-output-${{ github.run_id }}
          # OUT_DIR=probe-output is created relative to the working-directory
          # of the Probe step (apps/prime-self-smoke). The historical "missing
          # dir" warning was downstream of the credentials check exiting 2
          # before probe-factory-admin.mjs ever created OUT_DIR — once secrets
          # are wired, this path resolves correctly.
          path: apps/prime-self-smoke/probe-output/
          retention-days: 14
