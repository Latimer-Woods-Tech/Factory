name: smoke admin-studio

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Override BASE_URL
        required: false
        default: https://apunlimited.com
  schedule:
    # Every 2 hours. Quiet enough to not spam Sentry, busy enough to
    # surface deploy drift between releases.
    - cron: '17 */2 * * *'

concurrency:
  group: smoke-admin-studio
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install
        run: npm install --legacy-peer-deps
        working-directory: apps/prime-self-smoke

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
        working-directory: apps/prime-self-smoke

      - name: Probe
        id: probe
        env:
          # NOTE: STUDIO_EMAIL / STUDIO_PASSWORD must be populated as repo or
          # org Actions secrets. Without them probe-factory-admin.mjs exits 2
          # at startup (RC-2 in the 2026-05-23 scheduled-workflow triage).
          BASE_URL: ${{ github.event.inputs.base_url || 'https://apunlimited.com' }}
          STUDIO_EMAIL: ${{ secrets.FACTORY_USER }}
          STUDIO_PASSWORD: ${{ secrets.FACTORY_PW }}
          STUDIO_ENV: production
          OUT_DIR: probe-output
        run: node scripts/probe-factory-admin.mjs
        working-directory: apps/prime-self-smoke

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: probe-output-${{ github.run_id }}
          # OUT_DIR=probe-output is created relative to the working-directory
          # of the Probe step (apps/prime-self-smoke). The historical "missing
          # dir" warning was downstream of the credentials check exiting 2
          # before probe-factory-admin.mjs ever created OUT_DIR — once secrets
          # are wired, this path resolves correctly.
          path: apps/prime-self-smoke/probe-output/
          retention-days: 14
