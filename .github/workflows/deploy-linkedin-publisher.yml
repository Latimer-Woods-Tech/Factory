name: Deploy LinkedIn Publisher

on:
  push:
    branches: [main]
    paths:
      - 'apps/linkedin-publisher/**'
      - '.github/workflows/deploy-linkedin-publisher.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

concurrency:
  group: deploy-linkedin-publisher-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Deploy linkedin-publisher to Cloudflare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build local package dependencies
        run: |
          set -euo pipefail
          for package in errors monitoring logger llm; do
            echo "=== ${package} ==="
            cd "packages/${package}"
            npm ci --ignore-scripts
            npm run build
            cd ../..
          done

      - name: Install dependencies
        run: |
          cd apps/linkedin-publisher
          npm install

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Fetch secrets from GCP Secret Manager
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env ANTHROPIC_API_KEY ANTHROPIC_API_KEY
          fetch_to_env PUSHOVER_TOKEN PUSHOVER_TOKEN
          fetch_to_env PUSHOVER_USER_KEY PUSHOVER_USER_KEY

      - name: Deploy to Cloudflare Workers
        working-directory: apps/linkedin-publisher
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          
          # Put secrets
          printf '%s' "${ANTHROPIC_API_KEY:-${{ secrets.ANTHROPIC_API_KEY }}}" | npx wrangler secret put ANTHROPIC_API_KEY --env production
          printf '%s' "${PUSHOVER_TOKEN:-${{ secrets.PUSHOVER_TOKEN }}}" | npx wrangler secret put PUSHOVER_TOKEN --env production
          printf '%s' "${PUSHOVER_USER_KEY:-${{ secrets.PUSHOVER_USER_KEY }}}" | npx wrangler secret put PUSHOVER_USER_KEY --env production
          
          # Deploy
          npx wrangler deploy --env production
