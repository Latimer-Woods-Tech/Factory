name: Deploy latimerwoods-dev (Developer Index)

# Static Pages site that renders docs/service-registry.yml as a grouped
# index of every Factory service. Lives at https://dev.latimerwoods.dev.
#
# PRE-DEPLOY CHECKLIST (one-time provisioning):
#   1. wrangler pages project create latimerwoods-dev --production-branch main
#   2. Attach custom domain in CF Pages dashboard: dev.latimerwoods.dev
#   3. Confirm CF_API_TOKEN has Pages:Edit + Zone:Read for latimerwoods.dev

on:
  push:
    branches: [main]
    paths:
      - 'apps/latimerwoods-dev/**'
      - 'docs/service-registry.yml'
      - '.github/workflows/deploy-latimerwoods-dev.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        working-directory: apps/latimerwoods-dev
        run: npm install --no-audit --no-fund

      - name: Build static site
        working-directory: apps/latimerwoods-dev
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/latimerwoods-dev/dist --project-name=latimerwoods-dev --branch=main

      - name: Verify Pages preview deployment
        run: |
          # Pages production deploys (--branch=main) serve at {project}.pages.dev,
          # NOT {branch}.{project}.pages.dev (that pattern is for non-main branches).
          OK=0
          for i in {1..5}; do
            if curl -fsSL https://latimerwoods-dev.pages.dev > /dev/null; then
              echo "Pages production deploy reachable"
              OK=1
              break
            fi
            echo "Retrying preview verification ($i/5)..."
            sleep 5
          done
          if [ "$OK" -ne 1 ]; then
            echo "Pages production deploy verification failed"
            exit 1
          fi

      # Custom-domain verification is best-effort during the first rollout — it
      # only fails CI if the page is reachable but missing the expected marker
      # (so a still-propagating DNS attach does not block other deploys).
      - name: Verify dev.latimerwoods.dev (best-effort)
        continue-on-error: true
        run: |
          set -e
          body=$(curl -fsSL --retry 3 --retry-delay 5 --max-time 20 https://dev.latimerwoods.dev/ || true)
          if [ -z "$body" ]; then
            echo "::warning::dev.latimerwoods.dev not reachable yet (DNS/cert propagating). Skipping content check."
            exit 0
          fi
          if echo "$body" | grep -qiE "Developer Index"; then
            echo "Custom domain verified: dev.latimerwoods.dev is serving the latest build."
          else
            echo "::warning::dev.latimerwoods.dev reachable but missing 'Developer Index' marker."
          fi
