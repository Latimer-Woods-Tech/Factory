name: Generate App Lockfiles

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        app: [wordis-bond, cypher-healing, prime-self, ijustus, the-calling, neighbor-aid, xico-city]
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: Latimer-Woods-Tech/${{ matrix.app }}
          token: ${{ steps.app-token.outputs.token }}
          path: app

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
      - name: Configure npm auth for GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${{ steps.app-token.outputs.token }}" >> app/.npmrc

      - name: Update vitest to v2 (required by @cloudflare/vitest-pool-workers ^0.8)
        working-directory: app
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.devDependencies['vitest'] = '^2.0.0';
            pkg.devDependencies['@vitest/coverage-v8'] = '^2.0.0';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Updated vitest to ^2.0.0');
          "

      - name: Install dependencies and generate lockfile
        run: npm install --package-lock-only
        working-directory: app

      - name: Commit and push package-lock.json
        working-directory: app
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: upgrade vitest to v2 and generate package-lock.json"
          git push
