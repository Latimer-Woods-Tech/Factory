name: Factory Status Dashboard
on:
  schedule:
    - cron: '0 */4 * * *'  # every hour
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      # Check out main, NOT the status-dashboard data-branch. status-dashboard
      # holds only the generated STATUS.md and is recreated by the force-push
      # below, so it must not be a checkout dependency — when the branch prune
      # deleted it (2026-06), checkout `ref: status-dashboard` hard-failed every
      # hourly run. Starting from main makes this workflow self-healing.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          fetch-depth: 0
      - name: Generate status
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -e
          OUT="docs/STATUS.md"
          mkdir -p docs
          {
            echo "# Factory Ecosystem Status"
            echo
            echo "_Auto-generated hourly by \`factory-status-dashboard.yml\`. Last update: $(date -u +%FT%TZ)_"
            echo "_Written to the \`status-dashboard\` branch. View raw:_ [status-dashboard/docs/STATUS.md](https://github.com/Latimer-Woods-Tech/factory/blob/status-dashboard/docs/STATUS.md)"
            echo
            echo "| Repo | Latest CI | Last commit | Open PRs |"
            echo "|---|---|---|---|"
          } > "$OUT"
          for repo in factory wordis-bond cypher-healing ijustus the-calling neighbor-aid xico-city factory-admin xpelevator capricast HumanDesign; do
            CI=$(gh api "/repos/Latimer-Woods-Tech/$repo/actions/runs?per_page=1" --jq '.workflow_runs[0] | "\(.status) \(.conclusion // "-")"' 2>/dev/null || echo "-")
            ICON="❔"
            case "$CI" in
              "completed success") ICON="✅" ;;
              "completed failure") ICON="❌" ;;
              "in_progress "*) ICON="🟡" ;;
              "queued "*) ICON="⏳" ;;
            esac
            COMMIT=$(gh api "/repos/Latimer-Woods-Tech/$repo/commits/main" --jq '.commit.committer.date' 2>/dev/null | cut -dT -f1)
            PRS=$(gh api "/repos/Latimer-Woods-Tech/$repo/pulls?state=open" --jq 'length' 2>/dev/null || echo 0)
            echo "| [$repo](https://github.com/Latimer-Woods-Tech/$repo) | $ICON $CI | $COMMIT | $PRS |" >> "$OUT"
          done
          {
            echo
            echo "## Cloudflare Workers"
            echo
            echo "_Inventory snapshot — live count via factory-admin._"
            echo "- Total Workers: 19 (after Apr 30 cleanup)"
            echo "- R2 buckets: 6"
            echo "- Hyperdrive configs: 10"
            echo "- Neon databases: 10"
          } >> "$OUT"
      - name: Commit to status-dashboard branch
        run: |
          git config user.email "factory-cross-repo[bot]@users.noreply.github.com"
          git config user.name "factory-cross-repo[bot]"
          git add docs/STATUS.md
          git diff --staged --quiet || git commit -m "chore(status): hourly status update [skip ci]"
          git push origin HEAD:status-dashboard --force
