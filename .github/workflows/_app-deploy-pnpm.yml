# =============================================================================
# Reusable deploy workflow for Latimer-Woods-Tech apps — pnpm variant.
#
# WHAT IT DOES
#   Like _app-deploy.yml but uses pnpm instead of npm. Use this for apps that
#   manage their lockfile with pnpm (e.g. videoking).
#   Installs deps from GitHub Packages via pnpm, runs `wrangler deploy`,
#   optionally probes a health URL with retry. Targets either staging or
#   production GitHub Environment so required-reviewer gates apply automatically.
#
# WHO CALLS IT
#   App repos that use pnpm. Currently: videoking.
#   Chain with _post-deploy-verify.yml for production-grade auto-rollback.
#
# HOW TO CALL
#   jobs:
#     deploy:
#       uses: Latimer-Woods-Tech/factory/.github/workflows/_app-deploy-pnpm.yml@main
#       with:
#         environment: production
#         health_url: https://app.example.com/healthz
#       secrets: inherit
#
# HOW TO CALL WITH POST-DEPLOY VERIFY (recommended for production)
#   jobs:
#     deploy:
#       uses: Latimer-Woods-Tech/factory/.github/workflows/_app-deploy-pnpm.yml@main
#       with:
#         environment: production
#       secrets: inherit
#     verify:
#       needs: deploy
#       uses: Latimer-Woods-Tech/factory/.github/workflows/_post-deploy-verify.yml@main
#       with:
#         health_url: https://app.example.com/healthz
#         rollback_on_failure: true
#         worker_name: my-app-production
#       secrets: inherit
#
# REQUIRED SECRETS (passed via `secrets: inherit` from org-level vault)
#   FACTORY_APP_ID            - GitHub App ID for `factory-cross-repo`
#   FACTORY_APP_PRIVATE_KEY   - PEM private key for the same App
#   VERTEX_SA_KEY             - GCP service account for Secret Manager access
#   CF_API_TOKEN or CLOUDFLARE_API_TOKEN        - transition fallback only
#   CF_ACCOUNT_ID or CLOUDFLARE_ACCOUNT_ID      - transition fallback only
#
# REQUIRED REPO STATE
#   GitHub Environment named `production` and/or `staging` must exist on the
#   calling repo. Public repos get required-reviewer gates; private repos on
#   the Team plan get bare environments only (Enterprise needed for private
#   repo gates).
#
# OPTIONAL INPUTS
#   pnpm_version       - pnpm major version to install (default '9')
#   node_version       - Node.js major version (default '22')
#   working_directory  - Subdir to run wrangler in (default '.')
#   environment        - GitHub Environment name (default 'production')
#   wrangler_command   - Wrangler CLI command (default 'deploy')
#   health_url         - URL to probe post-deploy. Empty string skips the check.
#
# OUTPUT
#   No outputs. Failure exits non-zero. For auto-rollback, chain
#   `_post-deploy-verify.yml` with `rollback_on_failure: true`.
#
# RELATED
#   _app-deploy.yml          - npm variant (for most apps)
#   _app-ci-pnpm.yml         - Pre-deploy CI for pnpm apps
#   _post-deploy-verify.yml  - Stronger verify with auto-rollback
#   docs/CI_CD.md            - Full architecture reference
# =============================================================================

name: _app-deploy-pnpm

concurrency:
  group: deploy-${{ inputs.environment }}-${{ github.repository }}
  cancel-in-progress: false

on:
  workflow_call:
    inputs:
      pnpm_version:
        type: string
        default: '9'
      node_version:
        type: string
        default: '22'
      working_directory:
        type: string
        default: '.'
      environment:
        type: string
        default: 'production'
      wrangler_command:
        type: string
        default: 'deploy'
      health_url:
        type: string
        default: ''

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    env:
      # secrets context is unavailable in `if:` expressions inside workflow_call
      # reusable workflows. Map secret presence to an env var checked via env.*.
      HAS_VERTEX_SA_KEY: ${{ secrets.VERTEX_SA_KEY != '' }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ inputs.pnpm_version }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@latimer-woods-tech'
          cache: 'pnpm'
      - name: Authenticate to GCP
        if: env.HAS_VERTEX_SA_KEY == 'true'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}
      - name: Set up gcloud
        if: env.HAS_VERTEX_SA_KEY == 'true'
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
      - name: Fetch Cloudflare deploy credentials from GCP Secret Manager
        if: env.HAS_VERTEX_SA_KEY == 'true'
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env CF_API_TOKEN CF_API_TOKEN CLOUDFLARE_API_TOKEN cloudflare-api-token
          fetch_to_env CF_ACCOUNT_ID CF_ACCOUNT_ID CLOUDFLARE_ACCOUNT_ID cloudflare-account-id
      - name: Resolve Cloudflare deploy credentials
        id: cf-creds
        env:
          FALLBACK_CF_API_TOKEN: ${{ secrets.CF_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          FALLBACK_CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          cf_api_token="${CF_API_TOKEN:-$FALLBACK_CF_API_TOKEN}"
          cf_account_id="${CF_ACCOUNT_ID:-$FALLBACK_CF_ACCOUNT_ID}"
          test -n "$cf_api_token" || (echo "::error::Cloudflare API token missing in GCP Secret Manager and GitHub secrets" && exit 1)
          test -n "$cf_account_id" || (echo "::error::Cloudflare account ID missing in GCP Secret Manager and GitHub secrets" && exit 1)
          echo "::add-mask::$cf_api_token"
          {
            echo "api_token=$cf_api_token"
            echo "account_id=$cf_account_id"
          } >> "$GITHUB_OUTPUT"
      - name: Configure npm auth for GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${{ steps.app-token.outputs.token }}" >> .npmrc
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ steps.cf-creds.outputs.api_token }}
          accountId: ${{ steps.cf-creds.outputs.account_id }}
          command: ${{ inputs.wrangler_command }}
          packageManager: pnpm
      - name: Post-deploy health check
        if: ${{ inputs.health_url != '' }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsSL --max-time 10 "${{ inputs.health_url }}" > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
