name: Run DB Migrations (Phase 7.5)

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Single app to migrate (leave empty for all configured apps)'
        required: false
        default: ''

# For each app:
# 1. Clones the app repo
# 2. Runs drizzle-kit generate (produces SQL migration files)
# 3. Runs drizzle-kit migrate (applies to the production Neon branch)
# 4. Commits generated migration files back to the app repo
#
# Requires these secrets in the Factory repo:
#   WORDISBOND_CONNECTION_STRING
#   CYPHEROFHEALING_CONNECTION_STRING
#   SELFPRIME_CONNECTION_STRING
#   KAIROSCOUNCIL_CONNECTION_STRING
#   THECALLING_CONNECTION_STRING

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

concurrency:
  group: run-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: wordis-bond
            conn_secret: WORDISBOND_CONNECTION_STRING
          - app: cypher-healing
            conn_secret: CYPHEROFHEALING_CONNECTION_STRING
          - app: prime-self
            conn_secret: SELFPRIME_CONNECTION_STRING
          - app: ijustus
            conn_secret: KAIROSCOUNCIL_CONNECTION_STRING
          - app: the-calling
            conn_secret: THECALLING_CONNECTION_STRING
    steps:
      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account_email: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Get secrets from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets:
            - name: FACTORY_APP_ID
              id: factory_app_id
            - name: FACTORY_APP_PRIVATE_KEY
              id: factory_app_private_key
            - name: WORDISBOND_CONNECTION_STRING
              id: wordisbond_conn
            - name: CYPHEROFHEALING_CONNECTION_STRING
              id: cypher_conn
            - name: SELFPRIME_CONNECTION_STRING
              id: prime_conn
            - name: KAIROSCOUNCIL_CONNECTION_STRING
              id: ijustus_conn
            - name: THECALLING_CONNECTION_STRING
              id: calling_conn

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ steps.secrets.outputs.factory_app_id }}
          private-key: ${{ steps.secrets.outputs.factory_app_private_key }}
          owner: Latimer-Woods-Tech
      - name: Resolve connection string for app
        id: conn
        run: |
          case "${{ matrix.app }}" in
            wordis-bond) echo "url=${{ steps.secrets.outputs.wordisbond_conn }}" >> "$GITHUB_OUTPUT" ;;
            cypher-healing) echo "url=${{ steps.secrets.outputs.cypher_conn }}" >> "$GITHUB_OUTPUT" ;;
            prime-self) echo "url=${{ steps.secrets.outputs.prime_conn }}" >> "$GITHUB_OUTPUT" ;;
            ijustus) echo "url=${{ steps.secrets.outputs.ijustus_conn }}" >> "$GITHUB_OUTPUT" ;;
            the-calling) echo "url=${{ steps.secrets.outputs.calling_conn }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Skip if filter set and app doesn't match
        if: ${{ github.event.inputs.app != '' && github.event.inputs.app != matrix.app }}
        run: echo "Skipping ${{ matrix.app }} — filter is '${{ github.event.inputs.app }}'"

      - name: Clone app repo
        if: ${{ github.event.inputs.app == '' || github.event.inputs.app == matrix.app }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/Latimer-Woods-Tech/${{ matrix.app }}.git" app
          cd app
          git config user.email "ci@factory.dev"
          git config user.name "Factory CI"

      - uses: actions/setup-node@v6
        if: ${{ github.event.inputs.app == '' || github.event.inputs.app == matrix.app }}
        with:
          node-version: '22'

      - name: Install drizzle deps (isolated)
        if: ${{ github.event.inputs.app == '' || github.event.inputs.app == matrix.app }}
        run: |
          mkdir -p migration-runner
          cd migration-runner
          echo '{"type":"module"}' > package.json
          npm install --no-save drizzle-kit drizzle-orm postgres

      - name: Generate migration SQL
        if: ${{ github.event.inputs.app == '' || github.event.inputs.app == matrix.app }}
        env:
          DATABASE_URL: ${{ steps.conn.outputs.url }}
        run: |
          # Run drizzle-kit from the isolated runner but point to the app schema
          cp app/drizzle.config.ts migration-runner/drizzle.config.ts
          cp -r app/src migration-runner/src
          mkdir -p migration-runner/src/db/migrations
          cd migration-runner
          node_modules/.bin/drizzle-kit generate
          echo "✅ Migration SQL generated for ${{ matrix.app }}"

      - name: Apply migration to Neon
        if: ${{ github.event.inputs.app == '' || github.event.inputs.app == matrix.app }}
        env:
          DATABASE_URL: ${{ steps.conn.outputs.url }}
        run: |
          cd migration-runner
          node_modules/.bin/drizzle-kit migrate
          echo "✅ Migration applied to Neon for ${{ matrix.app }}"

      - name: Copy migration files back to app
        if: ${{ github.event.inputs.app == '' || github.event.inputs.app == matrix.app }}
        run: |
          cp -r migration-runner/src/db/migrations/. app/src/db/migrations/

      - name: Commit migration files back to app repo
        if: ${{ github.event.inputs.app == '' || github.event.inputs.app == matrix.app }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cd app
          git add src/db/migrations/
          if git diff --staged --quiet; then
            echo "No new migration files to commit."
          else
            git commit -m "chore(db): add initial drizzle migration via factory CI"
            git push origin main
            echo "✅ Migration files committed to ${{ matrix.app }}"
          fi
