name: Canonical PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  merge_group:

# Cancel in-progress review when a new push lands on the same PR
concurrency:
  group: pr-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  # pull-requests: write — needed so the bot can post a review and labels.
  # On Dependabot PRs the App token mint can fail (FACTORY_APP_* must be mirrored
  # via mirror-org-secrets-to-dependabot.yml); the GH_TOKEN env below falls back
  # to GITHUB_TOKEN, which needs these permissions to act.
  pull-requests: write
  issues: write

jobs:
  review:
    # Skip merge_group runs (review already passed on the PR) and drafts.
    # Self-review by factory-cross-repo[bot] is guarded inside pr-review.mjs.
    # Dependabot PRs ARE reviewed — pr-review.mjs detects them and short-circuits
    # to a narrow lockfile-bump sanity check instead of full LLM consensus.
    if: ${{ github.event_name != 'merge_group' && !github.event.pull_request.draft }}
    name: Factory architecture review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip draft PRs. Skip merge_group — review already passed on the PR;
    # re-running the LLM review in a merge group has no useful target to post to.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Mint the factory-cross-repo App token so reviews are attributed to the
      # bot account (a CODEOWNER on apps/*/src/**). On Dependabot PRs this can
      # fail if FACTORY_APP_* aren't yet mirrored as Dependabot secrets — we
      # continue-on-error so the next step can fall back to GITHUB_TOKEN.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        continue-on-error: true
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Run canonical review
        env:
          # Prefer the App token (CODEOWNER attribution). Fall back to GITHUB_TOKEN
          # so Dependabot PRs still get reviewed when the App token cannot be minted.
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          MAX_REVIEW_ATTEMPTS: ${{ vars.MAX_REVIEW_ATTEMPTS || '3' }}
          HUMAN_REVIEWER: ${{ vars.HUMAN_REVIEWER || 'adrper79-dot' }}
          TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}
          TELNYX_FROM_NUMBER: ${{ secrets.TELNYX_FROM_NUMBER }}
          NOTIFICATION_PHONE: ${{ secrets.NOTIFICATION_PHONE }}
          # Optional: JSON array to override/extend the built-in reviewer-class map.
          # Shape: [{"class":"platform","label":"...","patterns":["regex"],"reviewers":["handle"]}]
          REVIEWER_HINTS_MAP: ${{ vars.REVIEWER_HINTS_MAP || '' }}
          # Factory Core API — gate ingest for the Command Center (P2.3).
          # Best-effort: omitting these vars silently skips the gate write.
          FACTORY_CORE_API_URL: ${{ vars.FACTORY_CORE_API_URL || '' }}
          FACTORY_CORE_API_INGEST_KEY: ${{ secrets.FACTORY_CORE_API_INGEST_KEY || '' }}
        run: node .github/scripts/pr-review.mjs
