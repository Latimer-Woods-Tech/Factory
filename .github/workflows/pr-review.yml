name: Canonical PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  merge_group:

# Cancel in-progress review when a new push lands on the same PR
concurrency:
  group: pr-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  review:
    if: github.event.sender.type != 'Bot'
    name: Factory architecture review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip draft PRs. Skip merge_group — review already passed on the PR;
    # re-running the LLM review in a merge group has no useful target to post to.
    if: ${{ github.event_name != 'merge_group' && !github.event.pull_request.draft }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run canonical review
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          MAX_REVIEW_ATTEMPTS: ${{ vars.MAX_REVIEW_ATTEMPTS || '3' }}
          HUMAN_REVIEWER: ${{ vars.HUMAN_REVIEWER || 'adrper79-dot' }}
          TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}
          TELNYX_FROM_NUMBER: ${{ secrets.TELNYX_FROM_NUMBER }}
          NOTIFICATION_PHONE: ${{ secrets.NOTIFICATION_PHONE }}
          # Optional: JSON array to override/extend the built-in reviewer-class map.
          # Shape: [{"class":"platform","label":"...","patterns":["regex"],"reviewers":["handle"]}]
          REVIEWER_HINTS_MAP: ${{ vars.REVIEWER_HINTS_MAP || '' }}
        run: node .github/scripts/pr-review.mjs
