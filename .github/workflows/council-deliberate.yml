name: Council Deliberation

# Trigger when a PR adds or modifies an inquiry file.
# Posts a multi-voice LLM deliberation as a PR comment — the author
# can then run `node scripts/council.mjs deliberate <file>` locally
# to persist the result to the inquiry file.
#
# Requires:
#   ANTHROPIC_API_KEY — repo or org secret

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'docs/council/inquiries/*.md'

concurrency:
  group: council-deliberate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deliberate:
    name: Multi-voice council deliberation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run when the API key is available; skip silently otherwise so the
    # workflow never blocks a PR just because the key is absent.
    if: ${{ vars.COUNCIL_DELIBERATE_ENABLED != 'false' }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      # Detect which inquiry files changed in this PR
      - name: Detect changed inquiry files
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 'docs/council/inquiries/*.md' || true)
          if [ -z "$changed" ]; then
            echo "No inquiry files changed — skipping deliberation"
            echo "files=" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Changed inquiry files:"
            echo "$changed"
            # Space-separated for the next step
            files=$(echo "$changed" | tr '\n' ' ' | sed 's/ $//')
            echo "files=$files" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Run deliberation on each changed inquiry file using --no-write so we
      # capture the output for posting as a PR comment rather than committing.
      - name: Run council deliberation
        id: deliberate
        if: ${{ steps.detect.outputs.skip != 'true' && env.ANTHROPIC_API_KEY != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
          CHANGED_FILES: ${{ steps.detect.outputs.files }}
        run: |
          set -euo pipefail
          output_file="$(mktemp)"
          echo "" > "$output_file"

          for file in $CHANGED_FILES; do
            if [ ! -f "$file" ]; then
              echo "File not found (deleted?): $file — skipping"
              continue
            fi
            echo "## Deliberation for \`$file\`" >> "$output_file"
            echo "" >> "$output_file"
            node scripts/council.mjs deliberate "$file" --no-write >> "$output_file" 2>&1 || {
              echo "> Deliberation failed for $file — see logs above." >> "$output_file"
            }
            echo "" >> "$output_file"
            echo "---" >> "$output_file"
            echo "" >> "$output_file"
          done

          # Truncate to 65000 chars to stay within GitHub comment limits
          truncated=$(head -c 65000 "$output_file")
          if [ ${#truncated} -ge 65000 ]; then
            truncated="$(printf '%s\n\n%s' "$truncated" '> [Deliberation output truncated — see workflow logs for the full output]')"
          fi

          # Write to GitHub step summary for persistent visibility
          echo "$truncated" >> "$GITHUB_STEP_SUMMARY"

          # Expose for the comment step
          {
            echo "body<<COUNCIL_BODY_EOF"
            echo "$truncated"
            echo "COUNCIL_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post deliberation as PR comment
        if: ${{ steps.deliberate.outputs.body != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          header="$(printf '%s\n' \
            '### 🏛️ Council Deliberation' \
            '' \
            '> Auto-generated by the Factory council deliberation workflow.' \
            '> To persist this to the inquiry file, run locally:' \
            '> ```' \
            '> node scripts/council.mjs deliberate <inquiry-file>' \
            '> ```' \
            '> Then set `Status` to `review` when ready for human council review.' \
            '' \
            '')"
          full_body="${header}${{ steps.deliberate.outputs.body }}"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            -f body="$full_body"

      - name: Validate council index consistency
        if: ${{ steps.detect.outputs.skip != 'true' }}
        run: |
          node scripts/council.mjs validate || {
            echo "::warning::Council validate found issues — run 'node scripts/council.mjs validate' locally to review"
            exit 0
          }

      - name: Report stale inquiries
        run: |
          node scripts/council.mjs stale || true
