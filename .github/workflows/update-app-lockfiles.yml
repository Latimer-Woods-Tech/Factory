name: Update App Lockfiles

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

jobs:
  update-lockfiles:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        repo:
          - the-calling
          - wordis-bond
          - prime-self
          - neighbor-aid
          - cypher-healing
          - ijustus
          - xico-city
      fail-fast: false
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Checkout ${{ matrix.repo }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Latimer-Woods-Tech/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          registry-url: 'https://npm.pkg.github.com'
          scope: '@adrper79-dot'

      - name: Update neon to latest
        run: npm install @latimer-woods-tech/neon@0.2.1
        env:
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Commit and push lockfile if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet package-lock.json; then
            echo "No changes to lockfile"
          else
            git add package-lock.json
            git commit -m "chore: update lockfile [skip ci]"
            git push
          fi

