name: Deploy Webhook Fanout

on:
  push:
    branches: [main]
    paths:
      - 'apps/webhook-fanout/**'
      - '.github/workflows/deploy-webhook-fanout.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

concurrency:
  group: deploy-webhook-fanout-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    name: Deploy webhook-fanout to Cloudflare

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Fetch secrets from GCP Secret Manager
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env CLOUDFLARE_API_TOKEN   CF_API_TOKEN CLOUDFLARE_API_TOKEN
          fetch_to_env CLOUDFLARE_ACCOUNT_ID  CF_ACCOUNT_ID CLOUDFLARE_ACCOUNT_ID
          fetch_to_env STRIPE_WEBHOOK_SECRET  STRIPE_WEBHOOK_SECRET
          fetch_to_env POSTHOG_KEY            POSTHOG_KEY POSTHOG_API_KEY POSTHOG_API
          fetch_to_env RESEND_API_KEY         RESEND_API_KEY FACTORY_RESEND_API_KEY
          fetch_to_env SENTRY_AUTH_TOKEN      SENTRY_AUTH_TOKEN FACTORY_SENTRY_API sentry-auth-token
          fetch_to_env SENTRY_ORG            SENTRY_ORG sentry-org

      - name: Build local package dependencies
        run: |
          set -euo pipefail
          for package in errors monitoring logger; do
            echo "=== ${package} ==="
            cd "packages/${package}"
            npm ci --ignore-scripts
            npm run build
            cd ../..
          done

      - name: Install dependencies
        run: |
          cd apps/webhook-fanout
          npm install

      - name: Install Sentry CLI
        run: npm install -g @sentry/cli

      - name: Build worker bundle (dry-run for Sentry sourcemaps)
        working-directory: apps/webhook-fanout
        run: |
          mkdir -p .sentry-dist
          npx wrangler deploy --env production --dry-run --outdir .sentry-dist

      - name: Inject Sentry debug IDs into bundle
        working-directory: apps/webhook-fanout
        run: sentry-cli sourcemaps inject .sentry-dist/

      - name: Upload sourcemaps to Sentry
        working-directory: apps/webhook-fanout
        run: |
          if ! sentry-cli sourcemaps upload \
            --project webhook-fanout \
            .sentry-dist/; then
            echo "::warning::Sentry sourcemap upload failed; continuing deployment"
          fi

      - name: Deploy to Cloudflare Workers
        working-directory: apps/webhook-fanout
        run: |
          set -euo pipefail
          printf '%s' "$STRIPE_WEBHOOK_SECRET" | npx wrangler secret put STRIPE_WEBHOOK_SECRET --env production
          printf '%s' "$POSTHOG_KEY" | npx wrangler secret put POSTHOG_KEY --env production
          printf '%s' "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY --env production
          BUILT_FILE=$(ls .sentry-dist/*.js | grep -v '\.map$' | head -1)
          echo "Deploying pre-built bundle: $BUILT_FILE"
          npx wrangler deploy --no-bundle "$BUILT_FILE" --env production

      - name: Verify deployment
        run: |
          echo "🚀 Deployment complete"
          echo "📍 Health check: https://webhook-fanout.adrper79.workers.dev/health"
          echo "📍 Custom domain target: https://webhooks.latwoodtech.work/health"
          node scripts/verify-http-endpoint.mjs \
            --url https://webhook-fanout.adrper79.workers.dev/health \
            --status 200 \
            --json-field worker \
            --json-equals webhook-fanout \
            --retries 8 \
            --delay-ms 5000
