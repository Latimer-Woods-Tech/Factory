name: Deploy Webhook Fanout

on:
  push:
    branches: [main]
    paths:
      - 'apps/webhook-fanout/**'
      - '.github/workflows/deploy-webhook-fanout.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

concurrency:
  group: deploy-webhook-fanout-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: Deploy webhook-fanout to Cloudflare
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build local package dependencies
        run: |
          set -euo pipefail
          for package in errors monitoring logger; do
            echo "=== ${package} ==="
            cd "packages/${package}"
            npm ci --ignore-scripts
            npm run build
            cd ../..
          done

      - name: Install dependencies
        run: |
          cd apps/webhook-fanout
          npm install

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/webhook-fanout
          command: deploy --env production
          secrets: |
            STRIPE_WEBHOOK_SECRET
            CHARTMOGUL_API_KEY
            LOOPS_API_KEY
          environment: production
        env:
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          CHARTMOGUL_API_KEY: ${{ secrets.CHARTMOGUL_API_KEY }}
          LOOPS_API_KEY: ${{ secrets.LOOPS_API_KEY }}

      - name: Verify deployment
        run: |
          echo "🚀 Deployment complete"
          echo "📍 Health check: https://webhooks.latwoodtech.com/health"
          node scripts/verify-http-endpoint.mjs \
            --url https://webhooks.latwoodtech.com/health \
            --status 200 \
            --json-field worker \
            --json-equals webhook-fanout \
            --retries 8 \
            --delay-ms 5000
