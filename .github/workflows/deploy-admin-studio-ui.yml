name: Deploy admin-studio-ui (Pages)

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin-studio-ui/**'
      - 'packages/studio-core/**'
      - '.github/workflows/deploy-admin-studio-ui.yml'
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: admin-studio-ui-${{ github.event.inputs.env || 'staging' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ github.event.inputs.env || 'staging' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account_email: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Get secrets from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets:
            - name: CF_API_TOKEN
              id: cf_token
            - name: CF_ACCOUNT_ID
              id: cf_account

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install + build studio-core
        run: npm ci --ignore-scripts
        working-directory: packages/studio-core

      - name: Build studio-core
        run: npm run build
        working-directory: packages/studio-core

      - name: Install admin-studio-ui
        run: npm ci
        working-directory: apps/admin-studio-ui

      - name: Build UI
        run: npm run build
        working-directory: apps/admin-studio-ui
        env:
          # Multi-environment API bases — resolved by the app at runtime based on the active session env.
          # These are public worker URLs (no secrets); hardcoded so deploys don't depend on workflow secret config.
          # Worker mounts routes at /auth, /synthetic, /ai, etc. — no /api prefix, so do NOT append one here.
          # Staging custom domain attached via apps/admin-studio/wrangler.jsonc env.staging.routes.
          VITE_API_BASE_LOCAL: "http://localhost:8787"
          VITE_API_BASE_STAGING: "https://admin-staging.latwoodtech.work"
          VITE_API_BASE_PROD: "https://api.apunlimited.com"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ steps.secrets.outputs.cf_token }}
          accountId: ${{ steps.secrets.outputs.cf_account }}
          command: pages deploy apps/admin-studio-ui/dist --project-name=admin-studio-ui --branch=${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'main' || 'staging' }}

      - name: Verify Pages deployment
        run: |
          is_prod="${{ github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}"
          target_env="${{ github.event.inputs.env || 'staging' }}"
          if [ "$is_prod" = "true" ] || [ "$target_env" = "production" ]; then
            url="https://apunlimited.com"
          else
            url="https://staging.admin-studio-ui.pages.dev"
          fi
          node scripts/verify-http-endpoint.mjs \
            --url "$url" \
            --status 200 \
            --body-contains "Factory Admin Studio" \
            --retries 8 \
            --delay-ms 5000
