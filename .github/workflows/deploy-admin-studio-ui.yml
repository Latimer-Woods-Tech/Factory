name: Deploy admin-studio-ui (Pages)

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin-studio-ui/**'
      - 'packages/studio-core/**'
      - '.github/workflows/deploy-admin-studio-ui.yml'
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: admin-studio-ui-${{ github.event.inputs.env || 'staging' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ github.event.inputs.env || 'staging' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install + build studio-core
        run: npm ci --ignore-scripts
        working-directory: packages/studio-core

      - name: Build studio-core
        run: npm run build
        working-directory: packages/studio-core

      - name: Install admin-studio-ui
        run: npm ci
        working-directory: apps/admin-studio-ui

      - name: Build UI
        run: npm run build
        working-directory: apps/admin-studio-ui
        env:
          # On push to main (no workflow_dispatch input) treat as production.
          # On workflow_dispatch: use the selected env input.
          VITE_API_BASE: ${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'https://api.apunlimited.com' || 'https://api-staging.apunlimited.com' }}
          # Multi-environment API bases — resolved by the app at runtime based on the current environment.
          # VITE_API_BASE_LOCAL is static (local dev convenience); never varies between CI runs.
          VITE_API_BASE_LOCAL: "http://localhost:8787/api"
          # Canonical staging and production URLs from docs/service-registry.yml.
          # Prefer GitHub secrets (ADMIN_STUDIO_STAGING_URL / ADMIN_STUDIO_PROD_URL) so the
          # values can be rotated without a code change.  The inline fallbacks match the
          # service-registry entries and are safe to hard-code because they are backend
          # API endpoints (not user-facing HTML), but converting them to secrets is
          # recommended for future-proofing.
          VITE_API_BASE_STAGING: "${{ secrets.ADMIN_STUDIO_STAGING_URL || 'https://admin-studio-staging.adrper79.workers.dev' }}/api"
          VITE_API_BASE_PROD: "${{ secrets.ADMIN_STUDIO_PROD_URL || 'https://admin-studio-production.adrper79.workers.dev' }}/api"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/admin-studio-ui/dist --project-name=admin-studio-ui --branch=${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'main' || 'staging' }}

      - name: Verify Pages deployment
        run: |
          is_prod="${{ github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}"
          target_env="${{ github.event.inputs.env || 'staging' }}"
          if [ "$is_prod" = "true" ] || [ "$target_env" = "production" ]; then
            url="https://apunlimited.com"
          else
            url="https://staging.admin-studio-ui.pages.dev"
          fi
          node scripts/verify-http-endpoint.mjs \
            --url "$url" \
            --status 200 \
            --body-contains "Factory Admin Studio" \
            --retries 8 \
            --delay-ms 5000
