name: Auto-Merge Spotter

# Strict required-status-checks + branch protection means an APPROVED PR
# with auto-merge enabled goes BEHIND main the moment a predecessor lands,
# and GitHub's auto-merge does NOT auto-rebase. Without this spotter, the
# queue stalls and a human has to run `gh pr update-branch` repeatedly.
#
# Scope: ONLY PRs that have auto-merge already enabled (someone made an
# affirmative choice) AND are in BEHIND state. DIRTY / CONFLICTING PRs are
# left alone — those need real human attention.
on:
  schedule:
    - cron: '5 * * * *' # hourly (was */10) — cost trim; native auto-merge handles fast path
  workflow_dispatch:

concurrency:
  group: auto-merge-spotter
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  nudge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Mint Factory App token
        id: app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: Factory

      - name: Update-branch BEHIND auto-merge PRs
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          set -euo pipefail

          # List every open non-draft PR with auto-merge enabled (number only).
          #
          # We deliberately do NOT filter on mergeStateStatus in this bulk call.
          # GitHub computes mergeStateStatus LAZILY: `gh pr list` returns
          # "UNKNOWN" for any PR whose mergeability hasn't been recently
          # recomputed, so filtering on == "BEHIND" here silently skips behind
          # PRs that nobody has viewed — the exact bug that let approved PRs sit
          # BEHIND for days while this spotter reported "No BEHIND auto-merge
          # PRs." We re-resolve state per-PR below, which forces computation.
          mapfile -t prs < <(
            gh pr list \
              --repo Latimer-Woods-Tech/Factory \
              --state open \
              --limit 50 \
              --json number,isDraft,autoMergeRequest \
              --jq '.[]
                    | select(.isDraft == false
                        and .autoMergeRequest != null)
                    | .number'
          )

          if [ ${#prs[@]} -eq 0 ]; then
            echo "No auto-merge PRs."
            exit 0
          fi

          echo "Resolving merge state for ${#prs[@]} auto-merge PR(s): ${prs[*]}"
          behind=0
          fail=0
          for pr in "${prs[@]}"; do
            # An individual `gh pr view` pokes GitHub's background mergeability
            # job. Retry once if it's still UNKNOWN (computation in flight).
            state=$(gh pr view "$pr" --repo Latimer-Woods-Tech/Factory \
              --json mergeStateStatus --jq .mergeStateStatus)
            if [ "$state" = "UNKNOWN" ]; then
              sleep 3
              state=$(gh pr view "$pr" --repo Latimer-Woods-Tech/Factory \
                --json mergeStateStatus --jq .mergeStateStatus)
            fi

            # Only BEHIND is our job. DIRTY/CONFLICTING needs human attention;
            # CLEAN/BLOCKED is already progressing on its own.
            if [ "$state" != "BEHIND" ]; then
              echo "  skip #$pr (state=$state)"
              continue
            fi

            behind=$((behind + 1))
            if gh pr update-branch "$pr" --repo Latimer-Woods-Tech/Factory; then
              echo "  ok   #$pr (was BEHIND)"
            else
              # update-branch races against in-flight CI runs (the PR can flip
              # away from BEHIND between our view and the update). Treat any
              # single failure as a skip — the next tick retries.
              echo "  skip #$pr (likely race / conflict / merged)"
              fail=$((fail + 1))
            fi
          done

          if [ "$behind" -eq 0 ]; then
            echo "No BEHIND auto-merge PRs after per-PR resolution."
          fi

          # Hard-cap pattern: if every BEHIND nudge failed, surface it so a
          # noisy broken loop is visible in the Actions UI.
          if [ "$behind" -gt 1 ] && [ "$fail" -eq "$behind" ]; then
            echo "::warning::All $behind nudges failed; spotter may be misconfigured."
            exit 1
          fi
