name: Platform Conformance

# Stage 1 M1 — Shadow mode. Scores are advisory; no merge gating until Stage 4.
on:
  schedule:
    - cron: '23 5 * * *' # daily 05:23 UTC
  workflow_dispatch:
    inputs:
      repo:
        description: 'Single repo key (HD, VK, FA, CH, XC). Leave empty for all.'
        required: false
      pushover:
        description: 'Send Pushover digest (true/false)'
        required: false
        default: 'true'

permissions:
  contents: write
  pull-requests: write # open auto-merge PR (direct push to main is blocked by branch protection)

concurrency:
  group: platform-conformance
  cancel-in-progress: false

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # Mint a Factory App token with read access across all 5 app repos.
      # Mirrors the proven pattern in completion-tracker.yml — avoids a
      # separate long-lived PAT.
      - name: Mint Factory App token (5 repos)
        id: app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: |
            HumanDesign
            capricast
            Factory
            coh
            xico-city

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Fetch Pushover credentials from GCP Secret Manager
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env PUSHOVER_USER  FACTORY_PUSHOVER_USER PUSHOVER_USER pushover-user
          fetch_to_env PUSHOVER_TOKEN FACTORY_PUSHOVER_API  PUSHOVER_TOKEN pushover-token

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Run conformance scan
        env:
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}
          # PUSHOVER_USER and PUSHOVER_TOKEN are already in $GITHUB_ENV from
          # the GCP Secret Manager fetch step above.
        run: |
          set -euo pipefail
          args=""
          if [ -n "${{ github.event.inputs.repo }}" ]; then
            args="$args --repo ${{ github.event.inputs.repo }}"
          fi
          if [ "${{ github.event.inputs.pushover || 'true' }}" = "true" ]; then
            args="$args --pushover"
          fi
          python scripts/platform_conformance.py $args

      - name: Open auto-merge PR for conformance snapshots
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Stage first; git diff against HEAD doesn't see new untracked files.
          git add docs/conformance/ 2>/dev/null || true
          if git diff --quiet --cached docs/conformance/; then
            echo "No conformance changes to commit."
            exit 0
          fi
          DATE=$(date -u +%F)
          BRANCH="chore/conformance-snapshot-$DATE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
           
          # Check if the branch already exists
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi
           
          git add docs/conformance/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Existing conformance PR already contains this content."
          else
            git commit -m "chore(conformance): auto-update shadow scores ($DATE)"
            git push --force-with-lease --set-upstream origin "$BRANCH"
          fi
           
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing conformance PR #$EXISTING_PR."
            gh pr edit "$EXISTING_PR" \
              --title "chore(conformance): shadow scores ($DATE)" \
              --body "Automated daily conformance scan output from \`platform-conformance.yml\`. Shadow mode — scores are advisory until Stage 4. This branch is stable per day so reruns update one PR instead of opening timestamped duplicates."
            gh pr merge --auto --squash "$EXISTING_PR" || true
          else
            gh pr create \
              --title "chore(conformance): shadow scores ($DATE)" \
              --body "Automated daily conformance scan output from \`platform-conformance.yml\`. Shadow mode — scores are advisory until Stage 4. This branch is stable per day so reruns update one PR instead of opening timestamped duplicates." \
              --label automation \
              --label documentation \
              --label auto-merge
          fi
