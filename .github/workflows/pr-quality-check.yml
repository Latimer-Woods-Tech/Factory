name: PR Quality Check (shadow-mode)

# Shadow-mode (warn-only) quality gate for PR descriptions.
# Checks for key sections that help reviewers: objective, test plan, rollback.
# Non-blocking — posts a comment advisory but never fails the build.
#
# Ref: Factory governance issue #271 — phased rollout, warn-only first.

on:
  workflow_dispatch:  # now handled by pr-advisory-sweep.yml on a 4-hour schedule

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    name: PR description quality
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip bot senders, bot PR authors, and Dependabot
    # (was two duplicate `if:` keys before — invalid YAML)
    if: |
      github.event.sender.type != 'Bot' &&
      !contains(github.event.pull_request.user.login, '[bot]') &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - name: Check PR description quality
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
        run: |
          node - <<'EOF'
          const { GH_TOKEN, PR_NUMBER, PR_BODY, PR_TITLE, REPO } = process.env;
          const body = PR_BODY || '';
          const num = parseInt(PR_NUMBER, 10);

          // Check for key PR description signals.
          // Pattern: presence of any recognisable heading or keyword.
          const checks = [
            {
              name: 'Summary / Objective',
              pass: /##\s*(summary|objective|what|overview|changes?)\b/i.test(body) ||
                    body.trim().length > 50,
              hint: 'Add a `## Summary` section explaining *what* this PR does and *why*.',
            },
            {
              name: 'Test plan',
              pass: /##\s*(test\s*plan|testing|how\s+to\s+test|verification)\b/i.test(body) ||
                    /\[ \]|\[x\]/i.test(body),
              hint: 'Add a `## Test plan` section or a checklist so reviewers know what to verify.',
            },
            {
              name: 'Rollback / revert guidance',
              // Only required for PRs that look risky (config, migrations, infra)
              pass: !/\b(migration|schema|wrangler|d1_database|secret|credential)\b/i.test(body) ||
                    /##\s*(rollback|revert|undo|recovery)\b/i.test(body) ||
                    /rollback/i.test(body),
              hint: 'This PR looks infra-related. Add a `## Rollback` note explaining how to revert if needed.',
            },
          ];

          const failing = checks.filter(c => !c.pass);

          if (failing.length === 0) {
            console.log(`PR #${num}: description quality OK`);
            process.exit(0);
          }

          const bullets = failing.map(c => `- **${c.name}**: ${c.hint}`).join('\n');
          const commentBody = [
            '### :memo: PR Description Quality Advisory',
            '',
            'This PR description is missing some recommended sections:',
            '',
            bullets,
            '',
            '**This is a non-blocking advisory** — you can merge without updating the description,',
            'but complete descriptions help reviewers and future maintainers.',
            '',
            '_Governed by Factory governance issue [#271](https://github.com/Latimer-Woods-Tech/factory/issues/271)._',
          ].join('\n');

          async function gh(method, path, data) {
            const url = `https://api.github.com${path}`;
            const res = await fetch(url, {
              method,
              headers: {
                Accept: 'application/vnd.github+json',
                Authorization: `Bearer ${GH_TOKEN}`,
                'X-GitHub-Api-Version': '2022-11-28',
                ...(data ? { 'Content-Type': 'application/json' } : {}),
              },
              body: data ? JSON.stringify(data) : undefined,
            });
            if (!res.ok) {
              const t = await res.text();
              console.warn(`GH ${method} ${path} → ${res.status}: ${t.slice(0, 200)}`);
              return null;
            }
            return res.status === 204 ? null : res.json();
          }

          // Update existing advisory comment rather than duplicating.
          const comments = await gh('GET', `/repos/${REPO}/issues/${num}/comments?per_page=100`);
          const existing = comments?.find(c =>
            c.body?.includes(':memo: PR Description Quality Advisory') &&
            c.user?.type === 'Bot'
          );

          if (existing) {
            await gh('PATCH', `/repos/${REPO}/issues/comments/${existing.id}`, { body: commentBody });
            console.log(`Updated quality advisory on PR #${num}`);
          } else {
            await gh('POST', `/repos/${REPO}/issues/${num}/comments`, { body: commentBody });
            console.log(`Posted quality advisory on PR #${num}`);
          }
          EOF
