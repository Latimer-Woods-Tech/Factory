name: Documentation Freshness Audit

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  # Allow manual trigger
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  issues: write

jobs:
  audit:
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
      - name: Run documentation freshness audit
        id: audit
        run: node scripts/doc-freshness-audit.js > audit-report.md
        continue-on-error: true

      - name: Publish audit report to workflow summary
        if: always()
        run: |
          echo "## 📋 Documentation Freshness Audit" >> $GITHUB_STEP_SUMMARY
          cat audit-report.md >> $GITHUB_STEP_SUMMARY

      - name: Ingest audit-report artifact
        if: always()
        env:
          FACTORY_CORE_API_URL: ${{ vars.FACTORY_CORE_API_URL || '' }}
          FACTORY_CORE_API_INGEST_KEY: ${{ secrets.FACTORY_CORE_API_INGEST_KEY || '' }}
        run: |
          if [ -z "${FACTORY_CORE_API_URL:-}" ] || [ -z "${FACTORY_CORE_API_INGEST_KEY:-}" ]; then
            echo "Skipping audit artifact ingest (FACTORY_CORE_API_URL or FACTORY_CORE_API_INGEST_KEY not set)"
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg at "audit-report" \
            --arg pt "github-workflow" \
            --arg pr "${{ github.run_id }}" \
            --arg ss "github-actions" \
            --arg sei "audit-doc-freshness-${{ github.repository }}-${{ github.run_id }}" \
            --arg srepo "${{ github.repository }}" \
            --arg uri "$RUN_URL" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg report_type "doc-freshness" \
            '{artifact_type:$at,producer_type:$pt,producer_ref:$pr,source_system:$ss,
              source_event_id:$sei,subject_repo:$srepo,uri:$uri,
              metadata:{report_type:$report_type},observed_at:$ts}')
          curl -s -o /dev/null -w "Audit-report artifact HTTP %{http_code}\n" \
            -X POST "${FACTORY_CORE_API_URL}/v1/artifacts" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${FACTORY_CORE_API_INGEST_KEY}" \
            -d "$PAYLOAD" || echo "::warning::Audit-report artifact ingest failed (non-blocking)"

      - name: Open docs-debt issue if stale docs found
        # steps.audit.outcome is 'failure' when the script exits non-zero,
        # even though continue-on-error prevents the job from failing.
        # (The old `if: failure()` never triggered for the same reason.)
        if: steps.audit.outcome == 'failure'
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('audit-report.md', 'utf8');

            const DEBT_LABEL = 'docs:debt';
            const ISSUE_TITLE_PREFIX = '📋 Docs Drift Audit — stale docs detected';

            // Ensure the docs:debt label exists (idempotent).
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: DEBT_LABEL,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: DEBT_LABEL,
                  color: 'e4e669',
                  description: 'Documentation is drifting out of date (auto-opened by freshness audit)',
                });
                console.log(`Created label "${DEBT_LABEL}".`);
              } else {
                throw e;
              }
            }

            // Deduplication: skip if an open docs:debt issue already exists.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: DEBT_LABEL,
              state: 'open',
              per_page: 10,
            });

            const alreadyOpen = existing.data.some(i =>
              i.title.startsWith(ISSUE_TITLE_PREFIX)
            );

            if (alreadyOpen) {
              console.log('An open docs-debt issue already exists — skipping creation.');
              return;
            }

            const date = new Date().toISOString().split('T')[0];
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${ISSUE_TITLE_PREFIX} (${date})`,
              body: [
                '## 📋 Documentation Drift — Report-Only',
                '',
                `> Auto-opened by the [Documentation Freshness Audit](${runUrl}) on ${date}.`,
                '> **This is a report-only issue. No CI gates are blocked.**',
                '',
                report,
                '',
                '### Action Required',
                '',
                'Please update stale docs according to their assigned cadence.',
                'See [DOCS_OWNERSHIP.md](docs/DOCS_OWNERSHIP.md) for owner assignments.',
                '',
                '_Close this issue once all flagged docs have been updated._',
              ].join('\n'),
              labels: [DEBT_LABEL, 'docs', 'maintenance'],
            });

            console.log(`Created docs-debt issue #${issue.data.number}: ${issue.data.html_url}`);

  bootstrap-missing-contexts:
    name: Generate missing repo context docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
      - name: Configure git
        run: |
          git config user.name  "factory-docs-bot"
          git config user.email "factory-docs-bot@users.noreply.github.com"
      - name: Create org-scoped GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Generate missing repo contexts
        env:
          GH_TOKEN:          ${{ steps.app-token.outputs.token }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/repo-context-generator.mjs
