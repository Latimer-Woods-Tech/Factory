# =============================================================================
# Reusable deploy workflow for Latimer-Woods-Tech apps (Cloudflare Workers).
#
# WHAT IT DOES
#   Installs deps from GitHub Packages, runs `wrangler deploy`, optionally
#   probes a health URL with retry. Targets either staging or production
#   GitHub Environment so required-reviewer gates apply automatically.
#
# WHO CALLS IT
#   Every app repo's `.github/workflows/deploy.yml` should call this when a
#   push to main lands (production) or a push to staging/* lands (staging).
#
# HOW TO CALL
#   jobs:
#     deploy:
#       uses: Latimer-Woods-Tech/factory/.github/workflows/_app-deploy.yml@main
#       with:
#         environment: production           # or 'staging'
#         working_directory: workers        # if app is in a subdir
#         health_url: https://app.example.com/healthz
#       secrets: inherit
#
# REQUIRED SECRETS (passed via `secrets: inherit` from org-level vault)
#   FACTORY_APP_ID            - GitHub App ID for `factory-cross-repo`
#   FACTORY_APP_PRIVATE_KEY   - PEM private key for the same App
#   VERTEX_SA_KEY             - GCP service account for Secret Manager access
#   CF_API_TOKEN or CLOUDFLARE_API_TOKEN        - transition fallback only
#   CF_ACCOUNT_ID or CLOUDFLARE_ACCOUNT_ID      - transition fallback only
#
# REQUIRED REPO STATE
#   GitHub Environment named `production` and/or `staging` must exist on the
#   calling repo. Public repos get required-reviewer gates; private repos on
#   the Team plan get bare environments only (Enterprise needed for private
#   repo gates).
#
# OPTIONAL INPUTS
#   node_version       - Node.js major version (default '22')
#   working_directory  - Subdir to run wrangler in (default '.')
#   environment        - GitHub Environment name (default 'production')
#   wrangler_command   - Wrangler CLI command (default 'deploy')
#   health_url         - URL to probe post-deploy. Empty string skips the check.
#
# OUTPUT
#   No outputs. Failure exits non-zero. For auto-rollback, chain
#   `_post-deploy-verify.yml` with `rollback_on_failure: true`.
#
# RELATED
#   _app-ci.yml              - Pre-deploy CI (typecheck, lint, test, build)
#   _post-deploy-verify.yml  - Stronger verify with auto-rollback
#   docs/CI_CD.md            - Full architecture reference
# =============================================================================

name: _app-deploy

concurrency:
  group: deploy-${{ inputs.environment }}-${{ github.repository }}
  cancel-in-progress: false

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: '22'
      working_directory:
        type: string
        default: '.'
      environment:
        type: string
        default: 'production'
      wrangler_command:
        type: string
        default: 'deploy'
      health_url:
        type: string
        default: ''
      # Factory Core API URL for artifact ingest (P2.10). Optional — skipped when empty.
      factory_core_api_url:
        type: string
        default: ''

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@latimer-woods-tech'
      - name: Authenticate to GCP
        if: ${{ secrets.VERTEX_SA_KEY != '' }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}
      - name: Set up gcloud
        if: ${{ secrets.VERTEX_SA_KEY != '' }}
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
      - name: Fetch Cloudflare deploy credentials from GCP Secret Manager
        if: ${{ secrets.VERTEX_SA_KEY != '' }}
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env CF_API_TOKEN CF_API_TOKEN CLOUDFLARE_API_TOKEN cloudflare-api-token
          fetch_to_env CF_ACCOUNT_ID CF_ACCOUNT_ID CLOUDFLARE_ACCOUNT_ID cloudflare-account-id
      - name: Resolve Cloudflare deploy credentials
        id: cf-creds
        env:
          FALLBACK_CF_API_TOKEN: ${{ secrets.CF_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          FALLBACK_CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          cf_api_token="${CF_API_TOKEN:-$FALLBACK_CF_API_TOKEN}"
          cf_account_id="${CF_ACCOUNT_ID:-$FALLBACK_CF_ACCOUNT_ID}"
          test -n "$cf_api_token" || (echo "::error::Cloudflare API token missing in GCP Secret Manager and GitHub secrets" && exit 1)
          test -n "$cf_account_id" || (echo "::error::Cloudflare account ID missing in GCP Secret Manager and GitHub secrets" && exit 1)
          echo "::add-mask::$cf_api_token"
          {
            echo "api_token=$cf_api_token"
            echo "account_id=$cf_account_id"
          } >> "$GITHUB_OUTPUT"
      - name: Configure npm auth
        run: echo "//npm.pkg.github.com/:_authToken=${{ steps.app-token.outputs.token }}" >> .npmrc
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ steps.cf-creds.outputs.api_token }}
          accountId: ${{ steps.cf-creds.outputs.account_id }}
          command: ${{ inputs.wrangler_command }}
      - name: Post-deploy health check
        if: ${{ inputs.health_url != '' }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsSL --max-time 10 "${{ inputs.health_url }}" > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Ingest deploy artifact rows
        if: always()
        env:
          FACTORY_CORE_API_URL: ${{ inputs.factory_core_api_url }}
          FACTORY_CORE_API_INGEST_KEY: ${{ secrets.FACTORY_CORE_API_INGEST_KEY }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "${FACTORY_CORE_API_URL:-}" ] || [ -z "${FACTORY_CORE_API_INGEST_KEY:-}" ]; then
            echo "Skipping deploy artifact ingest (FACTORY_CORE_API_URL or FACTORY_CORE_API_INGEST_KEY not set)"
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # deploy-url artifact — the health URL or the run URL as evidence
          DEPLOY_URI="${{ inputs.health_url }}"
          if [ -z "$DEPLOY_URI" ]; then DEPLOY_URI="$RUN_URL"; fi
          DEPLOY_PAYLOAD=$(jq -n \
            --arg at "deploy-url" \
            --arg pt "cloudflare-deploy" \
            --arg pr "${{ github.run_id }}" \
            --arg ss "github-actions" \
            --arg sei "deploy-url-${{ github.repository }}-${{ github.run_id }}" \
            --arg srepo "${{ github.repository }}" \
            --arg sref "${{ inputs.environment }}" \
            --arg uri "$DEPLOY_URI" \
            --arg ts "$TS" \
            '{artifact_type:$at,producer_type:$pt,producer_ref:$pr,source_system:$ss,
              source_event_id:$sei,subject_repo:$srepo,subject_ref:$sref,
              uri:$uri,observed_at:$ts}')
          curl -s -o /dev/null -w "Deploy-url artifact HTTP %{http_code}\n" \
            -X POST "${FACTORY_CORE_API_URL}/v1/artifacts" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${FACTORY_CORE_API_INGEST_KEY}" \
            -d "$DEPLOY_PAYLOAD" || echo "::warning::Deploy artifact ingest failed (non-blocking)"
          # build-artifact — the GitHub Actions run URL
          BUILD_PAYLOAD=$(jq -n \
            --arg at "build-artifact" \
            --arg pt "github-workflow" \
            --arg pr "${{ github.run_id }}" \
            --arg ss "github-actions" \
            --arg sei "build-${{ github.repository }}-${{ github.run_id }}" \
            --arg srepo "${{ github.repository }}" \
            --arg sref "${{ inputs.environment }}" \
            --arg uri "$RUN_URL" \
            --arg ts "$TS" \
            '{artifact_type:$at,producer_type:$pt,producer_ref:$pr,source_system:$ss,
              source_event_id:$sei,subject_repo:$srepo,subject_ref:$sref,
              uri:$uri,observed_at:$ts}')
          curl -s -o /dev/null -w "Build-artifact HTTP %{http_code}\n" \
            -X POST "${FACTORY_CORE_API_URL}/v1/artifacts" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${FACTORY_CORE_API_INGEST_KEY}" \
            -d "$BUILD_PAYLOAD" || echo "::warning::Build artifact ingest failed (non-blocking)"
