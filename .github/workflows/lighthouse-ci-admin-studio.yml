name: Lighthouse CI — admin-studio-ui
on:
  pull_request:
    paths:
      - 'apps/admin-studio-ui/**'

concurrency:
  group: lighthouse-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse mobile budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@latimer-woods-tech'
      - name: Build studio-core dependency
        working-directory: packages/studio-core
        run: npm ci && npm run build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install deps
        working-directory: apps/admin-studio-ui
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        working-directory: apps/admin-studio-ui
        run: npm run build
        env:
          VITE_API_BASE: https://admin-studio-staging.latwoodtech.com
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Lighthouse CI
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@512cc908a55bfb0ad231facca52adf3d3a651df4 # v12
        with:
          configPath: apps/admin-studio-ui/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
