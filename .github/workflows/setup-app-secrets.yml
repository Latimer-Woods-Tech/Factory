name: Setup App Secrets (Phase 6.6)

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to set up (leave empty for all configured apps)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — print commands without executing'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Prerequisites: add GH_PAT secret to this repo (factory).
# It must be a classic GitHub PAT with: repo + read:packages scopes
# under the adrper79-dot account (owner of all 6 app repos).

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account_email: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Get secrets from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets:
            - name: FACTORY_APP_ID
              id: factory_app_id
            - name: FACTORY_APP_PRIVATE_KEY
              id: factory_app_private_key
            - name: CF_API_TOKEN
              id: cf_token
            - name: CF_ACCOUNT_ID
              id: cf_account
            - name: SENTRY_DSN_WORDIS_BOND
              id: sentry_wordis
            - name: SENTRY_DSN_CYPHER_HEALING
              id: sentry_cypher
            - name: SENTRY_DSN_PRIME_SELF
              id: sentry_prime
            - name: SENTRY_DSN_IJUSTUS
              id: sentry_ijustus
            - name: SENTRY_DSN_THE_CALLING
              id: sentry_calling
            - name: SENTRY_DSN_NEIGHBOR_AID
              id: sentry_neighbor
            - name: SENTRY_DSN_VIDEOKING
              id: sentry_video
            - name: POSTHOG_PROJECT_TOKEN
              id: posthog_token
            - name: STRIPE_SECRET_KEY
              id: stripe_key
            - name: JWT_SECRET_VIDEOKING
              id: jwt_videoking
            - name: BETTER_AUTH_SECRET_VIDEOKING
              id: better_auth_videoking
            - name: STRIPE_WEBHOOK_SECRET_VIDEOKING
              id: stripe_webhook_videoking
            - name: RESEND_API_KEY
              id: resend_key
            - name: ANTHROPIC_API_KEY
              id: anthropic_key
            - name: TELNYX_API_KEY
              id: telnyx_key
            - name: ELEVENLABS_API_KEY
              id: elevenlabs_key
            - name: DEEPGRAM_API_KEY
              id: deepgram_key

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ steps.secrets.outputs.factory_app_id }}
          private-key: ${{ steps.secrets.outputs.factory_app_private_key }}
          owner: Latimer-Woods-Tech

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Run setup-all-apps.mjs
        env:
          # ── Auth ─────────────────────────────────────────────────────────────
          # GH_PAT: classic PAT with repo + read:packages (cross-repo secret write)
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CF_API_TOKEN: ${{ steps.secrets.outputs.cf_token }}
          CF_ACCOUNT_ID: ${{ steps.secrets.outputs.cf_account }}
          PACKAGES_READ_TOKEN: ${{ steps.app-token.outputs.token }}

          # ── Sentry DSNs ───────────────────────────────────────────────────────
          SENTRY_DSN_WORDIS_BOND: ${{ steps.secrets.outputs.sentry_wordis }}
          SENTRY_DSN_CYPHER_HEALING: ${{ steps.secrets.outputs.sentry_cypher }}
          SENTRY_DSN_PRIME_SELF: ${{ steps.secrets.outputs.sentry_prime }}
          SENTRY_DSN_IJUSTUS: ${{ steps.secrets.outputs.sentry_ijustus }}
          SENTRY_DSN_THE_CALLING: ${{ steps.secrets.outputs.sentry_calling }}
          SENTRY_DSN_NEIGHBOR_AID: ${{ steps.secrets.outputs.sentry_neighbor }}
          SENTRY_DSN_VIDEOKING: ${{ steps.secrets.outputs.sentry_video }}

          # ── PostHog — shared project token for all apps ───────────────────────
          POSTHOG_KEY_WORDIS_BOND: ${{ steps.secrets.outputs.posthog_token }}
          POSTHOG_KEY_CYPHER_HEALING: ${{ steps.secrets.outputs.posthog_token }}
          POSTHOG_KEY_PRIME_SELF: ${{ steps.secrets.outputs.posthog_token }}
          POSTHOG_KEY_IJUSTUS: ${{ steps.secrets.outputs.posthog_token }}
          POSTHOG_KEY_THE_CALLING: ${{ steps.secrets.outputs.posthog_token }}
          POSTHOG_KEY_NEIGHBOR_AID: ${{ steps.secrets.outputs.posthog_token }}
          POSTHOG_KEY_VIDEOKING: ${{ steps.secrets.outputs.posthog_token }}

          # ── Stripe — shared key across all apps ───────────────────────────────
          STRIPE_SECRET_KEY_WORDIS_BOND: ${{ steps.secrets.outputs.stripe_key }}
          STRIPE_SECRET_KEY_CYPHER_HEALING: ${{ steps.secrets.outputs.stripe_key }}
          STRIPE_SECRET_KEY_PRIME_SELF: ${{ steps.secrets.outputs.stripe_key }}
          STRIPE_SECRET_KEY_IJUSTUS: ${{ steps.secrets.outputs.stripe_key }}
          STRIPE_SECRET_KEY_THE_CALLING: ${{ steps.secrets.outputs.stripe_key }}
          STRIPE_SECRET_KEY_NEIGHBOR_AID: ${{ steps.secrets.outputs.stripe_key }}
          STRIPE_SECRET_KEY_VIDEOKING: ${{ steps.secrets.outputs.stripe_key }}

          # ── App auth ───────────────────────────────────────────────────────────
          JWT_SECRET_VIDEOKING: ${{ steps.secrets.outputs.jwt_videoking }}
          BETTER_AUTH_SECRET_VIDEOKING: ${{ steps.secrets.outputs.better_auth_videoking }}
          STRIPE_WEBHOOK_SECRET_VIDEOKING: ${{ steps.secrets.outputs.stripe_webhook_videoking }}
          EMAIL_API_KEY_VIDEOKING: ${{ steps.secrets.outputs.resend_key }}

          # ── LLM keys ─────────────────────────────────────────────────────────
          ANTHROPIC_API_KEY_CYPHER_HEALING: ${{ steps.secrets.outputs.anthropic_key }}
          ANTHROPIC_API_KEY_PRIME_SELF: ${{ steps.secrets.outputs.anthropic_key }}
          ANTHROPIC_API_KEY_IJUSTUS: ${{ steps.secrets.outputs.anthropic_key }}

          # ── Telephony ────────────────────────────────────────────────────────
          TELNYX_API_KEY_WORDIS_BOND: ${{ steps.secrets.outputs.telnyx_key }}
          TELNYX_API_KEY_IJUSTUS: ${{ steps.secrets.outputs.telnyx_key }}
          ELEVENLABS_API_KEY_CYPHER_HEALING: ${{ steps.secrets.outputs.elevenlabs_key }}
          ELEVENLABS_API_KEY_PRIME_SELF: ${{ steps.secrets.outputs.elevenlabs_key }}
          ELEVENLABS_API_KEY_IJUSTUS: ${{ steps.secrets.outputs.elevenlabs_key }}
          DEEPGRAM_API_KEY_CYPHER_HEALING: ${{ steps.secrets.outputs.deepgram_key }}
          DEEPGRAM_API_KEY_PRIME_SELF: ${{ steps.secrets.outputs.deepgram_key }}
          DEEPGRAM_API_KEY_IJUSTUS: ${{ steps.secrets.outputs.deepgram_key }}

          # ── Email ────────────────────────────────────────────────────────────
          RESEND_API_KEY_WORDIS_BOND: ${{ steps.secrets.outputs.resend_key }}
          RESEND_API_KEY_CYPHER_HEALING: ${{ steps.secrets.outputs.resend_key }}
          RESEND_API_KEY_PRIME_SELF: ${{ steps.secrets.outputs.resend_key }}
          RESEND_API_KEY_THE_CALLING: ${{ steps.secrets.outputs.resend_key }}
          RESEND_API_KEY_NEIGHBOR_AID: ${{ steps.secrets.outputs.resend_key }}

        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.app }}" ]; then
            ARGS="--app ${{ github.event.inputs.app }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node packages/deploy/scripts/setup-all-apps.mjs $ARGS
