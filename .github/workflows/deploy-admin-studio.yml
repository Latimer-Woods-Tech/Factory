name: Deploy admin-studio (Worker)

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin-studio/**'
      - 'packages/studio-core/**'
      - '.github/workflows/deploy-admin-studio.yml'
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: admin-studio-${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'production' || 'staging' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'production' || 'staging' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build dependency packages
        run: |
          set -euo pipefail
          for pkg in errors monitoring logger neon llm studio-core; do
            echo "=== Installing + building packages/${pkg} ==="
            cd "packages/${pkg}"
            npm ci --ignore-scripts
            npm run build
            cd ../..
          done

      - name: Install admin-studio
        run: npm install --legacy-peer-deps
        working-directory: apps/admin-studio

      - name: Typecheck
        run: npm run typecheck
        working-directory: apps/admin-studio

      - name: Test studio-core
        run: npm test
        working-directory: packages/studio-core

      - name: Verify health pre-deploy (sanity)
        run: |
          target_env="${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'production' || 'staging' }}"
          echo "Deploying admin-studio to $target_env"
          test -n "${{ secrets.CF_API_TOKEN }}" || (echo "::error::CF_API_TOKEN missing" && exit 1)

      - name: Provision webhook secret
        run: |
          target_env="${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'production' || 'staging' }}"
          if [ -z "${{ secrets.STRIPE_SUBSCRIPTION_WEBHOOK_SECRET }}" ]; then
            echo "::warning::STRIPE_SUBSCRIPTION_WEBHOOK_SECRET missing; webhook endpoint will return 503 until configured"
            exit 0
          fi
          echo "Provisioning STRIPE_SUBSCRIPTION_WEBHOOK_SECRET for $target_env"
          echo "${{ secrets.STRIPE_SUBSCRIPTION_WEBHOOK_SECRET }}" | npx wrangler secret put STRIPE_SUBSCRIPTION_WEBHOOK_SECRET --env "$target_env"
        working-directory: apps/admin-studio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}


      - name: Provision studio credentials
        run: |
          target_env="${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'production' || 'staging' }}"
          if [ -z "${{ secrets.FACTORY_USER }}" ] || [ -z "${{ secrets.FACTORY_PW }}" ]; then
            echo "::warning::FACTORY_USER or FACTORY_PW missing; using placeholder credentials"
            exit 0
          fi
          password_hash=$(echo -n "${{ secrets.FACTORY_PW }}" | sha256sum | cut -d' ' -f1)
          echo "${{ secrets.FACTORY_USER }}" | npx wrangler secret put STUDIO_ADMIN_EMAIL --env "$target_env"
          echo "$password_hash" | npx wrangler secret put STUDIO_ADMIN_PASSWORD_SHA256 --env "$target_env"
        working-directory: apps/admin-studio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Push self-improvement secrets
        run: |
          target_env="${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'production' || 'staging' }}"
          echo "${{ secrets.ANTHROPIC_API_KEY }}" | npx wrangler secret put ANTHROPIC_API_KEY --env "$target_env"
          echo "${{ secrets.GH_PAT }}" | npx wrangler secret put GITHUB_TOKEN --env "$target_env"
          if [ -n "${{ secrets.WORKER_API_TOKEN }}" ]; then
            echo "${{ secrets.WORKER_API_TOKEN }}" | npx wrangler secret put WORKER_API_TOKEN --env "$target_env"
          fi
        working-directory: apps/admin-studio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Apply database migrations
        run: |
          # Run all migrations against Neon via psql.
          # All migrations use IF NOT EXISTS, so they are idempotent and safe to re-run.
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "::warning::DATABASE_URL not set; skipping migrations — ensure tables exist in the target database"
            exit 0
          fi
          # Install psql
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          # Apply all pending migrations in sequence (sorted by filename)
          for f in $(ls apps/admin-studio/migrations/*.sql | sort); do
            echo "Applying migration: $f"
            psql "${{ secrets.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "✓ Database migrations applied successfully"
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy
        run: npx wrangler deploy --env ${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'production' || 'staging' }}
        working-directory: apps/admin-studio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Verify post-deploy endpoints
        run: |
          target_env="${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'production' || 'staging' }}"
          if [ "$target_env" = "production" ]; then
            base_url="https://admin.latwoodtech.work"
          else
            base_url="https://admin-studio-staging.adrper79.workers.dev"
          fi
          node apps/admin-studio/scripts/verify-deployment.mjs "$target_env" --base-url "$base_url"
