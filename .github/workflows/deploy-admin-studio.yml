name: Deploy admin-studio (Worker)

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin-studio/**'
      - 'packages/studio-core/**'
      - '.github/workflows/deploy-admin-studio.yml'
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: admin-studio-${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'production' || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Use workflow-scoped environment keys to avoid the shared production/staging
    # environment scheduler wedge (0-job pending runs) seen in May 2026.
    environment: ${{ (github.event.inputs.env == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'admin-studio-production' || 'admin-studio-staging' }}
    permissions:
      contents: read
    outputs:
      environment:         ${{ steps.target.outputs.env }}
      previous_version_id: ${{ steps.capture.outputs.previous_version_id }}
      new_version_id:      ${{ steps.capture-new.outputs.new_version_id }}
      has_migrations:      ${{ steps.migrations.outputs.has_migrations }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        env:
          GCP_AUTH_CREDENTIALS_JSON: ${{ secrets.VERTEX_SA_KEY }}
        with:
          credentials_json: ${{ env.GCP_AUTH_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Fetch deploy secrets and vars from GCP Secret Manager
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env CF_API_TOKEN                         CF_API_TOKEN CLOUDFLARE_API_TOKEN cloudflare-api-token
          fetch_to_env CF_ACCOUNT_ID                        CF_ACCOUNT_ID CLOUDFLARE_ACCOUNT_ID cloudflare-account-id
          fetch_to_env JWT_SECRET                           JWT_SECRET jwt-secret
          fetch_to_env STUDIO_ADMIN_EMAIL                   ADMIN_STUDIO_BOOTSTRAP_EMAIL FACTORY_USER
          fetch_to_env STUDIO_ADMIN_PASSWORD                ADMIN_STUDIO_BOOTSTRAP_PASSWORD FACTORY_PW
          fetch_to_env ANTHROPIC_API_KEY                    LATIMER_ANTHROPIC_API ANTHROPIC_API_KEY anthropic-api-key
          fetch_to_env AI_GATEWAY_BASE_URL                  AI_GATEWAY_URL AI_GATEWAY_BASE_URL ai-gateway-base-url ai-gateway-url
          fetch_to_env DEEPSEEK_API_KEY                     DEEPSEEK_API_KEY deepseek-api-key
          fetch_to_env XAI_API_KEY                          XAI_API_KEY GROK_API_KEY grok-api-key xai-api-key
          fetch_to_env GROQ_API_KEY                         GROQ_API_KEY groq-api-key
          fetch_to_env VERTEX_ACCESS_TOKEN                  VERTEX_ACCESS_TOKEN vertex-access-token
          fetch_to_env VERTEX_PROJECT                       VERTEX_PROJECT vertex-project-id gcp-project-id
          fetch_to_env VERTEX_LOCATION                      VERTEX_LOCATION vertex-location gcp-location
          fetch_to_env STRIPE_SUBSCRIPTION_WEBHOOK_SECRET   STRIPE_SUBSCRIPTION_WEBHOOK_SECRET
          fetch_to_env STUDIO_WEBHOOK_SECRET                STUDIO_WEBHOOK_SECRET
          fetch_to_env WORKER_API_TOKEN                     WORKER_API_TOKEN worker-api-token
          fetch_to_env GOOGLE_CLIENT_ID                     ADMIN_STUDIO_GOOGLE_CLIENT_ID GOOGLE_CLIENT_ID google-client-id
          fetch_to_env STUDIO_ALLOWED_USERS_JSON            ADMIN_STUDIO_ALLOWED_USERS_JSON STUDIO_ALLOWED_USERS_JSON
          fetch_to_env STUDIO_GOOGLE_WORKSPACE_DOMAIN       STUDIO_GOOGLE_WORKSPACE_DOMAIN ADMIN_STUDIO_GOOGLE_WORKSPACE_DOMAIN
          fetch_to_env GCP_SA_KEY                           ADMIN_STUDIO_GCP_SA_KEY

      - name: Verify AI Gateway exists (preflight)
        # admin-studio routes LLM (AI strategies) through this gateway. A ghost
        # gateway 401s every call → silent fallback; fail loud pre-deploy.
        run: |
          set -euo pipefail
          export CLOUDFLARE_API_TOKEN="$CF_API_TOKEN"
          export CLOUDFLARE_ACCOUNT_ID="$CF_ACCOUNT_ID"
          node scripts/verify-ai-gateway.mjs --url "$AI_GATEWAY_BASE_URL"

      - name: Resolve target environment
        id: target
        run: |
          if [ "${{ github.event.inputs.env }}" = "production" ] || ([ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]); then
            echo "env=production" >> "$GITHUB_OUTPUT"
          else
            echo "env=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Build dependency packages
        run: |
          set -euo pipefail
          for pkg in errors monitoring logger neon llm studio-core; do
            echo "=== Installing + building packages/${pkg} ==="
            cd "packages/${pkg}"
            npm ci --ignore-scripts
            npm run build
            cd ../..
          done

      - name: Install admin-studio
        run: npm install --legacy-peer-deps
        working-directory: apps/admin-studio

      - name: Typecheck
        run: npm run typecheck
        working-directory: apps/admin-studio

      # Hard ESLint gate (--max-warnings 0). The worker's 23 pre-existing lint
      # errors were fixed at root cause, so this now blocks a regressing deploy.
      - name: Lint
        run: npm run lint
        working-directory: apps/admin-studio

      - name: Test studio-core
        run: npm test
        working-directory: packages/studio-core

      # Gate the deploy on admin-studio's OWN test suite, not just studio-core.
      # The app-local vitest.config.ts runs the co-located src/**/*.test.ts unit
      # tests that the monorepo-root config (include: tests/**) silently skipped.
      - name: Test admin-studio (worker)
        run: npm test
        working-directory: apps/admin-studio

      # Advisory CVE report — NOT a hard gate yet. A blocking `npm audit
      # --audit-level=high` would fail today on transitive CVEs (js-yaml across
      # shared packages) and block every deploy. Surface them as a warning until
      # the org-wide transitive-dependency remediation lands; then flip this to a
      # hard gate (or adopt _app-reliability-gate.yml at audit_level: high).
      - name: CVE audit (advisory)
        continue-on-error: true
        working-directory: apps/admin-studio
        run: |
          echo "::group::npm audit (advisory)"
          npm audit --audit-level=high || echo "::warning::admin-studio has high/critical CVEs (mostly transitive). Tracked for org-wide remediation; not yet a hard gate."
          echo "::endgroup::"

      - name: Verify health pre-deploy (sanity)
        env:
          FALLBACK_CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          echo "Deploying admin-studio to ${{ steps.target.outputs.env }}"
          cf_api_token="${CF_API_TOKEN:-$FALLBACK_CF_API_TOKEN}"
          test -n "$cf_api_token" || (echo "::error::CF_API_TOKEN missing" && exit 1)

      # ---- NEW: capture previous live version BEFORE deploy ----
      - name: Capture previous worker version (pre-deploy)
        id: capture
        if: steps.target.outputs.env == 'production'
        working-directory: apps/admin-studio
        env:
          FALLBACK_CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          FALLBACK_CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          export CLOUDFLARE_API_TOKEN="${CF_API_TOKEN:-$FALLBACK_CF_API_TOKEN}"
          export CLOUDFLARE_ACCOUNT_ID="${CF_ACCOUNT_ID:-$FALLBACK_CF_ACCOUNT_ID}"
          # The currently-deployed prod version IS the rollback target.
          PREV=$(npx -y wrangler@latest deployments list --env production --json 2>/dev/null \
            | jq -r '.[0].versions[0].version_id // .[0].version_id // empty')
          if [ -z "$PREV" ]; then
            # First-ever prod deploy — no rollback target. Disable canary watch downstream.
            echo "::warning::No previous prod version found; canary-watch will not auto-rollback"
            PREV=""
          fi
          echo "previous_version_id=$PREV" >> "$GITHUB_OUTPUT"
          echo "Captured previous prod version: $PREV"

      # ---- NEW: detect migrations in this deploy's diff ----
      - name: Detect DB migrations in this deploy
        id: migrations
        run: |
          set -euo pipefail
          # If any migrations/*.sql changed since the previous commit on main, flag it.
          BASE="${{ github.event.before || 'HEAD~1' }}"
          if git diff --name-only "$BASE" HEAD -- 'apps/admin-studio/migrations/*.sql' | grep -q .; then
            echo "has_migrations=true"  >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy contains DB migrations — auto-rollback will be skipped on canary failure"
          else
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Provision webhook secret
        env:
          FALLBACK_CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          FALLBACK_CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          FALLBACK_STRIPE_SUBSCRIPTION_WEBHOOK_SECRET: ${{ secrets.STRIPE_SUBSCRIPTION_WEBHOOK_SECRET }}
        run: |
          export CLOUDFLARE_API_TOKEN="${CF_API_TOKEN:-$FALLBACK_CF_API_TOKEN}"
          export CLOUDFLARE_ACCOUNT_ID="${CF_ACCOUNT_ID:-$FALLBACK_CF_ACCOUNT_ID}"
          webhook_secret="${STRIPE_SUBSCRIPTION_WEBHOOK_SECRET:-$FALLBACK_STRIPE_SUBSCRIPTION_WEBHOOK_SECRET}"
          if [ -z "$webhook_secret" ]; then
            echo "::warning::STRIPE_SUBSCRIPTION_WEBHOOK_SECRET missing; webhook endpoint will return 503 until configured"
            exit 0
          fi
          printf '%s' "$webhook_secret" | npx wrangler secret put STRIPE_SUBSCRIPTION_WEBHOOK_SECRET --env "${{ steps.target.outputs.env }}"
        working-directory: apps/admin-studio

      - name: Provision required runtime secrets
        run: |
          set -euo pipefail

          put_required_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error::$name is required for admin-studio deploy"
              exit 1
            fi
            printf '%s' "$value" | npx wrangler secret put "$name" --env "${{ steps.target.outputs.env }}"
          }

          put_optional_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::warning::Skipping optional secret $name — value not configured"
              return 0
            fi
            printf '%s' "$value" | npx wrangler secret put "$name" --env "${{ steps.target.outputs.env }}"
          }

          export CLOUDFLARE_API_TOKEN="${CF_API_TOKEN:-${FALLBACK_CF_API_TOKEN}}"
          export CLOUDFLARE_ACCOUNT_ID="${CF_ACCOUNT_ID:-${FALLBACK_CF_ACCOUNT_ID}}"

          jwt_secret="${JWT_SECRET:-${FALLBACK_JWT_SECRET}}"
          studio_admin_email="${STUDIO_ADMIN_EMAIL:-${FALLBACK_STUDIO_ADMIN_EMAIL}}"
          studio_admin_password="${STUDIO_ADMIN_PASSWORD:-${FALLBACK_STUDIO_ADMIN_PASSWORD}}"
          anthropic_api_key="${ANTHROPIC_API_KEY:-${FALLBACK_ANTHROPIC_API_KEY}}"
          github_token="${STUDIO_GITHUB_TOKEN:-${FALLBACK_GITHUB_TOKEN:-}}"

          password_hash=$(printf '%s' "$studio_admin_password" | sha256sum | cut -d' ' -f1)

          put_required_secret JWT_SECRET "$jwt_secret"
          put_required_secret STUDIO_ADMIN_EMAIL "$studio_admin_email"
          put_required_secret STUDIO_ADMIN_PASSWORD_SHA256 "$password_hash"
          put_required_secret ANTHROPIC_API_KEY "$anthropic_api_key"
          put_required_secret FACTORY_APP_ID "${{ secrets.FACTORY_APP_ID }}"
          put_required_secret FACTORY_APP_PRIVATE_KEY "${{ secrets.FACTORY_APP_PRIVATE_KEY }}"
          put_required_secret FACTORY_APP_INSTALLATION_ID "${{ secrets.FACTORY_APP_INSTALLATION_ID }}"

          put_optional_secret DEEPSEEK_API_KEY "${DEEPSEEK_API_KEY:-}"
          put_optional_secret XAI_API_KEY "${XAI_API_KEY:-}"
          put_optional_secret GROQ_API_KEY "${GROQ_API_KEY:-}"
          put_optional_secret VERTEX_ACCESS_TOKEN "${VERTEX_ACCESS_TOKEN:-}"
          put_optional_secret STUDIO_WEBHOOK_SECRET "${STUDIO_WEBHOOK_SECRET:-${FALLBACK_STUDIO_WEBHOOK_SECRET}}"
          put_optional_secret WORKER_API_TOKEN "${WORKER_API_TOKEN:-${FALLBACK_WORKER_API_TOKEN}}"
          put_optional_secret GOOGLE_CLIENT_ID "${GOOGLE_CLIENT_ID:-${FALLBACK_GOOGLE_CLIENT_ID}}"
          put_optional_secret STUDIO_ALLOWED_USERS_JSON "${STUDIO_ALLOWED_USERS_JSON:-${FALLBACK_STUDIO_ALLOWED_USERS_JSON}}"
          put_optional_secret GCP_SA_KEY "${GCP_SA_KEY:-}"
        working-directory: apps/admin-studio
        env:
          FALLBACK_CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          FALLBACK_CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          FALLBACK_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FALLBACK_STUDIO_ADMIN_EMAIL: ${{ secrets.FACTORY_USER }}
          FALLBACK_STUDIO_ADMIN_PASSWORD: ${{ secrets.FACTORY_PW }}
          FALLBACK_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FALLBACK_STUDIO_WEBHOOK_SECRET: ${{ secrets.STUDIO_WEBHOOK_SECRET }}
          FALLBACK_WORKER_API_TOKEN: ${{ secrets.WORKER_API_TOKEN }}
          FALLBACK_GOOGLE_CLIENT_ID: ${{ secrets.ADMIN_STUDIO_GOOGLE_CLIENT_ID }}
          FALLBACK_STUDIO_ALLOWED_USERS_JSON: ${{ secrets.ADMIN_STUDIO_ALLOWED_USERS_JSON }}

      - name: Apply database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::warning::DATABASE_URL not set; skipping migrations — ensure tables exist in the target database"
            exit 0
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          for f in $(ls apps/admin-studio/migrations/*.sql | sort); do
            echo "Applying migration: $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "✓ Database migrations applied successfully"
        shell: bash

      - name: Deploy
        env:
          FALLBACK_CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          FALLBACK_CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          export CLOUDFLARE_API_TOKEN="${CF_API_TOKEN:-$FALLBACK_CF_API_TOKEN}"
          export CLOUDFLARE_ACCOUNT_ID="${CF_ACCOUNT_ID:-$FALLBACK_CF_ACCOUNT_ID}"

          ai_gateway_base_url="${AI_GATEWAY_BASE_URL:-}"
          if [ -z "$ai_gateway_base_url" ]; then
            echo "::error::AI_GATEWAY_BASE_URL missing; Admin Studio AI strategies cannot function without it"
            exit 1
          fi

          vertex_project="${VERTEX_PROJECT:-factory-495015}"
          vertex_location="${VERTEX_LOCATION:-us-central1}"
          workspace_domain="${STUDIO_GOOGLE_WORKSPACE_DOMAIN:-latwoodtech.com}"

          npx wrangler deploy \
            --env "${{ steps.target.outputs.env }}" \
            --outdir dist \
            --var AI_GATEWAY_BASE_URL:"$ai_gateway_base_url" \
            --var VERTEX_PROJECT:"$vertex_project" \
            --var VERTEX_LOCATION:"$vertex_location" \
            --var STUDIO_GOOGLE_WORKSPACE_DOMAIN:"$workspace_domain"
        working-directory: apps/admin-studio

      # Upload sourcemaps to Sentry so stack traces resolve to TypeScript
      # source lines. The release tag must match the BUILD_SHA exposed to the
      # worker via @latimer-woods-tech/monitoring. Skips gracefully when the
      # SENTRY_AUTH_TOKEN secret is not configured.
      - name: Upload sourcemaps to Sentry
        # Sourcemap upload is nice-to-have (stack-trace symbolication) — it must
        # never gate a deploy. Verified slugs via Sentry API 2026-05-24: org
        # `latwood-tech`, Worker project `factory-admin-worker`. (The Pages
        # project `admin-studio-ui` is uploaded by the sibling deploy workflow.)
        continue-on-error: true
        working-directory: apps/admin-studio
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: latwood-tech
          SENTRY_PROJECT: factory-admin-worker
          SENTRY_RELEASE: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "::warning::SENTRY_AUTH_TOKEN missing; sourcemaps upload skipped"
            exit 0
          fi
          if [ ! -d dist ]; then
            echo "::warning::No dist/ directory after deploy; sourcemaps upload skipped"
            exit 0
          fi
          npx -y @sentry/cli@latest releases new "$SENTRY_RELEASE"
          npx -y @sentry/cli@latest sourcemaps upload \
            --release "$SENTRY_RELEASE" \
            --url-prefix '~/' \
            dist
          npx -y @sentry/cli@latest releases finalize "$SENTRY_RELEASE"

      # ---- NEW: capture the just-deployed version id ----
      - name: Capture new worker version (post-deploy)
        id: capture-new
        if: steps.target.outputs.env == 'production'
        working-directory: apps/admin-studio
        env:
          FALLBACK_CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          FALLBACK_CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          export CLOUDFLARE_API_TOKEN="${CF_API_TOKEN:-$FALLBACK_CF_API_TOKEN}"
          export CLOUDFLARE_ACCOUNT_ID="${CF_ACCOUNT_ID:-$FALLBACK_CF_ACCOUNT_ID}"
          NEW=$(npx -y wrangler@latest versions list --name admin-studio-production --json 2>/dev/null \
            | jq -r '.[0].id // empty')
          test -n "$NEW" || (echo "::error::Could not capture new version id" && exit 1)
          echo "new_version_id=$NEW" >> "$GITHUB_OUTPUT"
          echo "New prod version: $NEW"

      - name: Verify post-deploy endpoints
        run: |
          # Probe the canonical custom domain. CF deactivates the .workers.dev URL
          # for any worker with a Custom Domain attached (HTTP 1042 "Route not active"),
          # so workers.dev probing here would always fail post-#610.
          if [ "${{ steps.target.outputs.env }}" = "production" ]; then
            base_url="https://api.apunlimited.com"
          else
            base_url="https://api.admin.latimerwoods.dev"
            # Staging uses a latimerwoods.dev custom domain that may take 1-3 min to
            # propagate on first attach (Cloudflare cert provisioning). Wait for /health
            # before running the full verify suite.
            node scripts/verify-http-endpoint.mjs \
              --url "${base_url}/health" \
              --status 200 \
              --retries 12 \
              --delay-ms 15000 \
              || echo "::warning::Staging health pre-check timed out — proceeding anyway"
          fi
          node apps/admin-studio/scripts/verify-deployment.mjs "${{ steps.target.outputs.env }}" --base-url "$base_url"

  # ---- NEW: post-deploy 5-minute canary watcher (prod only) ----
  canary-watch:
    needs: deploy
    if: needs.deploy.outputs.environment == 'production' && needs.deploy.outputs.previous_version_id != ''
    uses: Latimer-Woods-Tech/factory/.github/workflows/_canary-watch.yml@main
    with:
      app_name:            admin-studio
      worker_name:         admin-studio-production
      sentry_project:      factory-admin-worker
      sentry_org:          latwood-tech
      base_url:            https://api.apunlimited.com
      smoke_path:          /health
      previous_version_id: ${{ needs.deploy.outputs.previous_version_id }}
      new_version_id:      ${{ needs.deploy.outputs.new_version_id }}
      commit_sha:          ${{ github.sha }}
      has_migrations:      ${{ needs.deploy.outputs.has_migrations == 'true' }}
    secrets: inherit
