name: Secret Contract Preflight

# Phase 1 — report only.
# On every non-draft PR, detect which registered Workers / Pages apps are
# touched by the changed files, then post (or update) a comment listing the
# expected secret contracts for each touched service.
# This job never blocks a merge.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

concurrency:
  group: secret-contract-preflight-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  preflight:
    name: Report secret contracts for touched apps
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip draft PRs — re-triggers automatically when marked ready_for_review
    if: ${{ !github.event.pull_request.draft }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run secret contract preflight (report-only)
        # continue-on-error ensures this step never blocks the PR, even if the
        # script exits non-zero due to an unexpected error.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node .github/scripts/secret-contract-preflight.mjs
