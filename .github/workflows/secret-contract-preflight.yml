name: Secret Contract Preflight

# Phase 1 — report only.
# On every non-draft PR, detect which registered Workers / Pages apps are
# touched by the changed files, then post (or update) a comment listing the
# expected secret contracts for each touched service.
# This job never blocks a merge.

on:
  workflow_dispatch:  # now handled by pr-advisory-sweep.yml on a 4-hour schedule

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  preflight:
    name: Report secret contracts for touched apps
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip bot senders and draft PRs — re-triggers automatically when marked ready_for_review
    # (was two duplicate `if:` keys before — invalid YAML)
    if: ${{ github.event.sender.type != 'Bot' && !github.event.pull_request.draft }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Run secret contract preflight (report-only)
        # continue-on-error ensures this step never blocks the PR, even if the
        # script exits non-zero due to an unexpected error.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node .github/scripts/secret-contract-preflight.mjs
