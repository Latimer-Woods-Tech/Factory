name: Deploy Inbound Oracle

on:
  push:
    branches: [main]
    paths:
      - 'apps/inbound-oracle/**'
      - '.github/workflows/deploy-inbound-oracle.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

concurrency:
  group: deploy-inbound-oracle-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Deploy inbound-oracle to Cloudflare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build local package dependencies
        run: |
          set -euo pipefail
          for package in errors monitoring logger llm; do
            echo "=== ${package} ==="
            cd "packages/${package}"
            npm ci --ignore-scripts
            npm run build
            cd ../..
          done

      - name: Install dependencies
        run: |
          cd apps/inbound-oracle
          npm install

      - name: Deploy to Cloudflare Workers
        working-directory: apps/inbound-oracle
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          
          # Put secrets
          printf '%s' "${{ secrets.ANTHROPIC_API_KEY }}" | npx wrangler secret put ANTHROPIC_API_KEY --env production
          printf '%s' "${{ secrets.ELEVENLABS_API_KEY }}" | npx wrangler secret put ELEVENLABS_API_KEY --env production
          printf '%s' "${{ secrets.TELNYX_API_KEY }}" | npx wrangler secret put TELNYX_API_KEY --env production
          printf '%s' "${{ secrets.FACTORY_R2_ACCESS_KEY }}" | npx wrangler secret put R2_ACCESS_KEY_ID --env production
          printf '%s' "${{ secrets.FACTORY_R2_SECRET_KEY }}" | npx wrangler secret put R2_SECRET_ACCESS_KEY --env production
          
          # Deploy
          npx wrangler deploy --env production
