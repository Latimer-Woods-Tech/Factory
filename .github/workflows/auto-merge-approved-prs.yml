name: Auto Merge Approved PRs

on:
  pull_request_review:
    types:
      - submitted
  pull_request:
    types:
      - labeled
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: auto-merge-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  enable-auto-merge:
    if: |
      !github.event.pull_request.draft &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'no-automerge') &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'needs-human') &&
      (
        (
          !startsWith(github.event.pull_request.head.ref, 'supervisor/') &&
          !startsWith(github.event.pull_request.head.ref, 'copilot/')
        ) ||
        contains(join(github.event.pull_request.labels.*.name, ','), 'automerge:allow-bot-branch')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Log auto-merge decision context
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          echo "PR number: $PR_NUMBER"
          echo "PR branch: $PR_BRANCH"
          echo "PR labels: $PR_LABELS"

      - name: Create GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - name: Enable auto-merge after approval and checks
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          review_decision=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json reviewDecision --jq '.reviewDecision')
          if [ "$review_decision" != "APPROVED" ]; then
            echo "PR is not approved yet (reviewDecision=$review_decision), skipping."
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash --delete-branch
