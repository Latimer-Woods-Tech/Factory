name: Auto Merge Approved PRs

on:
  pull_request_review:
    types:
      - submitted
  pull_request:
    types:
      - labeled
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: auto-merge-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: |
      !github.event.pull_request.draft &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'no-automerge') &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'needs-human') &&
      (
        (
          !startsWith(github.event.pull_request.head.ref, 'supervisor/') &&
          !startsWith(github.event.pull_request.head.ref, 'copilot/')
        ) ||
        contains(join(github.event.pull_request.labels.*.name, ','), 'automerge:allow-bot-branch')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Log auto-merge decision context
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          echo "PR number: $PR_NUMBER"
          echo "PR branch: $PR_BRANCH"
          echo "PR labels: $PR_LABELS"

      - name: Create GitHub App token (non-Dependabot PRs)
        id: app-token
        if: github.actor != 'dependabot[bot]'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - name: Enable auto-merge after approval and checks
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          review_decision=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json reviewDecision --jq '.reviewDecision')
          if [ "$review_decision" != "APPROVED" ]; then
            echo "PR is not approved yet (reviewDecision=$review_decision), skipping."
            exit 0
          fi

          # ADR-0005 is not a branch-protection-required check on every path yet,
          # so this workflow must fail closed before enabling auto-merge. Without
          # this, a PR can merge after approval even when the diff-size guard failed.
          diff_guard=""
          for _ in $(seq 1 30); do
            diff_guard=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json statusCheckRollup --jq '
              [.statusCheckRollup[]?
                | select(.name == "PR diff-size guard (ADR-0005)")
                | (.conclusion // .status // "UNKNOWN")
              ] | last // "MISSING"
            ')
            case "$diff_guard" in
              SUCCESS)
                echo "Diff-size guard passed."
                break
                ;;
              FAILURE|ERROR|CANCELLED|TIMED_OUT|ACTION_REQUIRED)
                echo "Diff-size guard failed (conclusion=$diff_guard); refusing to enable auto-merge."
                exit 1
                ;;
              *)
                echo "Diff-size guard not complete yet (state=$diff_guard); waiting."
                sleep 10
                ;;
            esac
          done

          if [ "$diff_guard" != "SUCCESS" ]; then
            echo "Diff-size guard did not reach SUCCESS; refusing to enable auto-merge."
            exit 1
          fi

          gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash --delete-branch
