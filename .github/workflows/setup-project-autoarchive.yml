name: Setup project auto-archive

on:
  workflow_dispatch:

# TM — Manual only. Run once to bootstrap RFC-006 Phase 0 exit criterion:
# "Project auto-archive enabled for Done items after 30 days."
#
# The script queries the project to confirm settings and prints manual UI
# instructions (GitHub Projects v2 auto-archive is not yet configurable via API).
# Idempotent — safe to re-run.

concurrency:
  group: setup-project-autoarchive
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Mint Factory App token
        id: app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: Factory

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Query project and print auto-archive instructions
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: node .github/scripts/setup-project-autoarchive.mjs
