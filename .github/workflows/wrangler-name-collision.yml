name: Validate wrangler name uniqueness

# Prevents silent Cloudflare Worker overwrites caused by multiple wrangler.jsonc
# files declaring the same `name` or `env.*.name` value.
#
# Context: inbound-oracle had `env.production.name: "prime-self"` which caused
# wrangler to silently overwrite the real prime-self worker on every production
# deploy. This gate ensures that pattern cannot recur undetected.
#
# Enforces two rules:
#   R1  Every worker name across all apps/*/wrangler.jsonc is unique.
#   R2  Every env.production.name appears in docs/service-registry.yml.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-names:
    name: Validate wrangler name uniqueness
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Run wrangler name collision check
        run: node .github/scripts/wrangler-name-collision-check.mjs
