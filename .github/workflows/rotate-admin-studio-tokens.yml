name: rotate admin-studio tokens

# Rotates the short-lived tokens that admin-studio-production needs:
#
#   GITHUB_TOKEN          → factory-cross-repo[bot] installation token
#                           (1 hour TTL; powers /repo/branches, /repo/tree, etc.)
#
#   VERTEX_ACCESS_TOKEN   → Vertex AI access token minted from VERTEX_SA_KEY
#                           (1 hour TTL; powers planning/drafting AI strategies
#                           via @latimer-woods-tech/llm)
#
# Both endpoints would otherwise 401/503 once the previous token expires.
# Refresh interval (40 min) is well under the 1h TTL so a missed run still
# leaves a valid token in place.
#
# This workflow runs on the default runner without declaring a GitHub
# deployment environment, so it sidesteps the production-env scheduling
# wedge tracked in #782.

on:
  workflow_dispatch: {}
  schedule:
    - cron: '*/40 * * * *'

concurrency:
  group: rotate-admin-studio-tokens
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # Required for Workload Identity Federation to GCP

jobs:
  rotate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      # ──────────────────────────────────────────────────────────────
      # 1) Mint factory-cross-repo[bot] installation token
      # ──────────────────────────────────────────────────────────────
      - name: Generate factory[bot] token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: factory
          # CRITICAL: by default this action revokes the token in its post-step,
          # which kills the freshly-rotated worker secret as soon as the cron
          # finishes. The whole point of the cron is to push a 1-hour token
          # that survives the run, so we must opt out of revocation.
          skip-token-revoke: true

      - name: Push GITHUB_TOKEN to admin-studio-production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          NEW_TOKEN: ${{ steps.app-token.outputs.token }}
        working-directory: apps/admin-studio
        run: |
          set -euo pipefail
          # printf '%s' instead of echo: echo appends a trailing newline that
          # wrangler v4 stores verbatim, which corrupts the Bearer header at
          # request time and surfaces as "Bad credentials" from GitHub.
          printf '%s' "$NEW_TOKEN" | npx wrangler@3 secret put GITHUB_TOKEN --env production

      # ──────────────────────────────────────────────────────────────
      # 2) Mint Vertex AI access token from the SA key in GCP SM
      # ──────────────────────────────────────────────────────────────
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: projects/891842778224/locations/global/workloadIdentityPools/github-factory/providers/github
          service_account: factory-sa@factory-495015.iam.gserviceaccount.com

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Mint Vertex token from VERTEX_SA_KEY and push to worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GCP_PROJECT: factory-495015
        working-directory: apps/admin-studio
        run: |
          set -euo pipefail

          # Pull the SA key JSON. Secret version 2 (uploaded 2026-05-17)
          # is already clean JSON; older versions had a BOM / CRLF / missing
          # outer brace issue. If the parse fails here, re-upload a clean
          # version via:
          #   gcloud secrets versions add VERTEX_SA_KEY --data-file=clean.json
          gcloud secrets versions access latest \
            --secret=VERTEX_SA_KEY \
            --project="$GCP_PROJECT" > /tmp/vertex-sa.json
          chmod 600 /tmp/vertex-sa.json

          # Activate the Vertex SA from its key and mint an access token
          # under its identity. Doing it this way (vs impersonation) avoids
          # any roles/iam.serviceAccountTokenCreator dependency on factory-sa.
          gcloud auth activate-service-account --key-file=/tmp/vertex-sa.json
          ACCESS_TOKEN=$(gcloud auth print-access-token)

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Failed to mint Vertex access token"
            exit 1
          fi

          # Push as the three secrets the worker's LLM package expects.
          # See GITHUB_TOKEN push above re: printf vs echo.
          printf '%s' "$ACCESS_TOKEN" | npx wrangler@3 secret put VERTEX_ACCESS_TOKEN --env production

          # Cleanup.
          rm -f /tmp/vertex-sa.json

      - name: Smoke test the worker
        env:
          BASE_URL: https://api.apunlimited.com
        run: |
          set -euo pipefail
          # /health must respond before we claim success.
          curl -fsS "$BASE_URL/health" > /dev/null
          echo "✓ rotation complete and worker /health is 200"
