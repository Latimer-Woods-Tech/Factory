name: Revenue + Reliability Digest

# Stage 2 M3 — Daily revenue + reliability digest. Shadow mode.
# Answers the 4 Stage 2 questions the cost digest doesn't cover:
#   • staying  (MRR from active Stripe subscriptions)
#   • shipping right (Sentry user-facing error rate)
#   • buying durably (funnel conversion via PostHog)
# Runs ~30 min after cost-observability so the daily Pushover sequence is:
# completion → cost → revenue.
#
# RFC-006 §10: daily runs upload revenue snapshot as a 30-day artifact.
# Snapshot PRs retired per RFC-006 §10.
on:
  schedule:
    - cron: '7 7 * * *' # daily 07:07 UTC (after cost digest at 06:37)
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD UTC). Empty = today.'
        required: false
      provider:
        description: 'Single provider (stripe_mrr|sentry_users|posthog_funnel). Empty = all.'
        required: false
      pushover:
        description: 'Send Pushover digest (true/false)'
        required: false
        default: 'true'

permissions:
  contents: read # RFC-006 §10: artifact upload does not need write

concurrency:
  group: revenue-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Mint Factory App token
        id: app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: Factory

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app.outputs.token }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Fetch secrets from GCP Secret Manager
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env STRIPE_API_KEY      STRIPE_SECRET_KEY stripe-api-key-readonly STRIPE_API_KEY
          fetch_to_env SENTRY_AUTH_TOKEN   FACTORY_SENTRY_API LATIMERWOODS_SENTRY_AUTH SENTRY_AUTH_TOKEN
          fetch_to_env POSTHOG_API_KEY     posthog-api-key POSTHOG_API_KEY
          fetch_to_env POSTHOG_PROJECT_ID  posthog-project-id POSTHOG_PROJECT_ID
          fetch_to_env POSTHOG_FUNNEL_ID   posthog-funnel-id POSTHOG_FUNNEL_ID
          fetch_to_env PUSHOVER_USER       FACTORY_PUSHOVER_USER PUSHOVER_USER pushover-user
          fetch_to_env PUSHOVER_TOKEN      FACTORY_PUSHOVER_API PUSHOVER_TOKEN pushover-token

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Run revenue digest
        env:
          SENTRY_ORG: latwood-tech
        run: |
          set -euo pipefail
          args=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            args="$args --date ${{ github.event.inputs.date }}"
          fi
          if [ -n "${{ github.event.inputs.provider }}" ]; then
            args="$args --provider ${{ github.event.inputs.provider }}"
          fi
          if [ "${{ github.event.inputs.pushover || 'true' }}" = "true" ]; then
            args="$args --pushover"
          fi
          python scripts/revenue_digest.py $args

      # RFC-006 §10: upload artifact instead of opening a snapshot PR.
      - name: Upload revenue snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: revenue-snapshot-${{ github.run_id }}
          path: docs/revenue/
          retention-days: 30
          if-no-files-found: warn
