name: Update STACK Manifest

# Triggers:
# - Every successful publish (workflow_run of Publish Package)
# - Manual dispatch
# - Daily safety net (catches missed updates if workflow_run fires before main is updated)
#
# RFC-006 §10 special case: STACK.md is a human-readable reference doc, not
# telemetry. The commit/PR is kept but uses a stable branch (chore/stack-manifest)
# instead of daily-timestamped branches, so only one PR accumulates at a time.
on:
  workflow_run:
    workflows: ['Publish Package']
    types: [completed]
  workflow_dispatch: {}
  schedule:
    - cron: '17 4 * * *' # daily 04:17 UTC

# Need write access for branch+commit and pull-requests:write for PR creation.
# Direct push to main is blocked by branch protection — must go through a PR
# that hits the existing auto-merge path.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-stack-manifest
  cancel-in-progress: false

jobs:
  update:
    # Only run on successful publish (or manual / scheduled).
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Need full history for git diff + commit back.
          fetch-depth: 0
          # Use a PAT or default token with contents:write.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
      - name: Run update-stack-manifest.js
        run: node scripts/update-stack-manifest.js

      # RFC-006 §10 special case: STACK.md is a reference doc — keep the Git
      # commit, but use a stable branch (no daily timestamp) so only one PR
      # accumulates. Reruns update the existing PR rather than opening new ones.
      - name: Open or update auto-merge PR if STACK.md changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git add docs/STACK.md
          if git diff --quiet --cached docs/STACK.md; then
            echo "STACK.md is already up to date — nothing to commit."
            exit 0
          fi
          DATE=$(date -u +%F)
          BRANCH="chore/stack-manifest"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          git add docs/STACK.md
          if git diff --cached --quiet docs/STACK.md; then
            echo "Existing STACK.md branch already contains this content."
          else
            git commit -m "chore(stack): auto-update STACK.md package versions ($DATE)"
            git push --force-with-lease --set-upstream origin "$BRANCH"
          fi

          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing STACK.md PR #$EXISTING_PR."
            gh pr edit "$EXISTING_PR" \
              --title "chore(stack): auto-update STACK.md ($DATE)" \
              --body "Automated STACK.md refresh from \`scripts/update-stack-manifest.js\` (see workflow \`update-stack-manifest.yml\`). Stable branch — reruns update this PR instead of opening new ones."
            gh pr merge --auto --squash "$EXISTING_PR" || true
          else
            gh pr create \
              --title "chore(stack): auto-update STACK.md ($DATE)" \
              --body "Automated STACK.md refresh from \`scripts/update-stack-manifest.js\` (see workflow \`update-stack-manifest.yml\`). Stable branch — reruns update this PR instead of opening new ones." \
              --label automation \
              --label documentation \
              --label auto-merge
          fi
