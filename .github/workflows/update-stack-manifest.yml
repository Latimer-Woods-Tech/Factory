name: Update Stack Manifest

on:
  # Fires after a successful package publish
  workflow_run:
    workflows: ["Publish Package"]
    types: [completed]
  # Manual trigger for initial setup or forced refresh
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: update-stack-manifest
  cancel-in-progress: false

jobs:
  update-stack:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Update STACK.md package versions
        run: node scripts/update-stack-manifest.js

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet docs/STACK.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version changes detected — STACK.md is already current."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changes detected:"
            git diff docs/STACK.md
          fi

      - name: Commit and push updated STACK.md
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/STACK.md
          git commit -m "chore(docs): auto-update STACK.md package versions [skip ci]"
          git push
