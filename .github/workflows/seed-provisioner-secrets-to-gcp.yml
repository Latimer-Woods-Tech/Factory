name: Seed provisioner secrets to GCP Secret Manager

# One-shot (and rotation) workflow that mirrors GH_PAT from GitHub Actions
# into GCP Secret Manager so fetch_gcp_secrets.sh can pull it at dispatch time.
#
# Only GH_PAT is seeded. NODE_AUTH_TOKEN is NOT seeded — provision-app-staging.yml
# uses GITHUB_TOKEN (auto-provided by Actions) for npm install, matching the
# pattern in ci.yml, deploy-supervisor.yml, etc.
# CF_API_TOKEN and CF_ACCOUNT_ID are already in GCP and are NOT touched.
#
# Idempotent: creates the secret if it doesn't exist; adds a new version on
# re-runs. Safe to re-run quarterly when GH_PAT is rotated.
#
# Required: supervisor-sa@factory-495015 must have roles/secretmanager.admin.
# Already granted 2026-05-27. If PERMISSION_DENIED, re-grant:
#   gcloud projects add-iam-policy-binding factory-495015 \
#     --member=serviceAccount:supervisor-sa@factory-495015.iam.gserviceaccount.com \
#     --role=roles/secretmanager.admin

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Print what would happen without writing to GCP
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT: factory-495015
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Seed GH_PAT → GCP Secret Manager
        env:
          SECRET_VALUE: ${{ secrets.GH_PAT }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          SECRET_NAME="GH_PAT"
          if [ -z "${SECRET_VALUE:-}" ]; then
            echo "::error::secrets.GH_PAT is empty — cannot seed"
            exit 1
          fi
          if [ "${DRY_RUN}" = "true" ]; then
            echo "DRY RUN: would write ${SECRET_NAME} to GCP project=${GCP_PROJECT}"
            exit 0
          fi
          echo "::add-mask::${SECRET_VALUE}"
          if gcloud secrets describe "${SECRET_NAME}" --project="${GCP_PROJECT}" --quiet 2>/dev/null; then
            printf '%s' "${SECRET_VALUE}" \
              | gcloud secrets versions add "${SECRET_NAME}" \
                  --data-file=- --project="${GCP_PROJECT}" --quiet
            echo "✅ ${SECRET_NAME} — new version added"
          else
            printf '%s' "${SECRET_VALUE}" \
              | gcloud secrets create "${SECRET_NAME}" \
                  --data-file=- --project="${GCP_PROJECT}" \
                  --replication-policy=automatic --quiet
            echo "✅ ${SECRET_NAME} — created"
          fi

      - name: Verify GH_PAT is readable
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          VALUE=$(gcloud secrets versions access latest \
            --secret="GH_PAT" --project="${GCP_PROJECT}" --quiet 2>/dev/null || echo "")
          if [ -z "$VALUE" ]; then
            echo "::error::Post-seed verification failed — GH_PAT not readable from GCP"
            exit 1
          fi
          echo "::add-mask::${VALUE}"
          echo "✅ GH_PAT verified readable from GCP"
          echo ""
          echo "GH_PAT is now available to fetch_gcp_secrets.sh."
          echo "provision-app-staging.yml fetches it via: fetch_to_env GH_PAT GH_PAT"
          echo "NODE_AUTH_TOKEN uses GITHUB_TOKEN (auto-provided) — no seed needed."
