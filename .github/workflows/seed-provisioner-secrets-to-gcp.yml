name: Seed provisioner secrets to GCP Secret Manager

# One-shot (and rotation) workflow that mirrors the two GitHub Actions–only
# secrets needed by provision-app-staging.yml into GCP Secret Manager so
# fetch_gcp_secrets.sh can pull them at dispatch time.
#
# GH_PAT and NODE_AUTH_TOKEN exist only as GitHub Actions repo secrets today.
# CF_API_TOKEN and CF_ACCOUNT_ID are already in GCP (confirmed by existing
# deploy workflows); this workflow intentionally does NOT touch those.
#
# Idempotent: creates the secret if it doesn't exist; adds a new version if it
# does. Safe to re-run quarterly when GH_PAT / NODE_AUTH_TOKEN are rotated.
#
# Required GCP permissions on factory-sa@factory-495015.iam.gserviceaccount.com:
#   roles/secretmanager.secretAccessor (already granted)
#   roles/secretmanager.secretVersionAdder  ← needed for `versions add`
#   roles/secretmanager.admin               ← needed for `secrets create`
# If the run fails with PERMISSION_DENIED, grant the above via:
#   gcloud projects add-iam-policy-binding factory-495015 \
#     --member=serviceAccount:factory-sa@factory-495015.iam.gserviceaccount.com \
#     --role=roles/secretmanager.admin

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Print what would happen without writing to GCP
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT: factory-495015
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Seed GH_PAT → GCP Secret Manager
        env:
          SECRET_VALUE: ${{ secrets.GH_PAT }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          SECRET_NAME="GH_PAT"
          if [ -z "${SECRET_VALUE:-}" ]; then
            echo "::error::secrets.GH_PAT is empty — cannot seed"
            exit 1
          fi
          if [ "${DRY_RUN}" = "true" ]; then
            echo "DRY RUN: would write ${SECRET_NAME} to GCP project=${GCP_PROJECT}"
            exit 0
          fi
          echo "::add-mask::${SECRET_VALUE}"
          if gcloud secrets describe "${SECRET_NAME}" --project="${GCP_PROJECT}" --quiet 2>/dev/null; then
            printf '%s' "${SECRET_VALUE}" \
              | gcloud secrets versions add "${SECRET_NAME}" \
                  --data-file=- --project="${GCP_PROJECT}" --quiet
            echo "✅ ${SECRET_NAME} — new version added"
          else
            printf '%s' "${SECRET_VALUE}" \
              | gcloud secrets create "${SECRET_NAME}" \
                  --data-file=- --project="${GCP_PROJECT}" \
                  --replication-policy=automatic --quiet
            echo "✅ ${SECRET_NAME} — created"
          fi

      - name: Seed NODE_AUTH_TOKEN → GCP Secret Manager
        env:
          SECRET_VALUE: ${{ secrets.NODE_AUTH_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          SECRET_NAME="NODE_AUTH_TOKEN"
          if [ -z "${SECRET_VALUE:-}" ]; then
            echo "::error::secrets.NODE_AUTH_TOKEN is empty — cannot seed"
            exit 1
          fi
          if [ "${DRY_RUN}" = "true" ]; then
            echo "DRY RUN: would write ${SECRET_NAME} to GCP project=${GCP_PROJECT}"
            exit 0
          fi
          echo "::add-mask::${SECRET_VALUE}"
          if gcloud secrets describe "${SECRET_NAME}" --project="${GCP_PROJECT}" --quiet 2>/dev/null; then
            printf '%s' "${SECRET_VALUE}" \
              | gcloud secrets versions add "${SECRET_NAME}" \
                  --data-file=- --project="${GCP_PROJECT}" --quiet
            echo "✅ ${SECRET_NAME} — new version added"
          else
            printf '%s' "${SECRET_VALUE}" \
              | gcloud secrets create "${SECRET_NAME}" \
                  --data-file=- --project="${GCP_PROJECT}" \
                  --replication-policy=automatic --quiet
            echo "✅ ${SECRET_NAME} — created"
          fi

      - name: Verify both secrets are readable
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          for name in GH_PAT NODE_AUTH_TOKEN; do
            VALUE=$(gcloud secrets versions access latest \
              --secret="${name}" --project="${GCP_PROJECT}" --quiet 2>/dev/null || echo "")
            if [ -z "$VALUE" ]; then
              echo "::error::Post-seed verification failed for ${name} — secret not readable"
              exit 1
            fi
            echo "::add-mask::${VALUE}"
            echo "✅ ${name} verified readable from GCP"
          done
          echo ""
          echo "Both secrets are now available to fetch_gcp_secrets.sh."
          echo "provision-app-staging.yml can now fetch them via:"
          echo "  fetch_to_env GH_PAT           GH_PAT"
          echo "  fetch_to_env NODE_AUTH_TOKEN  NODE_AUTH_TOKEN"
