name: Deploy Daily Brief

on:
  push:
    branches: [main]
    paths:
      - 'apps/daily-brief/**'
      - 'packages/email/**'
      - 'packages/llm/**'
      - 'packages/telephony/**'
      - 'packages/errors/**'
      - 'packages/logger/**'
      - '.github/workflows/deploy-daily-brief.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: deploy-daily-brief-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: Deploy daily-brief to Cloudflare

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build dependency packages
        run: |
          set -euo pipefail
          # Build in strict dependency order (see CLAUDE.md §Package Dependency Order)
          for pkg in errors logger llm telephony email; do
            echo "=== Building packages/${pkg} ==="
            cd "packages/${pkg}"
            npm ci --ignore-scripts
            npm run build
            cd ../..
          done

      - name: Install daily-brief dependencies
        run: npm ci
        working-directory: apps/daily-brief

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: apps/daily-brief

      - name: Test
        run: npx vitest run
        working-directory: apps/daily-brief

      - name: Confirm CF_API_TOKEN is set
        run: |
          test -n "${{ secrets.CF_API_TOKEN }}" || \
            (echo "::error::CF_API_TOKEN secret is not set." && exit 1)

      - name: Provision secrets
        working-directory: apps/daily-brief
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          # Only provision secrets that are set — skip empties with a warning.
          put_secret() {
            local name="$1" val="$2"
            if [ -z "$val" ]; then
              echo "::warning::Skipping $name — secret not set in this repo"
              return 0
            fi
            echo "$val" | npx wrangler secret put "$name" --env production 2>&1 | grep -v "^$"
          }

          # Required secrets
          put_secret RESEND_API_KEY         "${{ secrets.RESEND_API_KEY }}"
          put_secret ANTHROPIC_API_KEY      "${{ secrets.ANTHROPIC_API_KEY }}"
          put_secret GROQ_API_KEY           "${{ secrets.GROQ_API_KEY }}"
          put_secret VERTEX_ACCESS_TOKEN    "${{ secrets.VERTEX_ACCESS_TOKEN }}"
          put_secret ELEVENLABS_API_KEY     "${{ secrets.ELEVENLABS_API_KEY }}"
          put_secret ELEVENLABS_VOICE_ID    "${{ secrets.ELEVENLABS_VOICE_DEFAULT }}"
          put_secret GITHUB_TOKEN           "${{ secrets.FACTORY_GITHUB_TOKEN }}"
          put_secret NEWS_API_KEY           "${{ secrets.NEWS_API_KEY }}"

          # Optional secrets
          put_secret GROK_API_KEY           "${{ secrets.GROK_API_KEY }}"
          put_secret STRIPE_SECRET_KEY      "${{ secrets.STRIPE_SECRET_KEY }}"
          put_secret POSTHOG_API_KEY        "${{ secrets.POSTHOG_API_KEY }}"
          put_secret POSTHOG_PROJECT_ID     "${{ secrets.POSTHOG_PROJECT_ID }}"
          put_secret SENTRY_AUTH_TOKEN      "${{ secrets.SENTRY_AUTH_TOKEN }}"
          put_secret SENTRY_ORG             "${{ secrets.SENTRY_ORG }}"

      - name: Deploy to Cloudflare Workers
        working-directory: apps/daily-brief
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy --env production

      - name: Verify deployment health
        run: |
          URL="https://daily-brief.adrper79.workers.dev"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${URL}/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ /health returned 200"
              exit 0
            fi
            echo "Attempt $i: status=${STATUS}, retrying in 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 5 attempts (last status: ${STATUS})"
          exit 1
