name: Deploy Video Cron Worker

on:
  push:
    branches: [main]
    paths:
      - 'apps/video-cron/**'
      - '.github/workflows/deploy-video-cron.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

concurrency:
  group: deploy-video-cron-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    name: Deploy video-cron to Cloudflare
    environment: production

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Build local package dependencies
        run: |
          set -euo pipefail
          for package in errors monitoring logger neon video schedule; do
            echo "=== ${package} ==="
            cd "packages/${package}"
            npm ci --ignore-scripts
            npm run build
            cd ../..
          done

      - name: Install dependencies
        run: |
          cd apps/video-cron
          npm install

      - name: Update wrangler.jsonc with Hyperdrive ID
        run: |
          cd apps/video-cron
          sed -i 's/REPLACE_WITH_HYPERDRIVE_ID/${{ secrets.HYPERDRIVE_FACTORY_CORE }}/g' wrangler.jsonc
          echo "✅ Updated wrangler.jsonc with Hyperdrive ID"
          cat wrangler.jsonc

      - name: Install Sentry CLI
        run: npm install -g @sentry/cli

      - name: Build worker bundle (dry-run for Sentry sourcemaps)
        working-directory: apps/video-cron
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          mkdir -p .sentry-dist
          npx wrangler deploy --env production --dry-run --outdir .sentry-dist

      - name: Inject Sentry debug IDs into bundle
        working-directory: apps/video-cron
        run: sentry-cli sourcemaps inject .sentry-dist/

      - name: Upload sourcemaps to Sentry
        working-directory: apps/video-cron
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.FACTORY_SENTRY_API }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG || 'latwood-tech' }}
        run: |
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "::warning::FACTORY_SENTRY_API missing; sourcemap upload skipped"
            exit 0
          fi
          if ! sentry-cli sourcemaps upload \
            --project video-cron \
            .sentry-dist/; then
            echo "::warning::Sentry sourcemap upload failed; continuing deployment"
          fi

      - name: Provision secrets and deploy to Cloudflare Workers
        working-directory: apps/video-cron
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GITHUB_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          WORKER_API_TOKEN: ${{ secrets.WORKER_API_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "$GITHUB_APP_TOKEN" | npx wrangler secret put GITHUB_TOKEN --env production
          printf '%s' "$WORKER_API_TOKEN" | npx wrangler secret put WORKER_API_TOKEN --env production
          BUILT_FILE=$(ls .sentry-dist/*.js | grep -v '\.map$' | head -1)
          echo "Deploying pre-built bundle: $BUILT_FILE"
          npx wrangler deploy --no-bundle "$BUILT_FILE" --env production

      - name: Verify deployment
        run: |
          echo "🚀 Deployment complete"
          echo "⏰ Cron job configured: hourly (0 * * * *)"
          echo "📋 Cron jobs are managed by Cloudflare and run automatically"
          node scripts/verify-http-endpoint.mjs \
            --url https://video-cron.latwoodtech.work/health \
            --status 200 \
            --json-field status \
            --json-equals ok \
            --retries 8 \
            --delay-ms 5000
