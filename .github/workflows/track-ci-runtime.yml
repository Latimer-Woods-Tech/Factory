name: Track CI Runtime Telemetry

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write   # commit ci-runtime-history.csv
  issues: write     # open regression issues

jobs:
  track-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Collect CI runtime metrics
        run: node scripts/track-ci-runtime.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_RUNTIME_REPO_OWNER: ${{ github.repository_owner }}
          CI_RUNTIME_REPO_NAME: ${{ github.event.repository.name }}

      - name: Persist runtime history
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if [ -f ci-runtime-history.csv ]; then
            git add ci-runtime-history.csv
            git diff --quiet --cached || git commit -m 'chore: update CI runtime history'
            git push
          else
            echo "ci-runtime-history.csv not found — skipping commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
