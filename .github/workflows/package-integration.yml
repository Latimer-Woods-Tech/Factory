name: Package Integration Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'packages/**'
      - 'scripts/package-integration-smoke.mjs'
      - '.github/workflows/package-integration.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'scripts/package-integration-smoke.mjs'
      - '.github/workflows/package-integration.yml'

permissions:
  contents: read
  packages: read

concurrency:
  group: package-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-integration-smoke:
    name: Build dependency chain and run smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          registry-url: 'https://npm.pkg.github.com'
          scope: '@latimer-woods-tech'

      - name: Install and build package dependency chain
        shell: bash
        run: |
          set -euo pipefail
          for pkg in errors monitoring logger neon video llm schedule validation; do
            echo "::group::${pkg}"
            npm ci --prefix "packages/${pkg}" --prefer-offline
            npm run build --prefix "packages/${pkg}"
            echo "::endgroup::"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cross-package smoke assertions
        run: node scripts/package-integration-smoke.mjs
