name: completion-tracker
on:
  schedule:
    - cron: '30 10 * * *'   # 06:30 ET ≈ 10:30 UTC
  workflow_dispatch:
  repository_dispatch:
    types: [matrix-updated]

concurrency:
  group: completion-tracker
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: read
  actions: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      PUSHOVER_USER:    ${{ secrets.PUSHOVER_USER }}
      PUSHOVER_TOKEN:   ${{ secrets.PUSHOVER_TOKEN }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Mint Factory App token (all 5 repos)
        id: app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: |
            HumanDesign
            capricast
            Factory
            coh
            xico-city

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Run aggregator
        env:
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}
          OUTPUT_DIR: docs
        run: |
          python scripts/aggregate_completion.py

      - name: Detect drift
        id: drift
        run: |
          set -e
          git add docs/COMPLETION_TRACKER.md docs/completion-tracker.json docs/completion-tracker-history.jsonl
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compose digest fields
        if: steps.drift.outputs.changed == 'true'
        id: digest
        run: |
          set -e
          DATE=$(date -u +'%Y-%m-%d')
          PCT=$(python -c "import json;print(json.load(open('docs/completion-tracker.json'))['overall_weighted'])")
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "pct=$PCT"   >> "$GITHUB_OUTPUT"
          {
            echo 'body<<__EOF__'
            head -c 60000 docs/COMPLETION_TRACKER.md
            echo
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Open drift PR
        if: steps.drift.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          set -e
          BRANCH="completion-tracker/${{ steps.digest.outputs.date }}"
          git config user.name  "factory-cross-repo[bot]"
          git config user.email "factory-cross-repo[bot]@users.noreply.github.com"

          # Guard: if an open PR already exists for this branch, the workflow
          # was re-triggered today. Check if it's stale (>2h open without
          # auto-merging). If stale, re-arm auto-merge so it doesn't block the
          # next scheduled run. Symptom that motivated this: PR #702 sat open
          # 14h because GitHub's auto-merge silently disarmed after a rebase.
          EXISTING_PR=$(gh pr list \
            --head "$BRANCH" \
            --state open \
            --json number,createdAt \
            --jq '.[0] | "\(.number)|\(.createdAt)"' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            PR_NUM=$(echo "$EXISTING_PR" | cut -d'|' -f1)
            PR_CREATED=$(echo "$EXISTING_PR" | cut -d'|' -f2)
            PR_AGE_SEC=$(( $(date +%s) - $(date -d "$PR_CREATED" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$PR_CREATED" +%s 2>/dev/null || echo 0) ))
            if [ "$PR_AGE_SEC" -gt 7200 ]; then
              echo "PR #$PR_NUM open >2h ($PR_AGE_SEC s). Re-arming auto-merge."
              gh pr merge --auto --squash "$PR_NUM" \
                --repo Latimer-Woods-Tech/Factory 2>/dev/null \
                || gh pr merge --admin --squash "$PR_NUM" \
                     --repo Latimer-Woods-Tech/Factory 2>/dev/null \
                || echo "::warning::Could not re-arm auto-merge for PR #$PR_NUM; may need manual merge."
            else
              echo "PR #$PR_NUM already open for $BRANCH (age ${PR_AGE_SEC}s < 2h) — skipping duplicate push."
            fi
            exit 0
          fi

          # Branch may exist from a prior failed run that didn't open a PR.
          # Force-push is safe: this bot is the sole writer of tracker branches.
          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
          git commit -m "chore(completion-tracker): drift update ${{ steps.digest.outputs.date }} (${{ steps.digest.outputs.pct }}%)"
          git push --force-with-lease --set-upstream origin "$BRANCH"
          printf '%s' "${{ steps.digest.outputs.body }}" > /tmp/body.md
          gh pr create \
            --title "completion-tracker drift ${{ steps.digest.outputs.date }} — ${{ steps.digest.outputs.pct }}% weighted" \
            --body-file /tmp/body.md \
            --label automation \
            --label documentation \
            --label auto-merge
