name: Track Delivery KPIs

# RFC-006 §10: weekly runs upload KPI snapshot as a 30-day artifact.
# Snapshot PRs retired per RFC-006 §10.

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read # RFC-006 §10: artifact upload does not need write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # RFC-006 §10: artifact upload does not need write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run delivery KPI reporter
        run: node scripts/track-delivery-metrics.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_DELIVERY_KPIS }}
          INCIDENT_TRACKER_API: ${{ secrets.INCIDENT_TRACKER_API }}
          INCIDENT_TRACKER_TOKEN: ${{ secrets.INCIDENT_TRACKER_TOKEN }}
          KPI_REPO_OWNER: adrper79-dot
          KPI_REPO_NAME: factory

      # RFC-006 §10: upload artifact instead of opening a snapshot PR.
      - name: Upload KPI snapshot artifact
        uses: actions/upload-artifact@v7
        with:
          name: kpi-snapshot-${{ github.run_id }}
          path: kpi-history.csv
          retention-days: 30
          if-no-files-found: warn
