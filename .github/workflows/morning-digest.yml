name: Morning Digest

# Stage 2 M3 — Single morning Pushover that combines completion + cost +
# revenue + scorecard + open-PR asks into one message. Runs after all
# upstream digests have committed their snapshots.
#
# RFC-006 §10: daily runs upload digest as a 30-day artifact.
# Snapshot PRs retired per RFC-006 §10.
on:
  schedule:
    - cron: '17 8 * * *' # daily 08:17 UTC
    # Upstream cadence:
    #   06:37 UTC  cost-observability
    #   07:07 UTC  revenue-digest
    #   07:37 UTC  launch-readiness
    # The 40-minute pad after launch-readiness covers Actions queue jitter.
  workflow_dispatch:
    inputs:
      date:
        description: 'Reporting day (YYYY-MM-DD UTC). Empty = today.'
        required: false
      pushover:
        description: 'Send Pushover (true/false). Default true.'
        required: false
        default: 'true'

permissions:
  contents: read # RFC-006 §10: artifact upload does not need write

concurrency:
  group: morning-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Mint Factory App token
        id: app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: Factory

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
          token: ${{ steps.app.outputs.token }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Fetch Pushover credentials from Secret Manager
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env PUSHOVER_USER  FACTORY_PUSHOVER_USER PUSHOVER_USER pushover-user
          fetch_to_env PUSHOVER_TOKEN FACTORY_PUSHOVER_API PUSHOVER_TOKEN pushover-token

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Run morning digest
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          set -euo pipefail
          args=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            args="$args --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.pushover || 'true' }}" = "true" ]; then
            args="$args --pushover"
          fi
          python scripts/morning_digest.py $args

      # RFC-006 §10: upload artifact instead of opening a snapshot PR.
      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: morning-digest-${{ github.run_id }}
          path: docs/digest/
          retention-days: 30
          if-no-files-found: warn
