name: Morning Digest

# Stage 2 M3 — Single morning Pushover that combines completion + cost +
# revenue + scorecard + open-PR asks into one message. Runs after all
# upstream digests have committed their snapshots.
on:
  schedule:
    - cron: '17 8 * * *' # daily 08:17 UTC
    # Upstream cadence:
    #   06:37 UTC  cost-observability
    #   07:07 UTC  revenue-digest
    #   07:37 UTC  launch-readiness
    # The 40-minute pad after launch-readiness covers Actions queue jitter.
  workflow_dispatch:
    inputs:
      date:
        description: 'Reporting day (YYYY-MM-DD UTC). Empty = today.'
        required: false
      pushover:
        description: 'Send Pushover (true/false). Default true.'
        required: false
        default: 'true'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: morning-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Mint Factory App token
        id: app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: Factory

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          token: ${{ steps.app.outputs.token }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: ${{ secrets.VERTEX_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Fetch Pushover credentials from Secret Manager
        run: |
          set -euo pipefail
          source scripts/fetch_gcp_secrets.sh
          fetch_to_env PUSHOVER_USER  FACTORY_PUSHOVER_USER PUSHOVER_USER pushover-user
          fetch_to_env PUSHOVER_TOKEN FACTORY_PUSHOVER_API PUSHOVER_TOKEN pushover-token

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Run morning digest
        env:
          # App-minted token so the snapshot PR's labels can trigger
          # downstream workflows (auto-merge, project-sync). GITHUB_TOKEN
          # would suppress those cascades.
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          set -euo pipefail
          args=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            args="$args --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.pushover || 'true' }}" = "true" ]; then
            args="$args --pushover"
          fi
          python scripts/morning_digest.py $args

      - name: Open auto-merge PR for digest snapshot
        env:
          # App-minted token so the snapshot PR's labels can trigger
          # downstream workflows (auto-merge, project-sync). GITHUB_TOKEN
          # would suppress those cascades.
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          set -euo pipefail
          git add docs/digest/ 2>/dev/null || true
          if git diff --quiet --cached docs/digest/; then
            echo "No digest changes to commit."
            exit 0
          fi
          DATE=$(date -u +%F)
          BRANCH="chore/morning-digest-$DATE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
           
          # Check if the branch already exists
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi
           
          git add docs/digest/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Existing digest PR already contains this content."
          else
            git commit -m "chore(digest): morning digest ($DATE)"
            git push --force-with-lease --set-upstream origin "$BRANCH"
          fi
           
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing digest PR #$EXISTING_PR."
            gh pr edit "$EXISTING_PR" \
              --title "chore(digest): morning digest ($DATE)" \
              --body "Automated morning digest snapshot from \`morning-digest.yml\`. Single roll-up of conformance + cost + revenue + scorecard + open PRs. This branch is stable per day so reruns update one PR instead of opening timestamped duplicates."
            gh pr merge --auto --squash "$EXISTING_PR" || true
          else
            gh pr create \
              --title "chore(digest): morning digest ($DATE)" \
              --body "Automated morning digest snapshot from \`morning-digest.yml\`. Single roll-up of conformance + cost + revenue + scorecard + open PRs. This branch is stable per day so reruns update one PR instead of opening timestamped duplicates." \
              --label automation \
              --label documentation \
              --label auto-merge
          fi
