name: Mirror org secrets to Dependabot
on:
  workflow_dispatch:
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Mirror
        env:
          ADMIN_PAT: ${{ secrets.GH_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BETTER_AUTH_SECRET_VIDEOKING: ${{ secrets.BETTER_AUTH_SECRET_VIDEOKING }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_CYPHER: ${{ secrets.ELEVENLABS_VOICE_CYPHER }}
          ELEVENLABS_VOICE_DEFAULT: ${{ secrets.ELEVENLABS_VOICE_DEFAULT }}
          ELEVENLABS_VOICE_PRIME_SELF: ${{ secrets.ELEVENLABS_VOICE_PRIME_SELF }}
          FACTORY_PW: ${{ secrets.FACTORY_PW }}
          FACTORY_R2_ACCESS_KEY: ${{ secrets.FACTORY_R2_ACCESS_KEY }}
          FACTORY_R2_SECRET_KEY: ${{ secrets.FACTORY_R2_SECRET_KEY }}
          FACTORY_R2_TOKEN: ${{ secrets.FACTORY_R2_TOKEN }}
          FACTORY_USER: ${{ secrets.FACTORY_USER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_TOKEN_ISSUE: ${{ secrets.GH_TOKEN_ISSUE }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HYPERDRIVE_VIDEOKING: ${{ secrets.HYPERDRIVE_VIDEOKING }}
          ITSJUSUS_ZONE_ID: ${{ secrets.ITSJUSUS_ZONE_ID }}
          MINTLIFY_API: ${{ secrets.MINTLIFY_API }}
          NEON_CONNECTION_STRING: ${{ secrets.NEON_CONNECTION_STRING }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          POSTHOG_ADMIN_URL: ${{ secrets.POSTHOG_ADMIN_URL }}
          POSTHOG_API: ${{ secrets.POSTHOG_API }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_PROJECT_TOKEN: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
          POSTHOG_SESSION_URL: ${{ secrets.POSTHOG_SESSION_URL }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SCHEDULE_WORKER_URL: ${{ secrets.SCHEDULE_WORKER_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN_CYPHER_HEALING: ${{ secrets.SENTRY_DSN_CYPHER_HEALING }}
          SENTRY_DSN_FACTORY_ADMIN: ${{ secrets.SENTRY_DSN_FACTORY_ADMIN }}
          SENTRY_DSN_IJUSTUS: ${{ secrets.SENTRY_DSN_IJUSTUS }}
          SENTRY_DSN_NEIGHBOR_AID: ${{ secrets.SENTRY_DSN_NEIGHBOR_AID }}
          SENTRY_DSN_PRIME_SELF: ${{ secrets.SENTRY_DSN_PRIME_SELF }}
          SENTRY_DSN_THE_CALLING: ${{ secrets.SENTRY_DSN_THE_CALLING }}
          SENTRY_DSN_VIDEOKING: ${{ secrets.SENTRY_DSN_VIDEOKING }}
          SENTRY_DSN_WORDIS_BOND: ${{ secrets.SENTRY_DSN_WORDIS_BOND }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_PRACTITIONER_EMAIL: ${{ secrets.SMOKE_PRACTITIONER_EMAIL }}
          SMOKE_PRACTITIONER_PASSWORD: ${{ secrets.SMOKE_PRACTITIONER_PASSWORD }}
          SMOKE_USER_EMAIL: ${{ secrets.SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD }}
          STREAM_ACCOUNT_ID_VIDEOKING: ${{ secrets.STREAM_ACCOUNT_ID_VIDEOKING }}
          STREAM_CUSTOMER_DOMAIN_VIDEOKING: ${{ secrets.STREAM_CUSTOMER_DOMAIN_VIDEOKING }}
          STRIPE_PRICE_AGENCY: ${{ secrets.STRIPE_PRICE_AGENCY }}
          STRIPE_PRICE_AGENCY_ANNUAL: ${{ secrets.STRIPE_PRICE_AGENCY_ANNUAL }}
          STRIPE_PRICE_COMPOSITE_READING: ${{ secrets.STRIPE_PRICE_COMPOSITE_READING }}
          STRIPE_PRICE_INDIVIDUAL: ${{ secrets.STRIPE_PRICE_INDIVIDUAL }}
          STRIPE_PRICE_INDIVIDUAL_ANNUAL: ${{ secrets.STRIPE_PRICE_INDIVIDUAL_ANNUAL }}
          STRIPE_PRICE_LIFETIME_INDIVIDUAL: ${{ secrets.STRIPE_PRICE_LIFETIME_INDIVIDUAL }}
          STRIPE_PRICE_PRACTITIONER: ${{ secrets.STRIPE_PRICE_PRACTITIONER }}
          STRIPE_PRICE_PRACTITIONER_ANNUAL: ${{ secrets.STRIPE_PRICE_PRACTITIONER_ANNUAL }}
          STRIPE_PRICE_SINGLE_SYNTHESIS: ${{ secrets.STRIPE_PRICE_SINGLE_SYNTHESIS }}
          STRIPE_PRICE_TRANSIT_PASS: ${{ secrets.STRIPE_PRICE_TRANSIT_PASS }}
          STRIPE_PRICE_VIDEOKING_CITIZEN_ANNUAL: ${{ secrets.STRIPE_PRICE_VIDEOKING_CITIZEN_ANNUAL }}
          STRIPE_PRICE_VIDEOKING_CITIZEN_MONTHLY: ${{ secrets.STRIPE_PRICE_VIDEOKING_CITIZEN_MONTHLY }}
          STRIPE_PRICE_VIDEOKING_VIP_ANNUAL: ${{ secrets.STRIPE_PRICE_VIDEOKING_VIP_ANNUAL }}
          STRIPE_PRICE_VIDEOKING_VIP_MONTHLY: ${{ secrets.STRIPE_PRICE_VIDEOKING_VIP_MONTHLY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET_VIDEOKING: ${{ secrets.STRIPE_WEBHOOK_SECRET_VIDEOKING }}
          TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}
        run: |
          mkdir -p /tmp/mirror && cd /tmp/mirror
          npm init -y >/dev/null
          npm i libsodium-wrappers >/dev/null 2>&1
          cat > mirror.mjs <<'JS'
          import sodium from 'libsodium-wrappers';
          await sodium.ready;
          const ORG = 'Latimer-Woods-Tech';
          const PAT = "placeholder";
          const NAMES = ["ANTHROPIC_API_KEY","BETTER_AUTH_SECRET_VIDEOKING","CF_API_TOKEN","CLOUDFLARE_ACCOUNT_ID","CLOUDFLARE_API_TOKEN","DEEPGRAM_API_KEY","ELEVENLABS_API_KEY","ELEVENLABS_VOICE_CYPHER","ELEVENLABS_VOICE_DEFAULT","ELEVENLABS_VOICE_PRIME_SELF","FACTORY_PW","FACTORY_R2_ACCESS_KEY","FACTORY_R2_SECRET_KEY","FACTORY_R2_TOKEN","FACTORY_USER","GEMINI_API_KEY","GH_PAT","GH_TOKEN_ISSUE","GOOGLE_CLIENT_ID","GOOGLE_CLIENT_SECRET","GROK_API_KEY","GROQ_API_KEY","HYPERDRIVE_VIDEOKING","ITSJUSUS_ZONE_ID","MINTLIFY_API","NEON_CONNECTION_STRING","NEWS_API_KEY","NPM_TOKEN","POSTHOG_ADMIN_URL","POSTHOG_API","POSTHOG_PROJECT_ID","POSTHOG_PROJECT_TOKEN","POSTHOG_SESSION_URL","PUSHOVER_TOKEN","PUSHOVER_USER","PUSHOVER_USER_KEY","R2_ACCESS_KEY_ID","R2_BUCKET_NAME","R2_PUBLIC_DOMAIN","R2_SECRET_ACCESS_KEY","RESEND_API_KEY","SCHEDULE_WORKER_URL","SENTRY_AUTH_TOKEN","SENTRY_DSN_CYPHER_HEALING","SENTRY_DSN_FACTORY_ADMIN","SENTRY_DSN_IJUSTUS","SENTRY_DSN_NEIGHBOR_AID","SENTRY_DSN_PRIME_SELF","SENTRY_DSN_THE_CALLING","SENTRY_DSN_VIDEOKING","SENTRY_DSN_WORDIS_BOND","SMOKE_EMAIL","SMOKE_PASSWORD","SMOKE_PRACTITIONER_EMAIL","SMOKE_PRACTITIONER_PASSWORD","SMOKE_USER_EMAIL","SMOKE_USER_PASSWORD","STREAM_ACCOUNT_ID_VIDEOKING","STREAM_CUSTOMER_DOMAIN_VIDEOKING","STRIPE_PRICE_AGENCY","STRIPE_PRICE_AGENCY_ANNUAL","STRIPE_PRICE_COMPOSITE_READING","STRIPE_PRICE_INDIVIDUAL","STRIPE_PRICE_INDIVIDUAL_ANNUAL","STRIPE_PRICE_LIFETIME_INDIVIDUAL","STRIPE_PRICE_PRACTITIONER","STRIPE_PRICE_PRACTITIONER_ANNUAL","STRIPE_PRICE_SINGLE_SYNTHESIS","STRIPE_PRICE_TRANSIT_PASS","STRIPE_PRICE_VIDEOKING_CITIZEN_ANNUAL","STRIPE_PRICE_VIDEOKING_CITIZEN_MONTHLY","STRIPE_PRICE_VIDEOKING_VIP_ANNUAL","STRIPE_PRICE_VIDEOKING_VIP_MONTHLY","STRIPE_PUBLISHABLE_KEY","STRIPE_SECRET_KEY","STRIPE_WEBHOOK_SECRET_VIDEOKING","TELNYX_API_KEY"];
          const H = { 'Authorization': 'Bearer ' + PAT, 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' };
          const pkRes = await fetch(`https://api.github.com/orgs/${ORG}/dependabot/secrets/public-key`, { headers: H });
          if (!pkRes.ok) { console.error('public-key fetch failed', pkRes.status, await pkRes.text()); process.exit(1); }
          const pk = await pkRes.json();
          const pkBin = sodium.from_base64(pk.key, sodium.base64_variants.ORIGINAL);
          let ok=0, fail=0;
          for (const name of NAMES) {
            const v = process.env[name];
            if (v === undefined || v === null || v === '') { console.log('SKIP', name); fail++; continue; }
            const ct = sodium.crypto_box_seal(sodium.from_string(v), pkBin);
            const encrypted_value = sodium.to_base64(ct, sodium.base64_variants.ORIGINAL);
            const r = await fetch(`https://api.github.com/orgs/${ORG}/dependabot/secrets/${name}`, {
              method: 'PUT', headers: { ...H, 'Content-Type': 'application/json' },
              body: JSON.stringify({ encrypted_value, key_id: pk.key_id, visibility: 'all' }),
            });
            if (r.ok) { console.log('OK', name); ok++; }
            else { console.error('FAIL', name, r.status, await r.text()); fail++; }
          }
          console.log(`Done: ${ok} ok, ${fail} fail`);
          if (fail > 0) process.exit(1);
          JS
          node mirror.mjs
