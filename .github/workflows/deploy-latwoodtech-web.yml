name: Deploy latwoodtech.com

on:
  push:
    branches: [main]
    paths:
      - 'apps/latwoodtech-web/**'
      - 'docs/completion-tracker.json'
      - '.github/workflows/deploy-latwoodtech-web.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # never cancel an in-flight production deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        working-directory: apps/latwoodtech-web
        run: npm install

      - name: Build frontend
        working-directory: apps/latwoodtech-web
        run: npm run build:frontend

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/latwoodtech-web/dist --project-name=latwoodtech-com --branch=main

      - name: Verify Pages preview deployment
        run: |
          for i in {1..5}; do
            if curl -fsSL https://main.latwoodtech-com.pages.dev > /dev/null; then
              echo "Pages preview reachable"
              exit 0
            fi
            echo "Retrying preview verification ($i/5)..."
            sleep 5
          done
          echo "Pages preview verification failed"
          exit 1

      # CLAUDE.md Verification Requirement: a deploy is not done until the
      # customer-facing URL serves our build. This step fails loudly if
      # latwoodtech.com still serves the Squarespace parking page (i.e.
      # nameservers were never delegated to Cloudflare) so CI cannot go green
      # while the public URL is broken.
      - name: Verify custom domain serves the Pages build
        run: |
          set -e
          body=$(curl -fsSL --retry 5 --retry-delay 5 --max-time 30 https://latwoodtech.com/ || true)
          if [ -z "$body" ]; then
            echo "::error::latwoodtech.com returned no body (DNS not delegated, cert pending, or origin down)."
            exit 1
          fi
          if echo "$body" | grep -qiE "squarespace|coming soon|parking-page"; then
            echo "::error::latwoodtech.com is still serving a Squarespace parking page — Cloudflare nameservers are not active yet."
            echo "Fix at the Squarespace Domains registrar: set nameservers to the CF pair assigned to this zone."
            exit 1
          fi
          if ! echo "$body" | grep -qiE "latimer woods|factory pulse"; then
            echo "::error::latwoodtech.com is reachable but the body does not contain expected landing-page markers."
            exit 1
          fi
          echo "Custom domain verified: latwoodtech.com is serving the Pages build."
