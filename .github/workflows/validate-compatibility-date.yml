name: Validate Compatibility Date

# Enforces a single canonical wrangler `compatibility_date` across the worker
# fleet (FRH-CFG-001 / issue #585). Normalizing UP to the newest production-proven
# date — never down — keeps runtime semantics consistent across all workers.

on:
  pull_request:
    paths:
      - 'apps/*/wrangler.jsonc'
      - 'packages/deploy/templates/wrangler.jsonc'
      - 'packages/deploy/scripts/scaffold.mjs'
      - 'packages/deploy/scripts/scaffold-factory-admin.mjs'
      - 'scripts/check-compatibility-date.mjs'
      - '.github/workflows/validate-compatibility-date.yml'
  push:
    branches: [main]
    paths:
      - 'apps/*/wrangler.jsonc'
      - 'packages/deploy/templates/wrangler.jsonc'
      - 'packages/deploy/scripts/scaffold.mjs'
      - 'packages/deploy/scripts/scaffold-factory-admin.mjs'
      - 'scripts/check-compatibility-date.mjs'
      - '.github/workflows/validate-compatibility-date.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      # The validator uses only Node builtins — no dependency install required.
      - name: Validate compatibility_date is normalized
        run: npm run validate:compatibility-date
