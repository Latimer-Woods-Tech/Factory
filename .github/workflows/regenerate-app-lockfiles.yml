name: Regenerate App Lockfiles
on:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: read

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        repo:
          - cypher-healing
          - the-calling
          - neighbor-aid
          - xico-city
          - factory-admin
          - xpelevator
      fail-fast: false
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Checkout ${{ matrix.repo }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: Latimer-Woods-Tech/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}
          ref: main
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Regenerate package-lock.json
        run: |
          rm -f package-lock.json
          npm install --package-lock-only --no-audit --no-fund
      - name: Open PR if changed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -e
          if git diff --quiet package-lock.json 2>/dev/null; then
            echo "No lockfile changes"
            exit 0
          fi
          BR="chore/refresh-lockfile-npmjs"
          git config user.email "factory-cross-repo[bot]@users.noreply.github.com"
          git config user.name "factory-cross-repo[bot]"
           
          # Check if the branch already exists
          if git ls-remote --exit-code --heads origin "$BR" >/dev/null 2>&1; then
            git fetch origin "$BR"
            git checkout -B "$BR" "origin/$BR"
          else
            git checkout -b "$BR"
          fi
           
          git add package-lock.json
          if git diff --cached --quiet; then
            echo "Existing lockfile PR already contains this content."
          else
            git commit -m "chore: refresh package-lock.json (npmjs.org migration)"
            git push --force-with-lease --set-upstream origin "$BR"
          fi
           
          EXISTING_PR=$(gh pr list --head "$BR" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #$EXISTING_PR."
            gh pr edit "$EXISTING_PR" \
              --title "chore: refresh package-lock.json (npmjs.org migration)" \
              --body "Automated lockfile refresh after migrating @latimer-woods-tech/* packages to public npmjs.org. Merging unblocks CI. This branch is stable so reruns update one PR instead of opening timestamped duplicates."
            gh pr merge --auto --squash "$EXISTING_PR" || true
          else
            gh pr create --repo "Latimer-Woods-Tech/${{ matrix.repo }}" --base main --head "$BR" --title "chore: refresh package-lock.json (npmjs.org migration)" --body "Automated lockfile refresh after migrating @latimer-woods-tech/* packages to public npmjs.org. Merging unblocks CI. This branch is stable so reruns update one PR instead of opening timestamped duplicates."
          fi
