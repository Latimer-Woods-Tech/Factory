name: Publish Package
on:
  push:
    tags: ['*/v*']
permissions:
  contents: read
  id-token: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          scope: '@latimer-woods-tech'
      - name: Upgrade npm to >= 11.5.1 (required for OIDC trusted publishers)
        run: |
          set -euo pipefail
          echo "npm before: $(npm --version)"
          npm install -g npm@latest
          echo "npm after:  $(npm --version)"
          node -e "
            const v = require('child_process').execSync('npm --version').toString().trim();
            const [maj, min, patch] = v.split('.').map(Number);
            const ok = maj > 11 || (maj === 11 && (min > 5 || (min === 5 && patch >= 1)));
            if (!ok) { console.error('npm ' + v + ' < 11.5.1 — OIDC trusted publishers unavailable'); process.exit(1); }
          "
      - name: Detect and validate package from tag
        run: |
          set -euo pipefail
          PACKAGE=$(echo "$GITHUB_REF_NAME" | cut -d'/' -f1)
          if [ ! -d "packages/${PACKAGE}" ]; then
            echo "::error::Package directory 'packages/${PACKAGE}' does not exist for tag '${GITHUB_REF_NAME}'."
            exit 1
          fi
          PKG_NAME=$(node -p "require('./packages/' + '${PACKAGE}' + '/package.json').name")
          echo "Resolved package: ${PKG_NAME} from packages/${PACKAGE}"
          echo "PACKAGE=${PACKAGE}" >> "$GITHUB_ENV"
      - name: Build local dependencies in order
        run: |
          set -euo pipefail
          DEPS=(errors monitoring logger realtime bodygraph design-tokens ui auth neon stripe llm telephony analytics deploy testing email copy content social seo validation crm compliance admin video schedule llm-meter studio-core creator design-system entitlements protocol browser flags agent)
          for pkg in "${DEPS[@]}"; do
            if [ "$pkg" = "$PACKAGE" ]; then
              break
            fi
            if [ -d "packages/${pkg}" ]; then
              echo "--- Building dependency: $pkg ---"
              (cd "packages/${pkg}" && npm ci --ignore-scripts && npm run build)
            fi
          done
      - name: Strip publishConfig.registry override
        run: |
          cd "packages/${PACKAGE}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));if(p.publishConfig&&p.publishConfig.registry){delete p.publishConfig.registry;fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');console.log('Stripped publishConfig.registry')}"
      - name: Install package
        run: |
          cd "packages/${PACKAGE}"
          if [ -f "package-lock.json" ]; then
            npm ci --ignore-scripts
          else
            npm install --ignore-scripts --no-save
          fi
      - name: Pre-publish checks
        run: cd "packages/${PACKAGE}" && (npm run prepublish --if-present || echo 'no prepublish')
      - name: Publish to npmjs.org
        run: cd "packages/${PACKAGE}" && npm publish --access public --ignore-scripts --provenance
        env:
          # Authenticate with the automation token (setup-node wired registry-url
          # to read NODE_AUTH_TOKEN). This replaces tokenless OIDC, which required
          # a per-package trusted publisher configured in the npm web UI. Keeping
          # --provenance still attaches a Sigstore attestation via id-token: write.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
