name: Reusable — Neon PR Branch Lifecycle

# Spins up an isolated PR preview environment for any Factory app:
#   1. Creates a Neon branch forked from `staging` (named pr/{number}).
#   2. Creates an ephemeral Hyperdrive config bound to that branch.
#   3. Deploys a preview Worker (separate name) with the ephemeral Hyperdrive.
#   4. Attaches a custom domain at api.pr-{number}.{app}.latimerwoods.dev.
#   5. Posts a PR comment with the preview URL.
# On PR close, tears everything down in reverse order.
#
# Naming convention (deterministic so cleanup can re-derive without state):
#   Neon branch:  pr/{pr_number}                   (parent: staging)
#   Hyperdrive:   {worker_base_name}-pr-{pr_number}
#   Worker:       {worker_base_name}-pr-{pr_number}
#   Domain:       api.pr-{pr_number}.{app_name}.latimerwoods.dev
#
# Callers must provide their app's production Hyperdrive UUID so we can
# sed-replace it in wrangler.jsonc with the ephemeral one (Hyperdrive bindings
# are JSON-only — no CLI override exists).
#
# Security: FRIDGE rule 8 (irreversible actions require human approval) is
# respected because (a) Neon branches forked from staging carry no production
# data, (b) preview Workers live on isolated names that never replace prod
# routes, and (c) cleanup only deletes resources matching the deterministic
# pr-{number} pattern.

on:
  workflow_call:
    inputs:
      neon_project_id:
        description: Neon project ID (e.g. divine-grass-42421088).
        required: true
        type: string
      neon_parent_branch:
        description: Parent Neon branch to fork from. Defaults to 'staging' to keep production data isolated.
        required: false
        type: string
        default: staging
      app_name:
        description: Short app identifier used in the preview subdomain (e.g. 'capricast').
        required: true
        type: string
      worker_base_name:
        description: Production wrangler `name` field (e.g. 'capricast-api'). Cleanup derives the PR worker name from this.
        required: true
        type: string
      worker_path:
        description: Path to the worker's directory containing wrangler.jsonc (e.g. 'apps/capricast-api').
        required: true
        type: string
      worker_env:
        description: |
          wrangler env to deploy. Pass 'staging' (or whichever named env mirrors staging's
          bindings) so the preview Worker inherits staging routes/secrets, NOT production's.
          Leave empty only if your wrangler.jsonc has no named envs (top-level config only).
        required: false
        type: string
        default: staging
      production_hyperdrive_id:
        description: The Hyperdrive UUID currently hardcoded in wrangler.jsonc. Used as the sed-replace anchor.
        required: true
        type: string
      wrangler_config:
        description: |
          Optional path to a non-default wrangler config file (e.g. 'wrangler.staging.toml'
          for repos that use per-env files instead of env blocks in a single wrangler.jsonc).
          Empty means use the default wrangler.jsonc / wrangler.toml discovery.
        required: false
        type: string
        default: ''
      pr_number:
        description: GitHub PR number (github.event.number from the caller).
        required: true
        type: string
      pr_action:
        description: github.event.action — 'opened', 'synchronize', 'reopened', or 'closed'.
        required: true
        type: string
      latimerwoods_zone:
        description: CF zone for preview domains. Override only if testing on a different zone.
        required: false
        type: string
        default: latimerwoods.dev
    secrets:
      NEON_API_KEY:
        required: true
      CF_API_TOKEN:
        required: true
      CF_ACCOUNT_ID:
        required: true
      GH_PAT:
        required: true
      FACTORY_APP_ID:
        required: true
      FACTORY_APP_PRIVATE_KEY:
        required: true

concurrency:
  group: neon-pr-${{ inputs.app_name }}-${{ inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  create:
    name: Create or update PR preview
    if: ${{ inputs.pr_action == 'opened' || inputs.pr_action == 'synchronize' || inputs.pr_action == 'reopened' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Compute names
        id: names
        # PATTERNS.md #8: bind inputs through env: instead of inlining ${{ ... }}
        # into shell, even though workflow_call inputs come from caller-controlled
        # workflows rather than arbitrary user data.
        env:
          PR: ${{ inputs.pr_number }}
          BASE: ${{ inputs.worker_base_name }}
          APP: ${{ inputs.app_name }}
          ZONE: ${{ inputs.latimerwoods_zone }}
        run: |
          set -euo pipefail
          echo "neon_branch=pr/${PR}"                                      >> "$GITHUB_OUTPUT"
          echo "hyperdrive_name=${BASE}-pr-${PR}"                          >> "$GITHUB_OUTPUT"
          echo "worker_name=${BASE}-pr-${PR}"                              >> "$GITHUB_OUTPUT"
          echo "preview_host=api.pr-${PR}.${APP}.${ZONE}"                  >> "$GITHUB_OUTPUT"
          echo "preview_url=https://api.pr-${PR}.${APP}.${ZONE}"           >> "$GITHUB_OUTPUT"

      - name: Create or update Neon branch
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          BRANCH: ${{ steps.names.outputs.neon_branch }}
          PROJECT: ${{ inputs.neon_project_id }}
          PARENT: ${{ inputs.neon_parent_branch }}
        run: |
          set -euo pipefail

          # neonctl create is idempotent in practice: it returns the existing
          # branch when one already exists with the same name. We tolerate
          # either outcome and always pull a fresh connection string.
          npx --yes neonctl@latest branches create \
            --project-id "$PROJECT" \
            --name "$BRANCH" \
            --parent "$PARENT" \
            --type read_write \
            || echo "Branch $BRANCH already exists (treating as success)"

          CONN=$(npx --yes neonctl@latest connection-string \
            --project-id "$PROJECT" \
            --branch "$BRANCH" \
            --role-name neondb_owner \
            --database-name neondb \
            --pooled true)

          if [ -z "$CONN" ]; then
            echo "::error::Failed to resolve connection string for $BRANCH"
            exit 1
          fi

          # Mask the URL so it never lands in logs.
          echo "::add-mask::$CONN"
          echo "connection_string=$CONN" >> "$GITHUB_OUTPUT"

      - name: Create or replace ephemeral Hyperdrive
        id: hyperdrive
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          HD_NAME: ${{ steps.names.outputs.hyperdrive_name }}
          CONN: ${{ steps.neon.outputs.connection_string }}
        run: |
          set -euo pipefail
          NAME="$HD_NAME"

          # wrangler hyperdrive list --json is unsupported (outputs non-JSON).
          # Use CF API for all list/delete operations; wrangler only for create.
          hd_list() {
            curl -fsS \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/hyperdrive/configs"
          }
          hd_find_id() {
            HD_NAME="$1" node -e "
              const r=JSON.parse(require('fs').readFileSync(0,'utf8'));
              const m=(r.result??[]).find(h=>h.name===process.env.HD_NAME);
              console.log(m?m.id:'');
            "
          }

          EXISTING=$(hd_list | hd_find_id "$NAME")
          if [ -n "$EXISTING" ]; then
            echo "Removing stale Hyperdrive $EXISTING ($NAME) before recreating"
            curl -fsS -X DELETE \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/hyperdrive/configs/${EXISTING}" \
              > /dev/null
          fi

          npx --yes wrangler hyperdrive create "$NAME" --connection-string "$CONN"

          # Read back UUID via CF API — wrangler output format varies across versions.
          UUID=$(hd_list | hd_find_id "$NAME")
          if [ -z "$UUID" ]; then
            echo "::error::Hyperdrive '$NAME' not found after create"
            exit 1
          fi
          echo "hyperdrive_id=$UUID" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          set -euo pipefail
          # Install from repo root so workspace packages (e.g. @capricast/types,
          # @capricast/db) are resolvable when wrangler builds the worker bundle.
          if [ -f "pnpm-lock.yaml" ]; then
            npm install -g pnpm@latest --silent
            pnpm install --frozen-lockfile
          elif [ -f "yarn.lock" ]; then
            yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Prepare ephemeral wrangler config
        working-directory: ${{ inputs.worker_path }}
        env:
          PROD_UUID: ${{ inputs.production_hyperdrive_id }}
          EPHEMERAL_UUID: ${{ steps.hyperdrive.outputs.hyperdrive_id }}
          WRANGLER_CONFIG: ${{ inputs.wrangler_config }}
        run: |
          set -euo pipefail
          # Determine which wrangler config file to patch.
          # Callers that use per-env files (e.g. wrangler.staging.toml) pass
          # wrangler_config; callers using a single wrangler.jsonc leave it empty.
          CONFIG_FILE="${WRANGLER_CONFIG:-wrangler.jsonc}"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "::error::Wrangler config '$CONFIG_FILE' not found in $(pwd)"
            ls -la
            exit 1
          fi
          if ! grep -q "$PROD_UUID" "$CONFIG_FILE"; then
            echo "::error::production_hyperdrive_id '$PROD_UUID' not found in $CONFIG_FILE — sed replace would be a no-op"
            exit 1
          fi
          sed -i "s/$PROD_UUID/$EPHEMERAL_UUID/g" "$CONFIG_FILE"
          echo "Swapped Hyperdrive UUID in $CONFIG_FILE"

      - name: Deploy preview Worker
        working-directory: ${{ inputs.worker_path }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          WORKER_NAME: ${{ steps.names.outputs.worker_name }}
          WORKER_ENV: ${{ inputs.worker_env }}
          WRANGLER_CONFIG: ${{ inputs.wrangler_config }}
        run: |
          set -euo pipefail
          # Deploy the preview Worker:
          # - --name overrides the wrangler.jsonc `name` field.
          # - --env inherits the named env's bindings (DB, KV, routes outside top
          #   level, etc.). Critical for Capricast-style configs where production
          #   bindings live at the top level: without --env the preview Worker
          #   would inherit production bindings.
          # - --config picks up per-env wrangler files (e.g. wrangler.staging.toml).
          ARGS=( deploy --name "$WORKER_NAME" )
          if [ -n "$WORKER_ENV" ]; then
            ARGS+=( --env "$WORKER_ENV" )
          fi
          if [ -n "$WRANGLER_CONFIG" ]; then
            ARGS+=( --config "$WRANGLER_CONFIG" )
          fi
          echo "Running: npx wrangler ${ARGS[*]}"
          npx --yes wrangler "${ARGS[@]}"

      - name: Attach preview custom domain
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          WORKER_NAME: ${{ steps.names.outputs.worker_name }}
          HOST: ${{ steps.names.outputs.preview_host }}
          ZONE: ${{ inputs.latimerwoods_zone }}
        run: |
          set -euo pipefail

          # Look up the zone id once.
          ZONE_ID=$(curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=${ZONE}" \
            | node -e "const r=JSON.parse(require('fs').readFileSync(0,'utf8')); console.log(r.result?.[0]?.id ?? '')")
          if [ -z "$ZONE_ID" ]; then
            echo "::error::Could not resolve zone id for $ZONE"
            exit 1
          fi

          # Attach custom domain to the worker. The API is idempotent — if the
          # mapping already exists for this hostname + worker, the call returns
          # 200 with the existing record.
          curl -fsS -X PUT \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/domains" \
            -d "{\"environment\":\"production\",\"hostname\":\"$HOST\",\"service\":\"$WORKER_NAME\",\"zone_id\":\"$ZONE_ID\"}" \
            > /tmp/domain.json
          cat /tmp/domain.json | node -e "const r=JSON.parse(require('fs').readFileSync(0,'utf8')); if(!r.success){console.error('domain attach failed:', JSON.stringify(r.errors)); process.exit(1)}"
          echo "Attached https://$HOST → $WORKER_NAME"

      - name: Verify /health
        env:
          PREVIEW_URL: ${{ steps.names.outputs.preview_url }}
        run: |
          set -e
          URL="${PREVIEW_URL}/health"
          for i in 1 2 3 4 5 6; do
            if curl -fsSL --max-time 10 "$URL" > /tmp/health.json; then
              echo "Preview /health reachable: $URL"
              cat /tmp/health.json
              exit 0
            fi
            echo "Retry $i/6 — health not ready yet, waiting 10s"
            sleep 10
          done
          echo "::warning::Preview /health did not return 200 within 60s (DNS/cert may still be propagating)."

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR: ${{ inputs.pr_number }}
          APP_NAME: ${{ inputs.app_name }}
          PARENT_BRANCH: ${{ inputs.neon_parent_branch }}
          PREVIEW_URL: ${{ steps.names.outputs.preview_url }}
          NEON_BRANCH: ${{ steps.names.outputs.neon_branch }}
          WORKER_NAME: ${{ steps.names.outputs.worker_name }}
          HYPERDRIVE_NAME: ${{ steps.names.outputs.hyperdrive_name }}
        run: |
          set -euo pipefail
          MARKER="<!-- neon-pr-lifecycle:${APP_NAME} -->"
          BODY=$(cat <<EOM
          🔍 **PR Preview ready**

          | Resource | Value |
          |---|---|
          | Preview API | ${PREVIEW_URL} |
          | Health probe | ${PREVIEW_URL}/health |
          | Neon branch | \`${NEON_BRANCH}\` (forked from \`${PARENT_BRANCH}\`) |
          | Worker name | \`${WORKER_NAME}\` |
          | Hyperdrive  | \`${HYPERDRIVE_NAME}\` |

          This environment auto-tears-down when the PR closes or merges. Synchronize the PR to redeploy.

          ${MARKER}
          EOM
          )

          # Find existing comment with our marker and update it; otherwise create one.
          REPO=${GITHUB_REPOSITORY}
          EXISTING=$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            --jq "[.[] | select(.body | contains(\"${MARKER}\"))] | first | .id // empty")
          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${EXISTING}" -f body="$BODY" > /dev/null
            echo "Updated existing preview comment (id=$EXISTING)"
          else
            gh pr comment "$PR" --repo "$REPO" --body "$BODY"
            echo "Posted new preview comment"
          fi

  destroy:
    name: Tear down PR preview
    if: ${{ inputs.pr_action == 'closed' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Compute names
        id: names
        env:
          PR: ${{ inputs.pr_number }}
          BASE: ${{ inputs.worker_base_name }}
          APP: ${{ inputs.app_name }}
          ZONE: ${{ inputs.latimerwoods_zone }}
        run: |
          set -euo pipefail
          echo "neon_branch=pr/${PR}"                                       >> "$GITHUB_OUTPUT"
          echo "hyperdrive_name=${BASE}-pr-${PR}"                           >> "$GITHUB_OUTPUT"
          echo "worker_name=${BASE}-pr-${PR}"                               >> "$GITHUB_OUTPUT"
          echo "preview_host=api.pr-${PR}.${APP}.${ZONE}"                   >> "$GITHUB_OUTPUT"

      - name: Detach preview custom domain
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          HOST: ${{ steps.names.outputs.preview_host }}
        run: |
          set -euo pipefail
          # Look up the domain mapping id then DELETE it.
          MAPPING_ID=$(curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/domains?hostname=${HOST}" \
            | node -e "const r=JSON.parse(require('fs').readFileSync(0,'utf8')); console.log(r.result?.[0]?.id ?? '')")
          if [ -n "$MAPPING_ID" ]; then
            curl -fsS -X DELETE -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/domains/${MAPPING_ID}" \
              > /dev/null
            echo "Detached $HOST (mapping $MAPPING_ID)"
          else
            echo "No custom domain mapping found for $HOST (already detached)"
          fi

      - name: Delete preview Worker
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          WORKER_NAME: ${{ steps.names.outputs.worker_name }}
          WORKER_ENV: ${{ inputs.worker_env }}
          WRANGLER_CONFIG: ${{ inputs.wrangler_config }}
        run: |
          set -euo pipefail
          ARGS=( delete --name "$WORKER_NAME" --force )
          if [ -n "$WORKER_ENV" ]; then
            ARGS+=( --env "$WORKER_ENV" )
          fi
          if [ -n "$WRANGLER_CONFIG" ]; then
            ARGS+=( --config "$WRANGLER_CONFIG" )
          fi
          npx --yes wrangler "${ARGS[@]}" || echo "Worker $WORKER_NAME already gone"

      - name: Delete ephemeral Hyperdrive
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          HD_NAME: ${{ steps.names.outputs.hyperdrive_name }}
        run: |
          set -euo pipefail
          ID=$(curl -fsS \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/hyperdrive/configs" \
            | HD_NAME="$HD_NAME" node -e "
              const r=JSON.parse(require('fs').readFileSync(0,'utf8'));
              const m=(r.result??[]).find(h=>h.name===process.env.HD_NAME);
              console.log(m?m.id:'');
            ")
          if [ -n "$ID" ]; then
            curl -fsS -X DELETE \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/hyperdrive/configs/${ID}" \
              > /dev/null
            echo "Deleted Hyperdrive $HD_NAME ($ID)"
          else
            echo "No Hyperdrive named $HD_NAME (already gone)"
          fi

      - name: Delete Neon PR branch
        continue-on-error: true
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          BRANCH: ${{ steps.names.outputs.neon_branch }}
          PROJECT: ${{ inputs.neon_project_id }}
        run: |
          set -euo pipefail
          npx --yes neonctl@latest branches delete "$BRANCH" \
            --project-id "$PROJECT" \
            || echo "Neon branch $BRANCH already gone"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
      - name: Post cleanup confirmation
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR: ${{ inputs.pr_number }}
          APP_NAME: ${{ inputs.app_name }}
          WORKER_NAME: ${{ steps.names.outputs.worker_name }}
          HYPERDRIVE_NAME: ${{ steps.names.outputs.hyperdrive_name }}
          NEON_BRANCH: ${{ steps.names.outputs.neon_branch }}
          PREVIEW_HOST: ${{ steps.names.outputs.preview_host }}
        run: |
          set -euo pipefail
          REPO=${GITHUB_REPOSITORY}
          MARKER="<!-- neon-pr-lifecycle:${APP_NAME} -->"
          BODY=$(cat <<EOM
          🧹 **PR Preview torn down**

          Cleaned up:
          - Preview Worker \`${WORKER_NAME}\`
          - Hyperdrive \`${HYPERDRIVE_NAME}\`
          - Neon branch \`${NEON_BRANCH}\`
          - Custom domain \`${PREVIEW_HOST}\`

          ${MARKER}
          EOM
          )

          EXISTING=$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            --jq "[.[] | select(.body | contains(\"${MARKER}\"))] | first | .id // empty")
          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${EXISTING}" -f body="$BODY" > /dev/null
          else
            gh pr comment "$PR" --repo "$REPO" --body "$BODY"
          fi
