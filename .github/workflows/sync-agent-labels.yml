name: Sync agent labels

on:
  push:
    paths:
      - '.github/agent-labels.json'
      - '.github/workflows/sync-agent-labels.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - Factory
          - HumanDesign
          - capricast
          - xico-city
          - coh
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Mint Factory App token
        id: app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech
          repositories: >-
            Factory,HumanDesign,capricast,xico-city,coh

      - id: label-config
        run: echo "labels=$(jq -c '.labels' .github/agent-labels.json)" >> "$GITHUB_OUTPUT"

      - name: Apply labels to ${{ matrix.repo }}
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        with:
          github-token: ${{ steps.app.outputs.token }}
          script: |
            const labels = ${{ steps.label-config.outputs.labels }};
            const owner = 'Latimer-Woods-Tech';
            const repo = '${{ matrix.repo }}';
            let created = 0, updated = 0, skipped = 0;

            for (const label of labels) {
              try {
                const existing = await github.rest.issues.getLabel({ owner, repo, name: label.name });
                if (
                  existing.data.color === label.color &&
                  existing.data.description === label.description
                ) {
                  skipped++;
                  continue;
                }
                await github.rest.issues.updateLabel({
                  owner, repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
                updated++;
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner, repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
                created++;
              }
            }
            core.info(`${repo}: created=${created} updated=${updated} skipped=${skipped}`);
