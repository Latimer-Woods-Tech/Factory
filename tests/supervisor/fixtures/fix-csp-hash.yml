fixture_for: fix-csp-hash
issue:
  title: "fix(csp): update FOUC script hash after density persist added"
  labels: [bug, area:frontend]
  body: |
    Every page load produces a CSP violation in the browser console:

    "Refused to execute inline script because it violates the following
    Content Security Policy directive: 'script-src ... sha256-IBRAhIYm9X...'"

    PR #57 updated the FOUC inline script in client/index.html to persist
    ps-density alongside ps-theme, changing the SHA-256 hash. The CSP in
    client/public/_headers was last updated 2026-04-15 and still references
    the old hash.

    App: humandesign
    Headers file: client/public/_headers
    Old hash: sha256-IBRAhIYm9XMWtGSVWOS5jgqXr3hs3gA7yc2IzEJdBHM=
    New hash: sha256-KrVPBcf9XMWtGSVXOS5jgqXr3hs3gA7yc2IzEJdBkK8=

    Single-line fix: swap old hash for new hash in the CSP header.
